<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECInfo CALL 系統 UI 原型</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --font-sans: "PingFang HK", "PingFang TC", "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      --panel: #ffffff;
      --panel-soft: #f8fafd;
      --text: #1f2937;
      --muted: #687386;
      --line: #dde5f0;
      --border: #dde5f0;
      --primary: #1e6bff;
      --primary-strong: #0b55df;
      --primary-soft: #eaf1ff;
      --sidebar: #10233a;
      --sidebar-2: #0b1b2e;
      --success: #12a56b;
      --success-soft: #e8f8f1;
      --warning: #e99a12;
      --warning-soft: #fff5df;
      --danger: #e5484d;
      --danger-soft: #ffeded;
      --cyan: #0ea5b7;
      --purple: #7c5cff;
      --shadow: 0 12px 32px rgba(16, 35, 58, .08);
      --shadow-1: 0 1px 3px rgba(15, 23, 42, .08);
      --radius: 8px;
      --radius-control: 6px;
      --radius-surface: 8px;
      --radius-overlay: 12px;
      --radius-pill: 999px;
      --text-xs: 11px;
      --text-sm: 12px;
      --text-md: 13px;
      --text-lg: 16px;
      --text-xl: 20px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --height-compact: 30px;
      --control-height: 34px;
      --height-table-action: 32px;
      --height-mobile-action: 40px;
      --control-radius: 7px;
      --surface-radius: 8px;
      --overlay-radius: 12px;
      --surface-padding: 16px;
      --section-gap: 14px;
      --focus-ring: 0 0 0 3px rgba(30, 107, 255, .12);
    }

    [data-theme="dark"] {
      --bg: #0d1523;
      --panel: #141f31;
      --panel-soft: #101a2b;
      --text: #e8edf6;
      --muted: #9aa7bb;
      --line: #26354b;
      --border: #26354b;
      --primary: #5b8fff;
      --primary-strong: #82a9ff;
      --primary-soft: #16294b;
      --sidebar: #07111f;
      --sidebar-2: #050b14;
      --success-soft: #0e2f25;
      --warning-soft: #35270c;
      --danger-soft: #3a1518;
      --shadow: 0 18px 44px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 200px 1fr;
      transition: grid-template-columns .3s ease;
    }
    .app.sidebar-collapsed { grid-template-columns: 92px 1fr; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      color: #e9f1ff;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
      border-right: 1px solid rgba(255,255,255,.08);
      padding: 14px 10px;
      overflow: hidden;
      transition: width .3s ease;
      display: flex;
      flex-direction: column;
    }
    .brand {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2b7cff, #0ba5ff);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(30,107,255,.26);
      flex: 0 0 auto;
    }
    .brand-title {
      white-space: nowrap;
      overflow: hidden;
    }
    .brand-title strong { display: block; font-size: 14px; line-height: 1.2; }
    .brand-title span { display: block; font-size: 11px; color: rgba(233,241,255,.7); margin-top: 3px; }
    .hamburger-btn {
      order: 3;
      width: 100%;
      height: 40px;
      border: 0;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      color: #d8e6ff;
      margin: 14px 0 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }
    .hamburger-btn:hover { background: rgba(255,255,255,.12); }
    .nav-list {
      order: 2;
      display: grid;
      gap: 10px;
      align-content: start;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      /* 完全隱藏 nav-list 滾動條，用戶感知不到整體滾動 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .nav-list::-webkit-scrollbar { display: none; }
    .nav-item {
      height: 42px;
      border: 0;
      width: 100%;
      color: #d7e5f8;
      background: transparent;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      text-align: left;
      transition: all .2s;
    }
    .nav-item:hover { background: rgba(255,255,255,.08); }
    .nav-item.active { background: #1768ff; color: #fff; box-shadow: 0 8px 18px rgba(23,104,255,.24); }
    
    /* Settings Accordion Styles */
    .nav-item-parent {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .nav-item-settings {
      position: relative;
    }
    .nav-arrow {
      margin-left: auto;
      font-size: 10px;
      transition: transform 0.3s ease;
      color: #d7e5f8;
    }
    .nav-arrow.expanded {
      transform: rotate(90deg);
    }
    .nav-submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      margin-left: 32px;
    }
    .nav-submenu.expanded {
      max-height: 240px;
      overflow-y: auto;
      /* 細滾動條：預設隱藏，hover 顯示 */
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }
    .nav-submenu.expanded:hover {
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .nav-submenu.expanded::-webkit-scrollbar {
      width: 6px;
    }
    .nav-submenu.expanded::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 3px;
    }
    .nav-submenu.expanded::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
      transition: background 0.2s;
    }
    .nav-submenu.expanded:hover::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
    }
    .nav-submenu.expanded:hover::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.35);
    }
    .nav-subitem {
      height: 40px;
      border: 0;
      width: 100%;
      color: #d7e5f8;
      background: transparent;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      text-align: left;
      font-size: 13px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .nav-subitem:hover {
      background: rgba(30, 107, 255, 0.15);
    }
    .nav-subitem.active {
      background: rgba(30, 107, 255, 0.25);
      color: #fff;
      font-weight: 500;
    }
    
    .nav-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px;
      flex: 0 0 auto;
    }
    
    /* Collapsed Sidebar Styles */
    .app.sidebar-collapsed .brand-title,
    .app.sidebar-collapsed .nav-label,
    .app.sidebar-collapsed .nav-arrow { display: none; }
    .app.sidebar-collapsed .brand { justify-content: center; padding: 0; }
    .app.sidebar-collapsed .nav-list { gap: 10px; }
    .app.sidebar-collapsed .nav-item {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      padding: 0;
      justify-content: center;
      margin: 0 auto;
    }
    .app.sidebar-collapsed .nav-item-parent {
      position: relative;
    }
    .app.sidebar-collapsed .nav-item-settings {
      position: relative;
    }
    .app.sidebar-collapsed .nav-submenu {
      display: none;
    }
    .app.sidebar-collapsed .nav-icon {
      width: 28px;
      height: 28px;
      font-size: 14px;
    }
    
    /* Collapsed button with single character */
    .nav-collapsed-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-collapsed-char {
      font-size: 18px;
      font-weight: 600;
      color: #d7e5f8;
    }
    .nav-collapsed-btn.active .nav-collapsed-char {
      color: #fff;
    }
    
    /* Tooltip for collapsed sidebar */
    .nav-tooltip {
      position: fixed;
      left: 100px;
      top: 50%;
      transform: translateY(-50%);
      background: #fff;
      color: #1e293b;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      white-space: nowrap;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    .nav-tooltip.show {
      opacity: 1;
    }
    
    /* Settings Popover for collapsed sidebar */
    .settings-popover {
      position: fixed;
      left: 100px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      z-index: 1000;
      overflow-x: hidden;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      /* 細滾動條樣式 */
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.15) transparent;
    }
    .settings-popover::-webkit-scrollbar { width: 6px; }
    .settings-popover::-webkit-scrollbar-track { background: transparent; }
    .settings-popover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    .settings-popover.show {
      opacity: 1;
      pointer-events: auto;
    }
    .settings-popover-item {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border: 0;
      width: 100%;
      background: transparent;
      color: #1e293b;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
    }
    .settings-popover-item:hover {
      background: rgba(30, 107, 255, 0.08);
    }
    .settings-popover-item.active {
      background: #1e6bff;
      color: #fff;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    /* 第一層：系統級導航 */
    .topbar-system {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(244,247,251,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      transition: all 0.25s ease;
    }
    [data-theme="dark"] .topbar-system { background: rgba(13,21,35,.92); }
    .topbar-system-left, .topbar-system-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .topbar-system-left { flex: 1; }
    .workspace-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .person-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .person-switch span { font-size: 12px; color: var(--muted); }
    .person-switch select {
      height: 30px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .page-heading {
      min-width: max-content;
      display: grid;
      gap: 2px;
    }
    .page-heading h1 { margin: 0; font-size: 18px; line-height: 1.2; }
    .page-heading p { margin: 0; font-size: 12px; color: var(--muted); }
    .segmented {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 3px 14px rgba(15, 23, 42, .04);
    }
    .segmented button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      height: 30px;
      padding: 0 11px;
      white-space: nowrap;
    }
    #roleSwitch button,
    #viewSwitch button {
      padding: 0 3px;
      font-size: 13px;
    }
    .segmented button.active { background: var(--primary); color: #fff; }
    .mobile-call-segmented { display: flex; width: 100%; gap: 3px; }
    .mobile-call-segmented button { flex: 1; min-width: 0; padding: 0 3px; text-align: center; }
    .toolbar-btn, .primary-btn, .secondary-btn, .danger-btn, .ghost-btn {
      height: 34px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .primary-btn {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 16px rgba(30,107,255,.18);
    }
    .primary-btn:hover { background: var(--primary-strong); }
    .secondary-btn { background: var(--primary-soft); color: var(--primary-strong); border-color: transparent; }
    .danger-btn { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
    .ghost-btn { background: transparent; }

    .user-menu { position: relative; }
    .user-card {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 10px;
      min-width: 190px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .user-meta { min-width: 0; text-align: left; }
    .user-meta strong { display: block; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta span { display: block; color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown {
      position: absolute;
      right: 0;
      top: 48px;
      width: 190px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 6px;
      display: none;
    }
    .dropdown.open { display: block; }
    .dropdown button {
      width: 100%;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      text-align: left;
      padding: 0 10px;
    }
    .dropdown button:hover { background: var(--panel-soft); }

    .content {
      padding: 20px 22px 28px;
      min-width: 0;
    }
    .page {
      display: none;
      animation: fade .12s ease-out;
    }
    .page.active { display: block; }
    @keyframes fade { from { opacity: .4; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .grid { display: grid; gap: 14px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cols-8 { grid-template-columns: repeat(7, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      min-width: 0;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card h2, .card h3 { margin: 0; font-size: 15px; }
    .card p { color: var(--muted); margin: 5px 0 0; font-size: 12px; line-height: 1.5; }
    .muted { color: var(--muted); }

    .stat-card {
      min-height: 92px;
      display: grid;
      gap: 8px;
      align-content: space-between;
      border-left: 3px solid var(--primary);
    }
    .stat-card .stat-label { color: var(--muted); font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .stat-card .stat-value { font-size: 24px; font-weight: 800; }
    .stat-card .stat-note { font-size: 11px; color: var(--muted); }
    .dashboard-stat-card {
      width: 100%;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .dashboard-stat-card:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .dashboard-stat-card:focus-visible { outline: 3px solid rgba(37, 99, 235, .24); outline-offset: 2px; }

    .chip, .status-pill, .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .chip { background: var(--panel-soft); color: var(--muted); border-color: var(--line); }
    .tag { background: var(--primary-soft); color: var(--primary-strong); }
    .urgent { background: var(--danger-soft); color: var(--danger); }
    .data-table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }
    th { color: var(--muted); font-weight: 700; background: var(--panel-soft); }
    td .link-btn {
      border: 0;
      background: transparent;
      color: var(--primary-strong);
      padding: 0;
      font-weight: 700;
      text-align: left;
    }
    .ellipsis { max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .filters {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 10px;
      outline: none;
    }
    .field textarea { min-height: 86px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,107,255,.12); }
    /* 共用可搜尋下拉：保留原生 select 作為資料來源與表單值。 */
    .search-select {
      position: relative;
      display: inline-block;
      min-width: 0;
      vertical-align: top;
    }
    .search-select.search-select-fluid { display: block; width: 100%; }
    .search-select-native {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      margin: -1px !important;
      padding: 0 !important;
      overflow: hidden !important;
      clip: rect(0 0 0 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    .search-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      min-height: var(--control-height);
      padding: 0 10px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--control-radius);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }
    .search-select-trigger:hover { border-color: var(--primary); }
    .search-select-trigger:focus-visible { outline: 0; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 107, 255, .12); }
    .search-select-trigger:disabled { cursor: not-allowed; opacity: .6; }
    .search-select-value { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-select-caret { color: var(--muted); font-size: 12px; }
    .search-select-menu {
      position: absolute;
      z-index: 1300;
      top: calc(100% + 4px);
      left: 0;
      /* 選單與觸發框等寬；長選項在框內省略，避免窄欄位出現左右不齊。 */
      width: 100%;
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(15, 23, 42, .16);
    }
    .search-select-menu[hidden] { display: none; }
    .search-select-search {
      width: 100%;
      min-width: 0 !important;
      max-width: 100%;
      box-sizing: border-box;
      height: 32px;
      margin-bottom: 6px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      outline: 0;
    }
    .search-select-search:focus { border-color: var(--primary); background: var(--panel); }
    .search-select-options { max-height: 256px; overflow-y: auto; overscroll-behavior: contain; }
    .search-select-option {
      display: block;
      width: 100%;
      min-height: 32px;
      padding: 6px 9px;
      overflow: hidden;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      line-height: 20px;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }
    .search-select-option:hover,
    .search-select-option.active { background: var(--primary-soft); color: var(--primary-strong); }
    .search-select-option:disabled { cursor: not-allowed; color: var(--muted); }
    .search-select-empty { padding: 10px 8px; color: var(--muted); font-size: 12px; text-align: center; }
    .required::after { content: " *"; color: var(--danger); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .form-grid .wide { grid-column: 1 / -1; }
    .form-section { margin-bottom: 14px; }
    .form-section h3 { margin: 0 0 10px; font-size: 14px; }

    .split-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(360px, 1.3fr) minmax(250px, .9fr);
      gap: 14px;
      align-items: start;
    }
    .detail-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .detail-title { display: grid; gap: 5px; }
    .detail-title h2 { margin: 0; font-size: 20px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .info-list { display: grid; gap: 9px; }
    .info-row {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .info-row span:first-child { color: var(--muted); }
    .timeline { position: relative; display: grid; gap: 12px; }
    .timeline::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--line);
    }
    .timeline-item {
      position: relative;
      padding-left: 30px;
      display: grid;
      gap: 4px;
    }
    .timeline-dot {
      position: absolute;
      left: 3px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--panel);
    }
    .timeline-item strong { font-size: 13px; }
    .timeline-item p { margin: 0; font-size: 12px; color: var(--muted); }
    .dashboard-timeline { margin-top: 2px; }
    .timeline-ticket-link {
      padding: 0;
      font-size: inherit;
      font-weight: inherit;
    }

    /* 分派中心：先看清單，再於彈窗完成派工 */
    .dispatch-list-section { display: grid; gap: 10px; }
    .dispatch-summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .dispatch-summary-card {
      border: 1px solid var(--line);
      border-left: 3px solid var(--primary);
      border-radius: var(--surface-radius);
      background: var(--panel);
      padding: 9px 12px;
      width: 100%;
      text-align: left;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }
    .dispatch-summary-card::after {
      content: "查看明細 >";
      display: block;
      margin-top: 4px;
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
    }
    .dispatch-summary-card:nth-child(1) { border-left-color: #d97706; }
    .dispatch-summary-card:nth-child(1)::after { color: #b45309; }
    .dispatch-summary-card:nth-child(1):hover { background: #fffbeb; border-color: #f59e0b; }
    .dispatch-summary-card:nth-child(2) { border-left-color: #2563eb; }
    .dispatch-summary-card:nth-child(2)::after { color: #2563eb; }
    .dispatch-summary-card:nth-child(2):hover { background: #eff6ff; border-color: #60a5fa; }
    .dispatch-summary-card:nth-child(3) { border-left-color: #16a34a; }
    .dispatch-summary-card:nth-child(3)::after { color: #15803d; }
    .dispatch-summary-card:nth-child(3):hover { background: #f0fdf4; border-color: #4ade80; }
    .dispatch-summary-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .dispatch-summary-card:focus-visible { outline: 3px solid rgba(37, 99, 235, .28); outline-offset: 2px; }
    .dispatch-summary-card span { display: block; color: var(--muted); font-size: 11px; }
    .dispatch-summary-card strong { display: block; margin: 2px 0; font-size: 22px; }
    .dispatch-summary-card p { margin: 0; color: var(--muted); font-size: 11px; }
    .dispatch-list-section .pc-section { padding: 12px 14px; margin-bottom: 0; }
    .dispatch-toolbar { display: grid; gap: 12px; margin-bottom: 12px; }
    .dispatch-toolbar h2 { margin: 0; }
    .dispatch-toolbar .dispatch-filters { width: 100%; margin: 0; gap: 12px; justify-content: flex-start; }
    .dispatch-toolbar .wo-filter-group { min-width: 140px; gap: 4px; }
    .dispatch-toolbar .wo-filter-group select { height: 34px; font-size: 13px; }
    .dispatch-toolbar .wo-filter-group input { min-width: 160px; }
    .dispatch-toolbar .wo-search-btn { height: 34px; padding: 0 12px; font-size: 13px; }
    .dispatch-toolbar .wo-actions-top { margin-left: auto; }
    .dispatch-toolbar .wo-actions-top button { height: 34px; min-width: 78px; padding: 0 12px; font-size: 13px; }
    .dispatch-table td { white-space: nowrap; }
    .dispatch-table .dispatch-customer { display: block; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .dispatch-table .dispatch-desc { display: block; max-width: 220px; overflow: hidden; text-overflow: ellipsis; color: var(--muted); font-size: 12px; }
    .dispatch-actions { display: flex; justify-content: center; gap: 6px; white-space: nowrap; }
    .dispatch-actions button { height: var(--height-table-action); padding: 0 9px; font-size: 12px; }
    /* 採購管理：操作按鈕統一寬度，單按鈕與雙按鈕整體寬度一致 */
    .po-actions { display: flex; justify-content: center; gap: 6px; width: 110px; white-space: nowrap; }
    .po-actions button { height: var(--height-table-action); flex: 1; min-width: 0; padding: 0 6px; font-size: 12px; }
    .po-actions .tag { flex: 0 0 auto; }
    .dispatch-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(15, 23, 42, .42);
      backdrop-filter: blur(3px);
      animation: fade .12s ease-out;
    }
    .dispatch-modal {
      width: min(820px, 100%);
      max-height: min(780px, calc(100vh - 40px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--overlay-radius);
      box-shadow: 0 24px 64px rgba(15, 23, 42, .24);
    }
    .dispatch-modal-head,
    .dispatch-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }
    .dispatch-modal-head h2 { margin: 0; font-size: 16px; }
    .dispatch-modal-head p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    .dispatch-modal-body { overflow-y: auto; padding: 20px; }
    .dispatch-modal-footer { justify-content: flex-end; border-top: 1px solid var(--line); border-bottom: 0; }
    .dispatch-ticket-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .dispatch-ticket-summary > div {
      min-width: 0;
      padding: 10px 12px;
      border-radius: var(--control-radius);
      background: var(--panel-soft);
    }
    .dispatch-ticket-summary .wide { grid-column: 1 / -1; }
    .dispatch-ticket-summary span { display: block; margin-bottom: 3px; color: var(--muted); font-size: 11px; }
    .dispatch-ticket-summary strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
    .dispatch-master-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    /* 分派彈窗：搜索 + 篩選工具條 */
    .dispatch-picker-toolbar { display: flex; gap: 10px; align-items: center; padding: 14px 0 12px; border-bottom: 1px solid var(--line); flex-wrap: wrap; margin-bottom: 14px; }
    .dispatch-picker-search { flex: 1; min-width: 220px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 13px; }
    .dispatch-picker-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .dispatch-picker-filters .chip { cursor: pointer; padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; border: 1px solid var(--line); background: var(--panel); color: var(--muted); }
    .dispatch-picker-filters .chip:hover { border-color: var(--primary); color: var(--primary-strong); }
    .dispatch-picker-filters .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .dispatch-master-option {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--surface-radius);
      background: var(--panel);
      text-align: left;
      color: var(--text);
    }
    .dispatch-master-option:hover,
    .dispatch-master-option.active { border-color: var(--primary); background: var(--primary-soft); }
    .dispatch-master-option:disabled { cursor: not-allowed; opacity: .55; }
    .dispatch-master-option:disabled:hover { border-color: var(--line); background: var(--panel); }
    .dispatch-master-option .dispatch-master-avatar { width: 36px; height: 36px; }
    .dispatch-master-option .tag { justify-self: end; }
    @media (max-width: 760px) {
      .dispatch-summary, .dispatch-ticket-summary, .dispatch-master-options { grid-template-columns: 1fr; }
      .dispatch-toolbar { align-items: stretch; flex-direction: column; gap: 8px; }
      .dispatch-toolbar .dispatch-filters { justify-content: flex-start; }
    }

    /* ============ 新增報價：企業級 SaaS 卡片式佈局 ============ */
    .qf-overlay {
      position: fixed; inset: 0; background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px); z-index: 1100;
      display: flex; align-items: flex-start; justify-content: center;
      overflow-y: auto; padding: 24px 16px;
    }
    .qf-modal {
      width: 100%; max-width: 880px; background: #fff;
      border-radius: 16px; box-shadow: 0 24px 64px rgba(15,23,42,.22), 0 4px 12px rgba(15,23,42,.08);
      display: flex; flex-direction: column; overflow: hidden;
      margin: 0 auto;
    }
    .qf-header {
      padding: 22px 28px; border-bottom: 1px solid #eef0f4;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(180deg, #fafbff 0%, #fff 100%);
    }
    .qf-header h3 { margin: 0; font-size: 18px; font-weight: 700; color: #1f2937; letter-spacing: .2px; }
    .qf-header .qf-sub { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .qf-close { background: transparent; border: none; cursor: pointer; color: #9ca3af; font-size: 22px; line-height: 1; padding: 4px 8px; border-radius: 6px; transition: all .15s; }
    .qf-close:hover { background: #f3f4f6; color: #1f2937; }
    .qf-body { padding: 24px 28px; overflow-y: auto; max-height: calc(100vh - 220px); }
    /* 卡片樣式 */
    .qf-card {
      background: #fff; border: 1px solid #eef0f4; border-radius: 12px;
      padding: 20px 22px; margin-bottom: 18px;
      box-shadow: 0 1px 3px rgba(15,23,42,.04), 0 1px 2px rgba(15,23,42,.02);
    }
    .qf-card:last-child { margin-bottom: 0; }
    .qf-card-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 700; color: #1f2937;
      margin: 0 0 18px 0; letter-spacing: .2px;
    }
    .qf-card-title::before {
      content: ""; display: inline-block; width: 3px; height: 14px;
      background: var(--primary, #1e6bff); border-radius: 2px;
    }
    .qf-card-title .qf-card-sub { font-size: 12px; font-weight: 400; color: #9ca3af; margin-left: 6px; }
    /* 兩欄 Grid 佈局 */
    .qf-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px 20px; }
    .qf-field { display: flex; flex-direction: column; }
    .qf-field.wide { grid-column: 1 / -1; }
    .qf-label {
      font-size: 12px; font-weight: 600; color: #374151;
      margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
    }
    .qf-label .req { color: #ef4444; font-weight: 700; }
    .qf-label .opt { color: #9ca3af; font-weight: 400; font-size: 11px; }
    .qf-input, .qf-select, .qf-textarea {
      width: 100%; height: 40px; padding: 8px 12px;
      border: 1px solid #e5e7eb; border-radius: 10px;
      font-size: 13px; color: #1f2937; background: #fff;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .qf-input:focus, .qf-select:focus, .qf-textarea:focus {
      outline: none; border-color: var(--primary, #1e6bff);
      box-shadow: 0 0 0 3px rgba(30,107,255,.12);
    }
    .qf-textarea { height: auto; min-height: 80px; padding: 10px 12px; resize: vertical; line-height: 1.5; }
    .qf-readonly { background: #f3f4f6 !important; color: #6b7280 !important; cursor: not-allowed; }
    .qf-readonly:focus { border-color: #e5e7eb; box-shadow: none; }
    /* 自定義下拉框：隱藏原生 select（保留業務邏輯），用自定義 UI 顯示，最多顯示 6 個選項可滾動 */
    .qf-select-wrap { position: relative; width: 100%; }
    .qf-select-wrap > select.qf-select {
      position: absolute !important; opacity: 0; pointer-events: none;
      width: 1px !important; height: 1px !important; left: -9999px; top: 0;
      border: 0 !important; padding: 0 !important; box-shadow: none !important;
    }
    .qf-select-trigger {
      width: 100%; height: 40px; padding: 8px 32px 8px 12px;
      border: 1px solid #e5e7eb; border-radius: 10px;
      font-size: 13px; color: #1f2937; background: #fff;
      cursor: pointer; display: flex; align-items: center;
      position: relative; transition: border-color .15s, box-shadow .15s;
      font-family: inherit; text-align: left; box-sizing: border-box;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .qf-select-trigger::after {
      content: ''; position: absolute; right: 12px; top: 50%;
      width: 0; height: 0; border-left: 4px solid transparent;
      border-right: 4px solid transparent; border-top: 5px solid #6b7280;
      transform: translateY(-50%); pointer-events: none;
    }
    .qf-select-trigger.open {
      border-color: var(--primary, #1e6bff);
      box-shadow: 0 0 0 3px rgba(30,107,255,.12);
    }
    .qf-select-trigger.placeholder { color: #9ca3af; }
    .qf-select-panel {
      position: fixed;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(15,23,42,.12);
      max-height: 216px; overflow-y: auto; z-index: 100000;
      display: none; padding: 4px 0; box-sizing: border-box;
    }
    .qf-select-panel.open { display: block; }
    .qf-select-opt {
      padding: 8px 12px; cursor: pointer; font-size: 13px; color: #1f2937;
      min-height: 36px; display: flex; align-items: center;
      box-sizing: border-box;
    }
    .qf-select-opt:hover { background: #f3f4f6; }
    .qf-select-opt.selected { background: #eff6ff; color: var(--primary, #1e6bff); font-weight: 600; }
    .qf-select-opt.disabled { color: #d1d5db; cursor: not-allowed; }
    .qf-select-opt.disabled:hover { background: transparent; }
    .qf-select-wrap.qf-readonly .qf-select-trigger { background: #f3f4f6 !important; color: #6b7280 !important; cursor: not-allowed; }
    .qf-select-wrap.qf-readonly .qf-select-trigger::after { display: none; }
    /* 工單模態框淡入動畫：避免 backdrop-filter 突然應用導致閃爍 */
    #woModalOverlay .qf-overlay { animation: woOverlayFadeIn .16s ease-out; }
    #woModalOverlay .qf-modal { animation: woModalSlideIn .2s ease-out; }
    @keyframes woOverlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes woModalSlideIn { from { opacity: 0; transform: translateY(-10px) scale(.985); } to { opacity: 1; transform: none; } }
    .qf-amount-display {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      border: 1px solid #dbeafe; border-radius: 10px;
      font-size: 20px; font-weight: 700; color: #1e40af;
    }
    .qf-amount-display .qf-amount-currency { font-size: 13px; color: #6b7280; font-weight: 500; }
    /* Switch 開關 */
    .qf-switch { position: relative; display: inline-flex; align-items: center; cursor: pointer; gap: 10px; }
    .qf-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .qf-switch-slider {
      width: 38px; height: 22px; background: #cbd5e1; border-radius: 99px;
      position: relative; transition: background .2s; flex-shrink: 0;
    }
    .qf-switch-slider::before {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; background: #fff; border-radius: 50%;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .qf-switch input:checked + .qf-switch-slider { background: var(--primary, #1e6bff); }
    .qf-switch input:checked + .qf-switch-slider::before { transform: translateX(16px); }
    .qf-switch-label { font-size: 13px; color: #374151; font-weight: 500; }
    .qf-hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .qf-hidden { display: none !important; }
    /* Sticky Footer */
    .qf-footer {
      padding: 14px 28px; border-top: 1px solid #eef0f4;
      background: #fff; display: flex; justify-content: flex-end; gap: 10px;
      position: sticky; bottom: 0; z-index: 5;
      box-shadow: 0 -2px 8px rgba(15,23,42,.04);
    }
    .qf-btn {
      padding: 9px 22px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s; border: 1px solid transparent;
      font-family: inherit; min-width: 88px;
    }
    .qf-btn-cancel { background: #fff; color: #6b7280; border-color: #e5e7eb; }
    .qf-btn-cancel:hover { background: #f9fafb; color: #1f2937; border-color: #d1d5db; }
    .qf-btn-save { background: var(--primary, #1e6bff); color: #fff; }
    .qf-btn-save:hover { background: var(--primary-strong, #1849cc); box-shadow: 0 4px 12px rgba(30,107,255,.3); }
    @media (max-width: 720px) {
      .qf-grid { grid-template-columns: 1fr; }
      .qf-modal { max-width: 100%; }
      .qf-header, .qf-body, .qf-footer { padding-left: 18px; padding-right: 18px; }
    }

    /* ============ 新建採購單：物料明細表格樣式 ============ */
    .po-table-wrap {
      border: 1px solid #eef0f4; border-radius: 10px; overflow: hidden;
      max-height: 320px; overflow-y: auto;
    }
    .po-table-wrap::-webkit-scrollbar { width: 6px; }
    .po-table-wrap::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .po-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .po-table thead { position: sticky; top: 0; z-index: 2; background: #f9fafb; }
    .po-table th {
      text-align: left; padding: 10px 12px; font-weight: 600;
      color: #6b7280; font-size: 12px; border-bottom: 1px solid #eef0f4;
      white-space: nowrap;
    }
    .po-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    .po-table tr:last-child td { border-bottom: none; }
    .po-table tr:hover td { background: #f9fafb; }
    .po-table .po-input {
      width: 100%; height: 36px; padding: 6px 10px;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; color: #1f2937; background: #fff;
      transition: border-color .15s, box-shadow .15s; font-family: inherit;
    }
    .po-table .po-input:focus {
      outline: none; border-color: var(--primary, #1e6bff);
      box-shadow: 0 0 0 3px rgba(30,107,255,.1);
    }
    .po-table .po-input-sm { width: 80px; text-align: center; }
    .po-table .po-input-price { width: 110px; text-align: right; }
    .po-table .po-subtotal { text-align: right; font-weight: 600; color: #1f2937; padding-right: 16px; }
    .po-table .po-remove {
      border: none; background: transparent; color: #ef4444; cursor: pointer;
      font-size: 18px; padding: 4px 8px; border-radius: 6px; transition: background .15s;
    }
    .po-table .po-remove:hover { background: #fef2f2; }
    /* 採購總金額統計區 */
    .po-total-bar {
      display: flex; justify-content: flex-end; align-items: center; gap: 12px;
      margin-top: 14px; padding: 12px 16px;
      background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      border: 1px solid #dbeafe; border-radius: 10px;
    }
    .po-total-bar span { font-size: 13px; font-weight: 600; color: #374151; }
    .po-total-bar strong { font-size: 18px; font-weight: 700; color: #1e40af; }
    .po-total-bar .po-currency { font-size: 12px; color: #6b7280; font-weight: 500; margin-right: 4px; }

    .sr-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      padding-left: 10px;
      border-left: 3px solid var(--primary);
      line-height: 1.4;
    }
    .sr-field { margin-bottom: 12px; }
    .sr-field:last-child { margin-bottom: 0; }
    .sr-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .sr-label .sr-required { color: var(--danger); margin-left: 2px; }
    .sr-input, .sr-select, .sr-textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      background: var(--panel);
      box-sizing: border-box;
      font-family: inherit;
    }
    .sr-input:focus, .sr-select:focus, .sr-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }
    .sr-textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.5;
      padding-right: 40px;
    }
    .sr-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .sr-chip {
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      background: var(--panel);
      user-select: none;
      transition: all .15s ease;
    }
    .sr-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .sr-radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .sr-radio {
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      background: var(--panel);
      user-select: none;
      transition: all .15s ease;
    }
    .sr-radio.active {
      background: var(--primary-soft);
      color: var(--primary-strong);
      border-color: var(--primary);
      font-weight: 700;
    }
    .sr-textarea-wrap { position: relative; }
    .sr-voice-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--primary);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
    }
    .sr-voice-btn:hover { background: var(--primary-soft); }
    .sr-photo-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .sr-photo-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .sr-photo-col .sr-label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text); }
    .sr-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .sr-photo-thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--primary-soft);
      display: grid;
      place-items: center;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 4px;
      overflow: hidden;
      word-break: break-all;
    }
    .sr-photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .sr-photo-add {
      border: 2px dashed var(--line);
      cursor: pointer;
      color: var(--primary);
      font-size: 24px;
      background: var(--panel-soft);
      font-weight: 300;
    }
    .sr-photo-add:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .sr-photo-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
      display: grid;
      place-items: center;
      line-height: 1;
      padding: 0;
    }
    .sr-switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sr-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--line);
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s ease;
      flex-shrink: 0;
    }
    .sr-switch.active { background: var(--primary); }
    .sr-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s ease;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      pointer-events: none;
    }
    .sr-switch.active::after { transform: translateX(20px); }
    .sr-switch-label { font-size: 13px; font-weight: 700; }
    .sr-quotation-section {
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      display: grid;
      gap: 12px;
    }
    .sr-parts { display: grid; gap: 8px; }
    .sr-part-item {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sr-part-item .sr-part-name { flex: 1; }
    .sr-part-item .sr-part-qty { width: 70px; flex: none; }
    .sr-part-remove {
      width: 30px;
      height: 30px;
      border: none;
      background: var(--danger-soft);
      color: var(--danger);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      padding: 0;
    }
    .sr-add-part-btn {
      padding: 6px 12px;
      border: 1px dashed var(--primary);
      border-radius: 8px;
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
    }
    .sr-signature {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .sr-signature-canvas {
      display: block;
      width: 100%;
      height: 150px;
      touch-action: none;
      cursor: crosshair;
      background: var(--panel-soft);
    }
    .sr-signature-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .sr-signature-clear {
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--danger);
      font-size: 12px;
      cursor: pointer;
    }
    .sr-satisfaction {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .sr-satisfaction-btn {
      padding: 8px 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      color: var(--muted);
      transition: all .15s ease;
      line-height: 1.6;
    }
    .sr-satisfaction-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      font-weight: 700;
    }
    .sr-satisfaction-btn .sr-emoji { font-size: 20px; display: block; }
    .sr-error {
      color: var(--danger);
      font-size: 12px;
      margin-top: 4px;
    }
    .sr-submit-bar {
      position: sticky;
      bottom: 0;
      padding: 10px 12px;
      background: linear-gradient(180deg, transparent, var(--bg) 18%);
      z-index: 5;
      box-sizing: border-box;
    }
    .sr-submit-bar .primary-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
    }
    /* 提交成功頁面樣式 */
    .sr-success-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      min-height: 60vh;
    }
    .sr-success-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--success, #10b981);
      color: white;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .sr-success-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .sr-success-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .sr-success-countdown {
      font-size: 13px;
      color: var(--muted);
    }
    .sr-hidden { display: none !important; }

    @media (max-width: 1000px) {
      .cols-8 { grid-template-columns: repeat(4, minmax(130px, 1fr)); }
      .filters { grid-template-columns: repeat(3, minmax(130px, 1fr)); }
      .split-layout, .dispatch-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 1400px) {
      .topbar-system {
        height: auto;
        min-height: 64px;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px 24px;
      }
      .topbar-system-left { width: 100%; }
      .topbar-system-right { margin-left: auto; }
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; display: none; }
      .topbar-system { position: static; flex-direction: column; align-items: stretch; height: auto; padding: 12px 24px; }
      .topbar-system-left, .topbar-system-right { flex-wrap: wrap; justify-content: center; }
      .workspace-controls { flex-wrap: wrap; justify-content: center; }
      .content { padding: 14px; }
      .cols-2, .cols-3, .cols-4, .cols-8 { grid-template-columns: 1fr; }
      .filters, .form-grid { grid-template-columns: 1fr; }
      .user-card { min-width: 160px; }
      .phone { height: calc(100vh - 120px); border-width: 6px; border-radius: 26px; }
    }

    /* ===== User Management Module ===== */
    .um-layout {
      display: grid;
      grid-template-columns: 20% 45% 35%;
      gap: 14px;
      align-items: start;
      min-height: calc(100vh - 180px);
    }
    .um-role-sidebar, .um-list-panel, .um-detail-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .um-role-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      margin: 0 0 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .um-role-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s ease;
      margin-bottom: 4px;
      border: 1px solid transparent;
      background: transparent;
      width: 100%;
      text-align: left;
      color: var(--text);
      font: inherit;
    }
    .um-role-item:hover { background: var(--panel-soft); border-color: var(--line); }
    .um-role-item.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary-strong); font-weight: 700; }
    .um-role-item .role-name { font-size: 13px; }
    .um-role-item .role-count {
      font-size: 12px;
      background: var(--panel-soft);
      padding: 2px 8px;
      border-radius: 999px;
      color: var(--muted);
      min-width: 28px;
      text-align: center;
    }
    .um-role-item.active .role-count { background: var(--primary); color: #fff; }
    .um-list-panel { display: grid; gap: 12px; align-content: start; }
    .um-toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .um-toolbar .um-search { flex: 2; min-width: 140px; }
    .um-toolbar .um-filter-role, .um-toolbar .um-filter-status { flex: 1; min-width: 100px; }
    .um-toolbar input, .um-toolbar select {
      width: 100%;
      min-height: 34px;
      font-size: 13px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 10px;
      outline: none;
    }
    .um-toolbar input:focus, .um-toolbar select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,107,255,.12); }
    .um-user-table { width: 100%; border-collapse: collapse; }
    .um-user-table th, .um-user-table td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 12px;
      vertical-align: middle;
    }
    .um-user-table th { color: var(--muted); font-weight: 700; background: var(--panel-soft); font-size: 11px; }
    .um-user-table tbody tr { cursor: pointer; transition: background .12s ease; }
    .um-user-table tbody tr:hover { background: var(--panel-soft); }
    .um-user-table tbody tr.selected { background: var(--primary-soft); }
    .um-avatar-sm {
      width: 30px; height: 30px; border-radius: 50%;
      display: grid; place-items: center;
      font-size: 11px; font-weight: 700; color: #fff; flex: 0 0 auto;
    }
    .um-avatar-cs { background: var(--primary); }
    .um-avatar-tl { background: var(--purple); }
    .um-avatar-master { background: var(--success); }
    .um-avatar-admin { background: var(--danger); }
    .um-avatar-supervisor { background: var(--cyan); }
    .um-user-name { display: flex; align-items: center; gap: 8px; }
    .um-user-name strong { font-size: 13px; }
    .um-user-name span { font-size: 11px; color: var(--muted); }
    .um-detail-panel { display: grid; gap: 14px; align-content: start; }
    .um-detail-header {
      display: flex; align-items: center; gap: 14px;
      padding-bottom: 14px; border-bottom: 1px solid var(--line);
    }
    .um-avatar-lg {
      width: 56px; height: 56px; border-radius: 50%;
      display: grid; place-items: center;
      font-size: 20px; font-weight: 800; color: #fff; flex: 0 0 auto;
    }
    .um-detail-name { font-size: 18px; font-weight: 700; margin: 0; }
    .um-detail-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .um-section-title {
      font-size: 12px; font-weight: 700; color: var(--muted);
      margin: 0 0 8px; text-transform: uppercase; letter-spacing: .5px;
    }
    .um-perm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .um-perm-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; padding: 6px 8px;
      border-radius: 6px; background: var(--success-soft); color: var(--success);
    }
    .um-perm-item .chk { font-weight: 700; }
    .um-stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .um-stat-item {
      background: var(--panel-soft); border: 1px solid var(--line);
      border-radius: 8px; padding: 10px; text-align: center;
    }
    .um-stat-item .sv { font-size: 20px; font-weight: 800; color: var(--primary); }
    .um-stat-item .sl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .um-pagination {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding-top: 8px; font-size: 12px; color: var(--muted);
    }
    .um-pg-btns { display: flex; gap: 4px; }
    .um-pg-btns button {
      min-width: 28px; height: 28px; border: 1px solid var(--line);
      border-radius: 6px; background: var(--panel); color: var(--text);
      font-size: 12px; cursor: pointer; display: grid; place-items: center;
    }
    .um-pg-btns button:hover { border-color: var(--primary); color: var(--primary); }
    .um-pg-btns button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .um-pg-btns button:disabled { opacity: .4; cursor: not-allowed; }
    .um-empty-detail {
      display: grid; place-items: center; min-height: 300px;
      color: var(--muted); text-align: center; gap: 8px;
    }
    .um-empty-detail .icon { font-size: 36px; opacity: .4; }
    .user-status-啓用 { background: var(--success-soft); color: var(--success); }
    .user-status-禁用 { background: var(--danger-soft); color: var(--danger); }
    .user-status-離職 { background: #f0f2f5; color: #667085; }
    [data-theme="dark"] .user-status-啓用 { background: #0e2f25; color: #7be0b4; }
    [data-theme="dark"] .user-status-禁用 { background: #3a1518; color: #ff9fbb; }
    [data-theme="dark"] .user-status-離職 { background: #252b36; color: #b8c0cc; }

    /* Modal */
    .um-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, .45);
      backdrop-filter: blur(4px);
      display: grid; place-items: center;
      z-index: 100; animation: fade .12s ease-out;
    }
    .um-modal {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; box-shadow: 0 24px 64px rgba(15, 23, 42, .24);
      width: min(560px, 92vw); max-height: 88vh;
      overflow-y: auto; padding: 24px;
    }
    .um-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--line);
    }
    .um-modal-head h2 { margin: 0; font-size: 17px; }
    .um-modal-close {
      width: 32px; height: 32px; border: 1px solid var(--line);
      border-radius: 8px; background: var(--panel); color: var(--muted);
      display: grid; place-items: center; cursor: pointer; font-size: 16px;
    }
    .um-modal-close:hover { background: var(--danger-soft); color: var(--danger); border-color: var(--danger); }
    .um-modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
      margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line);
    }
    .um-form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .um-form-grid .wide { grid-column: 1 / -1; }

    /* ===== Dictionary Management Module ===== */
    .dm-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, .45);
      backdrop-filter: blur(4px);
      display: grid; place-items: center;
      z-index: 200; animation: fade .12s ease-out;
    }
    .dm-modal {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; box-shadow: 0 24px 64px rgba(15, 23, 42, .24);
      width: min(900px, 95vw); max-height: 88vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .dm-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .dm-modal-head-left h2 { margin: 0; font-size: 18px; font-weight: 600; }
    .dm-modal-head-left p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
    .dm-modal-head-right { display: flex; gap: 10px; align-items: center; }
    .dm-modal-close {
      width: 32px; height: 32px; border: 1px solid var(--line);
      border-radius: 8px; background: var(--panel); color: var(--muted);
      display: grid; place-items: center; cursor: pointer; font-size: 16px;
    }
    .dm-modal-close:hover { background: var(--danger-soft); color: var(--danger); border-color: var(--danger); }
    .dm-modal-body { flex: 1; overflow: auto; padding: 20px 24px; }
    .dm-modal-body::-webkit-scrollbar { width: 6px; height: 6px; }
    .dm-modal-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    .dm-modal-body table { width: 100%; border-collapse: collapse; }
    .dm-modal-body table th,
    .dm-modal-body table td {
      padding: 12px 16px; text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .dm-modal-body table th:last-child,
    .dm-modal-body table td:last-child {
      position: sticky;
      right: 0;
      background: white;
      z-index: 1;
    }
    /* Also style the main dictionary table */
    .card .data-table-wrap table { width: 100%; border-collapse: collapse; }
    .card .data-table-wrap table th,
    .card .data-table-wrap table td {
      padding: 12px 16px; text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .card .data-table-wrap table th:last-child,
    .card .data-table-wrap table td:last-child {
      position: sticky;
      right: 0;
      background: white;
      z-index: 1;
    }

    /* Dictionary Edit Drawer (right-side, 420px) */
    .dm-drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, .35);
      z-index: 300; animation: fade .12s ease-out;
    }
    .dm-drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 420px; max-width: 90vw;
      background: var(--panel); border-left: 1px solid var(--line);
      box-shadow: -8px 0 32px rgba(15, 23, 42, .15);
      display: flex; flex-direction: column;
      z-index: 301; animation: slideInRight .2s ease-out;
    }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .dm-drawer-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .dm-drawer-head h3 { margin: 0; font-size: 16px; font-weight: 600; }
    .dm-drawer-close {
      width: 32px; height: 32px; border: 1px solid var(--line);
      border-radius: 8px; background: var(--panel); color: var(--muted);
      display: grid; place-items: center; cursor: pointer; font-size: 16px;
    }
    .dm-drawer-close:hover { background: var(--danger-soft); color: var(--danger); border-color: var(--danger); }
    .dm-drawer-body { flex: 1; overflow-y: auto; padding: 24px; }
    .dm-drawer-body::-webkit-scrollbar { width: 6px; }

      position: absolute; cursor: pointer; inset: 0;

    }
    .switch .slider:before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background: #fff;
      border-radius: 50%; transition: .2s;
    }
    .switch input:checked + .slider { background: var(--primary); }

    /* 標書管理側邊欄底部操作區 - Sticky Footer 企業級 SaaS 風格（Ant Design Mobile） */
    /* 僅優化佈局與視覺效果，不改變任何按鈕業務邏輯、權限邏輯、顯示邏輯、按鈕文案、按鈕顏色 */
    .tender-drawer-footer {

    .wo-modal {

    .wo-form-grid {

    /* Notification System Styles */
    .noti-wrapper { position: relative; }
    .noti-bell {
      height: 34px;
      border-radius: 7px;

      transition: all .15s ease;

    .noti-bell:hover { border-color: var(--primary); background: var(--primary-soft); }
    .noti-bell .noti-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;

    .noti-panel {

    }

    .noti-panel-head .noti-unread-tag {
      font-size: 11px;
      background: var(--danger-soft);
      color: var(--danger);
      padding: 2px 7px;
      border-radius: 999px;

    }
    .noti-mark-all {
      border: 0;

      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .noti-mark-all:hover { background: var(--primary-soft); }
    .noti-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      min-height: 0;
    }
    .noti-panel-body::-webkit-scrollbar { width: 4px; }
    .noti-panel-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
    .noti-card {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s ease;
      border: 1px solid transparent;

    }
    .noti-card:hover { background: var(--panel-soft); border-color: var(--line); }
    .noti-card.unread { background: var(--primary-soft); border-color: rgba(30,107,255,.12); }
    .noti-card.unread:hover { background: #dde8ff; }
    [data-theme="dark"] .noti-card.unread { background: #16294b; }
    [data-theme="dark"] .noti-card.unread:hover { background: #1c3260; }
    .noti-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .noti-icon.level-action { background: var(--danger-soft); }
    .noti-icon.level-warning { background: var(--warning-soft); }
    .noti-icon.level-info { background: var(--primary-soft); }
    .noti-icon.level-success { background: var(--success-soft); }
    .noti-body { flex: 1; min-width: 0; }
    .noti-title {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    }
    .noti-level-dot.action { background: var(--danger); }
    .noti-level-dot.warning { background: var(--warning); }
    .noti-level-dot.info { background: var(--primary); }
    .noti-level-dot.success { background: var(--success); }
    .noti-content { font-size: 12px; color: var(--text); margin: 0; line-height: 1.4; }
    .noti-sub { font-size: 11px; color: var(--muted); margin: 2px 0 0; }
    .noti-time { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .noti-panel-foot {
      padding: 10px 16px;
      border-top: 1px solid var(--line);
      text-align: center;
      flex-shrink: 0;
    }
    .noti-panel-foot button {
      border: 0;
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;

    /* ===== 採購 / 會計 共用卡片式佈局 ===== */
    .pc-container { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }
    .pc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .pc-header h1 { font-size: 22px; font-weight: 700; margin: 0; color: var(--text); }
    .pc-header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .pc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .pc-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      transition: box-shadow .2s, transform .2s;
      position: relative;
      overflow: hidden;
    }
    .pc-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-2px); }
    .pc-card h3 { font-size: 13px; font-weight: 500; color: var(--muted); margin: 0 0 8px; }
    .pc-metric { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .pc-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .pc-card::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--primary);
    }
    .pc-card:nth-child(2)::before { background: var(--warning); }
    .pc-card:nth-child(3)::before { background: var(--success); }
    .pc-card:nth-child(4)::before { background: #a855f7; }

    .pc-section { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
    .pc-section h2 { font-size: 16px; font-weight: 600; margin: 0 0 14px; color: var(--text); }
    .pc-table-wrapper { overflow-x: auto; border-radius: 8px; }
    .pc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pc-table thead th {
      background: var(--panel-soft); color: var(--muted); font-weight: 600;
      text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .pc-table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; }
    .pc-table tbody tr:hover { background: var(--panel-soft); }
    .pc-table .tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
    .pc-table .tag.success { background: var(--success-soft); color: var(--success); }
    .pc-table .tag.warning { background: var(--warning-soft); color: var(--warning); }
    .pc-table .tag.danger { background: var(--danger-soft); color: var(--danger); }
    .pc-table .tag.info { background: var(--primary-soft); color: var(--primary); }

    /* ===== 會計部專用樣式 ===== */
    /* 篩選器欄：關鍵字、日期、類型篩選 */
    .fin-filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:14px; padding:14px 16px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
    .fin-filter-bar input, .fin-filter-bar select { border:1px solid var(--border); border-radius:6px; padding:8px 10px; min-width:160px; background:#fff; color:var(--text); font-size:13px; }
    .fin-filter-bar input:focus, .fin-filter-bar select:focus { outline:none; border-color:var(--primary); }
    /* 批量操作工具欄：全選、已選數量、批量按鈕 */
    .fin-batch-toolbar { display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:14px; padding:12px 16px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
    .fin-checkbox-label { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--text); cursor:pointer; }
    .fin-checkbox-label input { width:16px; height:16px; cursor:pointer; }
    .fin-selected-count { color:var(--muted); font-size:13px; }
    .fin-selected-count b { color:var(--primary); }
    /* 行內操作按鈕：用 flex 置中排列，gap:6px */
    .fin-row-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center; }
    .fin-row-actions .link-btn { padding:2px 6px; font-size:12px; }
    /* 收據預覽：模擬 PDF 第 4 頁收據樣式 */
    .fin-receipt-preview { border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:14px; background:#fff; }
    .fin-receipt-header { text-align:center; display:grid; gap:4px; padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:14px; }
    .fin-receipt-header strong { font-size:17px; }

    /* 批量按鈕 disabled 狀態 */
    .fin-batch-toolbar button:disabled { opacity:0.5; cursor:not-allowed; }

    /* 統一清單表格：所有業務表格沿用 CALL 管理的資料密度與操作節奏 */
    .data-table-wrap,
    .pc-table-wrapper {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);

    .sr-filter-bar {

    function getMastersForDispatch() {
      const masterUsers = getUsersByRole("MASTER");
      return masterUsers.map(u => {
        // 計算該師傅當前處理中工單數量（待確認/待處理/處理中）
        const activeTickets = tickets.filter(t => t.master === u.name && ["待確認", "待處理", "處理中"].includes(t.status));
        const load = activeTickets.length;
        // 負載 >= 3 視為忙碌，否則可接單
        const status = load >= 3 ? "忙碌" : "可接單";
        return {
          name: u.name,
          area: u.area || "未分配",
          skills: u.skills || "PM、維修",
          load,
          status,
          tag: load === 0 ? "可接單" : `負載 ${load}`,
          phone: u.phone || "",
          email: u.email || ""

      });

    const ROLE_MAP = {

      TL: "TEAM_LEADER",
      MASTER: "MASTER",

    function getCurrentUserId() {
      if (state.currentPerson) {

      return user ? user.id : null;

    // 獲取當前角色對應的通知角色類型
    function getCurrentNotificationRole() {
      return ROLE_MAP[state.role] || "CS";
    }

    // 獲取用戶收到的通知
    // 匹配規則：
    // 1. receiverRole === "ALL" → 所有人可見
    // 2. receiverRole 匹配當前角色 → 該角色羣體可見
    // 3. 如果同時指定了 receiverId，則必須 receiverId 也匹配當前用戶
    function getUserNotifications() {
      const userId = getCurrentUserId();
      const notifRole = getCurrentNotificationRole();
      
      return notifications.filter(n => {
        // 全局通知：所有人可見
        if (n.receiverRole === "ALL") {
          return true;
        }
        
        // 檢查角色是否匹配
        const roleMatches = n.receiverRole === notifRole;
        if (!roleMatches) {
          return false;
        }
        
        // 如果指定了具體的 receiverId（且不是 "ALL"），則必須匹配當前用戶
        if (n.receiverId && n.receiverId !== "ALL") {
          return n.receiverId === userId;
        }
        
        // 否則只要角色匹配即可（發送給該角色的所有人）
        return true;
      });
    }

    // 獲取未讀通知數量（只統計 Action 級別）

      return `
        <div class="noti-panel-head">
          <h3>🔔 通知 ${actionUnreadCount > 0 ? `<span class="noti-unread-tag">${actionUnreadCount} 待處理</span>` : ""}</h3>
