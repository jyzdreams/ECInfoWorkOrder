    // 確認執行 Excel 導入（將模擬數據寫入系統）
    function confirmExcelImport(fileName, type, data, validCount, invalidCount) {
      const typeLabels = { customer: '客戶資料', workorder: '工單記錄', quotation: '報價記錄', invoice: '發票記錄', payment: '收款記錄' };
      let successCount = 0;
      let failCount = 0;

      // 根據類型執行實際導入
      if (type === 'customer') {
        data.forEach(row => {
          if (!row['客戶編號'] || !row['中文名稱']) { failCount++; return; }
          // 檢查是否已存在
          if (customers.find(c => c.id === row['客戶編號'])) { failCount++; return; }
          customers.push({
            id: row['客戶編號'],
            nameZh: row['中文名稱'],
            nameEn: row['英文名稱'] || '',
            type: row['類型(政府/私人)'] || '私人',
            level: row['等級(普通/VIP/重要)'] || '普通',
            status: '啓用',
            peachtreeId: row['Peachtree ID'] || '',
            contacts: [{ name: row['聯繫人'] || '', title: '聯繫人', phone: row['電話'] || '', whatsapp: '', email: row['郵箱'] || '' }],
            addresses: [{ area: row['區域'] || '未設置', addressZh: row['地址'] || '', addressEn: '', tl: 'TL-001', noPhoto: false, noPhotoReason: '' }],
            createdAt: new Date().toISOString().slice(0, 10),
            createdBy: state.role === 'MASTER' ? '老闆' : (state.role || 'CS-001')
          });
          successCount++;
        });
      } else if (type === 'workorder') {
        data.forEach(row => {
          if (!row['工單編號']) { failCount++; return; }
          if (tickets.find(t => t.id === row['工單編號'])) { failCount++; return; }
          tickets.push({
            id: row['工單編號'],
            customerId: row['客戶編號'] || '',
            customerName: '',
            type: row['工單類型'] || '保養',
            area: row['區域'] || '',
            address: row['地址'] || '',
            assignee: row['負責人'] || '',
            createdAt: row['創建日期'] || new Date().toISOString().slice(0, 10),
            scheduledDate: row['預約日期'] || '',
            description: row['描述'] || '',
            status: row['狀態'] || '待處理',
            priority: '普通',
            source: 'Excel 導入'
          });
          successCount++;
        });
      } else if (type === 'quotation') {
        data.forEach(row => {
          if (!row['報價單號']) { failCount++; return; }
          if (quotations.find(q => q.id === row['報價單號'])) { failCount++; return; }
          quotations.push({
            id: row['報價單號'],
            customerId: row['客戶編號'] || '',
            customerName: row['客戶名稱'] || '',
            tenderAmount: row['報價金額'] || 0,
            category: row['類別(M/P/M+P)'] || 'M',
            createdAt: row['創建日期'] || new Date().toISOString().slice(0, 10),
            deadline: row['截止日期'] || '',
            source: row['來源'] || '',
            owner: row['負責人'] || '',
            bidStatus: row['狀態'] || '待報價'
          });
          successCount++;
        });
      } else if (type === 'invoice') {
        data.forEach(row => {
          if (!row['發票編號']) { failCount++; return; }
          if (invoices.find(i => i.invoiceNo === row['發票編號'])) { failCount++; return; }
          invoices.push({
            id: 'inv-' + Date.now() + Math.random().toString(36).slice(2, 6),
            invoiceNo: row['發票編號'],
            quotationId: row['報價單號'] || '',
            customerName: row['客戶名稱'] || '',
            amount: row['金額'] || 0,
            invoiceDate: row['開票日期'] || new Date().toISOString().slice(0, 10),
            dueDate: row['到期日'] || '',
            status: row['狀態'] || '已開具'
          });
          successCount++;
        });
      } else if (type === 'payment') {
        data.forEach(row => {
          if (!row['收據編號']) { failCount++; return; }
          payments.push({
            id: 'pay-' + Date.now() + Math.random().toString(36).slice(2, 6),
            receiptNo: row['收據編號'],
            invoiceId: row['發票編號'] || '',
            customerName: row['客戶名稱'] || '',
            amount: row['金額'] || 0,
            paymentDate: row['收款日期'] || new Date().toISOString().slice(0, 10),
            paymentMethod: row['收款方式'] || '現金',
            remark: row['備註'] || ''
          });
          successCount++;
        });
      }

      saveDataToLocalStorage();

      // 記錄導入歷史
      const importHistory = JSON.parse(localStorage.getItem('ecinfo_excel_imports') || '[]');
      importHistory.unshift({
        importTime: new Date().toLocaleString('zh-TW', { hour12: false }),
        type: type,
        typeLabel: typeLabels[type] || type,
        fileName: fileName,
        totalCount: data.length,
        successCount: successCount,
        failCount: failCount + invalidCount,
        status: (failCount + invalidCount) === 0 ? '成功' : '部分成功',
        operator: state.role === 'MASTER' ? '老闆' : (state.role || 'CS-001')
      });
      if (importHistory.length > 50) importHistory.length = 50;
      localStorage.setItem('ecinfo_excel_imports', JSON.stringify(importHistory));

      toast(`Excel 導入完成：成功 ${successCount} 條，失敗 ${failCount + invalidCount} 條`, "success");

      // 清空預覽區域並重新渲染
      const previewArea = document.getElementById('excelPreviewArea');
      if (previewArea) previewArea.innerHTML = '';
      render();
    }

    function filterUsers() {
      return users.filter(u => {
        const matchRole = userState.roleFilter === "全部" || u.role === userState.roleFilter;
        const matchFilterRole = userState.filterRole === "全部" || u.role === userState.filterRole;
        const matchFilterStatus = userState.filterStatus === "全部" || u.status === userState.filterStatus;
        const keyword = userState.searchKeyword.toLowerCase();
        const matchKeyword = !keyword ||
          u.name.toLowerCase().includes(keyword) ||
          u.employeeNo.toLowerCase().includes(keyword) ||
          u.phone.includes(keyword) ||
          u.email.toLowerCase().includes(keyword);
        return matchRole && matchFilterRole && matchFilterStatus && matchKeyword;
      });
    }

    function paginateUsers(filtered) {
      const start = (userState.currentPage - 1) * userState.pageSize;
      return filtered.slice(start, start + userState.pageSize);
    }

    function getUserStats(user) {
      const userTickets = tickets.filter(t => t.master === user.name || t.owner === user.name);
      const completed = userTickets.filter(t => t.status === "已完成").length;
      const processing = userTickets.filter(t => ["待確認", "待處理", "處理中"].includes(t.status)).length;
      const overdue = userTickets.filter(t => t.urgent && ["待確認", "待處理", "處理中"].includes(t.status)).length;
      const satisfaction = userTickets.length > 0 ? Math.min(98, 85 + Math.floor(Math.random() * 15)) : 0;
      return { completed, processing, overdue, satisfaction };
    }

    function saveUser(formData, isEdit = false, userId = null) {
      if (isEdit) {
        const user = users.find(u => u.id === userId);
        if (user) {
          Object.assign(user, {
            name: formData.get("name") || user.name,
            phone: formData.get("phone") || user.phone,
            email: formData.get("email") || user.email,
            role: formData.get("role") || user.role,
            area: formData.get("area") || user.area,
            manager: formData.get("manager") || user.manager,
            status: formData.get("status") || user.status
          });
          // 保存到 localStorage，確保新增 Call 時能讀取到最新的主管數據
          saveDataToLocalStorage();
          toast("用戶信息已更新");
        }
      } else {
        const newUser = {
          id: `U${String(users.length + 1).padStart(3, "0")}`,
          name: formData.get("name"),
          employeeNo: formData.get("employeeNo"),
          role: formData.get("role"),
          area: formData.get("area") || "未分配",
          phone: formData.get("phone"),
          email: formData.get("email") || "",
          manager: formData.get("manager") || "",
          status: formData.get("status") || "啓用",
          lastLogin: "尚未登錄",
          createdAt: new Date().toISOString().slice(0, 10)
        };
        users.unshift(newUser);
        saveDataToLocalStorage();
        toast("新用戶已創建");
      }
      render();
    }

    function deleteUser(userId) {
      const user = users.find(u => u.id === userId);
      if (!user) return;
      if (!confirm(`確定要刪除用戶 "${user.name}" 嗎？此操作不可恢復。`)) return;
      users = users.filter(u => u.id !== userId);
      saveDataToLocalStorage();
      if (userState.selectedUserId === userId) userState.selectedUserId = null;
      toast("用戶已刪除");
      render();
    }

    function bindModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });
      const createForm = modal.querySelector("#createUserForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveUser(formData, false);
          modal.remove();
        });
      }
      const editForm = modal.querySelector("#editUserForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const userId = editForm.dataset.userId;
          saveUser(formData, true, userId);
          modal.remove();
        });
      }
    }

    function filterCustomers() {
      return customers.filter(c => {
        // Category filter (only 全部/政府/私人)
        if (customerState.categoryFilter !== "全部") {
          if (c.type !== customerState.categoryFilter) return false;
        }

        // Type filter
        if (customerState.filterType !== "全部" && c.type !== customerState.filterType) return false;

        // Level filter
        if (customerState.filterLevel !== "全部" && c.level !== customerState.filterLevel) return false;

        // Status filter
        if (customerState.filterStatus !== "全部" && c.status !== customerState.filterStatus) return false;

        // Search filter
        if (customerState.searchKeyword) {
          const keyword = customerState.searchKeyword.toLowerCase();
          const searchFields = [
            c.nameZh,
            c.nameEn,
            c.id,
            c.contacts[0]?.name,
            c.contacts[0]?.phone,
            c.addresses[0]?.addressZh,
            c.addresses[0]?.addressEn
          ].map(f => (f || "").toLowerCase());

          return searchFields.some(f => f.includes(keyword));
        }

        return true;
      });
    }

    function paginateCustomers(filtered) {
      const start = (customerState.currentPage - 1) * customerState.pageSize;
      return filtered.slice(start, start + customerState.pageSize);
    }

    function getCustomerStats(customer) {
      // Simulate stats based on customer ID
      const idNum = parseInt(customer.id.replace("CUST-", ""));
      return {
        total: 10 + idNum * 3,
        month: 2 + (idNum % 5),
        processing: 1 + (idNum % 3),
        completed: 8 + idNum * 2
      };
    }

    function saveCustomer(formData, isEdit = false, customerId = null) {
      if (isEdit) {
        const customer = customers.find(c => c.id === customerId);
        if (customer) {
          customer.nameZh = formData.get("nameZh") || customer.nameZh;
          customer.nameEn = formData.get("nameEn") || customer.nameEn;
          customer.type = formData.get("type") || customer.type;
          customer.level = formData.get("level") || customer.level;
          customer.status = formData.get("status") || customer.status;
          customer.peachtreeId = formData.get("peachtreeId") || customer.peachtreeId || "";

          if (customer.contacts.length > 0) {
            customer.contacts[0].name = formData.get("contactName") || customer.contacts[0].name;
            customer.contacts[0].phone = formData.get("contactPhone") || customer.contacts[0].phone;
            customer.contacts[0].whatsapp = formData.get("contactWhatsapp") || customer.contacts[0].whatsapp;
            customer.contacts[0].email = formData.get("contactEmail") || customer.contacts[0].email;
          }

          if (customer.addresses.length > 0) {
            customer.addresses[0].area = formData.get("area") || customer.addresses[0].area;
            customer.addresses[0].addressZh = formData.get("addressZh") || customer.addresses[0].addressZh;
            customer.addresses[0].addressEn = formData.get("addressEn") || customer.addresses[0].addressEn;
            customer.addresses[0].noPhoto = formData.get("noPhoto") === "true";
            customer.addresses[0].noPhotoReason = formData.get("noPhotoReason") || "";
          }

          toast("客戶資訊已更新");
        }
      } else {
        const newCustomer = {
          id: `CUST-${String(customers.length + 1).padStart(4, "0")}`,
          nameZh: formData.get("nameZh"),
          nameEn: formData.get("nameEn"),
          type: formData.get("type"),
          level: formData.get("level"),
          status: formData.get("status") || "啓用",
          peachtreeId: formData.get("peachtreeId") || "",
          contacts: [{
            name: formData.get("contactName"),
            title: "聯繫人",
            phone: formData.get("contactPhone"),
            whatsapp: formData.get("contactWhatsapp") || "",
            email: formData.get("contactEmail") || ""
          }],
          addresses: [{
            area: formData.get("area") || "未設置",
            addressZh: formData.get("addressZh") || "",
            addressEn: formData.get("addressEn") || "",
            tl: "TL-001",
            noPhoto: formData.get("noPhoto") === "true",
            noPhotoReason: formData.get("noPhotoReason") || ""
          }],
          createdAt: new Date().toISOString().slice(0, 10),
          createdBy: "CS-001"
        };
        customers.unshift(newCustomer);
        saveDataToLocalStorage();
        toast("新客戶已創建");
      }
      render();
    }

    function deleteCustomer(customerId) {
      const customer = customers.find(c => c.id === customerId);
      if (!customer) return;
      if (!confirm(`確定要刪除客戶 "${customer.nameZh}" 嗎？此操作不可恢復。`)) return;
      customers = customers.filter(c => c.id !== customerId);
      saveDataToLocalStorage();
      if (customerState.selectedCustomerId === customerId) {
        customerState.selectedCustomerId = null;
      }
      toast("客戶已刪除");
      render();
    }

    function bindCustomerModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      // 客戶類型切換時顯示/隱藏政府字段
      const typeSelects = modal.querySelectorAll("[data-customer-type-select]");
      typeSelects.forEach(select => {
        const updateGovFields = () => {
          const isGov = select.value === "政府";
          const govPrefixField = modal.querySelector("#govPrefixField");
          const govContractField = modal.querySelector("#govContractField");
          const govJNumberField = modal.querySelector("#govJNumberField");
          if (govPrefixField) govPrefixField.classList.toggle("hidden", !isGov);
          if (govContractField) govContractField.classList.toggle("hidden", !isGov);
          if (govJNumberField) govJNumberField.classList.toggle("hidden", !isGov);
        };
        select.addEventListener("change", updateGovFields);
        updateGovFields(); // 初始化
      });

      const createForm = modal.querySelector("#createCustomerForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveCustomer(formData, false);
          modal.remove();
        });
      }

      const editForm = modal.querySelector("#editCustomerForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const customerId = editForm.dataset.customerId;
          saveCustomer(formData, true, customerId);
          modal.remove();
        });
      }
    }

              ${renderQuotationFilters()}

      `;

    // 報價管理分頁組件
    function renderQuotationPagination() {
      const filtered = filterQuotations();
      const totalPages = Math.max(1, Math.ceil(filtered.length / quotationState.pageSize));
      const current = quotationState.currentPage;
      // 生成頁碼按鈕（最多顯示 7 個頁碼，超出用省略號）
      const pages = [];
      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
      } else {
        pages.push(1);
        if (current > 3) pages.push("...");
        const start = Math.max(2, current - 1);
        const end = Math.min(totalPages - 1, current + 1);
        for (let i = start; i <= end; i++) pages.push(i);
        if (current < totalPages - 2) pages.push("...");
        pages.push(totalPages);
      }

      return `
        <div class="um-pagination">
          <span>共 ${filtered.length} 條記錄，每頁
            <select data-qm-page-size style="min-height:auto;padding:2px 6px;font-size:12px;">
              ${[10, 20, 50].map(n => `<option value="${n}" ${quotationState.pageSize === n ? "selected" : ""}>${n}</option>`).join("")}
            </select>
            條，第 ${current}/${totalPages} 頁
          </span>
          <div class="um-pg-btns">
            <button data-qm-page="prev" ${current <= 1 ? "disabled" : ""}>‹</button>
            ${pages.map(p => p === "..." ? `<span style="padding:0 4px;color:var(--muted);">…</span>` : `<button class="${current === p ? "active" : ""}" data-qm-page="${p}">${p}</button>`).join("")}
            <button data-qm-page="next" ${current >= totalPages ? "disabled" : ""}>›</button>
          </div>
        </div>
      `;
    }

    // 打開報價詳情抽屜（直接操作 DOM，避免全頁重渲染導致閃動）
    function openQuotationDrawer(quotationId) {
      quotationState.selectedQuotationId = quotationId;
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;

      const layout = document.querySelector(".qm-layout");
      // 找不到佈局容器時退回全量渲染
      if (!layout) { render(); return; }

      const existingDrawer = layout.querySelector(".wo-drawer");
      // 生成新抽屜 DOM
      const wrapper = document.createElement("div");
      wrapper.innerHTML = renderQuotationDrawer(quotation);
      const newDrawer = wrapper.firstElementChild;

      if (existingDrawer) {
        // 切換不同報價：僅替換抽屜內容，保留滾動位置，避免重播入場動畫造成閃動
        const oldBody = existingDrawer.querySelector(".wo-drawer-body");
        const scrollTop = oldBody ? oldBody.scrollTop : 0;
        existingDrawer.replaceWith(newDrawer);
        const newBody = newDrawer.querySelector(".wo-drawer-body");
        if (newBody) newBody.scrollTop = scrollTop;
        // 停用入場動畫（切換時不應再次滑入）
        newDrawer.style.animation = "none";
      } else {
        // 首次打開：加入 with-drawer 樣式並插入抽屜（播放入場動畫）
        layout.classList.add("with-drawer");
        layout.appendChild(newDrawer);
      }

      // 綁定抽屜內事件（DOM 直接插入後需手動綁定）
      bindQuotationDrawerEvents();
      // 禁止外部頁面滾動，僅抽屜內部可滾動

      quotationState.selectedQuotationId = null;
      const layout = document.querySelector(".qm-layout");
      if (layout) {
        layout.classList.remove("with-drawer");
        const drawer = layout.querySelector(".wo-drawer");
        if (drawer) drawer.remove();
      }
      document.body.classList.remove("drawer-open");
    }

      const drawer = document.querySelector(".qm-layout .wo-drawer");
      if (!drawer) return;

      drawer.querySelectorAll("[data-qm-close]").forEach(btn => btn.addEventListener("click", closeQuotationDrawer));
      drawer.querySelectorAll("[data-open]").forEach(btn => btn.addEventListener("click", () => performAction("view", btn.dataset.open)));
      drawer.querySelectorAll("[data-edit-quotation]").forEach(btn => btn.addEventListener("click", () => openEditQuotation(btn.dataset.editQuotation)));
      drawer.querySelectorAll("[data-delete-quotation]").forEach(btn => btn.addEventListener("click", () => deleteQuotation(btn.dataset.deleteQuotation)));
      drawer.querySelectorAll("[data-mark-won]").forEach(btn => btn.addEventListener("click", () => markQuotationWon(btn.dataset.markWon)));
      drawer.querySelectorAll("[data-mark-no-offer]").forEach(btn => btn.addEventListener("click", () => markNoOffer(btn.dataset.markNoOffer)));
      drawer.querySelectorAll("[data-create-revision]").forEach(btn => btn.addEventListener("click", () => createQuotationRevision(btn.dataset.createRevision)));
      drawer.querySelectorAll("[data-start-procurement]").forEach(btn => btn.addEventListener("click", () => startProcurement(btn.dataset.startProcurement)));
      drawer.querySelectorAll("[data-edit-contact]").forEach(btn => btn.addEventListener("click", () => editContactInfo(btn.dataset.editContact)));
      drawer.querySelectorAll("[data-manage-paper]").forEach(btn => btn.addEventListener("click", () => manageCompletionPaper(btn.dataset.managePaper)));

    function filterQuotations() {
      return quotations.filter(q => {
        // 報價狀態篩選
        if (quotationState.statusFilter !== "全部" && q.status !== quotationState.statusFilter) return false;

        // 類別篩選
        if (quotationState.categoryFilter !== "全部" && q.category !== quotationState.categoryFilter) return false;

        // 區域篩選（按關聯工單的區域匹配）
        if (quotationState.areaFilter !== "全部") {
          const ticket = tickets.find(t => t.id === q.ticketId);
          if (!ticket || ticket.area !== quotationState.areaFilter) return false;
        }

        // 工單狀態篩選
        if (quotationState.filterTicketStatus !== "全部") {
          const ticket = tickets.find(t => t.id === q.ticketId);
          if (!ticket || ticket.status !== quotationState.filterTicketStatus) return false;
        }

        // 客戶篩選
        if (quotationState.filterCustomer !== "全部" && q.customerId !== quotationState.filterCustomer) return false;

        // 關鍵詞搜索（報價編號、工單編號、客戶名稱、標題）
        if (quotationState.searchKeyword) {
          const keyword = quotationState.searchKeyword.toLowerCase();
          const searchFields = [
            q.id,
            q.ticketId,
            q.customerName,
            q.title
          ].map(f => (f || "").toLowerCase());

          if (!searchFields.some(f => f.includes(keyword))) return false;
        }

        return true;
      });
    }

    function paginateQuotations(filtered) {
      const start = (quotationState.currentPage - 1) * quotationState.pageSize;
      return filtered.slice(start, start + quotationState.pageSize);
    }

    function calculateTax(amount, taxRate) {
      return amount * (1 + taxRate);
    }

    function generateQuotationNo(form) {
      const area = form.querySelector('[name=area]')?.value || "";
      const category = form.querySelector('[name=category]')?.value || "";
      if (!area || !category) {
        form.querySelector('[name=id]').value = "選擇類別和區域後自動生成";
        return;
      }
      // 從字典管理中讀取區域編號
      const areaDict = dictData["區域"] || [];
      const areaItem = areaDict.find(r => r.name === area);
      const areaCode = areaItem?.code || area;
      const catCode = category.replace("+", "");

      const seq = String(quotations.length + 1).padStart(5, "0");
      form.querySelector('[name=id]').value = `${areaCode}${catCode}${yy}${seq}`;
    }

    function saveQuotation(formData, isEdit = false, quotationId = null) {
      const ticketId = formData.get("ticketId") || "";
      const ticket = tickets.find(t => t.id === ticketId);
      const customer = customers.find(c => c.id === ticket?.customerId);
      const amount = parseFloat(formData.get("amount")) || 0;
      const taxRate = parseFloat(formData.get("taxRate")) || 0;
      const totalAmount = calculateTax(amount, taxRate);
      const sourceTicketId = formData.get("sourceTicketId") || "";

      if (isEdit) {
        const quotation = quotations.find(q => q.id === quotationId);
        if (quotation) {
          quotation.title = formData.get("title") || quotation.title;
          quotation.category = formData.get("category") || quotation.category || "";
          quotation.srNo = formData.get("srNo") || quotation.srNo;
          quotation.owner = formData.get("owner") || quotation.owner;
          quotation.createdAt = formData.get("createdAt") || quotation.createdAt;
          quotation.validUntil = formData.get("validUntil") || quotation.validUntil;
          quotation.amount = amount;
          quotation.taxRate = taxRate;
          quotation.totalAmount = totalAmount;
          quotation.bargainAmount = parseFloat(formData.get("bargainAmount")) || null;
          quotation.status = formData.get("status") || quotation.status;
          quotation.remark = formData.get("remark") || quotation.remark;
          quotation.deadline = formData.get("deadline") || quotation.deadline;
          quotation.source = formData.get("source") || quotation.source;
          quotation.sourceTicketId = sourceTicketId;
          quotation.isInviteTender = formData.get("isInviteTender") === "on";
          quotation.projectJobNo = formData.get("projectJobNo") || quotation.projectJobNo || "";
          quotation.ticketId = ticketId;
          quotation.customerName = formData.get("customerName") || quotation.customerName || "";
          quotation.area = formData.get("area") || quotation.area || "";
          // 記錄修改歷史（#17 報價歷史記錄）
          if (!quotation.history) quotation.history = [];
          quotation.history.push({ action: "編輯", time: new Date().toLocaleString('zh-TW'), actor: currentRole().name, changes: `金額: ${amount}, 狀態: ${formData.get("status") || quotation.status}` });
          toast("報價信息已更新");
        }
      } else {
        const newQuotation = {
          id: formData.get("id"),
          title: formData.get("title"),
          ticketId: ticketId,
          customerId: ticket?.customerId || "",
          customerName: formData.get("customerName") || customer?.nameZh || "",
          area: formData.get("area") || ticket?.area || "",
          amount: amount,
          taxRate: taxRate,
          totalAmount: totalAmount,
          bargainAmount: parseFloat(formData.get("bargainAmount")) || null,
          status: formData.get("status") || "待報價",
          owner: formData.get("owner"),
          ownerPhone: users.find(u => u.name === formData.get("owner"))?.phone || "",
          ownerTeam: users.find(u => u.name === formData.get("owner"))?.area || "",
          srNo: formData.get("srNo") || "",
          category: formData.get("category") || "",
          createdAt: formData.get("createdAt"),
          validUntil: formData.get("validUntil"),
          deadline: formData.get("deadline"),
          source: formData.get("source") || "",
          sourceTicketId: sourceTicketId,
          isInviteTender: formData.get("isInviteTender") === "on",
          projectJobNo: formData.get("projectJobNo") || "",
          attachments: [],
          remark: formData.get("remark") || "",
          history: [{ action: "創建", time: new Date().toLocaleString('zh-TW'), actor: currentRole().name }]
        };
        quotations.unshift(newQuotation);
        saveDataToLocalStorage();
        toast("新報價已創建");
      }

    // 通用自定義確認彈窗（替代原生 confirm，頁面內彈出樣式美觀的確認窗口）
    // 參數：{ title: 標題, message: 提示訊息, confirmText: 確認按鈕文字, cancelText: 取消按鈕文字 }
    // 返回：Promise<boolean>，true 表示確認，false 表示取消
    function showConfirmDialog({ title = "確認操作", message = "", confirmText = "確定", cancelText = "取消" } = {}) {
      return new Promise((resolve) => {
        // 建立遮罩層（複用 dm-confirm-overlay 樣式，但提高 z-index 確保蓋過抽屜）
        const overlay = document.createElement("div");
        overlay.className = "dm-confirm-overlay";
        overlay.style.zIndex = "9999";

        // 建立確認對話框（複用 dm-confirm 樣式）
        const dialog = document.createElement("div");
        dialog.className = "dm-confirm";
        dialog.innerHTML = `
          <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;">
            <div style="width:40px;height:40px;border-radius:50%;background:var(--danger-soft);color:var(--danger);display:grid;place-items:center;font-size:20px;flex-shrink:0;">⚠</div>
            <div>
              <h3 style="margin:0 0 8px;font-size:16px;">${escapeHtml(title)}</h3>
              <p style="margin:0;font-size:13px;color:var(--muted);line-height:1.6;">${escapeHtml(message)}</p>
            </div>
          </div>
          <div class="dm-confirm-actions">
            <button class="ghost-btn" type="button" data-confirm-cancel>${escapeHtml(cancelText)}</button>
            <button class="danger-btn" type="button" data-confirm-ok>${escapeHtml(confirmText)}</button>
          </div>
        `;
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);

        // 關閉彈窗並回傳結果
        const close = (result) => {
          overlay.remove();
          resolve(result);
        };

        // 確認按鈕
        dialog.querySelector("[data-confirm-ok]").addEventListener("click", () => close(true));
        // 取消按鈕
        dialog.querySelector("[data-confirm-cancel]").addEventListener("click", () => close(false));
        // 點擊遮罩區域取消
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) close(false);
        });
        // ESC 鍵取消
        const escHandler = (e) => {
          if (e.key === "Escape") {
            document.removeEventListener("keydown", escHandler);
            close(false);
          }
        };
        document.addEventListener("keydown", escHandler);
      });
    }

    // 通用自定義輸入彈窗（替代原生 prompt，頁面內彈出帶輸入框的確認窗口）
    // 參數：{ title: 標題, message: 提示訊息, placeholder: 輸入框佔位文字, confirmText: 確認按鈕文字, cancelText: 取消按鈕文字, multiline: 是否多行輸入 }
    // 返回：Promise<string|null>，使用者輸入的字串（確認），null（取消）
    function showPromptDialog({ title = "請輸入", message = "", placeholder = "", confirmText = "確定", cancelText = "取消", multiline = false } = {}) {
      return new Promise((resolve) => {
        // 建立遮罩層
        const overlay = document.createElement("div");
        overlay.className = "dm-confirm-overlay";
        overlay.style.zIndex = "9999";

        // 建立對話框
        const dialog = document.createElement("div");
        dialog.className = "dm-confirm";
        dialog.innerHTML = `
          <div style="margin-bottom:16px;">
            <h3 style="margin:0 0 8px;font-size:16px;">${escapeHtml(title)}</h3>
            ${message ? `<p style="margin:0 0 12px;font-size:13px;color:var(--muted);line-height:1.6;">${escapeHtml(message)}</p>` : ''}
          </div>
          ${multiline
            ? `<textarea data-prompt-input placeholder="${escapeHtml(placeholder)}" style="width:100%;min-height:80px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;"></textarea>`
            : `<input type="text" data-prompt-input placeholder="${escapeHtml(placeholder)}" style="width:100%;height:40px;padding:0 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);" />`
          }
          <div class="dm-confirm-actions" style="margin-top:18px;">
            <button class="ghost-btn" type="button" data-prompt-cancel>${escapeHtml(cancelText)}</button>
            <button class="primary-btn" type="button" data-prompt-ok>${escapeHtml(confirmText)}</button>
          </div>
        `;
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);

        const input = dialog.querySelector("[data-prompt-input]");
        // 自動聚焦輸入框
        setTimeout(() => input.focus(), 0);

        // 關閉彈窗並回傳結果
        const close = (result) => {
          overlay.remove();
          resolve(result);
        };

        // 確認按鈕
        dialog.querySelector("[data-prompt-ok]").addEventListener("click", () => close(input.value || ""));
        // 取消按鈕
        dialog.querySelector("[data-prompt-cancel]").addEventListener("click", () => close(null));
        // 點擊遮罩區域取消
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) close(null);
        });
        // Enter 鍵確認（僅單行輸入時），ESC 鍵取消
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !multiline) {
            e.preventDefault();
            close(input.value || "");
          }
          if (e.key === "Escape") {
            e.preventDefault();
            close(null);
          }
        });
      });
    }

      render();

        const customerOrder = formData.get("customerOrder").trim();
        const tenderNo = formData.get("tenderNo").trim();
        const tenderAmount = parseFloat(formData.get("tenderAmount")) || 0;
        const startProc = formData.get("startProcurement") === "on";

        quotation.bidStatus = "已中標";
        quotation.customerOrder = customerOrder;
        quotation.tenderNo = tenderNo;
        quotation.tenderAmount = tenderAmount;
        quotation.status = "已確認";

    // 不投標
    function markNoOffer(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      if (!confirm(`確定要將報價 "${quotation.id}" 標記為「不投標」嗎？`)) return;
      quotation.bidStatus = "不投標";
      quotation.status = "已取消";
      saveDataToLocalStorage();
      toast("已標記為不投標");
      render();
    }

    // 創建修訂版
    function createQuotationRevision(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      const newAmount = prompt("請輸入修訂後的金額（HKD）：", quotation.amount);
      if (newAmount === null) return;
      
      const remark = prompt("請輸入修訂說明：");
      if (remark === null) return;
      
      // 保存當前版本到修訂歷史
      if (!quotation.revisions) quotation.revisions = [];
      quotation.revisions.push({
        rev: quotation.revision,
        amount: quotation.amount,
        date: quotation.createdAt,
        remark: quotation.remark || "初版"
      });
      
      // 更新爲新版本
      quotation.revision += 1;
      quotation.amount = parseFloat(newAmount) || quotation.amount;
      quotation.totalAmount = quotation.amount * (1 + (quotation.taxRate || 0));
      quotation.remark = remark;
      quotation.createdAt = new Date().toISOString().slice(0, 10);
      
      saveDataToLocalStorage();
      toast(`已創建修訂版 ${quotation.ourRef}R${quotation.revision}`);
      render();
    }

    // 啓動採購
    function startProcurement(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      quotation.procurementStatus = "採購中";
      quotation.completionPaperStatus = "待制作";
      quotation.completionPaperDueDate = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      
      saveDataToLocalStorage();
      toast("已通知採購部啓動採購流程，完工期限：2周");
      render();
    }

    // 標記到貨
    function markProcurementArrived(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      quotation.procurementStatus = "已到貨";
      
      saveDataToLocalStorage();
      toast("已標記到貨，通知TL和師傅");
      render();
    }

    // 完工紙管理
    function manageCompletionPaper(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      const action = prompt("請選擇操作：\n1. 記錄領取人\n2. 標記已完工\n\n請輸入數字 1 或 2：");
      
      if (action === "1") {
        const holder = prompt("請輸入完工紙領取人姓名：");
        if (holder === null) return;
        quotation.completionPaperHolder = holder;
        quotation.completionPaperStatus = "已領取";
        saveDataToLocalStorage();
        toast(`完工紙已領取，領取人：${holder}`);
      } else if (action === "2") {
        if (!quotation.completionPaperHolder) {
          alert("請先記錄領取人！");
          return;
        }
        quotation.completionPaperStatus = "已完工";
        saveDataToLocalStorage();
        toast("完工紙已歸還，工單可關閉");
      }
      
      render();
    }

    // 採購部關單
    function closeProcurement(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      // 檢查完工紙是否已歸還
      if (quotation.completionPaperStatus !== "已完工") {
        alert("完工紙尚未歸還，無法關單！");
        return;
      }
      
      if (!confirm("確定要關單嗎？關單後將通知會計部開具發票。")) return;
      
      quotation.procurementStatus = "已關單";
      
      // 創建通知給會計部
      createNotification({
        type: 'invoice_required',
        title: '新發票待開具',
        content: `報價單 ${quotation.ourRef} 已完工，請開具發票`,
        targetId: quotation.id,
        targetUrl: `?page=quotations&id=${quotation.id}`,
        recipients: ['FIN']
      });
      
      saveDataToLocalStorage();
      toast("已關單，已通知會計部");
      render();
    }

    function bindQuotationModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      // Auto-fill customer, area, SR No and quotation ID when ticket is selected
      const ticketSelect = modal.querySelector("[name='ticketId']");
      const customerInput = modal.querySelector("[name='customerName']");
      const areaSelect = modal.querySelector("[name='area']");
      const srNoInput = modal.querySelector("[name='srNo']");
      if (ticketSelect) {
        ticketSelect.addEventListener("change", () => {
          const ticket = tickets.find(t => t.id === ticketSelect.value);
          const customer = customers.find(c => c.id === ticket?.customerId);
          if (customerInput) {
            customerInput.value = customer?.nameZh || ticket?.customer || "";
          }
          // 設置區域下拉框的值
          if (areaSelect && ticket?.area) {
            areaSelect.value = ticket.area;
          }
          if (srNoInput) srNoInput.value = ticket?.serviceReportNo || "";
          // 區域和類別都選中後動態生成報價編號
          generateQuotationNo(modal.querySelector('form'));
        });
      }

      // Auto-calculate total amount
      const amountInput = modal.querySelector("[name='amount']");
      const taxRateInput = modal.querySelector("[name='taxRate']");
      const totalAmountInput = modal.querySelector("[name='totalAmount']");
      if (amountInput && taxRateInput && totalAmountInput) {
        const calculate = () => {
          const amount = parseFloat(amountInput.value) || 0;
          const taxRate = parseFloat(taxRateInput.value) || 0;
          totalAmountInput.value = calculateTax(amount, taxRate).toFixed(2);
        };
        amountInput.addEventListener("input", calculate);
        taxRateInput.addEventListener("input", calculate);
      }

      const createForm = modal.querySelector("#createQuotationForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveQuotation(formData, false);
          modal.remove();
        });
      }

      const editForm = modal.querySelector("#editQuotationForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const quotationId = editForm.dataset.quotationId;
          saveQuotation(formData, true, quotationId);
          modal.remove();
        });
      }

      const statusForm = modal.querySelector("#updateQuotationStatusForm");
      if (statusForm) {
        statusForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(statusForm);
          const quotationId = statusForm.dataset.quotationId;
          updateQuotationStatus(formData, quotationId);
          modal.remove();
        });
      }
    }

    function renderPoActions(po) {

      // 狀態標籤輔助函數：用於「已完成」「已取消」等終態顯示
      const tag = (label, cls) => `<span class="tag ${cls}" style="align-self:center;">${label}</span>`;

      // 依採購單狀態返回對應的操作按鈕組合，使用 dispatch-actions 容器實現置中 flex 佈局
      let inner = "";

        // 已發貨：推進至已到貨

        // 已到貨：驗收後自動建立待分派工單

        // 已驗收：流程結束，顯示成功標籤

      }

      return `<div class="po-actions">${inner}</div>`;

    function poStatusClass(status) {
      const map = {
        "待下單": "warning",
        "已下單": "info",
        "已發貨": "info",
        "已到貨": "success",
        "已驗收": "success",
        "已取消": "danger"
      };
      return map[status] || "";
    }

    // 採購單狀態優先級（數字越小表示越早期、進度越低）
    const PO_STATUS_ORDER = {
      "待下單": 1,
      "已下單": 2,
      "已發貨": 3,
      "已到貨": 4,
      "已驗收": 5,
      "已取消": 0
    };

    // 取得報價單關聯的採購狀態（從關聯採購單實時計算，取最低進度作為整體狀態）
    // 當採購單狀態變化時，此函數返回的值會自動更新
    function getQuotationProcStatus(quotationId) {
      const relatedPOs = purchaseOrders.filter(po => po.quotationId === quotationId);
      if (relatedPOs.length === 0) return null;
      // 過濾掉已取消的採購單
      const activePOs = relatedPOs.filter(po => po.status !== "已取消");
      if (activePOs.length === 0) return "已取消";
      // 取進度最低的狀態作為整體採購狀態（反映最落後的採購單）
      const sorted = activePOs.sort((a, b) =>
        (PO_STATUS_ORDER[a.status] || 0) - (PO_STATUS_ORDER[b.status] || 0)
      );
      return sorted[0].status;
    }

    // 採購單狀態流轉
    function poAction(poId, action) {
      const po = purchaseOrders.find(p => p.id === poId);
      if (!po) return;
      const flow = {
        order: { next: "已下單", msg: "採購單已下單", field: "orderDate", value: new Date().toISOString().slice(0, 10) },
        ship: { next: "已發貨", msg: "已標記為發貨" },
        arrive: { next: "已到貨", msg: "已確認到貨", field: "arrivedDate", value: new Date().toISOString().slice(0, 10) },
        verify: { next: "已驗收", msg: "驗收通過" },
        cancel: { next: "已取消", msg: "採購單已取消" }
      };
      const step = flow[action];
      if (!step) return;
      if (action === "cancel" && !confirm("確定取消此採購單嗎？")) return;
      po.status = step.next;
      if (step.field) po[step.field] = step.value;
      saveDataToLocalStorage();
      toast(step.msg);

      // 採購驗收完成時，通知對應工單的 TL 採購完畢可派出工單
      if (action === "verify" && po.ticketId) {
        const ticket = tickets.find(t => t.id === po.ticketId);
        if (ticket) {
          const tlUser = users.find(u => u.name === ticket.tl && u.role === "TL" && isEnabled(u.status));
          if (tlUser) {
            createNotification({
              module: "ticket",
              level: "action",
              title: "採購完畢，可派出工單",
              content: `工單 ${ticket.id} - ${ticket.customer}`,
              subContent: `採購單 ${po.id} 已驗收完成，客戶 ${ticket.customer}（區域：${ticket.area}）的工單可派工處理。聯繫人：${ticket.contact || "無"}，電話：${ticket.phone || "無"}`,
              targetPage: "dispatch",
              targetId: ticket.id,
              receiverId: tlUser.id,
              receiverRole: "TEAM_LEADER"
            });
          }

          // 自動建立待分派工單：基於原工單 ID 添加 (N) 後綴
          // 規則：原工單 WO-20260615-003 → 新工單 WO-20260615-003(2)
          //       若原工單已有 (N) 後綴，則遞增為 (N+1)
          const origId = ticket.id;
          let newId;
          const suffixMatch = origId.match(/^(.+)\((\d+)\)$/);
          if (suffixMatch) {
            // 原 ID 已有 (N) 後綴，遞增為 (N+1)
            newId = `${suffixMatch[1]}(${parseInt(suffixMatch[2], 10) + 1})`;
          } else {
            // 原 ID 無後綴，添加 (2)
            newId = `${origId}(2)`;
          }

          // 避免重複建立（理論上採購單狀態已變為「已驗收」不會再次觸發，但仍做防護）
          if (!tickets.find(t => t.id === newId)) {
            const now = new Date();
            const dateStr = `${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
            const creatorName = currentRole().name;
            const newTicket = {
              id: newId,
              customerId: ticket.customerId,
              type: ticket.type,
              customer: ticket.customer,
              contact: ticket.contact,
              phone: ticket.phone,
              channel: ticket.channel,
              area: ticket.area,
              address: ticket.address,
              status: "待分派",
              owner: creatorName,
              tl: ticket.tl,
              master: "",
              createdAt: dateStr,
              updatedAt: dateStr,
              desc: ticket.desc,
              records: [{ time: dateStr.slice(-5), actor: creatorName, text: `採購驗收完成（採購單 ${po.id}），自動建立派工工單，原工單：${origId}。` }],
              attachments: [],
              tags: [],
              urgent: false,
              parentTicketId: origId,  // 關聯原工單 ID
              sourcePOId: po.id         // 關聯採購單 ID
            };
            tickets.unshift(newTicket);
            saveDataToLocalStorage();
            toast(`已自動建立待分派工單 ${newId}`);
          }
        }
      }

      render();
    }

      modal.querySelectorAll("[data-close-modal]").forEach(btn => btn.addEventListener("click", () => modal.remove()));
      modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });

      // 物料明細管理：新增一列、自動計算小計與總金額、刪除物料
      const itemsBody = modal.querySelector("#poItemsBody");
      const totalEl = modal.querySelector("#poTotalAmount");
      const recalcTotal = () => {
        let total = 0;
        itemsBody.querySelectorAll("tr").forEach(tr => {
          const qty = parseFloat(tr.querySelector("[data-po-qty]")?.value) || 0;
          const price = parseFloat(tr.querySelector("[data-po-price]")?.value) || 0;
          const subtotal = qty * price;
          const subtotalEl = tr.querySelector("[data-po-subtotal]");
          if (subtotalEl) subtotalEl.textContent = subtotal.toFixed(2);
          total += subtotal;
        });
        totalEl.textContent = total.toFixed(2);
      };
      const addItemRow = (item = {}) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="po-input" data-po-name value="${item.name || ""}" placeholder="請輸入物料名稱"></td>
          <td><input class="po-input" data-po-spec value="${item.spec || ""}" placeholder="規格/型號"></td>
          <td><input class="po-input po-input-sm" data-po-qty type="number" min="1" value="${item.qty || 1}"></td>
          <td><select class="po-input" data-po-unit><option>個</option><option>套</option><option>件</option><option>批</option><option>箱</option></select></td>
          <td><input class="po-input po-input-price" data-po-price type="number" step="0.01" min="0" value="${item.unitPrice || 0}"></td>
          <td class="po-subtotal" data-po-subtotal>0.00</td>
          <td style="text-align:center;"><button type="button" class="po-remove" data-po-remove title="刪除">×</button></td>
        `;
        itemsBody.appendChild(tr);
        tr.querySelector("[data-po-qty]").addEventListener("input", recalcTotal);
        tr.querySelector("[data-po-price]").addEventListener("input", recalcTotal);
        tr.querySelector("[data-po-remove]").addEventListener("click", () => { tr.remove(); recalcTotal(); });
        if (item.unit) tr.querySelector("[data-po-unit]").value = item.unit;
        recalcTotal();
      };
      modal.querySelector("#poAddItemBtn").addEventListener("click", () => addItemRow());

      // 選擇工單後自動帶出關聯報價
      const ticketSelect = modal.querySelector("[name='ticketId']");
      const quotationSelect = modal.querySelector("[name='quotationId']");
      ticketSelect.addEventListener("change", () => {
        const ticket = tickets.find(t => t.id === ticketSelect.value);
        if (ticket) {
          const relatedQuotation = quotations.find(q => q.ticketId === ticket.id);
          if (relatedQuotation) quotationSelect.value = relatedQuotation.id;
        }
      });

      // 表單提交：驗證供應商、收集物料明細、生成採購單
      const form = modal.querySelector("#createPOForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const supplierId = formData.get("supplierId");
        const supplier = suppliers.find(s => s.id === supplierId);
        if (!supplier) { toast("請選擇供應商", "error"); return; }
        const items = [];
        itemsBody.querySelectorAll("tr").forEach(tr => {
          const name = tr.querySelector("[data-po-name]").value.trim();
          if (!name) return;
          const spec = tr.querySelector("[data-po-spec]").value.trim();
          const qty = parseInt(tr.querySelector("[data-po-qty]").value) || 1;
          const unit = tr.querySelector("[data-po-unit]").value;
          const unitPrice = parseFloat(tr.querySelector("[data-po-price]").value) || 0;
          items.push({ name, spec, qty, unit, unitPrice, amount: qty * unitPrice });
        });
        if (items.length === 0) { toast("請添加至少一項物料", "error"); return; }
        const totalAmount = items.reduce((sum, i) => sum + i.amount, 0);
        const po = {
          id: `PO-${Date.now().toString().slice(-8)}`,
          quotationId: formData.get("quotationId") || "",
          ticketId: formData.get("ticketId") || "",
          supplierId: supplier.id,
          supplierName: supplier.name,
          items,
          totalAmount,
          status: "待下單",
          orderDate: "",
          expectedDate: formData.get("expectedDate"),
          arrivedDate: "",
          remark: formData.get("remark") || "",
          createdBy: currentRole().name
        };
        purchaseOrders.push(po);
        saveDataToLocalStorage();
        toast("採購單已創建");
        modal.remove();
        render();
      });
    }

    // 分析待同步數據並顯示預覽
    function analyzePeachtreeSyncData() {
      const customersToSync = customers.filter(c => !c.peachtreeId || c.peachtreeSynced !== true);
      const invoicesToSync = invoices.filter(i => !i.peachtreeSynced);
      const paymentsToSync = payments.filter(p => !p.peachtreeSynced);
      return { customersToSync, invoicesToSync, paymentsToSync };
    }

    // 執行 Peachtree 同步流程（分步驟模擬）
    function runPeachtreeSync(modal, config) {
      const startBtn = modal.querySelector("#peachtreeStartBtn");
      const preview = modal.querySelector("#peachtreePreview");
      const progress = modal.querySelector("#peachtreeProgress");
      const progressSteps = modal.querySelector("#peachtreeProgressSteps");
      const progressBar = modal.querySelector("#peachtreeProgressBar");
      const result = modal.querySelector("#peachtreeResult");

      startBtn.disabled = true;
      startBtn.textContent = "同步中...";

      const data = analyzePeachtreeSyncData();

      // 顯示待同步數據
      preview.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div style="background:#eff6ff;padding:8px;border-radius:6px;text-align:center;">
            <div style="font-size:20px;font-weight:600;color:#1e40af;">${data.customersToSync.length}</div>
            <div style="font-size:12px;color:#64748b;">客戶資料</div>
          </div>
          <div style="background:#f0fdf4;padding:8px;border-radius:6px;text-align:center;">
            <div style="font-size:20px;font-weight:600;color:#166534;">${data.invoicesToSync.length}</div>
            <div style="font-size:12px;color:#64748b;">發票數據</div>
          </div>
          <div style="background:#fef3c7;padding:8px;border-radius:6px;text-align:center;">
            <div style="font-size:20px;font-weight:600;color:#92400e;">${data.paymentsToSync.length}</div>
            <div style="font-size:12px;color:#64748b;">收款記錄</div>
          </div>
        </div>
      `;

      progress.style.display = "block";
      result.style.display = "none";

      // 同步步驟定義
      const steps = [
        { name: "連接 Peachtree 服務器", duration: 600 },
        { name: `同步客戶資料 (${data.customersToSync.length} 條)`, duration: 900 },
        { name: `同步發票數據 (${data.invoicesToSync.length} 條)`, duration: 800 },
        { name: `同步收款記錄 (${data.paymentsToSync.length} 條)`, duration: 700 },
        { name: "驗證數據一致性", duration: 500 },
        { name: "完成同步", duration: 300 }
      ];

      let currentStep = 0;
      let successCount = 0;
      let failCount = 0;

      // 逐步執行同步
      function executeStep() {
        if (currentStep >= steps.length) {
          finishSync();
          return;
        }
        const step = steps[currentStep];
        const stepEl = document.createElement("div");
        stepEl.style.cssText = "padding:4px 0;font-size:13px;display:flex;align-items:center;gap:6px;";
        stepEl.innerHTML = `<span id="stepIcon-${currentStep}" style="display:inline-block;width:16px;height:16px;border:2px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></span><span>${step.name}...</span>`;
        progressSteps.appendChild(stepEl);

        setTimeout(() => {
          const icon = progressSteps.querySelector(`#stepIcon-${currentStep}`);
          if (icon) {
            icon.style.animation = "none";
            icon.style.borderColor = "var(--success)";
            icon.innerHTML = "✓";
            icon.style.fontSize = "12px";
            icon.style.textAlign = "center";
            icon.style.lineHeight = "14px";
            icon.style.color = "var(--success)";
          }
          // 累計成功條數
          if (currentStep === 1) successCount += data.customersToSync.length;
          else if (currentStep === 2) successCount += data.invoicesToSync.length;
          else if (currentStep === 3) successCount += data.paymentsToSync.length;
          currentStep++;
          progressBar.style.width = `${(currentStep / steps.length) * 100}%`;
          executeStep();
        }, step.duration);
      }

      // 完成同步：記錄日誌、更新數據、顯示結果
      function finishSync() {
        // 模擬少量失敗（10% 機率失敗 1 條）
        if (successCount > 5 && Math.random() < 0.3) {
          failCount = 1;
          successCount -= 1;
        }

        // 標記客戶、發票、收款為已同步
        customers.forEach(c => {
          if (!c.peachtreeId) c.peachtreeId = `PT-${c.id.replace('CUST-', '')}`;
          c.peachtreeSynced = true;
        });
        invoices.forEach(i => { i.peachtreeSynced = true; });
        payments.forEach(p => { p.peachtreeSynced = true; });
        saveDataToLocalStorage();

        // 寫入同步日誌
        const logs = JSON.parse(localStorage.getItem('ecinfo_peachtree_logs') || '[]');
        const newLog = {
          syncTime: new Date().toLocaleString('zh-TW', { hour12: false }),
          direction: config.syncDirection || "雙向",
          types: config.syncTypes || ['客戶', '發票', '收款'],
          successCount,
          failCount,
          status: failCount === 0 ? '成功' : '部分成功',
          detail: failCount > 0 ? `${failCount} 條記錄因 Peachtree ID 衝突失敗` : '全部數據同步成功'
        };
        logs.unshift(newLog);
        if (logs.length > 50) logs.length = 50;
        localStorage.setItem('ecinfo_peachtree_logs', JSON.stringify(logs));

        // 更新配置的最後同步時間
        config.lastSync = newLog.syncTime;
        config.enabled = true;
        localStorage.setItem('ecinfo_peachtree_config', JSON.stringify(config));

        // 顯示同步結果
        result.style.display = "block";
        result.innerHTML = `
          <div style="background:${failCount === 0 ? '#f0fdf4' : '#fef3c7'};border:1px solid ${failCount === 0 ? '#bbf7d0' : '#fde68a'};border-radius:8px;padding:12px;">
            <h4 style="margin:0 0 8px;color:${failCount === 0 ? '#166534' : '#92400e'};">✓ 同步完成</h4>
            <div style="font-size:13px;color:#475569;">
              <div>成功同步：<strong style="color:var(--success);">${successCount}</strong> 條</div>
              ${failCount > 0 ? `<div>失敗：<strong style="color:var(--danger);">${failCount}</strong> 條</div>` : ''}
              <div>同步時間：${newLog.syncTime}</div>
              <div style="margin-top:8px;color:var(--muted);">系統已自動為未對應的客戶生成 Peachtree Customer ID</div>
            </div>
          </div>
        `;

        startBtn.disabled = false;
        startBtn.textContent = "再次同步";
        toast(`Peachtree 同步完成：成功 ${successCount} 條${failCount > 0 ? `，失敗 ${failCount} 條` : ''}`, "success");
        render();
      }

      executeStep();
    }

    // 打開 Peachtree 配置對話框

      modal.innerHTML = `

              <button type="submit" class="primary-btn">保存配置</button>
            </div>
          </form>

      `;
      document.body.appendChild(modal);

      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });

        if (e.target === modal) modal.remove();
      });

      const form = modal.querySelector("#peachtreeConfigForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const syncTypes = [];
        if (fd.get("syncTypeCustomer")) syncTypes.push("客戶");
        if (fd.get("syncTypeInvoice")) syncTypes.push("發票");
        if (fd.get("syncTypePayment")) syncTypes.push("收款");
        const newConfig = {
          enabled: true,
          server: fd.get("server"),
          company: fd.get("company"),
          username: fd.get("username"),
          password: fd.get("password"),
          syncDirection: fd.get("syncDirection"),
          syncTypes: syncTypes.length > 0 ? syncTypes : ['客戶', '發票', '收款'],

    // 渲染待開票頁面：只需 Job Code（報價編號），支援篩選、全選、批量開票、自動生成發票號
    function renderFinPending(pendingInvoices) {
      // 合併 M 類保養合約自動生成的月結待開票
      const maintenanceContracts = JSON.parse(localStorage.getItem('ecinfo_maintenance_contracts')) || DEFAULT_MAINTENANCE_CONTRACTS;

      const contractPending = maintenanceContracts.map((c, idx) => ({
        id: `MC-${c.jobCode}-${currentMonth}`,
        ourRef: c.jobCode,
        customerName: c.customer,
        title: `${currentMonth} 保養合約月結`,
        tenderAmount: c.amount,
        createdAt: currentMonth + '-01',
        isMaintenance: true,
        billingPeriod: currentMonth
      }));

      const allPending = [...pendingInvoices, ...contractPending];
      const finFilter = state.finFilter || { keyword: "", date: "", type: "" };

      // 依關鍵字、日期、類型篩選
      const filtered = allPending.filter(item => {
        const kw = (finFilter.keyword || "").toLowerCase().trim();
        const matchKeyword = !kw || (item.ourRef || '').toLowerCase().includes(kw) || (item.customerName || '').toLowerCase().includes(kw) || (item.title || '').toLowerCase().includes(kw);
        const matchDate = !finFilter.date || (item.createdAt || '').startsWith(finFilter.date);
        const matchType = !finFilter.type || (item.isMaintenance ? 'M類保養' : '工程') === finFilter.type;
        return matchKeyword && matchDate && matchType;
      });

      return `
        <div class="fin-filter-bar">
          <input type="text" id="finFilterKeyword" placeholder="關鍵字（Job Code / 客戶 / 描述）" value="${finFilter.keyword || ''}" data-fin-filter="keyword">
          <input type="date" id="finFilterDate" value="${finFilter.date || ''}" data-fin-filter="date">
          <select id="finFilterType" data-fin-filter="type">
            <option value="">全部類型</option>
            <option value="工程" ${finFilter.type === '工程' ? 'selected' : ''}>工程</option>
            <option value="M類保養" ${finFilter.type === 'M類保養' ? 'selected' : ''}>M類保養</option>

        <div class="fin-batch-toolbar">
          <label class="fin-checkbox-label">
            <input type="checkbox" id="finSelectAll" data-fin-select-all>

          <span class="fin-selected-count">已選 <b id="finSelectedCount">0</b> 筆</span>
          <button class="primary-btn" data-fin-batch-invoice disabled>批量開具發票</button>
          <button class="secondary-btn" data-fin-print-selected disabled>列印選取</button>
        </div>

        <div class="pc-table-wrapper">
          <table class="pc-table">
            <thead>
              <tr>
                <th style="width:36px;"></th>
                <th>Job Code</th>
                <th>客戶</th>
                <th>描述</th>
                <th>金額</th>
                <th>類型</th>
                <th>Billing Period</th>
                <th>附件</th>
                <th>狀態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(q => `
                <tr>
                  <td><input type="checkbox" class="fin-row-check" value="${q.id}" data-fin-row-check></td>
                  <td><strong>${q.ourRef || q.id}</strong></td>
                  <td>${q.customerName}</td>

    // 渲染收款記錄：加 Job ID；收據編號自動生成為 EC + invoice no；加列印收據功能
    function renderFinPayments() {
      // 查找對應發票的 Job ID
      const getJobId = (invoiceId) => {
        const inv = invoices.find(item => item.id === invoiceId || item.invoiceNo === invoiceId);
        if (!inv) return '—';
        const q = quotations.find(item => item.id === inv.quotationId);
        return q ? q.ourRef : inv.quotationId;
      };
      // 收據編號自動生成為 EC + invoice no 數字部分
      const formatReceiptNo = (pay) => {
        if (pay.receiptNo && pay.receiptNo.startsWith('EC')) return pay.receiptNo;
        const invNo = (pay.invoiceId || '').replace(/\D/g, '');
        return 'EC' + invNo.slice(-8).padStart(8, '0');
      };
      return `
        <div class="pc-table-wrapper">
          <table class="pc-table">
            <thead>
              <tr>
                <th>收據編號</th>
                <th>發票號</th>
                <th>Job ID</th>
                <th>客戶</th>
                <th>金額</th>
                <th>收款日期</th>
                <th>收款方式</th>
                <th>For Payment of</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${payments.map(pay => `
                <tr>
                  <td><strong>${formatReceiptNo(pay)}</strong></td>
                  <td>${pay.invoiceId}</td>
                  <td>${getJobId(pay.invoiceId)}</td>
                  <td>${pay.customerName}</td>
                  <td>HKD ${pay.amount.toLocaleString()}</td>
                  <td>${pay.paymentDate}</td>
                  <td><span class="chip">${pay.paymentMethod}</span></td>
                  <td>${pay.forJob || getJobId(pay.invoiceId)}</td>
                  <td><button class="link-btn" data-print-receipt="${pay.id}">列印收據</button></td>
                </tr>
              `).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--muted);">暫無收款記錄</td></tr>'}

      `;

      const today = new Date().toISOString().slice(0, 10);
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <span style="color:var(--muted);font-size:13px;">${contracts.length} 個保養合約</span>

    // ============ 會計部輔助函數及模態框 ============
    // 更新待開票已選數量，並啟用/停用批量按鈕
    function updateFinSelectedCount() {
      const checked = document.querySelectorAll(".fin-row-check:checked");
      const countEl = document.getElementById("finSelectedCount");
      if (countEl) countEl.textContent = checked.length;
      const selectAll = document.getElementById("finSelectAll");
      const allChecks = document.querySelectorAll(".fin-row-check");
      if (selectAll && allChecks.length > 0) selectAll.checked = checked.length === allChecks.length;
      document.querySelectorAll("[data-fin-batch-invoice], [data-fin-print-selected]").forEach(btn => { btn.disabled = checked.length === 0; });

    // 批量開具發票模態框：手動提供第一張發票號，餘下自動順序生成
    function openBatchInvoiceModal() {
      const selected = Array.from(document.querySelectorAll(".fin-row-check:checked")).map(cb => cb.value);
      if (selected.length === 0) { toast("請先選擇待開票項目", "error"); return; }
      const today = new Date().toISOString().slice(0, 10);
      const modal = document.createElement("div");
      modal.className = "um-modal-overlay";
      modal.innerHTML = `
        <div class="um-modal" style="max-width:520px;">
          <div class="um-modal-head"><h2>批量開具發票</h2><button class="um-modal-close" data-close-modal>×</button></div>
          <div style="padding:20px 24px;">
            <p style="color:var(--muted);font-size:13px;margin:0 0 16px;">已選 ${selected.length} 筆待開票。請輸入第一張發票號，餘下將自動順序生成。發票內容及金額將根據 CS/報價組輸入的資料滙出。</p>
            <div class="field"><label class="required">第一張發票號</label><input id="batchFirstNo" placeholder="如 INV-202607-020" value="INV-202607-020"></div>
            <div class="field"><label>發票日期（可手動變更）</label><input type="date" id="batchInvDate" value="${today}"></div>
            <p style="font-size:12px;color:var(--muted);background:var(--bg);padding:10px;border-radius:6px;margin:12px 0 0;">ℹ 加完發票號後，系統自動生成發票連同該單工程相關的相片、完工紙、SR 及客戶確認 work order/confirmation，並自動彈出列印發票功能。</p>
          </div>
          <div style="display:flex;gap:10px;justify-content:flex-end;padding:14px 24px;border-top:1px solid var(--border);background:var(--bg);">
            <button type="button" class="ghost-btn" data-close-modal>取消</button>
            <button type="button" class="primary-btn" id="batchConfirmBtn">確認開具並列印</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      modal.querySelectorAll("[data-close-modal]").forEach(b => b.addEventListener("click", () => modal.remove()));
      modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });
      modal.querySelector("#batchConfirmBtn").addEventListener("click", () => {
        const firstNo = modal.querySelector("#batchFirstNo").value.trim();
        const invDate = modal.querySelector("#batchInvDate").value;
        if (!firstNo) { toast("請輸入第一張發票號", "error"); return; }
        // 解析發票號前綴與數字部分，自動順序生成
        const match = firstNo.match(/^(.*?)(\d+)$/);
        const prefix = match ? match[1] : firstNo;
        const startNum = match ? parseInt(match[2], 10) : 0;
        const padLen = match ? match[2].length : 3;
        const newInvoiceIds = [];
        selected.forEach((id, index) => {
          const invoiceNo = `${prefix}${String(startNum + index).padStart(padLen, "0")}`;
          newInvoiceIds.push(invoiceNo);
          // 查找對應的待開票項目（報價或保養合約）
          const q = quotations.find(item => item.id === id);
          if (q) {
            invoices.push({
              id: invoiceNo, invoiceNo: invoiceNo, quotationId: q.id, customerName: q.customerName,
              amount: q.tenderAmount || q.amount, invoiceDate: invDate, dueDate: "",
              status: "已開具", taxRate: 0, remark: q.title || "", amountChanged: false
            });
          } else {
            // M 類保養合約自動生成的待開票
            const contracts = JSON.parse(localStorage.getItem('ecinfo_maintenance_contracts')) || DEFAULT_MAINTENANCE_CONTRACTS;
            const c = contracts.find(item => `MC-${item.jobCode}-${new Date().toISOString().slice(0, 7)}` === id);
            if (c) {
              invoices.push({
                id: invoiceNo, invoiceNo: invoiceNo, quotationId: c.jobCode, customerName: c.customer,
                amount: c.amount, invoiceDate: invDate, dueDate: "",
                status: "已開具", taxRate: 0, remark: `${new Date().toISOString().slice(0, 7)} 保養合約月結`, amountChanged: false
              });
            }
          }
        });
        localStorage.setItem('ecinfo_invoices', JSON.stringify(invoices));
        modal.remove();
        toast(`已批量開具 ${selected.length} 張發票，自動彈出列印功能。`, "success");
        render();
        // 自動彈出列印發票功能
        setTimeout(() => openPrintInvoiceModal(newInvoiceIds), 300);
      });
    }

    // ============ 標書管理模塊 ============
    // 渲染標書管理主頁面（統計卡 + 搜索 + 狀態篩選 + 列表 + 詳情）
    function renderTender() {
      const tenderStatuses = ["投標中", "已中標", "未中標", "不投標"];
      const counts = {
        all: tenders.length,
        "投標中": tenders.filter(t => t.status === "投標中").length,
        "已中標": tenders.filter(t => t.status === "已中標").length,
        "未中標": tenders.filter(t => t.status === "未中標").length,
        "不投標": tenders.filter(t => t.status === "不投標").length
      };
      const totalValue = tenders.filter(t => t.status === "投標中" || t.status === "已中標").reduce((sum, t) => sum + (t.tenderValue || 0), 0);
      const wonValue = tenders.filter(t => t.status === "已中標").reduce((sum, t) => sum + (t.tenderValue || 0), 0);
      const winRate = counts["已中標"] + counts["未中標"] > 0
        ? Math.round(counts["已中標"] / (counts["已中標"] + counts["未中標"]) * 100)
        : 0;

      const tab = state.tenderTab || "all";
      const search = (state.tenderSearch || "").toLowerCase().trim();

      // 按狀態篩選 + 搜索過濾
      let filtered = tenders;
      if (tab !== "all") filtered = filtered.filter(t => t.status === tab);
      if (search) {
        filtered = filtered.filter(t =>
          (t.id || "").toLowerCase().includes(search) ||
          (t.projectName || "").toLowerCase().includes(search) ||
          (t.client || "").toLowerCase().includes(search) ||
          (t.owner || "").toLowerCase().includes(search)
        );
      }

      // 按投標日期倒序排列
      filtered = [...filtered].sort((a, b) => (b.tenderDate || "").localeCompare(a.tenderDate || ""));

      return `
        <div class="pc-container">
          <div class="pc-header">
            <h1>標書管理</h1>
            <div class="pc-header-actions">
              <button class="primary-btn" data-tender-create>新建標書</button>
            </div>
          </div>

          <div class="pc-grid">
            <div class="pc-card">
              <h3>投標中</h3>
              <div class="pc-metric">${counts["投標中"]}</div>
              <div class="pc-label">進行中的投標項目</div>
            </div>
            <div class="pc-card">
              <h3>已中標</h3>
              <div class="pc-metric">${counts["已中標"]}</div>
              <div class="pc-label">HKD ${wonValue.toLocaleString()}</div>
            </div>
            <div class="pc-card">
              <h3>中標率</h3>
              <div class="pc-metric">${winRate}%</div>
              <div class="pc-label">已揭曉項目 ${counts["已中標"] + counts["未中標"]}</div>
            </div>
            <div class="pc-card">
              <h3>投標總額</h3>
              <div class="pc-metric">${totalValue.toLocaleString()}</div>
              <div class="pc-label">HKD（投標中 + 已中標）</div>
            </div>
          </div>

          <div class="pc-section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
              <div class="proc-tabs">
                <button class="proc-tab ${tab === 'all' ? 'active' : ''}" data-tender-tab="all">全部 (${counts.all})</button>
                <button class="proc-tab ${tab === '投標中' ? 'active' : ''}" data-tender-tab="投標中">投標中 (${counts["投標中"]})</button>
                <button class="proc-tab ${tab === '已中標' ? 'active' : ''}" data-tender-tab="已中標">已中標 (${counts["已中標"]})</button>
                <button class="proc-tab ${tab === '未中標' ? 'active' : ''}" data-tender-tab="未中標">未中標 (${counts["未中標"]})</button>
                <button class="proc-tab ${tab === '不投標' ? 'active' : ''}" data-tender-tab="不投標">不投標 (${counts["不投標"]})</button>
              </div>
              <div class="wo-search-wrap">
                <input type="text" class="tender-search-input" value="${escapeHtml(state.tenderSearch || '')}" data-tender-search style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:280px;">
                <button type="button" class="primary-btn wo-search-btn" data-tender-search-btn>搜索</button>
              </div>
            </div>

            ${renderTenderList(filtered)}

            ${(() => { const selectedTender = state.selectedTenderId ? tenders.find(t => t.id === state.selectedTenderId) : null; return selectedTender ? renderTenderDetail(selectedTender) : ""; })()}
          </div>
        </div>
      `;
    }

    // 渲染標書列表表格
    function renderTenderList(filtered) {
      if (filtered.length === 0) {
        return `<div style="text-align:center;padding:40px 20px;color:var(--muted);background:var(--bg);border-radius:10px;border:1px dashed var(--border);">暫無符合條件的標書記錄</div>`;
      }
      const statusColor = (s) => s === "已中標" ? "success" : s === "未中標" || s === "不投標" ? "danger" : s === "投標中" || s === "待投標" ? "warning" : "";
      // 計算距離截止日期的剩餘天數（倒數機制）
      const calcCountdown = (deadline) => {
        if (!deadline) return { days: null, label: "-", color: "var(--muted)" };
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const dl = new Date(deadline);
        dl.setHours(0, 0, 0, 0);
        const diffMs = dl.getTime() - now.getTime();
        const diffDays = Math.ceil(diffMs / 86400000);
        if (diffDays < 0) return { days: diffDays, label: "已逾期", color: "var(--danger)" };
        if (diffDays === 0) return { days: 0, label: "今天截止", color: "var(--danger)" };
        // 5 天起開始倒數，不同天數不同顏色
        if (diffDays === 1) return { days: 1, label: "剩 1 天", color: "var(--danger)" };
        if (diffDays === 2) return { days: 2, label: "剩 2 天", color: "#dc2626" };
        if (diffDays === 3) return { days: 3, label: "剩 3 天", color: "#ea580c" };
        if (diffDays === 4) return { days: 4, label: "剩 4 天", color: "#d97706" };
        if (diffDays === 5) return { days: 5, label: "剩 5 天", color: "#ca8a04" };
        return { days: diffDays, label: `剩 ${diffDays} 天`, color: "var(--muted)" };
      };
      return `
        <div class="pc-table-wrapper">
          <table class="pc-table">
            <thead>
              <tr>
                <th>標書編號</th>
                <th>項目名稱</th>
                <th>客戶</th>
                <th>標書金額</th>
                <th>接受標書日期</th>
                <th>截止時間</th>
                <th>距離截止日期</th>
                <th>標書狀態</th>
                <th>EC負責人</th>
                <th>已發出報價編號</th>
                <th style="text-align:center;">操作</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(t => {
                const linkedQuotation = t.relatedQuotationId ? quotations.find(q => q.id === t.relatedQuotationId) : null;
                const isOverdue = t.status === "投標中" && t.deadline && new Date(t.deadline) < new Date();
                const countdown = calcCountdown(t.deadline);
                return `
                <tr>
                  <td><button class="wo-id-link" data-tender-view="${t.id}">${escapeHtml(t.id)}</button></td>
                  <td>${escapeHtml(t.projectName)}${isOverdue ? ' <span class="tag danger">已逾期</span>' : ''}</td>
                  <td>${escapeHtml(t.client)}</td>
                  <td>HKD ${(t.tenderValue || 0).toLocaleString()}</td>
                  <td>${escapeHtml(t.tenderDate || '-')}</td>
                  <td>${escapeHtml(t.deadline || '-')}</td>
                  <td><strong style="color:${countdown.color};">${countdown.label}</strong></td>
                  <td><span class="tag ${statusColor(t.status)}">${escapeHtml(t.status)}</span></td>
                  <td>${escapeHtml(t.owner || '-')}</td>
                  <td>${linkedQuotation ? `<button class="link-btn" data-jump-quotation="${linkedQuotation.id}">${escapeHtml(linkedQuotation.id)}</button>` : '<span style="color:var(--muted);">無</span>'}</td>
                  <td class="wo-td-actions">
                    <div class="wo-actions-group">
                      <button class="wo-view-btn" data-tender-view="${t.id}">查看詳情</button>
                      <button class="wo-delete-btn" data-tender-delete="${t.id}">刪除</button>
                    </div>
                  </td>
                </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

            ${t.description ? `

    // 渲染標書側邊欄內編輯表單（點擊【編輯】按鈕後在側邊欄內直接編輯，不開彈窗）

      // 從字典獲取下拉選項
      const sourceOptions = (dictData["標書來源"] || []).filter(s => isEnabled(s.status));
      const replyOptions = (dictData["回標方式"] || []).filter(r => isEnabled(r.status));
      const regionOptions = (dictData["區域"] || []).filter(r => isEnabled(r.status));
      const tenderStatusOptions = (dictData["標書狀態"] || []).filter(s => isEnabled(s.status));

      // 側邊欄編輯表單樣式（單列佈局，適配 420px 寬度）

        { value: 'M+P', label: 'M+P', sub: '保養+工程' }

        const checked = (t.tenderCategory || '') === item.value;
        return `
          <label style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;border:2px solid ${checked ? 'var(--primary)' : 'var(--line)'};border-radius:8px;cursor:pointer;background:${checked ? 'var(--primary)' : 'var(--panel)'};color:${checked ? '#fff' : 'var(--text)'};min-height:60px;">
            <input type="radio" name="tenderCategory" value="${item.value}" ${checked ? 'checked' : ''} style="position:absolute;opacity:0;pointer-events:none;">
            <span style="font-size:14px;font-weight:700;">${item.label}</span>
            <span style="font-size:11px;margin-top:2px;opacity:.85;">${item.sub}</span>
          </label>`;
      }).join('');

      return `
        <aside class="wo-drawer">
          <div class="wo-drawer-header">
            <div class="wo-drawer-title">
              <h3>編輯標書</h3>
              <span style="font-size:13px;color:var(--muted);">${escapeHtml(t.id)}</span>
            </div>
            <button class="wo-drawer-close" data-tender-close>×</button>
          </div>
          <div class="wo-drawer-body">
            <form id="tenderEditForm" data-tender-id="${t.id}">
              <div class="wo-detail-section">
                <div class="wo-detail-card">
                  <h4>基本資訊</h4>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">標書類別 ${requiredStar}</label>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
                      ${cardRadioHtml}
                    </div>
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">標書編號</label>
                    <input name="id" value="${escapeHtml(t.id)}" readonly style="${inputStyle}${readonlyStyle}">
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">項目名稱 ${requiredStar}</label>
                    <input name="projectName" value="${escapeHtml(t.projectName || '')}" required placeholder="請輸入項目名稱" style="${inputStyle}">
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">客戶 ${requiredStar}</label>
                    <input name="client" value="${escapeHtml(t.client || '')}" required placeholder="請輸入招標客戶" style="${inputStyle}">
