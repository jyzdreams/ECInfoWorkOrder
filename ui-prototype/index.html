    function saveQuotation(formData, isEdit = false, quotationId = null) {
      const ticketId = formData.get("ticketId");
      const ticket = tickets.find(t => t.id === ticketId);
      const customer = customers.find(c => c.id === ticket?.customerId);
      const amount = parseFloat(formData.get("amount")) || 0;
      const taxRate = parseFloat(formData.get("taxRate")) || 0;
      const totalAmount = calculateTax(amount, taxRate);

      if (isEdit) {
        const quotation = quotations.find(q => q.id === quotationId);
        if (quotation) {
          quotation.title = formData.get("title") || quotation.title;
          quotation.srNo = formData.get("srNo") || quotation.srNo;
          quotation.owner = formData.get("owner") || quotation.owner;
          quotation.createdAt = formData.get("createdAt") || quotation.createdAt;
          quotation.validUntil = formData.get("validUntil") || quotation.validUntil;
          quotation.amount = amount;
          quotation.taxRate = taxRate;
          quotation.totalAmount = totalAmount;
          quotation.status = formData.get("status") || quotation.status;
          quotation.remark = formData.get("remark") || quotation.remark;
          toast("报价信息已更新");
        }
      } else {
        const newQuotation = {
          id: formData.get("id"),
          title: formData.get("title"),
          ticketId: ticketId,
          customerId: ticket?.customerId || "",
          customerName: customer?.nameZh || "",
          amount: amount,
          taxRate: taxRate,
          totalAmount: totalAmount,
          status: formData.get("status") || "待报价",
          owner: formData.get("owner"),
          ownerPhone: users.find(u => u.name === formData.get("owner"))?.phone || "",
          ownerTeam: users.find(u => u.name === formData.get("owner"))?.area || "",
          srNo: formData.get("srNo") || "",
          createdAt: formData.get("createdAt"),
          validUntil: formData.get("validUntil"),
          attachments: [],
          remark: formData.get("remark") || ""
        };
        quotations.unshift(newQuotation);
        saveDataToLocalStorage();
        toast("新报价已创建");
      }
      render();
    }

    function updateQuotationStatus(formData, quotationId) {

    function markQuotationWon(quotationId) {

      if (tenderAmount === null) return;
      
      quotation.bidStatus = "已中标";
      quotation.customerOrder = customerOrder || "";
      quotation.tenderNo = tenderNo || "";
      quotation.tenderAmount = parseFloat(tenderAmount) || 0;
      quotation.status = "已确认";
      
      saveDataToLocalStorage();
      toast("已标记为中标，CC通知采购部");
      
      // 自动创建采购通知
      if (customerOrder) {
        setTimeout(() => {
          if (confirm("是否需要启动采购流程？")) {
            startProcurement(quotationId);
          }
        }, 500);
      }
      
      render();
    }

    // 创建修订版
    function createQuotationRevision(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      const newAmount = prompt("请输入修订后的金额（HKD）：", quotation.amount);
      if (newAmount === null) return;
      
      const remark = prompt("请输入修订说明：");
      if (remark === null) return;
      
      // 保存当前版本到修订历史
      if (!quotation.revisions) quotation.revisions = [];
      quotation.revisions.push({
        rev: quotation.revision,
        amount: quotation.amount,
        date: quotation.createdAt,
        remark: quotation.remark || "初版"
      });
      
      // 更新为新版本
      quotation.revision += 1;
      quotation.amount = parseFloat(newAmount) || quotation.amount;
      quotation.totalAmount = quotation.amount * (1 + (quotation.taxRate || 0));
      quotation.remark = remark;
      quotation.createdAt = new Date().toISOString().slice(0, 10);
      
      saveDataToLocalStorage();
      toast(`已创建修订版 ${quotation.ourRef}R${quotation.revision}`);
      render();
    }

    // 启动采购
    function startProcurement(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      quotation.procurementStatus = "采购中";
      quotation.completionPaperStatus = "待制作";
      quotation.completionPaperDueDate = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      
      saveDataToLocalStorage();
      toast("已通知采购部启动采购流程，完工期限：2周");
      render();
    }

    // 标记到货
    function markProcurementArrived(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      quotation.procurementStatus = "已到货";
      
      saveDataToLocalStorage();
      toast("已标记到货，通知TL和师傅");
      render();
    }

    // 完工纸管理
    function manageCompletionPaper(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      const action = prompt("请选择操作：\n1. 记录领取人\n2. 标记已完工\n\n请输入数字 1 或 2：");
      
      if (action === "1") {
        const holder = prompt("请输入完工纸领取人姓名：");
        if (holder === null) return;
        quotation.completionPaperHolder = holder;
        quotation.completionPaperStatus = "已领取";
        saveDataToLocalStorage();
        toast(`完工纸已领取，领取人：${holder}`);
      } else if (action === "2") {
        if (!quotation.completionPaperHolder) {
          alert("请先记录领取人！");
          return;
        }
        quotation.completionPaperStatus = "已完工";
        saveDataToLocalStorage();
        toast("完工纸已归还，工单可关闭");
      }
      
      render();
    }

    // 采购部关单
    function closeProcurement(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      // 检查完工纸是否已归还
      if (quotation.completionPaperStatus !== "已完工") {
        alert("完工纸尚未归还，无法关单！");
        return;
      }
      
      if (!confirm("确定要关单吗？关单后将通知会计部开具发票。")) return;
      
      quotation.procurementStatus = "已关单";
      
      // 创建通知给会计部
      createNotification({
        type: 'invoice_required',
        title: '新发票待开具',
        content: `报价单 ${quotation.ourRef} 已完工，请开具发票`,
        targetId: quotation.id,
        targetUrl: `?page=quotations&id=${quotation.id}`,
        recipients: ['FIN']
      });
      
      saveDataToLocalStorage();
      toast("已关单，已通知会计部");
      render();
    }

    function bindQuotationModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      // Auto-fill customer when ticket is selected
      const ticketSelect = modal.querySelector("[name='ticketId']");
      const customerInput = modal.querySelector("[name='customerName']");
      if (ticketSelect && customerInput) {
        ticketSelect.addEventListener("change", () => {
          const ticket = tickets.find(t => t.id === ticketSelect.value);
          const customer = customers.find(c => c.id === ticket?.customerId);
          if (customerInput) {
            customerInput.value = customer?.nameZh || "";
          }
        });
      }

      // Auto-calculate total amount
      const amountInput = modal.querySelector("[name='amount']");
      const taxRateInput = modal.querySelector("[name='taxRate']");
      const totalAmountInput = modal.querySelector("[name='totalAmount']");
      if (amountInput && taxRateInput && totalAmountInput) {
        const calculate = () => {
          const amount = parseFloat(amountInput.value) || 0;
          const taxRate = parseFloat(taxRateInput.value) || 0;
          totalAmountInput.value = calculateTax(amount, taxRate).toFixed(2);
        };
        amountInput.addEventListener("input", calculate);
        taxRateInput.addEventListener("input", calculate);
      }

      const createForm = modal.querySelector("#createQuotationForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveQuotation(formData, false);
          modal.remove();
        });
      }

      const editForm = modal.querySelector("#editQuotationForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const quotationId = editForm.dataset.quotationId;
          saveQuotation(formData, true, quotationId);
          modal.remove();
        });
      }

      const statusForm = modal.querySelector("#updateQuotationStatusForm");
      if (statusForm) {
        statusForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(statusForm);
          const quotationId = statusForm.dataset.quotationId;
          updateQuotationStatus(formData, quotationId);
          modal.remove();
        });
      }
    }

    // 语音输入功能
    function startVoiceInput() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('您的浏览器不支持语音输入，请手动输入文字。');
        return;
      }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.continuous = true;
      recognition.interimResults = true;
      
      const textarea = document.getElementById('mobileResult');
      if (!textarea) return;
      
      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        textarea.value += transcript;
      };
      
      recognition.onerror = (event) => {
        console.error('语音识别错误:', event.error);
        alert('语音输入失败，请手动输入文字。');
      };
      
      recognition.start();
      toast('开始语音输入，请说话...');
      
      setTimeout(() => {
        recognition.stop();
        toast('语音输入已停止');
      }, 30000);
    }

      const t = ticketById(state.selectedTicketId);

      t.attachments.push(photoName);

    // 检查完工纸到期提醒
    function checkCompletionPaperExpiration() {
      const today = new Date();
      const twoWeeksLater = new Date(today.getTime() + 14 * 24 * 60 * 60 * 1000);
      
      quotations.forEach(q => {
        if (q.completionPaperStatus === '待制作' || q.completionPaperStatus === '已领取') {
          const dueDate = q.completionPaperDueDate ? new Date(q.completionPaperDueDate) : null;
          
          if (dueDate && dueDate <= twoWeeksLater) {
            const daysLeft = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
            
            // 检查是否已经发送过提醒
            const reminderKey = `completion_paper_reminder_${q.id}`;
            const lastReminder = localStorage.getItem(reminderKey);
            const todayStr = today.toISOString().slice(0, 10);
            
            if (lastReminder !== todayStr) {
              // 发送提醒
              const reminderMsg = daysLeft <= 0 
                ? `完工纸已超期！报价单 ${q.ourRef} 的完工纸需要立即归还。`
                : `完工纸将在 ${daysLeft} 天后到期！报价单 ${q.ourRef} 的完工纸请尽快归还。`;
              
              // 创建通知
              addNotification({
                role: ['TL', 'Master'],
                module: 'quotation',
                targetId: q.id,
                title: '完工纸到期提醒',
                content: reminderMsg
              });
              
              // 记录今天已发送提醒
              localStorage.setItem(reminderKey, todayStr);
            }
          }
        }
      });
    }

    }

    function render() {
      renderShell();
      if (state.view === "pc") renderPc();
      if (state.view === "mobile") renderMobile();
      bindEvents();
    }

    // Hamburger toggle: collapse / expand sidebar
    $("#hamburgerBtn").addEventListener("click", () => {
      state.isSidebarCollapsed = !state.isSidebarCollapsed;
      state.isSettingsPopoverOpen = false;
      render();
    });

    // Tooltip for collapsed sidebar nav items
    let tooltipEl = null;
    document.addEventListener("mouseover", (e) => {
      if (!state.isSidebarCollapsed) return;
      const navItem = e.target.closest(".nav-item[data-collapsed-label]");
      if (!navItem) return;
      const label = navItem.dataset.collapsedLabel;
      if (!tooltipEl) {
        tooltipEl = document.createElement("div");
        tooltipEl.className = "nav-tooltip";
        document.body.appendChild(tooltipEl);
      }
      const rect = navItem.getBoundingClientRect();
      tooltipEl.textContent = label;
      tooltipEl.style.top = (rect.top + rect.height / 2) + "px";
      tooltipEl.style.left = (rect.right + 10) + "px";
      tooltipEl.style.transform = "translateY(-50%)";
      tooltipEl.classList.add("show");
    });
    document.addEventListener("mouseout", (e) => {
      const navItem = e.target.closest(".nav-item[data-collapsed-label]");
      if (navItem && tooltipEl) {
        tooltipEl.classList.remove("show");
      }
    });

    // Settings popover: close on outside click
    document.addEventListener("click", (e) => {
      if (!state.isSettingsPopoverOpen) return;
      const popover = document.getElementById("settingsPopover");
      const settingsBtn = document.querySelector(".nav-item-settings");
      if (popover && !popover.contains(e.target) && !(settingsBtn && settingsBtn.contains(e.target))) {
        state.isSettingsPopoverOpen = false;
        render();
      }
    });

    $("#themeBtn").addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem("ec-ui-theme", next);
      $("#themeBtn").textContent = next === "dark" ? "亮色模式" : "暗色模式";
    });
    $("#userMenuBtn").addEventListener("click", () => $("#userDropdown").classList.toggle("open"));
    document.addEventListener("click", (event) => {
      if (!event.target.closest(".user-menu")) $("#userDropdown").classList.remove("open");
    });

    const savedTheme = localStorage.getItem("ec-ui-theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
    $("#themeBtn").textContent = savedTheme === "dark" ? "亮色模式" : "暗色模式";
    render();
    
    // 检查完工纸到期提醒
    checkCompletionPaperExpiration();
  </script>
</body>
</html>
