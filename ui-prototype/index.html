<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECInfo × DingTalk 工单系统 MVP UI 原型</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafd;
      --text: #1f2937;
      --muted: #687386;
      --line: #dde5f0;
      --primary: #1e6bff;
      --primary-strong: #0b55df;
      --primary-soft: #eaf1ff;
      --sidebar: #10233a;
      --sidebar-2: #0b1b2e;
      --success: #12a56b;
      --success-soft: #e8f8f1;
      --warning: #e99a12;
      --warning-soft: #fff5df;
      --danger: #e5484d;
      --danger-soft: #ffeded;
      --cyan: #0ea5b7;
      --purple: #7c5cff;
      --shadow: 0 12px 32px rgba(16, 35, 58, .08);
      --radius: 8px;
    }

    [data-theme="dark"] {
      --bg: #0d1523;
      --panel: #141f31;
      --panel-soft: #101a2b;
      --text: #e8edf6;
      --muted: #9aa7bb;
      --line: #26354b;
      --primary: #5b8fff;
      --primary-strong: #82a9ff;
      --primary-soft: #16294b;
      --sidebar: #07111f;
      --sidebar-2: #050b14;
      --success-soft: #0e2f25;
      --warning-soft: #35270c;
      --danger-soft: #3a1518;
      --shadow: 0 18px 44px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
      transition: grid-template-columns .3s ease;
    }
    .app.sidebar-collapsed { grid-template-columns: 92px 1fr; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      color: #e9f1ff;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
      border-right: 1px solid rgba(255,255,255,.08);
      padding: 14px 10px;
      overflow: hidden;
      transition: width .3s ease;
    }
    .brand {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      margin-bottom: 10px;
    }
    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2b7cff, #0ba5ff);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(30,107,255,.26);
      flex: 0 0 auto;
    }
    .brand-title {
      white-space: nowrap;
      overflow: hidden;
    }
    .brand-title strong { display: block; font-size: 14px; line-height: 1.2; }
    .brand-title span { display: block; font-size: 11px; color: rgba(233,241,255,.7); margin-top: 3px; }
    .hamburger-btn {
      width: 100%;
      height: 40px;
      border: 0;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      color: #d8e6ff;
      margin: 4px 0 14px;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .hamburger-btn:hover { background: rgba(255,255,255,.12); }
    .nav-list { display: grid; gap: 10px; }
    .nav-item {
      height: 42px;
      border: 0;
      width: 100%;
      color: #d7e5f8;
      background: transparent;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      text-align: left;
      transition: all .2s;
    }
    .nav-item:hover { background: rgba(255,255,255,.08); }
    .nav-item.active { background: #1768ff; color: #fff; box-shadow: 0 8px 18px rgba(23,104,255,.24); }
    
    /* Settings Accordion Styles */
    .nav-item-parent {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .nav-item-settings {
      position: relative;
    }
    .nav-arrow {
      margin-left: auto;
      font-size: 10px;
      transition: transform 0.3s ease;
      color: #d7e5f8;
    }
    .nav-arrow.expanded {
      transform: rotate(90deg);
    }
    .nav-submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-left: 32px;
    }
    .nav-submenu.expanded {
      max-height: 200px;
    }
    .nav-subitem {
      height: 36px;
      border: 0;
      width: 100%;
      color: #d7e5f8;
      background: transparent;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      text-align: left;
      font-size: 13px;
      transition: all 0.2s ease;
    }
    .nav-subitem:hover {
      background: rgba(30, 107, 255, 0.15);
    }
    .nav-subitem.active {
      background: rgba(30, 107, 255, 0.25);
      color: #fff;
      font-weight: 500;
    }
    
    .nav-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px;
      flex: 0 0 auto;
    }
    
    /* Collapsed Sidebar Styles */
    .app.sidebar-collapsed .brand-title,
    .app.sidebar-collapsed .nav-label,
    .app.sidebar-collapsed .nav-arrow { display: none; }
    .app.sidebar-collapsed .brand { justify-content: center; padding: 0; }
    .app.sidebar-collapsed .nav-list { gap: 10px; }
    .app.sidebar-collapsed .nav-item {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      padding: 0;
      justify-content: center;
      margin: 0 auto;
    }
    .app.sidebar-collapsed .nav-item-parent {
      position: relative;
    }
    .app.sidebar-collapsed .nav-item-settings {
      position: relative;
    }
    .app.sidebar-collapsed .nav-submenu {
      display: none;
    }
    .app.sidebar-collapsed .nav-icon {
      width: 28px;
      height: 28px;
      font-size: 14px;
    }
    
    /* Collapsed button with single character */
    .nav-collapsed-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-collapsed-char {
      font-size: 18px;
      font-weight: 600;
      color: #d7e5f8;
    }
    .nav-collapsed-btn.active .nav-collapsed-char {
      color: #fff;
    }
    
    /* Tooltip for collapsed sidebar */
    .nav-tooltip {
      position: fixed;
      left: 100px;
      top: 50%;
      transform: translateY(-50%);
      background: #fff;
      color: #1e293b;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      white-space: nowrap;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    .nav-tooltip.show {
      opacity: 1;
    }
    
    /* Settings Popover for collapsed sidebar */
    .settings-popover {
      position: fixed;
      left: 100px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      z-index: 1000;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .settings-popover.show {
      opacity: 1;
      pointer-events: auto;
    }
    .settings-popover-item {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border: 0;
      width: 100%;
      background: transparent;
      color: #1e293b;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
    }
    .settings-popover-item:hover {
      background: rgba(30, 107, 255, 0.08);
    }
    .settings-popover-item.active {
      background: #1e6bff;
      color: #fff;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    /* 第一层：系统级导航 */
    .topbar-system {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(244,247,251,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      transition: all 0.25s ease;
    }
    [data-theme="dark"] .topbar-system { background: rgba(13,21,35,.92); }
    .topbar-system-left, .topbar-system-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    /* 第二层：工作区导航 */
    .topbar-workspace {
      position: sticky;
      top: 64px;
      z-index: 99;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      transition: all 0.25s ease;
    }
    [data-theme="dark"] .topbar-workspace { background: #1a2332; }
    .topbar-workspace-left, .topbar-workspace-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-heading {
      min-width: 170px;
      display: grid;
      gap: 2px;
    }
    .page-heading h1 { margin: 0; font-size: 18px; line-height: 1.2; }
    .page-heading p { margin: 0; font-size: 12px; color: var(--muted); }
    .segmented {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 3px 14px rgba(15, 23, 42, .04);
    }
    .segmented button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      height: 30px;
      padding: 0 11px;
      white-space: nowrap;
    }
    .segmented button.active { background: var(--primary); color: #fff; }
    .toolbar-btn, .primary-btn, .secondary-btn, .danger-btn, .ghost-btn {
      height: 34px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .primary-btn {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 16px rgba(30,107,255,.18);
    }
    .primary-btn:hover { background: var(--primary-strong); }
    .secondary-btn { background: var(--primary-soft); color: var(--primary-strong); border-color: transparent; }
    .danger-btn { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
    .ghost-btn { background: transparent; }

    .user-menu { position: relative; }
    .user-card {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 10px;
      min-width: 190px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .user-meta { min-width: 0; text-align: left; }
    .user-meta strong { display: block; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta span { display: block; color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown {
      position: absolute;
      right: 0;
      top: 48px;
      width: 190px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 6px;
      display: none;
    }
    .dropdown.open { display: block; }
    .dropdown button {
      width: 100%;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      text-align: left;
      padding: 0 10px;
    }
    .dropdown button:hover { background: var(--panel-soft); }

    .content {
      padding: 20px 22px 28px;
      min-width: 0;
    }
    .page {
      display: none;
      animation: fade .12s ease-out;
    }
    .page.active { display: block; }
    @keyframes fade { from { opacity: .4; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .grid { display: grid; gap: 14px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cols-8 { grid-template-columns: repeat(8, minmax(118px, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      min-width: 0;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card h2, .card h3 { margin: 0; font-size: 15px; }
    .card p { color: var(--muted); margin: 5px 0 0; font-size: 12px; line-height: 1.5; }
    .muted { color: var(--muted); }

    .stat-card {
      min-height: 92px;
      display: grid;
      gap: 8px;
      align-content: space-between;
      border-left: 3px solid var(--primary);
    }
    .stat-card .stat-label { color: var(--muted); font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .stat-card .stat-value { font-size: 24px; font-weight: 800; }
    .stat-card .stat-note { font-size: 11px; color: var(--muted); }

    .chip, .status-pill, .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .chip { background: var(--panel-soft); color: var(--muted); border-color: var(--line); }
    .tag { background: var(--primary-soft); color: var(--primary-strong); }
    .urgent { background: var(--danger-soft); color: var(--danger); }
    .status-待受理 { background: #eaf1ff; color: #1e6bff; }
    .status-待分派 { background: #fff5df; color: #bf7600; }
    .status-待接单 { background: #e8fbff; color: #08798a; }
    .status-处理中 { background: #eef0ff; color: #6550d9; }
    .status-待确认 { background: #fff0f4; color: #c63b64; }
    .status-已关闭 { background: #e8f8f1; color: #08764a; }
    .status-已取消 { background: #f0f2f5; color: #667085; }
    [data-theme="dark"] .status-待受理 { background: #16335d; color: #93b8ff; }
    [data-theme="dark"] .status-待分派 { background: #3a2b11; color: #ffc96b; }
    [data-theme="dark"] .status-待接单 { background: #123641; color: #73d9e6; }
    [data-theme="dark"] .status-处理中 { background: #28244e; color: #b6adff; }
    [data-theme="dark"] .status-待确认 { background: #3b1725; color: #ff9fbb; }
    [data-theme="dark"] .status-已关闭 { background: #123726; color: #7be0b4; }
    [data-theme="dark"] .status-已取消 { background: #252b36; color: #b8c0cc; }

    .data-table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }
    th { color: var(--muted); font-weight: 700; background: var(--panel-soft); }
    td .link-btn {
      border: 0;
      background: transparent;
      color: var(--primary-strong);
      padding: 0;
      font-weight: 700;
      text-align: left;
    }
    .ellipsis { max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .filters {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 10px;
      outline: none;
    }
    .field textarea { min-height: 86px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,107,255,.12); }
    .required::after { content: " *"; color: var(--danger); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .form-grid .wide { grid-column: 1 / -1; }
    .form-section { margin-bottom: 14px; }
    .form-section h3 { margin: 0 0 10px; font-size: 14px; }

    .split-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(360px, 1.3fr) minmax(250px, .9fr);
      gap: 14px;
      align-items: start;
    }
    .detail-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .detail-title { display: grid; gap: 5px; }
    .detail-title h2 { margin: 0; font-size: 20px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .info-list { display: grid; gap: 9px; }
    .info-row {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .info-row span:first-child { color: var(--muted); }
    .timeline { position: relative; display: grid; gap: 12px; }
    .timeline::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--line);
    }
    .timeline-item {
      position: relative;
      padding-left: 30px;
      display: grid;
      gap: 4px;
    }
    .timeline-dot {
      position: absolute;
      left: 3px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--panel);
    }
    .timeline-item strong { font-size: 13px; }
    .timeline-item p { margin: 0; font-size: 12px; color: var(--muted); }

    .photo-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .photo-thumb {
      aspect-ratio: 4 / 3;
      border-radius: 7px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(30,107,255,.16), rgba(18,165,107,.12)),
        repeating-linear-gradient(45deg, transparent 0 10px, rgba(104,115,134,.08) 10px 18px);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
    }

    .dispatch-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 20px;
      align-items: start;
      height: calc(100vh - 180px);
    }
    .dispatch-left, .dispatch-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }
    .dispatch-left {
      height: calc(100vh - 180px);
    }
    .dispatch-right {
      height: calc(100vh - 180px);
    }
    .dispatch-section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .dispatch-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dispatch-section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
    }
    .dispatch-pending-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dispatch-ticket-card {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .dispatch-ticket-card:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .dispatch-ticket-card.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      box-shadow: 0 0 0 2px rgba(30,107,255,.1);
    }
    .dispatch-ticket-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dispatch-ticket-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .dispatch-ticket-meta {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .dispatch-ticket-desc {
      font-size: 11px;

      filters: { status: "全部", type: "全部", area: "全部", owner: "全部", tl: "全部", customer: "全部", keyword: "" }
    };

    // Work Order Management State
    let workOrderState = {
      selectedWorkOrderId: null,
      filters: {
        status: "全部",
        type: "全部",
        area: "全部",
        owner: "全部",
        customer: "全部",
        keyword: ""
      },
      modalOpen: false,
      modalMode: "create" // "create" or "edit"
    };

    const $ = (selector) => document.querySelector(selector);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const ticketById = (id) => tickets.find(t => t.id === id) || tickets[0];
    const statusClass = (status) => `status-pill status-${status}`;
    
    // 获取当前角色对应的用户列表
    function getUsersByRole(roleKey) {
      const roleCode = {
        CS: "CS",
        TL: "TL",
        MASTER: "MASTER",
        QUO: "QUO",
        PUR: "PUR",
        FIN: "FIN",
        ADMIN: "ADMIN"
      }[roleKey];
      return users.filter(u => u.role === roleCode && u.status === "启用");
    }
    
    // 获取当前角色（支持人物切换）
    const currentRole = () => {
      const role = ROLES.find(r => r.key === state.role);
      if (!role) return ROLES[0];
      
      // 如果有选择具体人物，返回该人物的信息
      if (state.currentPerson) {
        return {
          ...role,
          name: state.currentPerson.name,
          avatar: state.currentPerson.name.slice(0, 1)
        };
      }
      return role;
    };

    function toast(message) {
      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    function countBy(field) {
      return tickets.reduce((acc, t) => {
        acc[t[field]] = (acc[t[field]] || 0) + 1;
        return acc;
      }, {});
    }

    function setPage(page) {
      // 如果点击的是基础设置且已经在基础设置页面，切换展开/收起状态
      if (page === "settings" && state.page === "settings") {
        state.isSettingsExpanded = !state.isSettingsExpanded;
      } else {
        state.page = page;
        state.view = "pc";
        // 进入基础设置时自动展开并默认显示字典管理
        if (page === "settings") {
          state.isSettingsExpanded = true;
          if (!state.settingsTab) {
            state.settingsTab = "dictionary";
          }
        } else {
          // 离开基础设置时收起菜单
          state.isSettingsExpanded = false;
        }
      }
      render();
    }

    function setMobilePage(page) {
      state.mobilePage = page;
      state.view = "mobile";
      render();
    }

    function setRole(role) {
      state.role = role;
      // 切换角色时，自动设置该角色下的第一个用户为当前人物
      const roleUsers = getUsersByRole(role);
      state.currentPerson = roleUsers.length > 0 ? roleUsers[0] : null;
      
      if (role === "MASTER") {
        state.view = "mobile";
        state.mobilePage = "tasks";
        const own = tickets.find(t => t.master === currentRole().name && ["待接单", "处理中", "待确认"].includes(t.status));
        if (own) state.selectedTicketId = own.id;
      } else {
        state.view = "pc";
        if (role === "CS") state.page = "create";
        if (role === "TL") state.page = "dispatch";
        if (role === "ADMIN") state.page = "dashboard";
        if (role === "FIN") state.page = "finance";
      }
      render();
      toast(`已切换为 ${currentRole().label} - ${currentRole().name}`);
    }
    
    // 切换同一角色下的不同人物
    function switchPerson(personName) {
      const roleUsers = getUsersByRole(state.role);
      const person = roleUsers.find(u => u.name === personName);
      if (person) {
        state.currentPerson = person;
        render();
        toast(`已切换为 ${personName}`);
      }
    }

    function updateTicket(id, patch, note) {
      const t = ticketById(id);
      Object.assign(t, patch);
      t.updatedAt = new Date().toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).replace(/\//g, "-");
      if (note) {
        t.records.push({ time: t.updatedAt.slice(-5), actor: currentRole().name, text: note });
      }
      saveDataToLocalStorage();
    }

    // ==================== Notification Engine ====================
    // 统一通知引擎 - 所有模块通过 createNotification() 发送通知
    // 采用「业务事件 → 接收对象」机制，不使用 if(role==='xxx') 硬编码

    // 角色映射表：系统角色 -> 通知角色
    const ROLE_MAP = {
      CS: "CS",
      TL: "TEAM_LEADER",
      MASTER: "MASTER",
      ADMIN: "ADMIN",
      SUPERVISOR: "SUPERVISOR"
    };

    // 获取当前角色对应的用户ID
    function getCurrentUserId() {
      if (state.currentPerson) {
        return state.currentPerson.id;
      }
      const role = currentRole();
      const user = users.find(u => u.name === role.name);
      return user ? user.id : null;
    }

    // 获取当前角色对应的通知角色类型
    function getCurrentNotificationRole() {
      return ROLE_MAP[state.role] || "CS";
    }

    // 获取用户收到的通知
    // 匹配规则：
    // 1. receiverRole === "ALL" → 所有人可见
    // 2. receiverRole 匹配当前角色 → 该角色群体可见
    // 3. 如果同时指定了 receiverId，则必须 receiverId 也匹配当前用户
    function getUserNotifications() {
      const userId = getCurrentUserId();
      const notifRole = getCurrentNotificationRole();
      
      return notifications.filter(n => {
        // 全局通知：所有人可见
        if (n.receiverRole === "ALL") {
          return true;
        }
        
        // 检查角色是否匹配
        const roleMatches = n.receiverRole === notifRole;
        if (!roleMatches) {
          return false;
        }
        
        // 如果指定了具体的 receiverId（且不是 "ALL"），则必须匹配当前用户
        if (n.receiverId && n.receiverId !== "ALL") {
          return n.receiverId === userId;
        }
        
        // 否则只要角色匹配即可（发送给该角色的所有人）
        return true;
      });
    }

    // 获取未读通知数量（只统计 Action 级别）
    function getUnreadActionCount() {
      return getUserNotifications().filter(n => !n.isRead && n.level === "action").length;
    }

    // 获取所有未读通知数量（包括所有级别）
    function getUnreadCount() {
      return getUserNotifications().filter(n => !n.isRead).length;
    }

    // 渲染通知铃铛（只显示 Action 级别的未读数）
    function renderNotificationBell() {
      const count = getUnreadActionCount();
      const badge = $("#notiBadge");
      if (badge) {
        badge.textContent = count > 0 ? count : "";
        badge.dataset.count = count;
      }
    }

    // 切换通知面板显示/隐藏
    function toggleNotificationPanel() {
      notificationState.panelOpen = !notificationState.panelOpen;
      const panel = $("#notiPanel");
      if (panel) {
        panel.classList.toggle("open", notificationState.panelOpen);
        if (notificationState.panelOpen) {
          panel.innerHTML = renderNotifications();
        }
      }
    }

    // 关闭通知面板
    function closeNotificationPanel() {
      notificationState.panelOpen = false;
      const panel = $("#notiPanel");
      if (panel) panel.classList.remove("open");
    }

    // 渲染通知列表（面板头部显示 Action 级别的未读数）
    function renderNotifications() {
      const userNotis = getUserNotifications().slice(0, 50);
      const actionUnreadCount = getUnreadActionCount();

      if (userNotis.length === 0) {
        return `
          <div class="noti-panel-head">
            <h3>🔔 通知</h3>
          </div>
          <div class="noti-panel-body">
            <div class="noti-empty">
              <div class="icon">🔔</div>
              <div>暂无通知</div>
            </div>
          </div>
        `;
      }

      return `
        <div class="noti-panel-head">
          <h3>🔔 通知 ${actionUnreadCount > 0 ? `<span class="noti-unread-tag">${actionUnreadCount} 待处理</span>` : ""}</h3>
          ${actionUnreadCount > 0 ? `<button class="noti-mark-all" data-mark-all-read>全部已读</button>` : ""}
        </div>
        <div class="noti-panel-body">
          ${userNotis.map(n => {
            const moduleInfo = NOTIFICATION_MODULES[n.module] || NOTIFICATION_MODULES.system;
            return `
              <div class="noti-card ${!n.isRead ? "unread" : ""}" data-open-notification="${n.id}">
                <div class="noti-icon level-${n.level}">${moduleInfo.icon}</div>
                <div class="noti-body">
                  <p class="noti-title">
                    <span class="noti-level-dot ${n.level}"></span>
                    ${escapeHtml(n.title)}
                  </p>
                  <p class="noti-content">${escapeHtml(n.content)}</p>
                  ${n.subContent ? `<p class="noti-sub">${escapeHtml(n.subContent)}</p>` : ""}
                  <p class="noti-time">${n.createdAt}</p>
                </div>
              </div>
            `;
          }).join("")}
        </div>
        <div class="noti-panel-foot">
          <button>查看最近50条通知</button>
        </div>
      `;
    }

    // 打开通知（点击通知后跳转）
    function openNotification(notificationId) {
      const notification = notifications.find(n => n.id === notificationId);
      if (!notification) return;

      // 标记为已读
      markAsRead(notificationId);

      // 跳转到对应页面
      if (notification.targetPage) {
        // 客户管理和用户管理现在在基础设置下
        if (notification.targetPage === "customers") {
          state.page = "settings";
          state.settingsTab = "customer";
          state.isSettingsExpanded = true;
        } else if (notification.targetPage === "users") {
          state.page = "settings";
          state.settingsTab = "user";
          state.isSettingsExpanded = true;
        } else {
          state.page = notification.targetPage;
        }
        state.view = "pc";

        // 根据模块设置选中ID
        if (notification.module === "ticket" && notification.targetId) {
          // 工单通知跳转到工单管理页面并打开详情 Drawer
          workOrderState.selectedWorkOrderId = notification.targetId;
        } else if (notification.module === "quotation" && notification.targetId) {
          quotationState.selectedQuotationId = notification.targetId;
        } else if (notification.module === "customer" && notification.targetId) {
          customerState.selectedCustomerId = notification.targetId;
        } else if (notification.module === "user" && notification.targetId) {
          userState.selectedUserId = notification.targetId;
        }

        render();
      }

      // 关闭通知面板
      closeNotificationPanel();
    }

    // 标记单条通知为已读
    function markAsRead(notificationId) {
      const notification = notifications.find(n => n.id === notificationId);
      if (notification) {
        notification.isRead = true;
        renderNotificationBell();
        // 如果面板打开，重新渲染
        if (notificationState.panelOpen) {
          const panel = $("#notiPanel");
          if (panel) panel.innerHTML = renderNotifications();
        }
      }
    }

    // 标记所有通知为已读
    function markAllAsRead() {
      getUserNotifications().forEach(n => { n.isRead = true; });
      renderNotificationBell();
      // 如果面板打开，重新渲染
      if (notificationState.panelOpen) {
        const panel = $("#notiPanel");
        if (panel) panel.innerHTML = renderNotifications();
      }
      toast("已将所有通知标记为已读");
    }

    // 删除通知
    function deleteNotification(notificationId) {
      notifications = notifications.filter(n => n.id !== notificationId);
      renderNotificationBell();
      if (notificationState.panelOpen) {
        const panel = $("#notiPanel");
        if (panel) panel.innerHTML = renderNotifications();
      }
    }

    // 创建通知 - 统一入口
    // 所有模块的业务事件都通过此函数发送通知
    function createNotification({ module, level, title, content, subContent, targetPage, targetId, receiverId, receiverRole }) {
      const newNoti = {
        id: `NOTI-${Date.now()}`,
        module: module || "system",
        level: level || "info",
        title: title || "",
        content: content || "",
        subContent: subContent || "",
        targetPage: targetPage || "",
        targetId: targetId || "",
        receiverId: receiverId || "ALL",
        receiverRole: receiverRole || "ALL",
        isRead: false,
        createdAt: new Date().toLocaleString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).replace(/\//g, "-")
      };
      notifications.unshift(newNoti);
      renderNotificationBell();
      return newNoti;
    }

    // 业务事件通知规则映射表
    // 格式: 事件名 -> { module, level, title, targetPage, receiverRole/ receiverId 获取方式 }
    const NOTIFICATION_RULES = {
      "ticket.created": {
        module: "ticket",
        level: "action",
        title: "新工单待分派",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 发送给工单所属团队的 Team Leader
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket) {
            const tl = users.find(u => u.role === "TL" && u.area === ticket.area);
            return { receiverId: tl?.id, receiverRole: "TEAM_LEADER" };
          }
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "ticket.assigned": {
        module: "ticket",
        level: "action",
        title: "工单待接单",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 发送给被分派的师傅
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket && ticket.master) {
            const master = users.find(u => u.name === ticket.master);
            return { receiverId: master?.id, receiverRole: "MASTER" };
          }
          return { receiverRole: "MASTER" };
        }
      },
      "ticket.rejected": {
        module: "ticket",
        level: "action",
        title: "工单被拒单",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 发送给 Team Leader
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket) {
            const tl = users.find(u => u.role === "TL" && u.area === ticket.area);
            return { receiverId: tl?.id, receiverRole: "TEAM_LEADER" };
          }
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "ticket.timeout.warning": {
        module: "ticket",
        level: "warning",
        title: "工单即将超时",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 发送给师傅和 Team Leader
          return { receiverRole: "MASTER" }; // 实际应同时发给 MASTER 和 TL
        }
      },
      "ticket.completed": {
        module: "ticket",
        level: "success",
        title: "工单已完成",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 发送给 CS
          return { receiverRole: "CS" };
        }
      },
      "quotation.created": {
        module: "quotation",
        level: "info",
        title: "新增报价",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 发送给报价负责人
          const quotation = quotations.find(q => q.id === data.quotationId);
          if (quotation) {
            const owner = users.find(u => u.name === quotation.owner);
            return { receiverId: owner?.id, receiverRole: getCurrentRoleType() };
          }
          return { receiverRole: getCurrentRoleType() };
        }
      },
      "quotation.pending.confirm": {
        module: "quotation",
        level: "action",
        title: "客户待确认报价",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 发送给 CS
          return { receiverRole: "CS" };
        }
      },
      "quotation.confirmed": {
        module: "quotation",
        level: "success",
        title: "报价已确认",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 发送给 CS 和 Team Leader
          return { receiverRole: "CS" };
        }
      },
      "quotation.expiring": {
        module: "quotation",
        level: "warning",
        title: "报价即将过期",
        targetPage: "quotations",
        getReceiver: (data) => {
          return { receiverRole: getCurrentRoleType() };
        }
      },
      "quotation.need.revision": {
        module: "quotation",
        level: "action",
        title: "报价需修订",
        targetPage: "quotations",
        getReceiver: (data) => {
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "customer.created": {
        module: "customer",
        level: "info",
        title: "新增客户",
        targetPage: "customers",
        getReceiver: (data) => {
          // 发送给 CS
          return { receiverRole: "CS" };
        }
      },
      "customer.updated": {
        module: "customer",
        level: "info",
        title: "客户资料修改",
        targetPage: "customers",
        getReceiver: (data) => {
          // 发送给 CS
          return { receiverRole: "CS" };
        }
      },
      "user.created": {
        module: "user",
        level: "info",
        title: "新增用户",
        targetPage: "users",
        getReceiver: (data) => {
          // 发送给 ADMIN
          return { receiverRole: "ADMIN" };
        }
      },
      "user.role.changed": {
        module: "user",
        level: "info",
        title: "用户角色变更",
        targetPage: "users",
        getReceiver: (data) => {
          // 发送给 ADMIN
          return { receiverRole: "ADMIN" };
        }
      },
      "system.error": {
        module: "system",
        level: "warning",
        title: "系统异常",
        targetPage: "dashboard",
        getReceiver: (data) => {
          // 发送给 ADMIN
          return { receiverRole: "ADMIN" };
        }
      }
    };

    // 触发业务事件通知
    function triggerNotification(eventName, data = {}) {
      const rule = NOTIFICATION_RULES[eventName];
      if (!rule) return;

      const receiver = rule.getReceiver(data);
      const ticket = data.ticketId ? tickets.find(t => t.id === data.ticketId) : null;
      const quotation = data.quotationId ? quotations.find(q => q.id === data.quotationId) : null;
      const customer = data.customerId ? customers.find(c => c.id === data.customerId) : null;

      let content = "";
      let subContent = "";
      let targetId = "";

      if (ticket) {
        content = ticket.id;
        subContent = ticket.customer;
        targetId = ticket.id;
      } else if (quotation) {
        content = quotation.id;
        subContent = quotation.customerName;
        targetId = quotation.id;
      } else if (customer) {
        content = customer.id;
        subContent = customer.nameZh;
        targetId = customer.id;
      } else if (data.userId) {
        const user = users.find(u => u.id === data.userId);
        content = data.userId;
        subContent = user?.name || "";
        targetId = data.userId;
      }

      createNotification({
        module: rule.module,
        level: rule.level,
        title: rule.title,
        content: content,
        subContent: subContent,
        targetPage: rule.targetPage,
        targetId: targetId,
        receiverId: receiver.receiverId,
        receiverRole: receiver.receiverRole
      });
    }


    function performAction(action, id) {
      const t = ticketById(id);
      if (action === "view") {
        state.selectedTicketId = id;
        state.page = "detail";
        state.view = "pc";
        render();
        return;
      }
      if (action === "accept") {
        updateTicket(id, { status: "待分派", owner: t.tl || "李组长" }, "CS 已受理，确认需要派工。");
      }
      if (action === "cancel") {
        updateTicket(id, { status: "已取消", owner: currentRole().name, cancelReason: "原型模拟取消" }, "工单已取消。");
      }
      if (action === "closeDirect") {
        const closeReason = prompt("请输入关单原因（现场解决/电话解决/简单咨询等）：", "现场解决");
        if (!closeReason) return;
        updateTicket(id, { status: "已关闭", owner: currentRole().name, closeReason: closeReason }, `CS 直接关单：${closeReason}`);
      }
      if (action === "assign") {
        state.selectedDispatchId = id;
        state.page = "dispatch";
        state.view = "pc";
        render();
        toast("请在分派中心选择师傅并确认分派");
        return;
      }
      if (action === "take") {
        const eta = prompt("请输入预计到达时间（例如：30分钟、14:30、下午3点）：");
        if (eta === null) return;
        const updates = { status: "处理中", owner: currentRole().name, master: currentRole().name };
        if (eta) updates.estimatedArrival = eta;
        updateTicket(id, updates, eta ? `师傅已接单，预计 ${eta} 到达。` : "师傅已接单，进入处理中。");
      }
      if (action === "reject") {
        updateTicket(id, { status: "待分派", owner: t.tl, master: "", rejectReason: "当前任务冲突，需重新安排。" }, "师傅拒单：当前任务冲突，退回待分派。");
      }
      if (action === "submitResult") {
        // 验证服务报告必填字段
        const serviceReportNo = document.getElementById('serviceReportNo');
        const mobileResult = document.getElementById('mobileResult');
        const paperHolder = document.getElementById('paperHolder');
        
        // 检查服务报告编号
        if (serviceReportNo && !serviceReportNo.value.match(/^\d{6}$/)) {
          alert('服务报告编号必须是6位数字');
          serviceReportNo.focus();
          return;
        }
        
        // 检查处理说明
        if (mobileResult && !mobileResult.value.trim()) {
          alert('请填写处理说明');
          mobileResult.focus();
          return;
        }
        
        // 检查是否有完工纸需求
        const hasCompletionPaper = t.quotationId && quotations.find(q => q.id === t.quotationId)?.procurementStatus === "已到货";
        
        // 如果需要完工纸，检查完工纸照片
        if (hasCompletionPaper && !t.completionPaperPhoto) {
          alert('请上传完工纸照片');
          return;
        }
        
        // 收集更新数据
        const updates = { 
          status: "待确认", 
          owner: t.tl,
          serviceReportNo: serviceReportNo ? serviceReportNo.value : t.serviceReportNo,
          serviceReportText: mobileResult ? mobileResult.value : t.serviceReportText
        };
        
        // 如果有完工纸领取人字段，更新
        if (paperHolder && paperHolder.value) {
          updates.paperHolder = paperHolder.value;
        }
        
        // 处理是否需要报价字段
        const needQuotationCheckbox = document.getElementById('needQuotation');
        if (needQuotationCheckbox) {
          updates.needQuotation = needQuotationCheckbox.checked;
          
          // 如果需要报价，通知报价组
          if (needQuotationCheckbox.checked && !t.needQuotation) {
            const quotationUsers = users.filter(u => u.role === "QUO" && u.status === "启用");
            quotationUsers.forEach(user => {
              createNotification({
                module: "ticket",
                level: "action",
                title: "工单需要报价",
                content: t.id,
                subContent: t.customer,
                targetPage: "workorder",
                targetId: t.id,
                receiverId: user.id,
                receiverRole: "QUO"
              });
            });
          }
        }
        
        updateTicket(id, updates, "师傅提交服务报告和现场记录，等待确认。");
      }
      if (action === "confirmClose") {
        updateTicket(id, { status: "已关闭", owner: currentRole().name }, "确认处理结果通过，工单关闭。");
      }
      if (action === "returnWork") {
        updateTicket(id, { status: "处理中", owner: t.master || "周师傅" }, "确认不通过，退回师傅继续处理。");
      }
      if (action === "note") {
        updateTicket(id, {}, "补充信息：已在原型中记录备注。");
      }
      if (action === "urge") {
        // 催单功能
        const urgeContent = prompt("请输入催单内容：");
        if (urgeContent) {
          const urgeRecord = {
            time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
            actor: currentRole().name,
            text: `客户催单：${urgeContent}`
          };
          if (!t.urgeRecords) t.urgeRecords = [];
          t.urgeRecords.push(urgeRecord);
          t.urgeCount = (t.urgeCount || 0) + 1;
          updateTicket(id, {}, `客户催单 ${t.urgeCount} 次：${urgeContent}`);
          toast("催单已记录，已通知TL和师傅");
        }
      }
      if (action === "editTicket") {
        // TL编辑工单
        openEditWorkOrderModal(id);
      }
      if (action === "createQuotationFromTicket" || action === "quote") {
        // 报价组从工单创建报价
        openQuotationModalFromTicket(id);
        return;
      }
      render();
      toast("状态已在页面内模拟更新");
    }

    function actionButtons(t, context = "detail") {
      const buttons = [];
      const add = (label, action, cls = "secondary-btn") => buttons.push(`<button class="${cls}" data-action="${action}" data-id="${t.id}">${label}</button>`);
      if (context === "list") add("查看详情", "view", "ghost-btn");
      
      // 报价组特殊处理：已关闭且需要报价的工单显示报价按钮
      if (state.role === "QUO" && t.status === "已关闭" && t.needQuotation) {
        add("创建报价", "createQuotationFromTicket", "primary-btn");
        return buttons.join("");
      }
      
      if (["已关闭", "已取消"].includes(t.status)) return buttons.join("");
      if (state.role === "CS") {
        if (t.status === "待受理") {
          add("受理", "accept", "primary-btn");
          add("直接关单", "closeDirect", "secondary-btn");
          add("取消", "cancel", "danger-btn");
        }
        if (["待受理", "处理中"].includes(t.status)) add("补充信息", "note", "secondary-btn");
        // 客户催单按钮
        if (["待分派", "待接单", "处理中"].includes(t.status)) add("催单", "urge", "warning-btn");
      }
      if (state.role === "TL") {
        if (t.status === "待分派") {
          add("分派", "assign", "primary-btn");
          add("编辑工单", "editTicket", "secondary-btn");
        }
        if (t.status === "待接单") add("重新分派", "assign", "secondary-btn");
        if (t.status === "待确认") {
          add("确认关闭", "confirmClose", "primary-btn");
          add("退回处理", "returnWork", "secondary-btn");
        }
        if (t.status === "处理中") add("补充备注", "note", "secondary-btn");
      }
      if (state.role === "MASTER") {
        if (t.status === "待接单") {
          add("接单", "take", "primary-btn");
          add("拒单", "reject", "danger-btn");
        }
        if (t.status === "处理中") add("提交处理结果", "submitResult", "primary-btn");
      }
      if (state.role === "ADMIN") {
        if (t.status === "待确认") {
          add("确认关闭", "confirmClose", "primary-btn");
          add("退回处理", "returnWork", "secondary-btn");
        }
        if (["待受理", "待分派", "处理中"].includes(t.status)) add("取消", "cancel", "danger-btn");
      }
      return buttons.join("");
    }

    function renderDashboard() {

            ${STATUSES.map(s => `<div class="card stat-card"><div class="stat-label">${s}<span class="${statusClass(s)}">${s}</span></div><div class="stat-value">${counts[s] || 0}</div><div class="stat-note">点击列表筛选查看</div></div>`).join("")}

            </div>
            <div class="card">
              <div class="card-head"><h2>异常 / 需关注工单</h2><span class="chip">${focus.length} 条</span></div>

            </div>
            <div class="card">
              <div class="card-head"><h2>最近动态</h2><span class="chip">${now}</span></div>

              <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">

    function barRow(label, value, total) {
      const pct = total ? Math.round(value / total * 100) : 0;
      return `<div class="bar-row"><span>${label}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, pct)}%"></div></div><strong>${value}</strong></div>`;
    }

    function filteredTickets() {
      const f = state.filters;
      return tickets.filter(t => {
        const keyword = f.keyword.trim().toLowerCase();
        return (f.status === "全部" || t.status === f.status)
          && (f.type === "全部" || t.type === f.type)
          && (f.area === "全部" || t.area === f.area)
          && (f.owner === "全部" || t.owner === f.owner || t.master === f.owner)
          && (f.tl === "全部" || t.tl === f.tl)
          && (f.customer === "全部" || t.customerId === f.customer)
          && (!keyword || `${t.id} ${t.customer} ${t.contact} ${t.desc}`.toLowerCase().includes(keyword));
      });
    }

    function infoRow(label, value) {
      return `<div class="info-row"><span>${label}</span><strong>${value}</strong></div>`;
    }

    // ==================== Work Order Management Module ====================
    function renderWorkOrderPage() {
      const hasDrawer = workOrderState.selectedWorkOrderId !== null;
      const selectedTicket = hasDrawer ? ticketById(workOrderState.selectedWorkOrderId) : null;

        <section class="page active">

    function renderWorkOrderFilters() {
      const ownerOptions = [...new Set(tickets.flatMap(t => [t.owner, t.master]).filter(Boolean))];
      const customerOptions = customers.map(c => ({ id: c.id, name: c.nameZh }));
      
      return `
        <div class="wo-filters">
          <div class="wo-filter-group">
            <label>状态</label>
            <select data-wo-filter="status">
              <option value="全部" ${workOrderState.filters.status === "全部" ? "selected" : ""}>全部</option>
              ${STATUSES.map(s => `<option value="${s}" ${workOrderState.filters.status === s ? "selected" : ""}>${s}</option>`).join("")}
            </select>
          </div>
          <div class="wo-filter-group">
            <label>工单类型</label>
            <select data-wo-filter="type">
              <option value="全部" ${workOrderState.filters.type === "全部" ? "selected" : ""}>全部</option>
              ${TYPES.map(t => `<option value="${t}" ${workOrderState.filters.type === t ? "selected" : ""}>${t}</option>`).join("")}
            </select>
          </div>
          <div class="wo-filter-group">
            <label>区域</label>
            <select data-wo-filter="area">
              <option value="全部" ${workOrderState.filters.area === "全部" ? "selected" : ""}>全部</option>
              ${REGIONS.map(r => `<option value="${r}" ${workOrderState.filters.area === r ? "selected" : ""}>${r}</option>`).join("")}

          </div>
          <div class="wo-filter-group">
            <label>负责人</label>

              <option value="全部" ${workOrderState.filters.owner === "全部" ? "selected" : ""}>全部</option>
              ${ownerOptions.map(o => `<option value="${o}" ${workOrderState.filters.owner === o ? "selected" : ""}>${o}</option>`).join("")}
            </select>
          </div>
          <div class="wo-filter-group">
            <label>客户</label>
            <select data-wo-filter="customer">
              <option value="全部" ${workOrderState.filters.customer === "全部" ? "selected" : ""}>全部</option>
              ${customerOptions.map(c => `<option value="${c.id}" ${workOrderState.filters.customer === c.id ? "selected" : ""}>${c.name}</option>`).join("")}
            </select>
          </div>
          <div class="wo-filter-group">
            <label>关键词搜索</label>

          <div class="wo-actions-top">
            <button class="secondary-btn" data-wo-reset>重置</button>
            <button class="primary-btn" data-wo-create>+ 新建工单</button>
            <button class="secondary-btn" data-wo-batch-create>批量生成空白工单</button>
          </div>
        </div>
      `;
    }

    function filterWorkOrders() {
      const f = workOrderState.filters;
      return tickets.filter(t => {
        const keyword = f.keyword.trim().toLowerCase();
        return (f.status === "全部" || t.status === f.status)
          && (f.type === "全部" || t.type === f.type)
          && (f.area === "全部" || t.area === f.area)
          && (f.owner === "全部" || t.owner === f.owner || t.master === f.owner)
          && (f.customer === "全部" || t.customerId === f.customer)
          && (!keyword || `${t.id} ${t.customer} ${t.contact} ${t.address}`.toLowerCase().includes(keyword));
      });
    }

    function renderWorkOrderTable() {
      const filtered = filterWorkOrders();
      const isQUO = state.role === "QUO";
      
      return `
        <table class="wo-table">
          <thead>
            <tr>
              <th>工单编号</th>
              <th>工单类型</th>
              <th>客户 / 联系人</th>
              <th>区域</th>
              <th>工单状态</th>
              ${isQUO ? '<th>报价状态</th>' : ''}
              <th>当前负责人</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0 ? `
              <tr>
                <td colspan="${isQUO ? 9 : 8}" style="text-align: center; padding: 40px; color: var(--muted);">
                  暂无匹配工单
                </td>
              </tr>
            ` : filtered.map(t => {
              const showUrge = state.role === "CS" && ["待分派", "待接单", "处理中"].includes(t.status);
              
              // 获取报价状态
              const ticketQuotation = quotations.find(q => q.ticketId === t.id);
              const quotationStatus = ticketQuotation?.status || '';
              const needQuotation = t.needQuotation;
              
              // 报价按钮逻辑（仅报价组显示）
              let quotationBtnHtml = '';
              if (isQUO) {
                if (!needQuotation) {
                  quotationBtnHtml = '<div style="width:70px;height:36px;visibility:hidden;"></div>';
                } else if (!quotationStatus || quotationStatus === "待报价" || quotationStatus === "需修订") {
                  quotationBtnHtml = `<button class="wo-quote-btn wo-quote-primary" data-action="quote" data-id="${t.id}">报价</button>`;
                } else if (["已发出", "等待客户确认", "已确认", "已取消"].includes(quotationStatus)) {
                  quotationBtnHtml = `<button class="wo-quote-btn wo-quote-secondary" data-action="viewQuote" data-id="${t.id}">查看报价</button>`;
                } else {
                  quotationBtnHtml = '<div style="width:70px;height:36px;visibility:hidden;"></div>';
                }
              }
              
              return `
              <tr>
                <td><button class="wo-id-link" data-wo-view="${t.id}">${t.id}</button></td>
                <td>${t.type}</td>
                <td>
                  <div class="wo-customer-name">${escapeHtml(t.customer)}</div>
                  <div class="wo-customer-contact">${escapeHtml(t.contact)}</div>
                </td>
                <td>${t.area}</td>
                <td><span class="wo-status-tag wo-status-${t.status}">${t.status}</span></td>
                ${isQUO ? `<td>${quotationStatus ? `<span class="wo-status-tag wo-quotation-status-${quotationStatus}">${quotationStatus}</span>` : '<span style="color: var(--muted);">-</span>'}</td>` : ''}
                <td>${escapeHtml(t.owner)}</td>
                <td>${t.updatedAt}</td>
                <td class="wo-td-actions">
                  <div>
                    <div class="wo-actions-left">
                      ${showUrge ? `<button class="wo-urge-btn" data-action="urge" data-id="${t.id}">催单</button>` : '<div style="width:70px;height:36px;visibility:hidden;"></div>'}
                    </div>
                    <div class="wo-actions-middle">
                      ${quotationBtnHtml}
                    </div>
                    <div class="wo-actions-right">
                      <button class="wo-view-btn" data-wo-view="${t.id}">查看详情</button>
                    </div>
                  </div>
                </td>
              </tr>
            `}).join("")}
          </tbody>
        </table>
      `;
    }

    function saveWorkOrder(formData) {
      const isEdit = workOrderState.modalMode === "edit";
      const ticketId = isEdit ? workOrderState.selectedWorkOrderId : `WO-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-${String(tickets.length + 1).padStart(3, '0')}`;
      
      const customer = customers.find(c => c.id === formData.get('customerId'));
      const ticketData = {
        id: ticketId,
        customerId: formData.get('customerId'),
        customer: customer?.nameZh || '',
        contact: formData.get('contact'),
        phone: formData.get('phone'),
        channel: formData.get('channel'),
        area: formData.get('area'),
        address: formData.get('address'),
        type: formData.get('type'),
        desc: formData.get('desc'),
        status: isEdit ? ticketById(ticketId).status : '待受理',
        owner: isEdit ? ticketById(ticketId).owner : currentRole().name,
        tl: formData.get('tl') || (isEdit ? ticketById(ticketId).tl : currentRole().name),
        master: isEdit ? ticketById(ticketId).master : '',
        createdAt: isEdit ? ticketById(ticketId).createdAt : new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        updatedAt: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        records: isEdit ? ticketById(ticketId).records : [{ time: new Date().toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false }), actor: currentRole().name, text: '创建工单' }],
        attachments: formData.get('attachments') ? formData.get('attachments').split(',').map(a => a.trim()).filter(Boolean) : [],
        tags: [],
        urgent: formData.get('priority') === '紧急' || formData.get('priority') === '非常紧急',
        priority: formData.get('priority')
      };

      if (isEdit) {
        const index = tickets.findIndex(t => t.id === ticketId);
        if (index !== -1) {
          tickets[index] = { ...tickets[index], ...ticketData };
          saveDataToLocalStorage();
          toast('工单已更新');
        }
      } else {
        tickets.unshift(ticketData);
        saveDataToLocalStorage();
        toast('工单已创建');
      }

      workOrderState.modalOpen = false;
      if (!isEdit) {
        workOrderState.selectedWorkOrderId = ticketId;
      }
      render();
    }

    // 批量生成空白工单
    function batchCreateWorkOrders() {
      const count = prompt('请输入要生成的空白工单数量（1-50）：', '5');
      if (!count || isNaN(count) || count < 1 || count > 50) {
        if (count !== null) toast('请输入1-50之间的数字');
        return;
      }

      const num = parseInt(count);
      const now = new Date();
      const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
      const timeStr = now.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-');
      
      let created = 0;
      for (let i = 0; i < num; i++) {
        const ticketId = `WO-${dateStr}-${String(tickets.length + i + 1).padStart(3, '0')}`;
        const ticketData = {
          id: ticketId,
          customerId: '',
          customer: '（空白工单）',
          contact: '',
          phone: '',
          channel: '电话',
          area: '香港',
          address: '',
          type: '保养维修',
          desc: '',
          status: '待受理',
          owner: currentRole().name,
          tl: '',
          master: '',
          createdAt: timeStr,
          updatedAt: timeStr,
          records: [{ time: timeStr, actor: currentRole().name, text: '批量生成空白工单' }],
          attachments: [],
          tags: ['空白工单'],
          urgent: false,
          priority: '普通'
        };
        tickets.unshift(ticketData);
        created++;
      }
      
      saveDataToLocalStorage();
      toast(`已批量生成 ${created} 张空白工单`);
      render();
    }

    function renderReport() {
      const statusCounts = countBy("status");
      const typeCounts = countBy("type");
      const areaCounts = countBy("area");
      const masterCounts = tickets.reduce((acc, t) => {
        const name = t.master || "未分派";
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      const customerCounts = tickets.reduce((acc, t) => {
        const name = t.customer || "未知客户";
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      
      // 中单报表统计
      const quotationStats = {
        total: quotations.length,
        won: quotations.filter(q => q.bidStatus === '已中标').length,
        lost: quotations.filter(q => q.bidStatus === '未中标').length,
        pending: quotations.filter(q => q.bidStatus === '待确认').length
      };
      const winRate = quotationStats.total > 0 ? ((quotationStats.won / quotationStats.total) * 100).toFixed(1) : 0;
      
      // 按客户统计中单情况
      const customerQuotationStats = {};
      quotations.forEach(q => {
        if (!customerQuotationStats[q.customerName]) {
          customerQuotationStats[q.customerName] = { total: 0, won: 0 };
        }
        customerQuotationStats[q.customerName].total++;
        if (q.bidStatus === '已中标') {
          customerQuotationStats[q.customerName].won++;
        }
      });
      
      // 按区域统计中单情况
      const areaQuotationStats = {};
      quotations.forEach(q => {
        const ticket = tickets.find(t => t.id === q.ticketId);
        const area = ticket ? ticket.area : '未知';
        if (!areaQuotationStats[area]) {
          areaQuotationStats[area] = { total: 0, won: 0 };
        }
        areaQuotationStats[area].total++;
        if (q.bidStatus === '已中标') {
          areaQuotationStats[area].won++;
        }
      });
      
      return `
        <section class="page active">
          <div class="grid cols-4">
            <div class="card stat-card"><div class="stat-label">工单总数</div><div class="stat-value">${tickets.length}</div><div class="stat-note">较上周 +12%</div></div>
            <div class="card stat-card"><div class="stat-label">已关闭</div><div class="stat-value">${statusCounts["已关闭"] || 0}</div><div class="stat-note">闭环工单</div></div>
            <div class="card stat-card"><div class="stat-label">待确认</div><div class="stat-value">${statusCounts["待确认"] || 0}</div><div class="stat-note">需 TL / 主管处理</div></div>
            <div class="card stat-card"><div class="stat-label">已取消</div><div class="stat-value">${statusCounts["已取消"] || 0}</div><div class="stat-note">进入基础统计</div></div>
          </div>
          <div class="grid cols-3" style="margin-top:14px;">
            <div class="card"><h2>按状态统计</h2>${STATUSES.map(s => barRow(s, statusCounts[s] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按工单类型统计</h2>${TYPES.map(t => barRow(t, typeCounts[t] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按区域统计</h2>${REGIONS.map(r => barRow(r, areaCounts[r] || 0, tickets.length)).join("")}</div>
          </div>
          <div class="grid cols-2" style="margin-top:14px;">
            <div class="card"><h2>按师傅统计</h2>${Object.entries(masterCounts).map(([k,v]) => barRow(k, v, tickets.length)).join("")}</div>
            <div class="card"><h2>按客户统计</h2>${Object.entries(customerCounts).sort((a,b) => b[1] - a[1]).map(([k,v]) => barRow(k, v, tickets.length)).join("")}</div>
          </div>
          
          <!-- 中单报表 -->
          <div class="grid cols-4" style="margin-top:14px;">
            <div class="card stat-card"><div class="stat-label">报价单总数</div><div class="stat-value">${quotationStats.total}</div><div class="stat-note">所有报价</div></div>
            <div class="card stat-card"><div class="stat-label">已中单</div><div class="stat-value">${quotationStats.won}</div><div class="stat-note">成功中标</div></div>
            <div class="card stat-card"><div class="stat-label">未中单</div><div class="stat-value">${quotationStats.lost}</div><div class="stat-note">失去机会</div></div>
            <div class="card stat-card"><div class="stat-label">中单率</div><div class="stat-value">${winRate}%</div><div class="stat-note">成功率</div></div>
          </div>
          
          <div class="grid cols-2" style="margin-top:14px;">
            <div class="card">
              <h2>按客户统计中单情况</h2>
              <div class="data-table-wrap">
                <table>
                  <thead>
                    <tr><th>客户名称</th><th>报价总数</th><th>中单数</th><th>中单率</th></tr>
                  </thead>
                  <tbody>
                    ${Object.entries(customerQuotationStats).map(([name, stats]) => {
                      const rate = stats.total > 0 ? ((stats.won / stats.total) * 100).toFixed(1) : 0;
                      return `<tr>
                        <td>${name}</td>
                        <td>${stats.total}</td>
                        <td>${stats.won}</td>
                        <td><span class="tag ${rate >= 50 ? 'success' : rate >= 30 ? 'warning' : 'danger'}">${rate}%</span></td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>
            <div class="card">
              <h2>按区域统计中单情况</h2>
              <div class="data-table-wrap">
                <table>
                  <thead>
                    <tr><th>区域</th><th>报价总数</th><th>中单数</th><th>中单率</th></tr>
                  </thead>
                  <tbody>
                    ${Object.entries(areaQuotationStats).map(([area, stats]) => {
                      const rate = stats.total > 0 ? ((stats.won / stats.total) * 100).toFixed(1) : 0;
                      return `<tr>
                        <td>${area}</td>
                        <td>${stats.total}</td>
                        <td>${stats.won}</td>
                        <td><span class="tag ${rate >= 50 ? 'success' : rate >= 30 ? 'warning' : 'danger'}">${rate}%</span></td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          
          <div class="grid cols-1" style="margin-top:14px;">
            <div class="card">
              <div class="card-head"><h2>最近 7 天趋势</h2><span class="chip">基础趋势</span></div>
              <div class="trend">${[3,5,4,7,6,8,9].map((v,i) => `<div class="trend-col"><div class="trend-bar" style="height:${v * 13}px"></div><span>06-${9+i}</span></div>`).join("")}</div>
              <p>第一版只做状态、类型、区域、师傅、客户等基础统计，不做成本、绩效、SLA、财务、采购或复杂 BI。</p>
            </div>
          </div>
        </section>`;
    }

    function filterUsers() {
      return users.filter(u => {
        const matchRole = userState.roleFilter === "全部" || u.role === userState.roleFilter;
        const matchFilterRole = userState.filterRole === "全部" || u.role === userState.filterRole;
        const matchFilterStatus = userState.filterStatus === "全部" || u.status === userState.filterStatus;
        const keyword = userState.searchKeyword.toLowerCase();
        const matchKeyword = !keyword ||
          u.name.toLowerCase().includes(keyword) ||
          u.employeeNo.toLowerCase().includes(keyword) ||
          u.phone.includes(keyword) ||
          u.email.toLowerCase().includes(keyword);
        return matchRole && matchFilterRole && matchFilterStatus && matchKeyword;
      });
    }

    function paginateUsers(filtered) {
      const start = (userState.currentPage - 1) * userState.pageSize;
      return filtered.slice(start, start + userState.pageSize);
    }

    function getUserStats(user) {
      const userTickets = tickets.filter(t => t.master === user.name || t.owner === user.name);
      const completed = userTickets.filter(t => t.status === "已关闭").length;
      const processing = userTickets.filter(t => ["处理中", "待接单", "待确认"].includes(t.status)).length;
      const overdue = userTickets.filter(t => t.urgent && ["处理中", "待接单"].includes(t.status)).length;
      const satisfaction = userTickets.length > 0 ? Math.min(98, 85 + Math.floor(Math.random() * 15)) : 0;
      return { completed, processing, overdue, satisfaction };
    }

    function saveUser(formData, isEdit = false, userId = null) {
      if (isEdit) {
        const user = users.find(u => u.id === userId);
        if (user) {
          Object.assign(user, {
            name: formData.get("name") || user.name,
            phone: formData.get("phone") || user.phone,
            email: formData.get("email") || user.email,
            role: formData.get("role") || user.role,
            area: formData.get("area") || user.area,
            manager: formData.get("manager") || user.manager,
            status: formData.get("status") || user.status
          });
          toast("用户信息已更新");
        }
      } else {
        const newUser = {
          id: `U${String(users.length + 1).padStart(3, "0")}`,
          name: formData.get("name"),
          employeeNo: formData.get("employeeNo"),
          role: formData.get("role"),
          area: formData.get("area") || "未分配",
          phone: formData.get("phone"),
          email: formData.get("email") || "",
          manager: formData.get("manager") || "",
          status: formData.get("status") || "启用",
          lastLogin: "尚未登录",
          createdAt: new Date().toISOString().slice(0, 10)
        };
        users.unshift(newUser);
        saveDataToLocalStorage();
        toast("新用户已创建");
      }
      render();
    }

    function deleteUser(userId) {
      const user = users.find(u => u.id === userId);
      if (!user) return;
      if (!confirm(`确定要删除用户 "${user.name}" 吗？此操作不可恢复。`)) return;
      users = users.filter(u => u.id !== userId);
      saveDataToLocalStorage();
      if (userState.selectedUserId === userId) userState.selectedUserId = null;
      toast("用户已删除");
      render();
    }

    function bindModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });
      const createForm = modal.querySelector("#createUserForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveUser(formData, false);
          modal.remove();
        });
      }
      const editForm = modal.querySelector("#editUserForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const userId = editForm.dataset.userId;
          saveUser(formData, true, userId);
          modal.remove();
        });
      }
    }

    function filterCustomers() {
      return customers.filter(c => {
        // Category filter
        if (customerState.categoryFilter !== "全部") {
          if (customerState.categoryFilter === "VIP" || customerState.categoryFilter === "重要") {
            if (c.level !== customerState.categoryFilter) return false;
          } else {
            if (c.type !== customerState.categoryFilter) return false;
          }
        }

        // Type filter
        if (customerState.filterType !== "全部" && c.type !== customerState.filterType) return false;

        // Level filter
        if (customerState.filterLevel !== "全部" && c.level !== customerState.filterLevel) return false;

        // Status filter
        if (customerState.filterStatus !== "全部" && c.status !== customerState.filterStatus) return false;

        // Search filter
        if (customerState.searchKeyword) {
          const keyword = customerState.searchKeyword.toLowerCase();
          const searchFields = [
            c.nameZh,
            c.nameEn,
            c.id,
            c.contacts[0]?.name,
            c.contacts[0]?.phone,
            c.addresses[0]?.addressZh,
            c.addresses[0]?.addressEn
          ].map(f => (f || "").toLowerCase());

          return searchFields.some(f => f.includes(keyword));
        }

        return true;
      });
    }

    function paginateCustomers(filtered) {
      const start = (customerState.currentPage - 1) * customerState.pageSize;
      return filtered.slice(start, start + customerState.pageSize);
    }

      return {

        processing: 1 + (idNum % 3),
        completed: 8 + idNum * 2
      };
    }

    function saveCustomer(formData, isEdit = false, customerId = null) {
      if (isEdit) {
        const customer = customers.find(c => c.id === customerId);
        if (customer) {
          customer.nameZh = formData.get("nameZh") || customer.nameZh;
          customer.nameEn = formData.get("nameEn") || customer.nameEn;
          customer.type = formData.get("type") || customer.type;
          customer.level = formData.get("level") || customer.level;
          customer.status = formData.get("status") || customer.status;

          if (customer.contacts.length > 0) {
            customer.contacts[0].name = formData.get("contactName") || customer.contacts[0].name;
            customer.contacts[0].phone = formData.get("contactPhone") || customer.contacts[0].phone;
            customer.contacts[0].whatsapp = formData.get("contactWhatsapp") || customer.contacts[0].whatsapp;
            customer.contacts[0].email = formData.get("contactEmail") || customer.contacts[0].email;
          }

          if (customer.addresses.length > 0) {
            customer.addresses[0].area = formData.get("area") || customer.addresses[0].area;
            customer.addresses[0].addressZh = formData.get("addressZh") || customer.addresses[0].addressZh;
            customer.addresses[0].addressEn = formData.get("addressEn") || customer.addresses[0].addressEn;
            customer.addresses[0].noPhoto = formData.get("noPhoto") === "true";
            customer.addresses[0].noPhotoReason = formData.get("noPhotoReason") || "";
          }

          toast("客户信息已更新");
        }
      } else {
        const newCustomer = {
          id: `CUST-${String(customers.length + 1).padStart(4, "0")}`,
          nameZh: formData.get("nameZh"),
          nameEn: formData.get("nameEn"),
          type: formData.get("type"),
          level: formData.get("level"),
          status: formData.get("status") || "启用",
          contacts: [{
            name: formData.get("contactName"),
            title: "联系人",
            phone: formData.get("contactPhone"),
            whatsapp: formData.get("contactWhatsapp") || "",
            email: formData.get("contactEmail") || ""
          }],
          addresses: [{
            area: formData.get("area") || "未设置",
            addressZh: formData.get("addressZh") || "",
            addressEn: formData.get("addressEn") || "",
            tl: "TL-001",
            noPhoto: formData.get("noPhoto") === "true",
            noPhotoReason: formData.get("noPhotoReason") || ""
          }],
          createdAt: new Date().toISOString().slice(0, 10),
          createdBy: "CS-001"
        };
        customers.unshift(newCustomer);
        saveDataToLocalStorage();
        toast("新客户已创建");
      }
      render();
    }

    function deleteCustomer(customerId) {
      const customer = customers.find(c => c.id === customerId);
      if (!customer) return;
      if (!confirm(`确定要删除客户 "${customer.nameZh}" 吗？此操作不可恢复。`)) return;
      customers = customers.filter(c => c.id !== customerId);
      saveDataToLocalStorage();
      if (customerState.selectedCustomerId === customerId) {
        customerState.selectedCustomerId = null;
      }
      toast("客户已删除");
      render();
    }

    function bindCustomerModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      const createForm = modal.querySelector("#createCustomerForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveCustomer(formData, false);
          modal.remove();
        });
      }

      const editForm = modal.querySelector("#editCustomerForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const customerId = editForm.dataset.customerId;
          saveCustomer(formData, true, customerId);
          modal.remove();
        });
      }
    }

    // 通过 Email 发送报价单
    function sendQuotationEmail(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;

      const customer = customers.find(c => c.id === quotation.customerId);
      const defaultEmail = customer?.contacts?.[0]?.email || '';
      
      const recipient = prompt('请输入收件人邮箱：', defaultEmail);
      if (!recipient) return;

      const remark = prompt('请输入备注信息（可选）：', '') || '';

      if (!quotation.sendRecords) quotation.sendRecords = [];
      
      quotation.sendRecords.push({
        time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        actor: currentRole().name,
        method: 'Email',
        recipient: recipient,
        status: '已发送',
        remark: remark
      });

      saveDataToLocalStorage();
      toast(`报价单已通过 Email 发送至 ${recipient}`);
      render();
    }

    // 报价单电子签名
    function signQuotation(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;

    function filterQuotations() {
      return quotations.filter(q => {
        // Status filter
        if (quotationState.statusFilter !== "全部" && q.status !== quotationState.statusFilter) return false;

        // Ticket status filter
        if (quotationState.filterTicketStatus !== "全部") {
          const ticket = tickets.find(t => t.id === q.ticketId);
          if (!ticket || ticket.status !== quotationState.filterTicketStatus) return false;
        }

        // Customer filter
        if (quotationState.filterCustomer !== "全部" && q.customerId !== quotationState.filterCustomer) return false;

        // Search filter
        if (quotationState.searchKeyword) {
          const keyword = quotationState.searchKeyword.toLowerCase();
          const searchFields = [
            q.id,
            q.ticketId,
            q.customerName,
            q.title
          ].map(f => (f || "").toLowerCase());

          return searchFields.some(f => f.includes(keyword));
        }

        return true;
      });
    }

    function paginateQuotations(filtered) {
      const start = (quotationState.currentPage - 1) * quotationState.pageSize;
      return filtered.slice(start, start + quotationState.pageSize);
    }

    function calculateTax(amount, taxRate) {
      return amount * (1 + taxRate);
    }
