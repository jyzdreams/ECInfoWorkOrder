<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECInfo × DingTalk 工單系統 MVP UI 原型</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafd;
      --text: #1f2937;
      --muted: #687386;
      --line: #dde5f0;
      --primary: #1e6bff;
      --primary-strong: #0b55df;
      --primary-soft: #eaf1ff;
      --sidebar: #10233a;
      --sidebar-2: #0b1b2e;
      --success: #12a56b;
      --success-soft: #e8f8f1;
      --warning: #e99a12;
      --warning-soft: #fff5df;
      --danger: #e5484d;
      --danger-soft: #ffeded;
      --cyan: #0ea5b7;
      --purple: #7c5cff;
      --shadow: 0 12px 32px rgba(16, 35, 58, .08);
      --radius: 8px;
    }

    [data-theme="dark"] {
      --bg: #0d1523;
      --panel: #141f31;
      --panel-soft: #101a2b;
      --text: #e8edf6;
      --muted: #9aa7bb;
      --line: #26354b;
      --primary: #5b8fff;
      --primary-strong: #82a9ff;
      --primary-soft: #16294b;
      --sidebar: #07111f;
      --sidebar-2: #050b14;
      --success-soft: #0e2f25;
      --warning-soft: #35270c;
      --danger-soft: #3a1518;
      --shadow: 0 18px 44px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
      transition: grid-template-columns .3s ease;
    }
    .app.sidebar-collapsed { grid-template-columns: 92px 1fr; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      color: #e9f1ff;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
      border-right: 1px solid rgba(255,255,255,.08);
      padding: 14px 10px;
      overflow: hidden;
      transition: width .3s ease;
    }
    .brand {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      margin-bottom: 10px;
    }
    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2b7cff, #0ba5ff);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(30,107,255,.26);
      flex: 0 0 auto;
    }
    .brand-title {
      white-space: nowrap;
      overflow: hidden;
    }
    .brand-title strong { display: block; font-size: 14px; line-height: 1.2; }
    .brand-title span { display: block; font-size: 11px; color: rgba(233,241,255,.7); margin-top: 3px; }
    .hamburger-btn {
      width: 100%;
      height: 40px;
      border: 0;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      color: #d8e6ff;
      margin: 4px 0 14px;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .hamburger-btn:hover { background: rgba(255,255,255,.12); }
    .nav-list { display: grid; gap: 10px; }
    .nav-item {
      height: 42px;
      border: 0;
      width: 100%;
      color: #d7e5f8;
      background: transparent;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      text-align: left;
      transition: all .2s;
    }
    .nav-item:hover { background: rgba(255,255,255,.08); }
    .nav-item.active { background: #1768ff; color: #fff; box-shadow: 0 8px 18px rgba(23,104,255,.24); }
    
    /* Settings Accordion Styles */
    .nav-item-parent {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .nav-item-settings {
      position: relative;
    }
    .nav-arrow {
      margin-left: auto;
      font-size: 10px;
      transition: transform 0.3s ease;
      color: #d7e5f8;
    }
    .nav-arrow.expanded {
      transform: rotate(90deg);
    }
    .nav-submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-left: 32px;
    }
    .nav-submenu.expanded {
      max-height: 200px;
    }
    .nav-subitem {
      height: 36px;
      border: 0;
      width: 100%;
      color: #d7e5f8;
      background: transparent;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      text-align: left;
      font-size: 13px;
      transition: all 0.2s ease;
    }
    .nav-subitem:hover {
      background: rgba(30, 107, 255, 0.15);
    }
    .nav-subitem.active {
      background: rgba(30, 107, 255, 0.25);
      color: #fff;
      font-weight: 500;
    }
    
    .nav-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px;
      flex: 0 0 auto;
    }
    
    /* Collapsed Sidebar Styles */
    .app.sidebar-collapsed .brand-title,
    .app.sidebar-collapsed .nav-label,
    .app.sidebar-collapsed .nav-arrow { display: none; }
    .app.sidebar-collapsed .brand { justify-content: center; padding: 0; }
    .app.sidebar-collapsed .nav-list { gap: 10px; }
    .app.sidebar-collapsed .nav-item {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      padding: 0;
      justify-content: center;
      margin: 0 auto;
    }
    .app.sidebar-collapsed .nav-item-parent {
      position: relative;
    }
    .app.sidebar-collapsed .nav-item-settings {
      position: relative;
    }
    .app.sidebar-collapsed .nav-submenu {
      display: none;
    }
    .app.sidebar-collapsed .nav-icon {
      width: 28px;
      height: 28px;
      font-size: 14px;
    }
    
    /* Collapsed button with single character */
    .nav-collapsed-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-collapsed-char {
      font-size: 18px;
      font-weight: 600;
      color: #d7e5f8;
    }
    .nav-collapsed-btn.active .nav-collapsed-char {
      color: #fff;
    }
    
    /* Tooltip for collapsed sidebar */
    .nav-tooltip {
      position: fixed;
      left: 100px;
      top: 50%;
      transform: translateY(-50%);
      background: #fff;
      color: #1e293b;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      white-space: nowrap;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    .nav-tooltip.show {
      opacity: 1;
    }
    
    /* Settings Popover for collapsed sidebar */
    .settings-popover {
      position: fixed;
      left: 100px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      z-index: 1000;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .settings-popover.show {
      opacity: 1;
      pointer-events: auto;
    }
    .settings-popover-item {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border: 0;
      width: 100%;
      background: transparent;
      color: #1e293b;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s;
    }
    .settings-popover-item:hover {
      background: rgba(30, 107, 255, 0.08);
    }
    .settings-popover-item.active {
      background: #1e6bff;
      color: #fff;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    /* 第一層：系統級導航 */
    .topbar-system {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(244,247,251,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      transition: all 0.25s ease;
    }
    [data-theme="dark"] .topbar-system { background: rgba(13,21,35,.92); }
    .topbar-system-left, .topbar-system-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    /* 第二層：工作區導航 */
    .topbar-workspace {
      position: sticky;
      top: 64px;
      z-index: 99;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      transition: all 0.25s ease;
    }
    [data-theme="dark"] .topbar-workspace { background: #1a2332; }
    .topbar-workspace-left, .topbar-workspace-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-heading {
      min-width: 170px;
      display: grid;
      gap: 2px;
    }
    .page-heading h1 { margin: 0; font-size: 18px; line-height: 1.2; }
    .page-heading p { margin: 0; font-size: 12px; color: var(--muted); }
    .segmented {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 3px 14px rgba(15, 23, 42, .04);
    }
    .segmented button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      height: 30px;
      padding: 0 11px;
      white-space: nowrap;
    }
    .segmented button.active { background: var(--primary); color: #fff; }
    .toolbar-btn, .primary-btn, .secondary-btn, .danger-btn, .ghost-btn {
      height: 34px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .primary-btn {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 16px rgba(30,107,255,.18);
    }
    .primary-btn:hover { background: var(--primary-strong); }
    .secondary-btn { background: var(--primary-soft); color: var(--primary-strong); border-color: transparent; }
    .danger-btn { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
    .ghost-btn { background: transparent; }

    .user-menu { position: relative; }
    .user-card {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 10px;
      min-width: 190px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .user-meta { min-width: 0; text-align: left; }
    .user-meta strong { display: block; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta span { display: block; color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown {
      position: absolute;
      right: 0;
      top: 48px;
      width: 190px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 6px;
      display: none;
    }
    .dropdown.open { display: block; }
    .dropdown button {
      width: 100%;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      text-align: left;
      padding: 0 10px;
    }
    .dropdown button:hover { background: var(--panel-soft); }

    .content {
      padding: 20px 22px 28px;
      min-width: 0;
    }
    .page {
      display: none;
      animation: fade .12s ease-out;
    }
    .page.active { display: block; }
    @keyframes fade { from { opacity: .4; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .grid { display: grid; gap: 14px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cols-8 { grid-template-columns: repeat(8, minmax(118px, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      min-width: 0;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card h2, .card h3 { margin: 0; font-size: 15px; }
    .card p { color: var(--muted); margin: 5px 0 0; font-size: 12px; line-height: 1.5; }
    .muted { color: var(--muted); }

    .stat-card {
      min-height: 92px;
      display: grid;
      gap: 8px;
      align-content: space-between;
      border-left: 3px solid var(--primary);
    }
    .stat-card .stat-label { color: var(--muted); font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .stat-card .stat-value { font-size: 24px; font-weight: 800; }
    .stat-card .stat-note { font-size: 11px; color: var(--muted); }

    .chip, .status-pill, .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .chip { background: var(--panel-soft); color: var(--muted); border-color: var(--line); }
    .tag { background: var(--primary-soft); color: var(--primary-strong); }
    .urgent { background: var(--danger-soft); color: var(--danger); }
    .status-待分派 { background: #fff5df; color: #bf7600; }
    .status-待確認 { background: #e8fbff; color: #08798a; }
    .status-待處理 { background: #e8f5e9; color: #2e7d32; }
    .status-處理中 { background: #eef0ff; color: #6550d9; }
    .status-待確認 { background: #fff3e0; color: #e65100; }
    .status-已完成 { background: #e8f8f1; color: #08764a; }
    .status-已取消 { background: #f0f2f5; color: #667085; }
    [data-theme="dark"] .status-待分派 { background: #3a2b11; color: #ffc96b; }
    [data-theme="dark"] .status-待確認 { background: #123641; color: #73d9e6; }
    [data-theme="dark"] .status-待處理 { background: #1a3a1a; color: #81c784; }
    [data-theme="dark"] .status-處理中 { background: #28244e; color: #b6adff; }
    [data-theme="dark"] .status-待確認 { background: #3e2723; color: #ffab91; }
    [data-theme="dark"] .status-已完成 { background: #123726; color: #7be0b4; }
    [data-theme="dark"] .status-已取消 { background: #252b36; color: #b8c0cc; }

    .data-table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }
    th { color: var(--muted); font-weight: 700; background: var(--panel-soft); }
    td .link-btn {
      border: 0;
      background: transparent;
      color: var(--primary-strong);
      padding: 0;
      font-weight: 700;
      text-align: left;
    }
    .ellipsis { max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .filters {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 10px;
      outline: none;
    }
    .field textarea { min-height: 86px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,107,255,.12); }
    .required::after { content: " *"; color: var(--danger); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .form-grid .wide { grid-column: 1 / -1; }
    .form-section { margin-bottom: 14px; }
    .form-section h3 { margin: 0 0 10px; font-size: 14px; }

    .split-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(360px, 1.3fr) minmax(250px, .9fr);
      gap: 14px;
      align-items: start;
    }
    .detail-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .detail-title { display: grid; gap: 5px; }
    .detail-title h2 { margin: 0; font-size: 20px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .info-list { display: grid; gap: 9px; }
    .info-row {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .info-row span:first-child { color: var(--muted); }
    .timeline { position: relative; display: grid; gap: 12px; }
    .timeline::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--line);
    }
    .timeline-item {
      position: relative;
      padding-left: 30px;
      display: grid;
      gap: 4px;
    }
    .timeline-dot {
      position: absolute;
      left: 3px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--panel);
    }
    .timeline-item strong { font-size: 13px; }
    .timeline-item p { margin: 0; font-size: 12px; color: var(--muted); }

    .photo-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .photo-thumb {
      aspect-ratio: 4 / 3;
      border-radius: 7px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(30,107,255,.16), rgba(18,165,107,.12)),
        repeating-linear-gradient(45deg, transparent 0 10px, rgba(104,115,134,.08) 10px 18px);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
    }

    .dispatch-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 20px;
      align-items: start;
      height: calc(100vh - 180px);
    }
    .dispatch-left, .dispatch-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }
    .dispatch-left {
      height: calc(100vh - 180px);
    }
    .dispatch-right {
      height: calc(100vh - 180px);
    }
    .dispatch-section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .dispatch-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dispatch-section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
    }
    .dispatch-pending-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dispatch-ticket-card {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .dispatch-ticket-card:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .dispatch-ticket-card.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      box-shadow: 0 0 0 2px rgba(30,107,255,.1);
    }
    .dispatch-ticket-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dispatch-ticket-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .dispatch-ticket-meta {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .dispatch-ticket-desc {
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dispatch-confirm-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    .dispatch-confirm-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .dispatch-confirm-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      background: var(--panel-soft);
      border-radius: 6px;
      font-size: 12px;
    }
    .dispatch-confirm-item.full-width {
      grid-column: 1 / -1;
    }
    .dispatch-confirm-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .dispatch-confirm-value {
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
    }
    .dispatch-master-card {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .dispatch-master-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary-strong);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 14px;
    }
    .dispatch-master-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .dispatch-master-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .dispatch-master-meta {
      font-size: 11px;
      color: var(--muted);
    }
    .dispatch-recommend-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dispatch-master-recommend {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .dispatch-master-recommend:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .dispatch-master-recommend.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      box-shadow: 0 0 0 2px rgba(30,107,255,.1);
    }
    .dispatch-master-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .dispatch-master-tag {
      font-size: 10px;
      padding: 2px 6px;
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 4px;
    }
    .dispatch-assigned-table {
      flex: 1;
      overflow-y: auto;
    }
    .dispatch-assigned-table table {
      width: 100%;
      font-size: 12px;
    }
    .dispatch-assigned-table th {
      background: var(--panel-soft);
      padding: 8px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      color: var(--muted);
      position: sticky;
      top: 0;
    }
    .dispatch-assigned-table td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
    }
    .dispatch-assigned-table tr:hover {
      background: var(--panel-soft);
    }
    .ticket-mini, .master-card {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      padding: 11px;
      display: grid;
      gap: 7px;
      margin-bottom: 10px;
    }
    .ticket-mini.active, .master-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30,107,255,.1);
    }
    .master-card { grid-template-columns: 42px 1fr auto; align-items: center; }
    .master-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary-strong);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .bar-row { display: grid; grid-template-columns: 82px 1fr 38px; gap: 9px; align-items: center; margin: 9px 0; font-size: 12px; }
    .bar-track { height: 8px; background: var(--panel-soft); border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); border-radius: 999px; }
    .trend { height: 164px; display: flex; align-items: end; gap: 10px; padding-top: 10px; }
    .trend-col { flex: 1; display: grid; gap: 6px; align-items: end; justify-items: center; color: var(--muted); font-size: 11px; }
    .trend-bar { width: 100%; max-width: 24px; background: var(--primary); border-radius: 6px 6px 0 0; min-height: 18px; }

    .settings-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .settings-tabs button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      height: 32px;
      padding: 0 12px;
    }
    .settings-tabs button.active { border-color: var(--primary); background: var(--primary); color: #fff; }

    .mobile-stage {
      min-height: calc(100vh - 66px);
      display: grid;
      place-items: start center;
      padding: 28px 18px;
    }
    .phone {
      width: min(390px, 100%);
      height: 844px;
      max-height: calc(100vh - 92px);
      border: 10px solid #111827;
      border-radius: 34px;
      background: var(--panel);
      box-shadow: 0 18px 54px rgba(15,23,42,.24);
      overflow: hidden;
      display: grid;
      grid-template-rows: 54px 1fr 64px;
    }
    .phone-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .phone-title { display: grid; gap: 2px; }
    .phone-title strong { font-size: 14px; }
    .phone-title span { font-size: 11px; color: var(--muted); }
    .phone-body {
      overflow-y: auto;
      padding: 12px;
      background: var(--bg);
    }
    .phone-tabs {
      display: flex;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    .phone-tabs button {
      flex: 1;
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 12px;
      padding: 8px 2px;
      white-space: nowrap;
    }
    .phone-tabs button.active { color: var(--primary-strong); font-weight: 700; }
    .mobile-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      display: grid;
      gap: 9px;
    }
    .mobile-card-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .mobile-actions { display: flex; gap: 8px; }
    .mobile-actions button { flex: 1; }
    .fixed-mobile-actions {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding-top: 10px;
      background: linear-gradient(180deg, transparent, var(--bg) 18%);
    }

    /* ===== Mobile Dispatch Center (md- prefix) ===== */
    .md-page { display: flex; flex-direction: column; gap: 16px; }
    .md-section { display: flex; flex-direction: column; gap: 12px; }
    .md-section-title { font-size: 14px; font-weight: 700; color: var(--sidebar); padding: 2px 0; }
    .md-empty {
      background: var(--panel); border: 1px dashed var(--line); border-radius: 10px;
      padding: 24px 14px; text-align: center; color: var(--muted); font-size: 13px;
    }
    .md-ticket-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; cursor: pointer; transition: border-color .15s, background .15s;
      display: flex; flex-direction: column; gap: 6px; min-height: 110px; max-height: 130px; overflow: hidden;
    }
    .md-ticket-card.selected { border-color: var(--primary); background: var(--primary-soft); }
    .md-ticket-head { display: flex; align-items: center; justify-content: space-between; }
    .md-ticket-head strong { font-size: 14px; color: var(--sidebar); }
    .md-ticket-info { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .md-dot { color: var(--muted); }
    .md-ticket-meta { font-size: 12px; color: var(--muted); }
    .md-ticket-desc {
      font-size: 12px; color: var(--muted); overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4;
    }
    .md-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .md-tag-warning { background: var(--warning-soft); color: var(--warning); }
    .md-tag-primary { background: var(--primary-soft); color: var(--primary); }
    .md-master-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .md-master-card.selected { border-color: var(--primary); background: var(--primary-soft); }
    .md-master-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: #fff;
      display: grid; place-items: center; font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .md-master-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .md-master-head { display: flex; align-items: center; gap: 8px; }
    .md-master-head strong { font-size: 14px; color: var(--sidebar); }
    .md-master-skills { font-size: 12px; color: var(--muted); }
    .md-master-stats { font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .md-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--line); flex-shrink: 0; position: relative; }
    .md-radio.checked { border-color: var(--primary); }
    .md-radio.checked::after { content: ""; position: absolute; inset: 3px; border-radius: 50%; background: var(--primary); }
    .md-confirm-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      padding: 14px; display: flex; flex-direction: column; gap: 14px;
    }
    .md-confirm-group { display: flex; flex-direction: column; gap: 8px; }
    .md-confirm-label { font-size: 13px; font-weight: 700; color: var(--primary); border-bottom: 1px solid var(--line); padding-bottom: 4px; }
    .md-confirm-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; gap: 10px; }
    .md-confirm-row span { color: var(--muted); flex-shrink: 0; }
    .md-confirm-row strong { color: var(--text); font-weight: 600; text-align: right; }
    .md-textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px;
      font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text);
      resize: vertical; box-sizing: border-box;
    }
    .md-textarea:focus { outline: none; border-color: var(--primary); }
    .md-submit-bar {
      position: sticky; bottom: 0; left: 0; right: 0; padding: 12px 0 4px;
      background: linear-gradient(180deg, transparent, var(--bg) 18%); z-index: 5;
    }
    .md-submit-btn {
      width: 100%; padding: 14px; border: 0; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .md-submit-btn:active { opacity: .9; }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: var(--sidebar);
      color: #fff;
      border-radius: 8px;
      min-width: 220px;
      padding: 12px 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.2);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: .18s ease;
      z-index: 60;
      font-size: 13px;
    }
    .toast.show { opacity: 1; transform: none; }
    .toast.toast-error { background: var(--danger); }
    .toast.toast-success { background: var(--success); }

    /* ===== Service Report Module (sr- prefix) ===== */
    .sr-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      display: grid;
      gap: 12px;
    }
    .sr-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      padding-left: 10px;
      border-left: 3px solid var(--primary);
      line-height: 1.4;
    }
    .sr-field { margin-bottom: 12px; }
    .sr-field:last-child { margin-bottom: 0; }
    .sr-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .sr-label .sr-required { color: var(--danger); margin-left: 2px; }
    .sr-input, .sr-select, .sr-textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      background: var(--panel);
      box-sizing: border-box;
      font-family: inherit;
    }
    .sr-input:focus, .sr-select:focus, .sr-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }
    .sr-textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.5;
      padding-right: 40px;
    }
    .sr-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .sr-chip {
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      background: var(--panel);
      user-select: none;
      transition: all .15s ease;
    }
    .sr-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .sr-radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .sr-radio {
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      background: var(--panel);
      user-select: none;
      transition: all .15s ease;
    }
    .sr-radio.active {
      background: var(--primary-soft);
      color: var(--primary-strong);
      border-color: var(--primary);
      font-weight: 700;
    }
    .sr-textarea-wrap { position: relative; }
    .sr-voice-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--primary);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
    }
    .sr-voice-btn:hover { background: var(--primary-soft); }
    .sr-photo-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .sr-photo-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .sr-photo-col .sr-label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text); }
    .sr-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .sr-photo-thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--primary-soft);
      display: grid;
      place-items: center;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 4px;
      overflow: hidden;
      word-break: break-all;
    }
    .sr-photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .sr-photo-add {
      border: 2px dashed var(--line);
      cursor: pointer;
      color: var(--primary);
      font-size: 24px;
      background: var(--panel-soft);
      font-weight: 300;
    }
    .sr-photo-add:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .sr-photo-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
      display: grid;
      place-items: center;
      line-height: 1;
      padding: 0;
    }
    .sr-switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sr-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--line);
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s ease;
      flex-shrink: 0;
    }
    .sr-switch.active { background: var(--primary); }
    .sr-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s ease;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      pointer-events: none;
    }
    .sr-switch.active::after { transform: translateX(20px); }
    .sr-switch-label { font-size: 13px; font-weight: 700; }
    .sr-quotation-section {
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      display: grid;
      gap: 12px;
    }
    .sr-parts { display: grid; gap: 8px; }
    .sr-part-item {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sr-part-item .sr-part-name { flex: 1; }
    .sr-part-item .sr-part-qty { width: 70px; flex: none; }
    .sr-part-remove {
      width: 30px;
      height: 30px;
      border: none;
      background: var(--danger-soft);
      color: var(--danger);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      padding: 0;
    }
    .sr-add-part-btn {
      padding: 6px 12px;
      border: 1px dashed var(--primary);
      border-radius: 8px;
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
    }
    .sr-signature {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .sr-signature-canvas {
      display: block;
      width: 100%;
      height: 150px;
      touch-action: none;
      cursor: crosshair;
      background: var(--panel-soft);
    }
    .sr-signature-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .sr-signature-clear {
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--danger);
      font-size: 12px;
      cursor: pointer;
    }
    .sr-satisfaction {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .sr-satisfaction-btn {
      padding: 8px 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      color: var(--muted);
      transition: all .15s ease;
      line-height: 1.6;
    }
    .sr-satisfaction-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      font-weight: 700;
    }
    .sr-satisfaction-btn .sr-emoji { font-size: 20px; display: block; }
    .sr-error {
      color: var(--danger);
      font-size: 12px;
      margin-top: 4px;
    }
    .sr-submit-bar {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 0;
      background: linear-gradient(180deg, transparent, var(--bg) 18%);
      z-index: 5;
    }
    .sr-submit-bar .primary-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
    }
    .sr-hidden { display: none !important; }

    @media (max-width: 1180px) {
      .cols-8 { grid-template-columns: repeat(4, minmax(130px, 1fr)); }
      .filters { grid-template-columns: repeat(3, minmax(130px, 1fr)); }
      .split-layout, .dispatch-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; display: none; }
      .topbar-system { position: static; flex-direction: column; align-items: stretch; height: auto; padding: 12px 24px; }
      .topbar-system-left, .topbar-system-right { flex-wrap: wrap; justify-content: center; }
      .topbar-workspace { position: static; flex-direction: column; align-items: stretch; height: auto; padding: 12px 24px; }
      .topbar-workspace-left, .topbar-workspace-right { flex-wrap: wrap; justify-content: center; }
      .content { padding: 14px; }
      .cols-2, .cols-3, .cols-4, .cols-8 { grid-template-columns: 1fr; }
      .filters, .form-grid { grid-template-columns: 1fr; }
      .user-card { min-width: 160px; }
      .phone { height: calc(100vh - 120px); border-width: 6px; border-radius: 26px; }
    }

    /* ===== User Management Module ===== */
    .um-layout {
      display: grid;
      grid-template-columns: 20% 45% 35%;
      gap: 14px;
      align-items: start;
      min-height: calc(100vh - 180px);
    }
    .um-role-sidebar, .um-list-panel, .um-detail-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;

    // 角色映射表：系統角色 -> 通知角色
    const ROLE_MAP = {
      CS: "CS",
      TL: "TEAM_LEADER",
      MASTER: "MASTER",
      ADMIN: "ADMIN",
      SUPERVISOR: "SUPERVISOR"
    };

    // 獲取當前角色對應的用戶ID
    function getCurrentUserId() {
      if (state.currentPerson) {
        return state.currentPerson.id;
      }
      const role = currentRole();
      const user = users.find(u => u.name === role.name);
      return user ? user.id : null;
    }

    // 獲取當前角色對應的通知角色類型
    function getCurrentNotificationRole() {
      return ROLE_MAP[state.role] || "CS";
    }

    // 獲取用戶收到的通知
    // 匹配規則：
    // 1. receiverRole === "ALL" → 所有人可見
    // 2. receiverRole 匹配當前角色 → 該角色羣體可見
    // 3. 如果同時指定了 receiverId，則必須 receiverId 也匹配當前用戶
    function getUserNotifications() {
      const userId = getCurrentUserId();
      const notifRole = getCurrentNotificationRole();
      
      return notifications.filter(n => {
        // 全局通知：所有人可見
        if (n.receiverRole === "ALL") {
          return true;
        }
        
        // 檢查角色是否匹配
        const roleMatches = n.receiverRole === notifRole;
        if (!roleMatches) {
          return false;
        }
        
        // 如果指定了具體的 receiverId（且不是 "ALL"），則必須匹配當前用戶
        if (n.receiverId && n.receiverId !== "ALL") {
          return n.receiverId === userId;
        }
        
        // 否則只要角色匹配即可（發送給該角色的所有人）
        return true;
      });
    }

    }

    // 獲取所有未讀通知數量（包括所有級別）
    function getUnreadCount() {

    // 渲染通知列表（面板頭部顯示 Action 級別的未讀數）
    function renderNotifications() {
      const userNotis = getUserNotifications().slice(0, 50);
      const actionUnreadCount = getUnreadActionCount();

      if (userNotis.length === 0) {
        return `
          <div class="noti-panel-head">
            <h3>🔔 通知</h3>
          </div>
          <div class="noti-panel-body">
            <div class="noti-empty">
              <div class="icon">🔔</div>
              <div>暫無通知</div>
            </div>
          </div>
        `;
      }

      return `
        <div class="noti-panel-head">
          <h3>🔔 通知 ${actionUnreadCount > 0 ? `<span class="noti-unread-tag">${actionUnreadCount} 待處理</span>` : ""}</h3>
          ${actionUnreadCount > 0 ? `<button class="noti-mark-all" data-mark-all-read>全部已讀</button>` : ""}
        </div>
        <div class="noti-panel-body">
          ${userNotis.map(n => {
            const moduleInfo = NOTIFICATION_MODULES[n.module] || NOTIFICATION_MODULES.system;
            return `
              <div class="noti-card ${!n.isRead ? "unread" : ""}" data-open-notification="${n.id}">
                <div class="noti-icon level-${n.level}">${moduleInfo.icon}</div>
                <div class="noti-body">
                  <p class="noti-title">
                    <span class="noti-level-dot ${n.level}"></span>
                    ${escapeHtml(n.title)}
                  </p>
                  <p class="noti-content">${escapeHtml(n.content)}</p>
                  ${n.subContent ? `<p class="noti-sub">${escapeHtml(n.subContent)}</p>` : ""}
                  <p class="noti-time">${n.createdAt}</p>
                </div>
              </div>
            `;
          }).join("")}
        </div>
        <div class="noti-panel-foot">
          <button>查看最近50條通知</button>
        </div>
      `;
    }

    // 打開通知（點擊通知後跳轉）
    function openNotification(notificationId) {
      const notification = notifications.find(n => n.id === notificationId);
      if (!notification) return;

      // 標記爲已讀
      markAsRead(notificationId);

      // 跳轉到對應頁面
      if (notification.targetPage) {
        // 客戶管理和用戶管理現在在基礎設置下
        if (notification.targetPage === "customers") {
          state.page = "settings";
          state.settingsTab = "customer";
          state.isSettingsExpanded = true;
        } else if (notification.targetPage === "users") {
          state.page = "settings";
          state.settingsTab = "user";
          state.isSettingsExpanded = true;
        } else {
          state.page = notification.targetPage;
        }
        state.view = "pc";

        // 根據模塊設置選中ID
        if (notification.module === "ticket" && notification.targetId) {
          // 工單通知跳轉到工單管理頁面並打開詳情 Drawer
          workOrderState.selectedWorkOrderId = notification.targetId;
        } else if (notification.module === "quotation" && notification.targetId) {
          quotationState.selectedQuotationId = notification.targetId;
        } else if (notification.module === "customer" && notification.targetId) {
          customerState.selectedCustomerId = notification.targetId;
        } else if (notification.module === "user" && notification.targetId) {
          userState.selectedUserId = notification.targetId;
        }

        render();
      }

      // 關閉通知面板
      closeNotificationPanel();
    }

    // 標記單條通知爲已讀
    function markAsRead(notificationId) {
      const notification = notifications.find(n => n.id === notificationId);
      if (notification) {
        notification.isRead = true;
        renderNotificationBell();
        // 如果面板打開，重新渲染
        if (notificationState.panelOpen) {
          const panel = $("#notiPanel");
          if (panel) panel.innerHTML = renderNotifications();
        }
      }
    }

    // 標記所有通知爲已讀
    function markAllAsRead() {
      getUserNotifications().forEach(n => { n.isRead = true; });
      renderNotificationBell();
      // 如果面板打開，重新渲染
      if (notificationState.panelOpen) {
        const panel = $("#notiPanel");
        if (panel) panel.innerHTML = renderNotifications();
      }
      toast("已將所有通知標記爲已讀");
    }

    // 刪除通知
    function deleteNotification(notificationId) {
      notifications = notifications.filter(n => n.id !== notificationId);
      renderNotificationBell();
      if (notificationState.panelOpen) {
        const panel = $("#notiPanel");
        if (panel) panel.innerHTML = renderNotifications();
      }
    }

    // 創建通知 - 統一入口
    // 所有模塊的業務事件都通過此函數發送通知
    function createNotification({ module, level, title, content, subContent, targetPage, targetId, receiverId, receiverRole }) {
      const newNoti = {
        id: `NOTI-${Date.now()}`,
        module: module || "system",
        level: level || "info",
        title: title || "",
        content: content || "",
        subContent: subContent || "",
        targetPage: targetPage || "",
        targetId: targetId || "",
        receiverId: receiverId || "ALL",
        receiverRole: receiverRole || "ALL",
        isRead: false,
        createdAt: new Date().toLocaleString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).replace(/\//g, "-")
      };
      notifications.unshift(newNoti);
      renderNotificationBell();
      return newNoti;
    }

    // 業務事件通知規則映射表
    // 格式: 事件名 -> { module, level, title, targetPage, receiverRole/ receiverId 獲取方式 }
    const NOTIFICATION_RULES = {
      "ticket.created": {
        module: "ticket",
        level: "action",
        title: "新工單待分派",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給工單所屬團隊的 Team Leader
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket) {
            const tl = users.find(u => u.role === "TL" && u.area === ticket.area);
            return { receiverId: tl?.id, receiverRole: "TEAM_LEADER" };
          }
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "ticket.assigned": {
        module: "ticket",
        level: "action",
        title: "工單待確認",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給被分派的師傅
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket && ticket.master) {
            const master = users.find(u => u.name === ticket.master);
            return { receiverId: master?.id, receiverRole: "MASTER" };
          }
          return { receiverRole: "MASTER" };
        }
      },
      "ticket.rejected": {
        module: "ticket",
        level: "action",
        title: "工單被拒單",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給 Team Leader
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket) {
            const tl = users.find(u => u.role === "TL" && u.area === ticket.area);
            return { receiverId: tl?.id, receiverRole: "TEAM_LEADER" };
          }
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "ticket.timeout.warning": {
        module: "ticket",
        level: "warning",
        title: "工單即將超時",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給師傅和 Team Leader
          return { receiverRole: "MASTER" }; // 實際應同時發給 MASTER 和 TL
        }
      },
      "ticket.completed": {
        module: "ticket",
        level: "success",
        title: "工單已完成",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給 CS
          return { receiverRole: "CS" };
        }
      },
      "quotation.created": {
        module: "quotation",
        level: "info",
        title: "新增報價",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 發送給報價負責人
          const quotation = quotations.find(q => q.id === data.quotationId);
          if (quotation) {
            const owner = users.find(u => u.name === quotation.owner);
            return { receiverId: owner?.id, receiverRole: getCurrentRoleType() };
          }
          return { receiverRole: getCurrentRoleType() };
        }
      },
      "quotation.pending.confirm": {
        module: "quotation",
        level: "action",
        title: "客戶待確認報價",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 發送給 CS
          return { receiverRole: "CS" };
        }
      },
      "quotation.confirmed": {
        module: "quotation",
        level: "success",
        title: "報價已確認",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 發送給 CS 和 Team Leader
          return { receiverRole: "CS" };
        }
      },
      "quotation.expiring": {
        module: "quotation",
        level: "warning",
        title: "報價即將過期",
        targetPage: "quotations",
        getReceiver: (data) => {
          return { receiverRole: getCurrentRoleType() };
        }
      },
      "quotation.need.revision": {
        module: "quotation",
        level: "action",
        title: "報價需修訂",
        targetPage: "quotations",
        getReceiver: (data) => {
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "customer.created": {
        module: "customer",
        level: "info",
        title: "新增客戶",
        targetPage: "customers",
        getReceiver: (data) => {
          // 發送給 CS

      "customer.updated": {

      "user.created": {

    // 觸發業務事件通知
    function triggerNotification(eventName, data = {}) {
      const rule = NOTIFICATION_RULES[eventName];
      if (!rule) return;

      const receiver = rule.getReceiver(data);
      const ticket = data.ticketId ? tickets.find(t => t.id === data.ticketId) : null;
      const quotation = data.quotationId ? quotations.find(q => q.id === data.quotationId) : null;
      const customer = data.customerId ? customers.find(c => c.id === data.customerId) : null;

      let content = "";
      let subContent = "";
      let targetId = "";

      if (ticket) {
        content = ticket.id;
        subContent = ticket.customer;
        targetId = ticket.id;
      } else if (quotation) {
        content = quotation.id;
        subContent = quotation.customerName;
        targetId = quotation.id;
      } else if (customer) {
        content = customer.id;
        subContent = customer.nameZh;
        targetId = customer.id;
      } else if (data.userId) {
        const user = users.find(u => u.id === data.userId);
        content = data.userId;
        subContent = user?.name || "";
        targetId = data.userId;
      }

      createNotification({
        module: rule.module,
        level: rule.level,
        title: rule.title,
        content: content,
        subContent: subContent,
        targetPage: rule.targetPage,
        targetId: targetId,
        receiverId: receiver.receiverId,
        receiverRole: receiver.receiverRole
      });
    }


    function performAction(action, id) {
      const t = ticketById(id);
      if (action === "view") {
        state.selectedTicketId = id;
        state.page = "detail";
        state.view = "pc";
        render();
        return;
      }
      if (action === "accept") {
        updateTicket(id, { status: "待確認", owner: t.tl || "李組長" }, "CS 已受理，確認需要派工，進入待確認。");
      }
      if (action === "cancel") {
        updateTicket(id, { status: "已取消", owner: currentRole().name, cancelReason: "原型模擬取消" }, "工單已取消。");
      }
      if (action === "closeDirect") {
        const closeReason = prompt("請輸入關單原因（現場解決/電話解決/簡單諮詢等）：", "現場解決");
        if (!closeReason) return;
        updateTicket(id, { status: "已完成", owner: currentRole().name, closeReason: closeReason }, `CS 直接完成：${closeReason}`);
      }
      if (action === "assign") {
        state.selectedDispatchId = id;
        state.page = "dispatch";
        state.view = "pc";
        render();
        toast("請在分派中心選擇師傅並確認分派");
        return;
      }
      if (action === "take") {
        const eta = prompt("請輸入預計到達時間（例如：30分鐘、14:30、下午3點）：");
        if (eta === null) return;
        const updates = { status: "待處理", owner: currentRole().name, master: currentRole().name };
        if (eta) updates.estimatedArrival = eta;
        updateTicket(id, updates, eta ? `師傅已接單，預計 ${eta} 到達。` : "師傅已接單，進入待處理。");
      }
      if (action === "submitResult") {
        // Sync current DOM values to ticket/state before reading
        srSyncInputs();

        // Collect field values
        const get = (id) => { const el = document.getElementById(id); return el ? el.value.trim() : ""; };
        const serviceReportNo = get("serviceReportNo");
        const arrivalTime = get("arrivalTime");
        const completionTime = get("completionTime");
        const completedWork = get("completedWork");
        const faultResult = get("faultResult");
        const quotationNote = get("quotationNote");
        const paperHolder = get("paperHolder");

        // Validation: SR number must be 6 digits
        if (!serviceReportNo.match(/^\d{6}$/)) {
          alert("服務報告 (SR) 編號必須是6位數字");
          document.getElementById("serviceReportNo")?.focus();
          return;
        }

        // Validation: completed work
        if (!completedWork) {
          alert("請填寫完成工作");
          document.getElementById("completedWork")?.focus();
          return;
        }

        // Validation: fault result
        if (!faultResult) {
          alert("請填寫故障原因/處理結果");
          document.getElementById("faultResult")?.focus();
          return;
        }

        // Validation: satisfaction
        if (!state.srSatisfaction) {
          alert("請選擇客戶滿意度");
          return;
        }

        // Validation: completion paper
        const hasCompletionPaper = t.quotationId && quotations.find(q => q.id === t.quotationId)?.procurementStatus === "已到貨";
        if (hasCompletionPaper && !t.completionPaperPhoto) {
          alert("請上傳完工紙照片");
          return;
        }

        // Build updates object with all new fields
        const updates = {
          status: "已完成",
          owner: t.tl,
          serviceReportNo: serviceReportNo,
          arrivalTime: arrivalTime,
          completionTime: completionTime,
          srArea: t.srArea || "",
          srSystems: [...(t.srSystems || [])],
          srObjectives: [...(t.srObjectives || [])],
          srSystemOther: t.srSystemOther || "",
          srObjectiveOther: t.srObjectiveOther || "",
          srObjectiveAmount: parseFloat(t.srObjectiveAmount) || 0,
          completedWork: completedWork,
          faultResult: faultResult,
          serviceReportText: faultResult,
          photos: [...(t.attachments || [])],
          serviceReportPhotos: [...(t.serviceReportPhotos || [])],
          needQuotation: state.srNeedQuotation,
          quotationNote: state.srNeedQuotation ? quotationNote : "",
          parts: state.srNeedQuotation ? state.srParts.map(p => ({ name: p.name, qty: parseInt(p.qty) || 1 })) : [],
          satisfaction: state.srSatisfaction,
          transportFee: parseFloat($('[data-sr-input="transportFee"]')?.value) || 0
        };

        if (paperHolder) {
          updates.paperHolder = paperHolder;
        }

        // Notify quotation team if newly marked as needing quotation
        if (state.srNeedQuotation && !t.needQuotation) {
          const quotationUsers = users.filter(u => u.role === "QUO" && isEnabled(u.status));
          quotationUsers.forEach(user => {
            createNotification({
              module: "ticket",
              level: "action",
              title: "工單需要報價",
              content: t.id,
              subContent: t.customer,
              targetPage: "workorder",
              targetId: t.id,
              receiverId: user.id,
              receiverRole: "QUO"
            });
          });
        }

        // Reset SR UI state for next ticket
        state.srInitialized = false;

        // 離線模式：保存到 outbox，待恢復網絡後上傳
        if (state.online === false) {
          saveToOfflineOutbox('workrecord', {
            ticketId: id,
            ...updates
          });
          toast(`📱 已離線保存處理記錄（SR: ${serviceReportNo}），待恢復網絡後自動上傳`, "success");
          setMobilePage("tasks");
          return;
        }

        updateTicket(id, updates, "師傅提交服務報告和現場記錄，工單已完成。");
      }
      if (action === "confirmClose") {
        updateTicket(id, { status: "已完成", owner: currentRole().name }, "確認處理結果通過，工單已完成。");
      }
      if (action === "returnWork") {
        updateTicket(id, { status: "處理中", owner: t.master || "周師傅" }, "確認不通過，退回師傅繼續處理。");
      }
      if (action === "note") {
        updateTicket(id, {}, "補充信息：已在原型中記錄備註。");
      }
      if (action === "startWork") {
        updateTicket(id, { status: "處理中", owner: currentRole().name }, "師傅開始現場處理，進入處理中。");
      }
      if (action === "urge") {
        // 催單功能
        const urgeContent = prompt("請輸入催單內容：");
        if (urgeContent) {
          const urgeRecord = {
            time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
            actor: currentRole().name,
            text: `客戶催單：${urgeContent}`
          };
          if (!t.urgeRecords) t.urgeRecords = [];
          t.urgeRecords.push(urgeRecord);
          t.urgeCount = (t.urgeCount || 0) + 1;
          updateTicket(id, {}, `客戶催單 ${t.urgeCount} 次：${urgeContent}`);
          toast("催單已記錄，已通知TL和師傅");
        }
      }
      if (action === "editTicket") {
        // TL編輯工單
        openEditWorkOrderModal(id);
      }
      if (action === "createQuotationFromTicket" || action === "quote") {
        // 報價組從工單創建報價
        openQuotationModalFromTicket(id);
        return;
      }
      render();
      toast("狀態已在頁面內模擬更新");
    }

    function actionButtons(t, context = "detail") {
      const buttons = [];
      const add = (label, action, cls = "secondary-btn") => buttons.push(`<button class="${cls}" data-action="${action}" data-id="${t.id}">${label}</button>`);
      if (context === "list") add("查看詳情", "view", "ghost-btn");
      
      // 報價組特殊處理：已完成且需要報價的工單顯示報價按鈕
      if (state.role === "QUO" && t.status === "已完成" && t.needQuotation) {
        add("創建報價", "createQuotationFromTicket", "primary-btn");
        return buttons.join("");
      }
      
      if (["已完成", "已取消"].includes(t.status)) return buttons.join("");
      if (state.role === "CS") {
        if (t.status === "待分派") {
          add("直接完成", "closeDirect", "secondary-btn");
          add("取消", "cancel", "danger-btn");
        }
        if (["待分派", "處理中"].includes(t.status)) add("補充信息", "note", "secondary-btn");
        // 客戶催單按鈕
        if (["待分派", "待確認", "待處理", "處理中"].includes(t.status)) add("催單", "urge", "warning-btn");
      }
      if (state.role === "TL") {
        if (t.status === "待分派") {
          add("分派", "assign", "primary-btn");
          add("編輯工單", "editTicket", "secondary-btn");
        }
        if (["待確認", "待處理", "處理中"].includes(t.status)) add("重新分派", "assign", "secondary-btn");
        if (t.status === "處理中") add("補充備註", "note", "secondary-btn");
      }
      if (state.role === "MASTER") {
        if (t.status === "待確認") {
          add("接單", "take", "primary-btn");
        }
        if (t.status === "待處理") add("開始處理", "startWork", "primary-btn");
        if (t.status === "處理中") add("提交處理結果", "submitResult", "primary-btn");
      }
      if (state.role === "ADMIN") {
        if (["待分派", "待確認", "待處理", "處理中"].includes(t.status)) add("取消", "cancel", "danger-btn");
      }
      return buttons.join("");
    }

              <div class="card-head"><h2>最近動態</h2><span class="chip">${now}</span></div>

              <p>用於演示從建單、查詢到分派的主流程入口。</p>

    function barRow(label, value, total) {
      const pct = total ? Math.round(value / total * 100) : 0;
      return `<div class="bar-row"><span>${label}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, pct)}%"></div></div><strong>${value}</strong></div>`;
    }

    function filteredTickets() {
      const f = state.filters;
      const result = tickets.filter(t => {
        const keyword = f.keyword.trim().toLowerCase();
        const jNo = (f.jNumber || "").trim().toLowerCase();
        return (f.status === "全部" || t.status === f.status)
          && (f.type === "全部" || t.type === f.type)
          && (f.area === "全部" || t.area === f.area)
          && (f.owner === "全部" || t.owner === f.owner || t.master === f.owner)
          && (f.tl === "全部" || t.tl === f.tl)
          && (f.master === "全部" || t.master === f.master)
          && (f.customer === "全部" || t.customerId === f.customer)
          && (!jNo || (t.jNumber || "").toLowerCase().includes(jNo))
          && (!keyword || `${t.id} ${t.customer} ${t.contact} ${t.desc} ${t.jNumber || ""}`.toLowerCase().includes(keyword));
      });
      // 排序：未完成和需跟進工單置頂（#34 客服CS視圖要求）
      const priorityStatus = ["待分派", "待處理", "處理中", "需跟進"];
      return result.sort((a, b) => {
        const aPriority = priorityStatus.includes(a.status) ? 0 : 1;
        const bPriority = priorityStatus.includes(b.status) ? 0 : 1;
        if (aPriority !== bPriority) return aPriority - bPriority;
        return 0;
      });
    }

    function renderList() {

            <div class="filters">
              ${selectFilter("status", "狀態", ["全部", ...STATUSES])}

    function infoRow(label, value) {

    // ==================== Work Order Management Module ====================
    function renderWorkOrderPage() {
      const hasDrawer = workOrderState.selectedWorkOrderId !== null;
      const selectedTicket = hasDrawer ? ticketById(workOrderState.selectedWorkOrderId) : null;
      
      return `
        <section class="page active">

    function renderWorkOrderFilters() {
      const ownerOptions = [...new Set(tickets.flatMap(t => [t.owner, t.master]).filter(Boolean))];

      return `

          <div class="wo-filter-group">

              <option value="全部" ${workOrderState.filters.status === "全部" ? "selected" : ""}>全部</option>

          </div>
          <div class="wo-filter-group">
            <label>工單類型</label>
            <select data-wo-filter="type">
              <option value="全部" ${workOrderState.filters.type === "全部" ? "selected" : ""}>全部</option>
              ${TYPES.map(t => `<option value="${t}" ${workOrderState.filters.type === t ? "selected" : ""}>${t}</option>`).join("")}
            </select>
          </div>
          <div class="wo-filter-group">
            <label>區域</label>
            <select data-wo-filter="area">
              <option value="全部" ${workOrderState.filters.area === "全部" ? "selected" : ""}>全部</option>

          </div>
          <div class="wo-filter-group">
            <label>負責人</label>
            <select data-wo-filter="owner">
              <option value="全部" ${workOrderState.filters.owner === "全部" ? "selected" : ""}>全部</option>
              ${ownerOptions.map(o => `<option value="${o}" ${workOrderState.filters.owner === o ? "selected" : ""}>${o}</option>`).join("")}
            </select>
          </div>
          <div class="wo-filter-group">
            <label>客戶</label>
            <select data-wo-filter="customer">
              <option value="全部" ${workOrderState.filters.customer === "全部" ? "selected" : ""}>全部</option>
              ${customerOptions.map(c => `<option value="${c.id}" ${workOrderState.filters.customer === c.id ? "selected" : ""}>${c.name}</option>`).join("")}
            </select>
          </div>
          <div class="wo-filter-group">
            <label>關鍵詞搜索</label>
            <input type="text" data-wo-filter="keyword" value="${escapeHtml(workOrderState.filters.keyword)}" placeholder="工單編號、客戶名稱、聯繫人、地址">
          </div>
          <div class="wo-actions-top">
            <button class="secondary-btn" data-wo-reset>重置</button>
            <button class="primary-btn" data-wo-create>+ 新建工單</button>
            <button class="secondary-btn" data-wo-batch-create>批量生成空白工單</button>
          </div>
        </div>
      `;
    }

    function filterWorkOrders() {
      const f = workOrderState.filters;
      return tickets.filter(t => {
        const keyword = f.keyword.trim().toLowerCase();
        return (f.status === "全部" || t.status === f.status)
          && (f.type === "全部" || t.type === f.type)
          && (f.area === "全部" || t.area === f.area)
          && (f.owner === "全部" || t.owner === f.owner || t.master === f.owner)
          && (f.customer === "全部" || t.customerId === f.customer)
          && (!keyword || `${t.id} ${t.customer} ${t.contact} ${t.address}`.toLowerCase().includes(keyword));
      });
    }

    function renderWorkOrderTable() {
      const filtered = filterWorkOrders();
      const isQUO = state.role === "QUO";
      
      return `
        <table class="wo-table">
          <thead>
            <tr>
              <th>工單編號</th>
              <th>工單類型</th>
              <th>客戶 / 聯繫人</th>
              <th>區域</th>
              <th>工單狀態</th>
              ${isQUO ? '<th>報價狀態</th>' : ''}
              <th>當前負責人</th>
              <th>更新時間</th>
              <th style="text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0 ? `
              <tr>
                <td colspan="${isQUO ? 9 : 8}" style="text-align: center; padding: 40px; color: var(--muted);">
                  暫無匹配工單
                </td>
              </tr>
            ` : filtered.map(t => {
              const showUrge = state.role === "CS" && ["待分派", "待確認", "處理中"].includes(t.status);
              
              // 獲取報價狀態
              const ticketQuotation = quotations.find(q => q.ticketId === t.id);
              const quotationStatus = ticketQuotation?.status || '';
              const needQuotation = t.needQuotation;
              
              // 報價按鈕邏輯（僅報價組顯示，不需要時留空）
              let quotationBtnHtml = '';
              if (isQUO) {
                if (!needQuotation) {
                  quotationBtnHtml = '';
                } else if (!quotationStatus || quotationStatus === "待報價" || quotationStatus === "需修訂") {
                  quotationBtnHtml = `<button class="wo-quote-btn wo-quote-primary" data-action="quote" data-id="${t.id}">報價</button>`;
                } else if (["已發出", "等待客戶確認", "已確認", "已取消"].includes(quotationStatus)) {
                  quotationBtnHtml = `<button class="wo-quote-btn wo-quote-secondary" data-action="viewQuote" data-id="${t.id}">查看報價</button>`;
                } else {
                  quotationBtnHtml = '';
                }
              }
              
              return `
              <tr>
                <td><button class="wo-id-link" data-wo-view="${t.id}">${t.id}</button></td>
                <td>${t.type}</td>
                <td>
                  <div class="wo-customer-name">${escapeHtml(t.customer)}</div>
                  <div class="wo-customer-contact">${escapeHtml(t.contact)}</div>
                </td>
                <td>${t.area}</td>
                <td><span class="wo-status-tag wo-status-${t.status}">${t.status}</span></td>
                ${isQUO ? `<td>${quotationStatus ? `<span class="wo-status-tag wo-quotation-status-${quotationStatus}">${quotationStatus}</span>` : '<span style="color: var(--muted);">-</span>'}</td>` : ''}
                <td>${escapeHtml(t.owner)}</td>
                <td>${t.updatedAt}</td>
                <td class="wo-td-actions">
                  <div class="wo-actions-group">
                    ${state.role === "CS" ? (showUrge ? `<button class="wo-urge-btn" data-action="urge" data-id="${t.id}">催單</button>` : '<button class="wo-btn-disabled" disabled>催單</button>') : ''}
                    ${isQUO ? (quotationBtnHtml || '<button class="wo-btn-disabled" disabled>報價</button>') : ''}
                    <button class="wo-view-btn" data-wo-view="${t.id}">查看詳情</button>
                  </div>
                </td>
              </tr>
            `}).join("")}
          </tbody>
        </table>
      `;
    }

    // 按客戶類型篩選客戶下拉選項（新建工單時聯動）
    function filterCustomersByType(type) {
      const select = document.getElementById("customerSelect");
      if (!select) return;
      if (!type) {
        select.innerHTML = '<option value="">請先選擇客戶類型</option>';
        return;
      }
      const filtered = customers.filter(c => c.type === type);
      select.innerHTML = '<option value="">請選擇客戶</option>' + filtered.map(c => `<option value="${c.id}">${c.nameZh} (${c.nameEn})</option>`).join("");
    }

    // 彈窗式工單的客戶類型篩選（支持編輯時預選客戶）
    function filterModalCustomersByType(type, preselectedCustomerId) {
      const select = document.getElementById("customerSelect");
      if (!select) return;
      if (!type) {
        select.innerHTML = '<option value="">請先選擇客戶類型</option>';
        return;
      }
      const filtered = customers.filter(c => c.type === type);
      select.innerHTML = '<option value="">請選擇客戶</option>' + filtered.map(c => `<option value="${c.id}" ${preselectedCustomerId === c.id ? 'selected' : ''}>${c.nameZh} (${c.nameEn})</option>`).join("");
    }

      workOrderState.modalOpen = true;
      workOrderState.modalMode = "create";
      workOrderState.selectedWorkOrderId = null;
      render();

      workOrderState.modalOpen = true;
      workOrderState.modalMode = "edit";
      workOrderState.selectedWorkOrderId = ticketId;
      render();

      workOrderState.modalOpen = false;
      render();

    function generateWorkOrderId(customer) {
      const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
      const seq = String(tickets.length + 1).padStart(3, '0');
      
      if (customer && customer.type === "政府") {
        const prefix = customer.governmentPrefix || "ECA";
        return `${prefix}-${dateStr}-${seq}`;
      }
      return `WO-${dateStr}-${seq}`;
    }
    
    function saveWorkOrder(formData) {
      const isEdit = workOrderState.modalMode === "edit";
      const customer = customers.find(c => c.id === formData.get('customerId'));
      const ticketId = isEdit ? workOrderState.selectedWorkOrderId : generateWorkOrderId(customer);
      
      const ticketData = {
        id: ticketId,
        customerId: formData.get('customerId'),
        customer: customer?.nameZh || '',
        customerType: formData.get('customerType') || customer?.type || '',
        contact: formData.get('contact'),
        phone: formData.get('phone'),
        channel: formData.get('channel'),
        area: formData.get('area'),
        address: formData.get('address'),
        type: formData.get('type'),
        desc: formData.get('desc'),
        status: isEdit ? ticketById(ticketId).status : '待分派',
        owner: isEdit ? ticketById(ticketId).owner : currentRole().name,
        tl: formData.get('tl') || (isEdit ? ticketById(ticketId).tl : currentRole().name),
        master: isEdit ? ticketById(ticketId).master : '',
        createdAt: isEdit ? ticketById(ticketId).createdAt : new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        updatedAt: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        records: isEdit ? ticketById(ticketId).records : [{ time: new Date().toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false }), actor: currentRole().name, text: '創建工單' }],
        attachments: formData.get('attachments') ? formData.get('attachments').split(',').map(a => a.trim()).filter(Boolean) : [],
        tags: [],
        urgent: formData.get('priority') === '緊急' || formData.get('priority') === '非常緊急',
        priority: formData.get('priority'),
        jNumber: customer?.type === "政府" ? (formData.get('jNumber') || customer.jNumber || '') : ''
      };

      if (isEdit) {
        const index = tickets.findIndex(t => t.id === ticketId);
        if (index !== -1) {
          tickets[index] = { ...tickets[index], ...ticketData };
          saveDataToLocalStorage();
          toast('工單已更新');
        }
      } else {
        tickets.unshift(ticketData);
        saveDataToLocalStorage();
        toast('工單已創建');
      }

      workOrderState.modalOpen = false;
      // 提交後不自動打開詳情抽屜，回到工單列表
      workOrderState.selectedWorkOrderId = null;
      render();
    }

    // 批量生成空白工單
    function batchCreateWorkOrders() {
      const count = prompt('請輸入要生成的空白工單數量（1-50）：', '5');
      if (!count || isNaN(count) || count < 1 || count > 50) {
        if (count !== null) toast('請輸入1-50之間的數字');
        return;
      }

      const num = parseInt(count);
      const now = new Date();
      const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
      const timeStr = now.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-');
      
      let created = 0;
      for (let i = 0; i < num; i++) {
        const ticketId = `WO-${dateStr}-${String(tickets.length + i + 1).padStart(3, '0')}`;
        const ticketData = {
          id: ticketId,
          customerId: '',
          customer: '（空白工單）',
          contact: '',
          phone: '',
          channel: '電話',
          area: '香港',
          address: '',
          type: '保養維修',
          desc: '',
          status: '待分派',
          owner: currentRole().name,
          tl: '',
          master: '',
          createdAt: timeStr,
          updatedAt: timeStr,
          records: [{ time: timeStr, actor: currentRole().name, text: '批量生成空白工單' }],
          attachments: [],
          tags: ['空白工單'],
          urgent: false,
          priority: '普通'
        };
        tickets.unshift(ticketData);
        created++;
      }
      
      saveDataToLocalStorage();
      toast(`已批量生成 ${created} 張空白工單`);
      render();
    }

        const timeA = a.createdAt || '';
