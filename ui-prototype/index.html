        <div class="noti-panel-body">
          ${userNotis.map(n => {
            const moduleInfo = NOTIFICATION_MODULES[n.module] || NOTIFICATION_MODULES.system;
            return `
              <div class="noti-card ${!n.isRead ? "unread" : ""}" data-open-notification="${n.id}">
                <div class="noti-icon level-${n.level}">${moduleInfo.icon}</div>
                <div class="noti-body">
                  <p class="noti-title">
                    <span class="noti-level-dot ${n.level}"></span>
                    ${escapeHtml(n.title)}
                  </p>
                  <p class="noti-content">${escapeHtml(n.content)}</p>
                  ${n.subContent ? `<p class="noti-sub">${escapeHtml(n.subContent)}</p>` : ""}
                  <p class="noti-time">${n.createdAt}</p>
                </div>
              </div>
            `;
          }).join("")}
        </div>
        <div class="noti-panel-foot">
          <button>查看最近50條通知</button>
        </div>
      `;
    }

    // 打開通知（點擊通知後跳轉）
    function openNotification(notificationId) {
      const notification = notifications.find(n => n.id === notificationId);
      if (!notification) return;

      // 標記爲已讀
      markAsRead(notificationId);

      // 跳轉到對應頁面
      if (notification.targetPage) {
        // 客戶管理和用戶管理現在在基礎設置下
        if (notification.targetPage === "customers") {
          state.page = "settings";
          state.settingsTab = "customer";
          state.isSettingsExpanded = true;
        } else if (notification.targetPage === "users") {
          state.page = "settings";
          state.settingsTab = "user";
          state.isSettingsExpanded = true;
        } else {
          state.page = notification.targetPage;
        }
        state.view = "pc";

        // 根據模塊設置選中ID
        if (notification.module === "ticket" && notification.targetId) {
          // 工單通知跳轉到工單管理頁面並打開詳情 Drawer
          workOrderState.selectedWorkOrderId = notification.targetId;
        } else if (notification.module === "quotation" && notification.targetId) {
          quotationState.selectedQuotationId = notification.targetId;
        } else if (notification.module === "customer" && notification.targetId) {
          customerState.selectedCustomerId = notification.targetId;
        } else if (notification.module === "user" && notification.targetId) {
          userState.selectedUserId = notification.targetId;
        }

        render();
      }

      // 關閉通知面板
      closeNotificationPanel();
    }

    // 標記單條通知爲已讀
    function markAsRead(notificationId) {
      const notification = notifications.find(n => n.id === notificationId);
      if (notification) {
        notification.isRead = true;
        renderNotificationBell();
        // 如果面板打開，重新渲染
        if (notificationState.panelOpen) {
          const panel = $("#notiPanel");
          if (panel) panel.innerHTML = renderNotifications();
        }
      }
    }

    // 標記所有通知爲已讀
    function markAllAsRead() {
      getUserNotifications().forEach(n => { n.isRead = true; });
      renderNotificationBell();
      // 如果面板打開，重新渲染
      if (notificationState.panelOpen) {
        const panel = $("#notiPanel");
        if (panel) panel.innerHTML = renderNotifications();
      }
      toast("已將所有通知標記爲已讀");
    }

    // 刪除通知
    function deleteNotification(notificationId) {
      notifications = notifications.filter(n => n.id !== notificationId);
      renderNotificationBell();
      if (notificationState.panelOpen) {
        const panel = $("#notiPanel");
        if (panel) panel.innerHTML = renderNotifications();
      }
    }

    // 創建通知 - 統一入口
    // 所有模塊的業務事件都通過此函數發送通知
    function createNotification({ module, level, title, content, subContent, targetPage, targetId, receiverId, receiverRole }) {
      const newNoti = {
        id: `NOTI-${Date.now()}`,
        module: module || "system",
        level: level || "info",
        title: title || "",
        content: content || "",
        subContent: subContent || "",
        targetPage: targetPage || "",
        targetId: targetId || "",
        receiverId: receiverId || "ALL",
        receiverRole: receiverRole || "ALL",
        isRead: false,
        createdAt: new Date().toLocaleString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).replace(/\//g, "-")
      };
      notifications.unshift(newNoti);
      renderNotificationBell();
      return newNoti;
    }

    // 業務事件通知規則映射表
    // 格式: 事件名 -> { module, level, title, targetPage, receiverRole/ receiverId 獲取方式 }
    const NOTIFICATION_RULES = {
      "ticket.created": {
        module: "ticket",
        level: "action",
        title: "新工單待分派",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給工單所屬團隊的 Team Leader
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket) {
            const tl = users.find(u => u.role === "TL" && u.area === ticket.area);
            return { receiverId: tl?.id, receiverRole: "TEAM_LEADER" };
          }
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "ticket.assigned": {
        module: "ticket",
        level: "action",
        title: "工單待確認",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給被分派的師傅
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket && ticket.master) {
            const master = users.find(u => u.name === ticket.master);
            return { receiverId: master?.id, receiverRole: "MASTER" };
          }
          return { receiverRole: "MASTER" };
        }
      },
      "ticket.rejected": {
        module: "ticket",
        level: "action",
        title: "工單被拒單",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給 Team Leader
          const ticket = tickets.find(t => t.id === data.ticketId);
          if (ticket) {
            const tl = users.find(u => u.role === "TL" && u.area === ticket.area);
            return { receiverId: tl?.id, receiverRole: "TEAM_LEADER" };
          }
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "ticket.timeout.warning": {
        module: "ticket",
        level: "warning",
        title: "工單即將超時",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給師傅和 Team Leader
          return { receiverRole: "MASTER" }; // 實際應同時發給 MASTER 和 TL
        }
      },
      "ticket.completed": {
        module: "ticket",
        level: "success",
        title: "工單已完成",
        targetPage: "workorder",
        getReceiver: (data) => {
          // 發送給 CS
          return { receiverRole: "CS" };
        }
      },
      "quotation.created": {
        module: "quotation",
        level: "info",
        title: "新增報價",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 發送給報價負責人
          const quotation = quotations.find(q => q.id === data.quotationId);
          if (quotation) {
            const owner = users.find(u => u.name === quotation.owner);
            return { receiverId: owner?.id, receiverRole: getCurrentRoleType() };
          }
          return { receiverRole: getCurrentRoleType() };
        }
      },
      "quotation.pending.confirm": {
        module: "quotation",
        level: "action",
        title: "客戶待確認報價",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 發送給 CS
          return { receiverRole: "CS" };
        }
      },
      "quotation.confirmed": {
        module: "quotation",
        level: "success",
        title: "報價已確認",
        targetPage: "quotations",
        getReceiver: (data) => {
          // 發送給 CS 和 Team Leader
          return { receiverRole: "CS" };
        }
      },
      "quotation.expiring": {
        module: "quotation",
        level: "warning",
        title: "報價即將過期",
        targetPage: "quotations",
        getReceiver: (data) => {
          return { receiverRole: getCurrentRoleType() };
        }
      },
      "quotation.need.revision": {
        module: "quotation",
        level: "action",
        title: "報價需修訂",
        targetPage: "quotations",
        getReceiver: (data) => {
          return { receiverRole: "TEAM_LEADER" };
        }
      },
      "customer.created": {
        module: "customer",
        level: "info",
        title: "新增客戶",
        targetPage: "customers",
        getReceiver: (data) => {

      "customer.updated": {

      "user.created": {

      "user.role.changed": {

    // 觸發業務事件通知
    function triggerNotification(eventName, data = {}) {
      const rule = NOTIFICATION_RULES[eventName];
      if (!rule) return;

      const receiver = rule.getReceiver(data);
      const ticket = data.ticketId ? tickets.find(t => t.id === data.ticketId) : null;
      const quotation = data.quotationId ? quotations.find(q => q.id === data.quotationId) : null;
      const customer = data.customerId ? customers.find(c => c.id === data.customerId) : null;

      let content = "";
      let subContent = "";
      let targetId = "";

      if (ticket) {
        content = ticket.id;
        subContent = ticket.customer;
        targetId = ticket.id;
      } else if (quotation) {
        content = quotation.id;
        subContent = quotation.customerName;
        targetId = quotation.id;
      } else if (customer) {
        content = customer.id;
        subContent = customer.nameZh;
        targetId = customer.id;
      } else if (data.userId) {
        const user = users.find(u => u.id === data.userId);
        content = data.userId;
        subContent = user?.name || "";
        targetId = data.userId;
      }

      createNotification({
        module: rule.module,
        level: rule.level,
        title: rule.title,
        content: content,
        subContent: subContent,
        targetPage: rule.targetPage,
        targetId: targetId,
        receiverId: receiver.receiverId,
        receiverRole: receiver.receiverRole
      });
    }


    function performAction(action, id) {
      const t = ticketById(id);
      if (action === "view") {
        // 在當前頁面以側邊欄形式打開工單詳情（不跳轉）
        state.selectedTicketId = id;
        workOrderState.selectedWorkOrderId = id;
        render();
        return;
      }
      if (action === "accept") {
        updateTicket(id, { status: "待分派", owner: t.tl || "李組長" }, "CS 已受理，確認需要派工，進入待分派。");
      }
      if (action === "cancel") {
        updateTicket(id, { status: "已取消", owner: currentRole().name, cancelReason: "原型模擬取消" }, "工單已取消。");
      }
      if (action === "closeDirect") {
        const closeReason = prompt("請輸入關單原因（現場解決/電話解決/簡單諮詢等）：", "現場解決");
        if (!closeReason) return;
        updateTicket(id, { status: "已完成", owner: currentRole().name, closeReason: closeReason }, `CS 直接完成：${closeReason}`);
      }
      if (action === "assign") {
        state.selectedDispatchId = id;
        const ticket = ticketById(id);
        const recommendedMaster = getRecommendedDispatchMaster(ticket);
        state.selectedMaster = recommendedMaster?.name || "";
        state.dispatchModalOpen = true;
        state.page = "dispatch";
        state.view = "pc";
        render();
        toast("請選擇師傅並確認分派");
        return;
      }
      if (action === "take") {
        // 彈出到達時間選擇窗口（精確到分鐘）
        openArrivalTimeModal(id);
        return;
      }
      if (action === "submitResult") {
        // Sync current DOM values to ticket/state before reading
        srSyncInputs();

        // Collect field values
        const get = (id) => { const el = document.getElementById(id); return el ? el.value.trim() : ""; };
        const serviceReportNo = get("serviceReportNo");
        const arrivalTime = get("arrivalTime");
        const completionTime = get("completionTime");
        const completedWork = get("completedWork");
        const faultResult = get("faultResult");
        const quotationNote = get("quotationNote");
        const paperHolder = get("paperHolder");

        // Validation: SR number must be 6 digits
        if (!serviceReportNo.match(/^\d{6}$/)) {
          alert("服務報告 (SR) 編號必須是6位數字");
          document.getElementById("serviceReportNo")?.focus();
          return;
        }

        // Validation: completed work
        if (!completedWork) {
          alert("請填寫完成工作");
          document.getElementById("completedWork")?.focus();
          return;
        }

        // Validation: fault result
        if (!faultResult) {
          alert("請填寫故障原因/處理結果");
          document.getElementById("faultResult")?.focus();
          return;
        }

        // Validation: satisfaction
        if (!state.srSatisfaction) {
          alert("請選擇客戶滿意度");
          return;
        }

        const customerAbsent = document.getElementById("srCustomerAbsent")?.checked;
        if (!customerAbsent && !(state.srSignature || t.signature)) {
          alert("請完成客戶電子簽名，或勾選客戶負責人未能簽署");
          return;
        }

        // Validation: completion paper
        const hasCompletionPaper = t.quotationId && quotations.find(q => q.id === t.quotationId)?.procurementStatus === "已到貨";
        if (hasCompletionPaper && !t.completionPaperPhoto) {
          alert("請上傳完工紙照片");
          return;
        }

        // Build updates object with all new fields
        const updates = {
          status: "已完成",
          owner: t.tl,
          serviceReportNo: serviceReportNo,
          arrivalTime: arrivalTime,
          completionTime: completionTime,
          srArea: t.srArea || "",
          srSystems: [...(t.srSystems || [])],
          srObjectives: [...(t.srObjectives || [])],
          srSystemOther: t.srSystemOther || "",
          srObjectiveOther: t.srObjectiveOther || "",
          srObjectiveAmount: parseFloat(t.srObjectiveAmount) || 0,
          completedWork: completedWork,
          faultResult: faultResult,
          serviceReportText: faultResult,
          photos: [...(t.attachments || [])],
          serviceReportPhotos: [...(t.serviceReportPhotos || [])],
          needQuotation: state.srNeedQuotation,
          quotationNote: state.srNeedQuotation ? quotationNote : "",
          parts: state.srNeedQuotation ? state.srParts.map(p => ({ name: p.name, qty: parseInt(p.qty) || 1 })) : [],
          satisfaction: state.srSatisfaction,
          signature: state.srSignature || t.signature || "",
          customerAbsent: Boolean(customerAbsent),
          transportFee: parseFloat($('[data-sr-input="transportFee"]')?.value) || 0
        };

        if (paperHolder) {
          updates.paperHolder = paperHolder;
        }

        // Notify quotation team if newly marked as needing quotation
        if (state.srNeedQuotation && !t.needQuotation) {
          const quotationUsers = users.filter(u => u.role === "QUO" && isEnabled(u.status));
          quotationUsers.forEach(user => {
            createNotification({
              module: "ticket",
              level: "action",
              title: "工單需要報價",
              content: t.id,
              subContent: t.customer,
              targetPage: "workorder",
              targetId: t.id,
              receiverId: user.id,
              receiverRole: "QUO"
            });
          });
          // 自動在報價管理模塊創建一條對應報價記錄，方便報價組跟進
          // 僅當尚未存在與此工單關聯的報價時才創建，避免重複
          const existingQuotation = quotations.find(q => q.ticketId === id || q.sourceTicketId === id);
          if (!existingQuotation) {
            const newQuotationId = `Q-${Date.now()}`;
            const newQuotation = {
              id: newQuotationId,
              title: `${t.customer} - ${t.type || "維修"}`,
              ticketId: id,
              customerId: t.customerId || "",
              customerName: t.customer || "",
              area: t.area || "",
              amount: 0,
              taxRate: 0,
              totalAmount: 0,
              bargainAmount: null,
              status: "待報價",
              owner: "",
              ownerPhone: "",
              ownerTeam: "",
              srNo: serviceReportNo,
              category: "",
              createdAt: new Date().toISOString().slice(0, 10),
              validUntil: "",
              deadline: "",
              source: "Service Report",
              sourceTicketId: id,
              isInviteTender: false,
              projectJobNo: t.projectRef || "",
              attachments: [],
              remark: quotationNote || "",
              history: [{ action: "自動創建", time: new Date().toLocaleString('zh-TW'), actor: currentRole().name, changes: "由服務報告提交觸發自動創建" }]
            };
            quotations.unshift(newQuotation);
            // 關聯報價 ID 到工單，便於後續查詢
            updates.quotationId = newQuotationId;
          }
        }

        // Reset SR UI state for next ticket
        state.srInitialized = false;

        // 離線模式：保存到 outbox，待恢復網絡後上傳
        if (state.online === false) {
          saveToOfflineOutbox('workrecord', {
            ticketId: id,
            ...updates
          });
          toast(`📱 已離線保存處理記錄（SR: ${serviceReportNo}），待恢復網絡後自動上傳`, "success");
        } else {
          updateTicket(id, updates, "師傅提交服務報告和現場記錄，工單已完成。");
        }

        // 顯示提交成功頁面，5 秒後自動跳轉到任務版面
        state.srSubmitted = true;
        state.srSubmittedTicketId = id;
        state.srSubmitCountdown = 5;
        render();

        // 啟動倒計時
        if (state.srSubmitCountdownTimer) clearInterval(state.srSubmitCountdownTimer);
        state.srSubmitCountdownTimer = setInterval(() => {
          state.srSubmitCountdown--;
          if (state.srSubmitCountdown <= 0) {
            clearInterval(state.srSubmitCountdownTimer);
            state.srSubmitCountdownTimer = null;
            // 跳轉到任務版面並顯示剛提交的項目
            const submittedId = state.srSubmittedTicketId;
            state.srSubmitted = false;
            state.srSubmittedTicketId = null;
            state.selectedTicketId = submittedId;
            setMobilePage("tasks");
          } else {
            // 更新倒計時顯示
            const cdEl = document.getElementById("srSuccessCountdown");
            if (cdEl) cdEl.textContent = `${state.srSubmitCountdown} 秒後自動跳轉到任務版面`;
          }
        }, 1000);
      }
      if (action === "confirmClose") {
        updateTicket(id, { status: "已完成", owner: currentRole().name }, "確認處理結果通過，工單已完成。");
      }
      if (action === "returnWork") {
        updateTicket(id, { status: "處理中", owner: t.master || "周師傅" }, "確認不通過，退回師傅繼續處理。");
      }
      if (action === "note") {
        updateTicket(id, {}, "補充信息：已在原型中記錄備註。");
      }
      if (action === "startWork") {
        updateTicket(id, { status: "處理中", owner: currentRole().name }, "師傅開始現場處理，進入處理中。");
      }
      if (action === "urge") {
        // 催單功能（使用自定義輸入彈窗）
        handleUrge(id);
        return;
      }
      if (action === "editTicket") {
        // TL編輯工單
        openEditWorkOrderModal(id);
      }
      if (action === "createQuotationFromTicket" || action === "quote") {
        // 報價組從工單創建報價
        openQuotationModalFromTicket(id);
        return;
      }
      render();
      toast("狀態已在頁面內模擬更新");
    }

    // 催單處理（使用自定義輸入彈窗替代原生 prompt）
    async function handleUrge(id) {
      const t = ticketById(id);
      if (!t) return;
      const urgeContent = await showPromptDialog({
        title: "催單",
        message: `請輸入催單內容（工單：${t.id}，客戶：${t.customer}）`,
        placeholder: "請輸入催單內容...",
        confirmText: "確認催單",
        multiline: true
      });
      if (!urgeContent) return;
      const urgeRecord = {
        time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        actor: currentRole().name,
        text: `客戶催單：${urgeContent}`
      };
      if (!t.urgeRecords) t.urgeRecords = [];
      t.urgeRecords.push(urgeRecord);
      t.urgeCount = (t.urgeCount || 0) + 1;
      updateTicket(id, {}, `客戶催單 ${t.urgeCount} 次：${urgeContent}`);
      toast("催單已記錄，已通知TL和師傅");
    }

    function actionButtons(t, context = "detail") {
      const buttons = [];
      const add = (label, action, cls = "secondary-btn") => buttons.push(`<button class="${cls}" data-action="${action}" data-id="${t.id}">${label}</button>`);
      if (context === "list") add("查看詳情", "view", "ghost-btn");
      
      // 報價組特殊處理：已完成且需要報價的工單顯示報價按鈕
      if (state.role === "QUO" && t.status === "已完成" && t.needQuotation) {
        add("創建報價", "createQuotationFromTicket", "primary-btn");
        return buttons.join("");
      }
      
      if (["已完成", "已取消"].includes(t.status)) return buttons.join("");
      if (state.role === "CS") {
        if (t.status === "待分派") {
          add("直接完成", "closeDirect", "secondary-btn");
          add("取消", "cancel", "danger-btn");
        }
        if (["待分派", "處理中"].includes(t.status)) add("補充信息", "note", "secondary-btn");
        // 客戶催單按鈕
        if (["待分派", "待確認", "待處理", "處理中"].includes(t.status)) add("催單", "urge", "warning-btn");
      }
      if (state.role === "TL") {
        if (t.status === "待分派") {
          add("分派", "assign", "primary-btn");
          add("編輯工單", "editTicket", "secondary-btn");
        }
        if (["待確認", "待處理", "處理中"].includes(t.status)) add("重新分派", "assign", "secondary-btn");
        if (t.status === "處理中") add("補充備註", "note", "secondary-btn");
      }
      if (state.role === "MASTER") {
        if (t.status === "待確認") {
          add("收到", "take", "primary-btn");
        }
        if (t.status === "待處理") add("開始處理", "startWork", "primary-btn");
        if (t.status === "處理中") add("提交處理結果", "submitResult", "primary-btn");
      }
      if (state.role === "ADMIN") {
        if (["待分派", "待確認", "待處理", "處理中"].includes(t.status)) add("取消", "cancel", "danger-btn");
      }
      // CR 客戶關係部：可直接分派給師傅，不用經主管
      if (state.role === "CR") {
        if (["待分派", "待確認", "待處理", "處理中"].includes(t.status)) add("分派給師傅", "assign", "primary-btn");
        if (t.status === "待分派") add("編輯工單", "editTicket", "secondary-btn");
        if (["待分派", "待確認", "待處理", "處理中"].includes(t.status)) add("補充信息", "note", "secondary-btn");
      }
      return buttons.join("");
    }

      // Render settings popover if in collapsed mode and popover is open
      let existingPopover = document.querySelector(".settings-popover");

        const popover = document.createElement("div");
        popover.className = "settings-popover show";
        popover.id = "settingsPopover";
        const settingsBtn = document.querySelector(".nav-item-settings");
        if (settingsBtn) {
          const rect = settingsBtn.getBoundingClientRect();
          // 計算 popover 最大高度，確保不超出視口
          const popoverHeight = 7 * 44 + 16; // 7個項目各44px + padding
          const belowSpace = window.innerHeight - rect.top - 20; // 按鈕下方空間
          const aboveSpace = rect.bottom - 20; // 按鈕上方空間
          // 優先向下展開，空間不足時向上偏移
          let topPos = rect.top;
          let maxHeight;
          if (belowSpace >= popoverHeight) {
            // 下方空間足夠，正常向下展開
            maxHeight = popoverHeight;
          } else if (aboveSpace >= popoverHeight) {
            // 下方不夠但上方夠，向上展開
            topPos = rect.bottom - popoverHeight;
            maxHeight = popoverHeight;
          } else {
            // 上下都不夠，取較大的一邊
            if (belowSpace >= aboveSpace) {
              maxHeight = belowSpace;
            } else {
              topPos = 20;
              maxHeight = aboveSpace;
            }
          }
          popover.style.top = topPos + "px";
          popover.style.left = (rect.right + 8) + "px";
          popover.style.transform = "none";
          popover.style.maxHeight = maxHeight + "px";
        }
        popover.innerHTML = `
          <button class="settings-popover-item ${state.settingsTab === 'dictionary' ? 'active' : ''}" data-settings-tab="dictionary">📖 字典管理</button>
          <button class="settings-popover-item ${state.settingsTab === 'customer' ? 'active' : ''}" data-settings-tab="customer">🏢 客戶管理</button>

          <button class="settings-popover-item ${state.settingsTab === 'components' ? 'active' : ''}" data-settings-tab="components">🧩 組件庫</button>
        `;
        document.body.appendChild(popover);

    function barRow(label, value, total) {
      const pct = total ? Math.round(value / total * 100) : 0;
      return `<div class="bar-row"><span>${label}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, pct)}%"></div></div><strong>${value}</strong></div>`;
    }

    function filteredTickets() {
      const f = state.filters;
      const result = tickets.filter(t => {
        const keyword = f.keyword.trim().toLowerCase();
        const jNo = (f.jNumber || "").trim().toLowerCase();
        return (f.status === "全部" || t.status === f.status)
          && (f.type === "全部" || t.type === f.type)
          && (f.area === "全部" || t.area === f.area)
          && (f.owner === "全部" || t.owner === f.owner || t.master === f.owner)
          && (f.tl === "全部" || t.tl === f.tl)
          && (f.master === "全部" || t.master === f.master)
          && (f.customer === "全部" || t.customerId === f.customer)
          && (!jNo || (t.jNumber || "").toLowerCase().includes(jNo))
          && (!keyword || `${t.id} ${t.customer} ${t.contact} ${t.desc} ${t.jNumber || ""}`.toLowerCase().includes(keyword));
      });
      // 排序：未完成和需跟進工單置頂（#34 客服CS視圖要求）
      const priorityStatus = ["待分派", "待處理", "處理中", "需跟進"];
      return result.sort((a, b) => {
        const aPriority = priorityStatus.includes(a.status) ? 0 : 1;
        const bPriority = priorityStatus.includes(b.status) ? 0 : 1;
        if (aPriority !== bPriority) return aPriority - bPriority;
        return 0;
      });
    }

            <div class="filters">

    function renderWorkOrderPage() {
      const hasDrawer = workOrderState.selectedWorkOrderId !== null;

      return `

          </div>
        </section>
      `;
    }

    // 工單管理分頁組件
    function renderWorkOrderPagination() {
      const filtered = filterWorkOrders();
      const totalPages = Math.max(1, Math.ceil(filtered.length / workOrderState.pageSize));
      const current = workOrderState.currentPage;
      // 生成頁碼按鈕（最多顯示 7 個頁碼，超出用省略號）
      const pages = [];
      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
      } else {
        pages.push(1);
        if (current > 3) pages.push("...");
        const start = Math.max(2, current - 1);
        const end = Math.min(totalPages - 1, current + 1);
        for (let i = start; i <= end; i++) pages.push(i);
        if (current < totalPages - 2) pages.push("...");
        pages.push(totalPages);
      }

      return `
        <div class="um-pagination">
          <span>共 ${filtered.length} 條記錄，每頁
            <select data-wo-page-size style="min-height:auto;padding:2px 6px;font-size:12px;">
              ${[10, 20, 50].map(n => `<option value="${n}" ${workOrderState.pageSize === n ? "selected" : ""}>${n}</option>`).join("")}
            </select>
            條，第 ${current}/${totalPages} 頁
          </span>
          <div class="um-pg-btns">
            <button data-wo-page="prev" ${current <= 1 ? "disabled" : ""}>‹</button>
            ${pages.map(p => p === "..." ? `<span style="padding:0 4px;color:var(--muted);">…</span>` : `<button class="${current === p ? "active" : ""}" data-wo-page="${p}">${p}</button>`).join("")}
            <button data-wo-page="next" ${current >= totalPages ? "disabled" : ""}>›</button>
          </div>
        </div>
      `;
    }

    function filterWorkOrders() {
      const f = workOrderState.filters;
      return tickets.filter(t => {
        const keyword = f.keyword.trim().toLowerCase();
        return (f.status === "全部" || t.status === f.status)
          && (f.type === "全部" || t.type === f.type)
          && (f.area === "全部" || t.area === f.area)
          && (f.owner === "全部" || t.owner === f.owner || t.master === f.owner)
          && (f.customer === "全部" || t.customerId === f.customer)
          && (!keyword || `${t.id} ${t.customer} ${t.contact} ${t.address}`.toLowerCase().includes(keyword));
      });
    }

    function renderWorkOrderTable() {
      const filtered = filterWorkOrders();
      const isQUO = state.role === "QUO";
      // 分頁計算
      const totalPages = Math.max(1, Math.ceil(filtered.length / workOrderState.pageSize));
      if (workOrderState.currentPage > totalPages) workOrderState.currentPage = totalPages;
      const start = (workOrderState.currentPage - 1) * workOrderState.pageSize;
      const paginated = filtered.slice(start, start + workOrderState.pageSize);

      return `
        <table class="wo-table">
          <thead>
            <tr>
              <th>CALL編號</th>
              <th>CALL類型</th>
              <th>客戶</th>
              <th>聯繫人</th>
              <th>區域</th>
              <th>CALL狀態</th>
              ${isQUO ? '<th>報價狀態</th>' : ''}
              <th>當前負責人</th>
              <th>更新時間</th>
              <th style="text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0 ? `
              <tr>
                <td colspan="${isQUO ? 10 : 9}" style="text-align: center; padding: 40px; color: var(--muted);">
                  暫無匹配工單
                </td>
              </tr>
            ` : paginated.map(t => {
              const showUrge = state.role === "CS" && ["待分派", "待確認", "處理中"].includes(t.status);
              
              // 獲取報價狀態
              const ticketQuotation = quotations.find(q => q.ticketId === t.id);
              const quotationStatus = ticketQuotation?.status || '';
              const needQuotation = t.needQuotation;
              
              // 報價按鈕邏輯（僅報價組顯示，不需要時留空）
              let quotationBtnHtml = '';
              if (isQUO) {
                if (!needQuotation) {
                  quotationBtnHtml = '';
                } else if (!quotationStatus || quotationStatus === "待報價" || quotationStatus === "需修訂") {
                  quotationBtnHtml = `<button class="wo-quote-btn wo-quote-primary" data-action="quote" data-id="${t.id}">報價</button>`;
                } else if (["已發出", "等待客戶確認", "已確認", "已取消"].includes(quotationStatus)) {
                  quotationBtnHtml = `<button class="wo-quote-btn wo-quote-secondary" data-action="viewQuote" data-id="${t.id}">查看報價</button>`;
                } else {
                  quotationBtnHtml = '';
                }
              }
              
              return `
              <tr>
                <td><button class="wo-id-link" data-wo-view="${t.id}">${t.id}</button></td>
                <td>${t.type}</td>
                <td><div class="wo-customer-name">${escapeHtml(t.customer)}</div></td>
                <td><div class="wo-customer-contact">${escapeHtml(t.contact)}</div></td>
                <td>${t.area}</td>
                <td>${statusBadge(t.status)}</td>
                ${isQUO ? `<td>${quotationStatus ? statusBadge(quotationStatus) : '<span class="muted">-</span>'}</td>` : ''}
                <td>${escapeHtml(t.owner)}</td>
                <td>${t.updatedAt}</td>
                <td class="wo-td-actions">
                  <div class="wo-actions-group">
                    ${state.role === "CS" ? (showUrge ? `<button class="wo-urge-btn" data-action="urge" data-id="${t.id}">催單</button>` : '<button class="wo-btn-disabled" disabled>催單</button>') : ''}

                    <button class="wo-delete-btn" data-wo-delete="${t.id}">刪除</button>
                  </div>
                </td>
              </tr>
            `}).join("")}
          </tbody>
        </table>
      `;
    }

    // 彈出到達時間選擇窗口（精確到分鐘），用於師傅"收到"工單
    // 使用 addEventListener + 閉包捕獲 ticketId，避免依賴全局變量
    function openArrivalTimeModal(ticketId) {
      // 關閉已存在的 modal
      const existing = document.getElementById("arrivalTimeModal");
      if (existing) existing.remove();

      // 預設時間為當前時間 + 30 分鐘
      const now = new Date();
      now.setMinutes(now.getMinutes() + 30);
      const pad = (n) => String(n).padStart(2, '0');
      const defaultValue = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

      // 建立 modal DOM 元素（使用 createElement 而非 insertAdjacentHTML，便於綁定事件）
      const overlay = document.createElement("div");
      overlay.id = "arrivalTimeModal";
      overlay.className = "um-modal-overlay";
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:9999;";

      const modal = document.createElement("div");
      modal.className = "um-modal";
      modal.style.cssText = "background:var(--panel);border-radius:12px;padding:24px;width:min(420px,92vw);box-shadow:0 20px 60px rgba(15,23,42,.3);";

      const header = document.createElement("div");
      header.style.cssText = "margin-bottom:16px;";
      header.innerHTML = `
        <h3 style="margin:0 0 6px;font-size:18px;">選擇到達時間</h3>
        <p style="margin:0;color:var(--muted);font-size:13px;">請選擇預計到達現場的時間（精確到分鐘）</p>
      `;

      const body = document.createElement("div");
      body.style.cssText = "margin-bottom:20px;";
      body.innerHTML = `
        <label style="display:block;margin-bottom:6px;font-size:13px;font-weight:600;">到達時間</label>
        <input type="datetime-local" id="arrivalTimeInput" value="${defaultValue}" style="width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:var(--bg);color:var(--text);">
      `;

      const footer = document.createElement("div");
      footer.style.cssText = "display:flex;gap:10px;justify-content:flex-end;";

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "secondary-btn";
      cancelBtn.textContent = "取消";

      const confirmBtn = document.createElement("button");
      confirmBtn.type = "button";
      confirmBtn.className = "primary-btn";
      confirmBtn.textContent = "確認收到";

      footer.appendChild(cancelBtn);
      footer.appendChild(confirmBtn);
      modal.appendChild(header);
      modal.appendChild(body);
      modal.appendChild(footer);
      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      // 點擊遮罩關閉 modal
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) overlay.remove();
      });

      // 取消按鈕：關閉 modal
      cancelBtn.addEventListener("click", () => overlay.remove());

      // 確認按鈕：使用閉包捕獲 ticketId，避免依賴全局變量
      confirmBtn.addEventListener("click", () => {
        const input = document.getElementById("arrivalTimeInput");
        if (!input) {
          console.error("confirmArrivalTime: 找不到到達時間輸入框");
          return;
        }
        const value = input.value;
        if (!value) {
          alert("請選擇到達時間");
          return;
        }
        // 格式化顯示時間（YYYY-MM-DD HH:mm）
        const dt = new Date(value);
        const pad2 = (n) => String(n).padStart(2, '0');
        const formatted = `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())} ${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
        const updates = {
          status: "待處理",
          owner: currentRole().name,
          master: currentRole().name,
          estimatedArrival: formatted
        };
        // 更新工單狀態為待處理，並記錄處理記錄
        updateTicket(ticketId, updates, `師傅已收到，預計 ${formatted} 到達。`);
        // 關閉 modal
        overlay.remove();
        // 收到後自動流轉到【工單】詳情頁，讓師傅查看工單並進入【處理】流程
        state.selectedTicketId = ticketId;
        try {
          // 跳轉到移動端工單詳情頁（同時顯示工單資訊與處理記錄）
          state.mobilePage = "mobileDetail";
          state.view = "mobile";
          render();
          toast("已收到工單，狀態已更新為待處理", "success");
        } catch (err) {
          console.error("收到後跳轉失敗:", err);
        }
      });

      // 焦點放到確認按鈕上，方便鍵盤操作
      setTimeout(() => confirmBtn.focus(), 50);
    }

    let searchableSelectDismissBound = false;
    let searchableSelectObserverBound = false;

    function closeSearchableSelects(except) {
      document.querySelectorAll(".search-select-menu:not([hidden])").forEach(menu => {
        if (menu !== except) menu.hidden = true;
      });
    }

    function refreshSearchableSelect(select) {
      const wrapper = select?.closest(".search-select");
      if (wrapper) {
        wrapper.parentNode.insertBefore(select, wrapper);
        wrapper.remove();
      }
      select?.removeAttribute("data-search-select-enhanced");
      select?.classList.remove("search-select-native");
      enhanceSearchableSelects();
    }

    function enhanceSearchableSelects(root = document) {
      root.querySelectorAll("select:not([data-search-select-enhanced]):not([multiple])").forEach(select => {
        if (select.closest(".search-select")) return;
        select.dataset.searchSelectEnhanced = "true";

        const rect = select.getBoundingClientRect();
        const isFluid = Boolean(select.closest(".field, .wo-filter-group, .dm-form-group, .wo-form-group, .qf-field, .md-filter-group"));
        const wrapper = document.createElement("div");
        wrapper.className = `search-select${isFluid ? " search-select-fluid" : ""}`;
        if (!isFluid && rect.width) wrapper.style.width = `${Math.ceil(rect.width)}px`;

        const trigger = document.createElement("button");
        trigger.type = "button";
        trigger.className = "search-select-trigger";
        trigger.setAttribute("aria-haspopup", "listbox");
        trigger.setAttribute("aria-expanded", "false");
        trigger.disabled = select.disabled;

        const value = document.createElement("span");
        value.className = "search-select-value";
        const caret = document.createElement("span");
        caret.className = "search-select-caret";
        caret.textContent = "⌄";
        trigger.append(value, caret);

        const menu = document.createElement("div");
        menu.className = "search-select-menu";
        menu.hidden = true;
        menu.setAttribute("role", "listbox");
        const search = document.createElement("input");
        search.type = "text";
        search.className = "search-select-search";
        search.placeholder = "輸入關鍵詞搜尋";
        search.autocomplete = "off";
        const options = document.createElement("div");
        options.className = "search-select-options";
        menu.append(search, options);

        const updateValue = () => {
          const selected = select.options[select.selectedIndex];
          value.textContent = selected?.textContent.trim() || "請選擇";
          trigger.disabled = select.disabled;
        };
        const renderOptions = (keyword = "") => {
          const query = keyword.trim().toLocaleLowerCase();
          const matched = Array.from(select.options).filter(option => option.textContent.trim().toLocaleLowerCase().includes(query));
          options.innerHTML = "";
          if (!matched.length) {
            options.innerHTML = '<div class="search-select-empty">沒有符合的選項</div>';
            return;
          }
          matched.forEach(option => {
            const item = document.createElement("button");
            item.type = "button";
            item.className = `search-select-option${option.selected ? " active" : ""}`;
            item.textContent = option.textContent.trim();
            item.disabled = option.disabled;
            item.dataset.value = option.value;
            item.addEventListener("click", () => {
              if (option.disabled) return;
              select.value = option.value;
              updateValue();
              menu.hidden = true;
              trigger.setAttribute("aria-expanded", "false");
              select.dispatchEvent(new Event("input", { bubbles: true }));
              select.dispatchEvent(new Event("change", { bubbles: true }));
            });
            options.appendChild(item);
          });
        };
        const open = () => {
          if (select.disabled) return;
          closeSearchableSelects(menu);
          search.value = "";
          renderOptions();
          menu.hidden = false;
          trigger.setAttribute("aria-expanded", "true");
          requestAnimationFrame(() => search.focus());
        };

        trigger.addEventListener("click", () => menu.hidden ? open() : (menu.hidden = true, trigger.setAttribute("aria-expanded", "false")));
        search.addEventListener("input", () => renderOptions(search.value));
        search.addEventListener("keydown", event => {
          if (event.key === "Escape") {
            menu.hidden = true;
            trigger.setAttribute("aria-expanded", "false");
            trigger.focus();
          }
        });
        select.addEventListener("change", updateValue);

        select.parentNode.insertBefore(wrapper, select);
        wrapper.append(trigger, menu, select);
        select.classList.add("search-select-native");
        updateValue();
        renderOptions();
      });

      if (!searchableSelectDismissBound) {
        searchableSelectDismissBound = true;
        document.addEventListener("pointerdown", event => {
          if (!event.target.closest(".search-select")) closeSearchableSelects();
        });
      }

      // 新增／編輯彈窗會在頁面渲染後才插入，監聽後自動套用同一組下拉規則。
      if (!searchableSelectObserverBound && document.body) {
        searchableSelectObserverBound = true;
        let scheduled = false;
        new MutationObserver(() => {
          if (scheduled) return;
          scheduled = true;
          requestAnimationFrame(() => {
            scheduled = false;
            enhanceSearchableSelects();
          });
        }).observe(document.body, { childList: true, subtree: true });
      }
    }

    // 按客戶類型篩選客戶下拉選項（新建工單時聯動）
    function filterCustomersByType(type) {
      const select = document.getElementById("customerSelect");
      if (!select) return;
      if (!type) {
        select.innerHTML = '<option value="">請先選擇客戶類型</option>';
        refreshSearchableSelect(select);
        return;
      }
      const filtered = customers.filter(c => c.type === type);
      select.innerHTML = '<option value="">請選擇客戶</option>' + filtered.map(c => `<option value="${c.id}">${c.nameZh} (${c.nameEn})</option>`).join("");
      refreshSearchableSelect(select);
    }

    // 彈窗式工單的客戶類型篩選（支持編輯時預選客戶）
    function filterModalCustomersByType(type, preselectedCustomerId) {
      const select = document.getElementById("customerSelect");
      if (!select) return;
      if (!type) {
        select.innerHTML = '<option value="">請先選擇客戶類型</option>';
        refreshSearchableSelect(select);
        return;
      }
      const filtered = customers.filter(c => c.type === type);
      select.innerHTML = '<option value="">請選擇客戶</option>' + filtered.map(c => `<option value="${c.id}" ${preselectedCustomerId === c.id ? 'selected' : ''}>${c.nameZh} (${c.nameEn})</option>`).join("");
      refreshSearchableSelect(select);
    }

    // 根據區域篩選主管（TL）下拉選項
    function filterModalTLsByArea(area, preselectedTL) {
      const select = document.getElementById("modalTLSelect");
      if (!select) return;
      if (!area) {
        select.innerHTML = '<option value="">請先選擇區域</option>';
        refreshSearchableSelect(select);
        return;
      }
      const filtered = users.filter(u => u.role === 'TL' && isEnabled(u.status) && u.area === area);
      if (filtered.length === 0) {
        select.innerHTML = '<option value="">該區域暫無主管</option>';
      } else {
        select.innerHTML = '<option value="">請選擇主管</option>' + filtered.map(u => `<option value="${u.name}" ${preselectedTL === u.name ? 'selected' : ''}>${u.name}（${u.area}）</option>`).join("");
      }
      refreshSearchableSelect(select);
    }

    function handleFileUpload(input) {

      updateFileList(files);
    }

    // 更新文件列表顯示
    function updateFileList(files) {
      const fileListEl = document.getElementById("fileList");
      const attachmentsInput = document.getElementById("attachmentsInput");
      if (!fileListEl) return;

      const fileNames = files.map(f => f.name);
      attachmentsInput.value = fileNames.join(', ');

      fileListEl.innerHTML = files.map((f, i) => `
        <div style="display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--panel); border-radius:4px; margin-bottom:4px; font-size:13px;">
          <span>📎 ${escapeHtml(f.name)} <span style="color:var(--muted); font-size:11px;">(${(f.size / 1024).toFixed(1)} KB)</span></span>
          <button type="button" class="link-btn" onclick="removeFile(${i})" style="color:var(--danger);">移除</button>
        </div>
      `).join("");

      // 存儲文件列表到全局變量供後續使用
      window._uploadedFiles = files;
    }

    // 移除已選文件
    function removeFile(index) {
      if (!window._uploadedFiles) return;
      window._uploadedFiles = Array.from(window._uploadedFiles).filter((_, i) => i !== index);
      updateFileList(window._uploadedFiles);
    }

    // 開啟新建工單模態框（直接附加到 body，避免全頁重渲染導致閃爍）
    function openCreateWorkOrderModal() {
      workOrderState.modalMode = "create";
      workOrderState.selectedWorkOrderId = null;
      showWorkOrderModal();
    }

    // 開啟編輯工單模態框
    function openEditWorkOrderModal(ticketId) {
      workOrderState.modalMode = "edit";
      workOrderState.selectedWorkOrderId = ticketId;
      showWorkOrderModal();
    }

    // 統一：生成模態框 HTML 並附加到 body，綁定事件
    // 使用雙 rAF 技巧確保淡入動畫正確觸發，並鎖定背景滾動避免閃動
    function showWorkOrderModal() {
      const existing = document.getElementById("woModalOverlay");
      if (existing) existing.remove();
      const overlay = document.createElement("div");
      overlay.id = "woModalOverlay";
      // 先以字串方式替換掉 qf-select 類，避免 DOM 插入後才移除類名觸發重排
      const html = renderWorkOrderModal().replace(/class="qf-select"/g, 'class="qf-input"');
      overlay.innerHTML = html;
      // 鎖定背景滾動，避免雙滾動條造成頁面跳動
      document.body.classList.add("modal-open");
      document.body.appendChild(overlay);
      bindWorkOrderModalEvents(overlay);
      // 附加已上傳檔案清單
      if (window._uploadedFiles) {
        updateFileList(window._uploadedFiles);
      }
    }

    // 關閉工單模態框（移除 overlay 並解鎖背景滾動，不觸發全頁重渲染）
    function closeWorkOrderModal() {
      const overlay = document.getElementById("woModalOverlay");
      if (overlay) overlay.remove();
      document.body.classList.remove("modal-open");
      workOrderState.modalMode = "";
      workOrderState.selectedWorkOrderId = null;
    }

    // 綁定工單模態框內的事件（close 按鈕、保存按鈕、附件拖放）
    function bindWorkOrderModalEvents(container) {
      // 關閉按鈕
      container.querySelectorAll("[data-wo-modal-close]").forEach(btn => btn.addEventListener("click", closeWorkOrderModal));
      // 保存按鈕
      container.querySelectorAll("[data-wo-save]").forEach(btn => btn.addEventListener("click", () => {
        const form = container.querySelector("#workOrderForm");
        if (form && form.checkValidity()) {
          const formData = new FormData(form);
          saveWorkOrder(formData);
        } else if (form) {
          form.reportValidity();
        }
      }));
      // 附件拖放上傳
      const fileUploadArea = container.querySelector("#fileUploadArea");
      if (fileUploadArea) {
        fileUploadArea.addEventListener("dragover", (e) => {
          e.preventDefault();
          fileUploadArea.style.borderColor = "var(--primary)";
          fileUploadArea.style.background = "var(--primary-soft)";
        });
        fileUploadArea.addEventListener("dragleave", (e) => {
          e.preventDefault();
          fileUploadArea.style.borderColor = "var(--line)";
          fileUploadArea.style.background = "var(--panel-soft)";
        });
        fileUploadArea.addEventListener("drop", (e) => {
          e.preventDefault();
          fileUploadArea.style.borderColor = "var(--line)";
          fileUploadArea.style.background = "var(--panel-soft)";
          const files = Array.from(e.dataTransfer.files);
          const fileInput = container.querySelector("#fileInput");
          if (fileInput) {
            const dt = new DataTransfer();
            files.forEach(f => dt.items.add(f));
            fileInput.files = dt.files;
          }
          updateFileList(files);
        });
      }
    }

    function generateWorkOrderId(customer) {
      const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
      const seq = String(tickets.length + 1).padStart(3, '0');
      
      if (customer && customer.type === "政府") {
        const prefix = customer.governmentPrefix || "ECA";
        return `${prefix}-${dateStr}-${seq}`;
      }
      return `WO-${dateStr}-${seq}`;
    }

    function notifyCustomerRelationsForComplaint(ticket) {
      const activeCrUsers = users.filter(user => user.role === "CR" && isEnabled(user.status));
      const recipientsInArea = activeCrUsers.filter(user => user.area === ticket.area);
      const recipients = recipientsInArea.length > 0 ? recipientsInArea : activeCrUsers;

      recipients.forEach(user => {
        createNotification({
          module: "ticket",
          level: "action",
          title: "投訴 Call 通知",
          content: `Call ${ticket.id}（客戶：${ticket.customer}）`,
          subContent: `投訴案件待跟進。區域：${ticket.area || "未填寫"}；聯繫人：${ticket.contact || "無"}；電話：${ticket.phone || "無"}`,
          targetPage: "workorder",
          targetId: ticket.id,
          receiverId: user.id,
          receiverRole: "CR"
        });
      });
    }
    
    function saveWorkOrder(formData) {
      const isEdit = workOrderState.modalMode === "edit";
      const customer = customers.find(c => c.id === formData.get('customerId'));
      const ticketId = isEdit ? workOrderState.selectedWorkOrderId : generateWorkOrderId(customer);
      
      const ticketData = {
        id: ticketId,
        customerId: formData.get('customerId'),
        customer: customer?.nameZh || '',
        customerType: formData.get('customerType') || customer?.type || '',
        contact: formData.get('contact'),
        phone: formData.get('phone'),
        channel: formData.get('channel'),
        area: formData.get('area'),
        address: formData.get('address'),
        type: formData.get('type'),
        desc: formData.get('desc'),
        status: isEdit ? ticketById(ticketId).status : '待分派',
        owner: isEdit ? ticketById(ticketId).owner : currentRole().name,
        tl: formData.get('tl') || (isEdit ? ticketById(ticketId).tl : currentRole().name),
        master: isEdit ? ticketById(ticketId).master : '',
        createdAt: isEdit ? ticketById(ticketId).createdAt : new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        updatedAt: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        records: isEdit ? ticketById(ticketId).records : [{ time: new Date().toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false }), actor: currentRole().name, text: '創建工單' }],
        attachments: formData.get('attachments') ? formData.get('attachments').split(',').map(a => a.trim()).filter(Boolean) : [],
        tags: [],
        urgent: formData.get('priority') === '緊急' || formData.get('priority') === '非常緊急',
        priority: formData.get('priority'),
        jNumber: customer?.type === "政府" ? (formData.get('jNumber') || customer.jNumber || '') : ''
      };

      if (isEdit) {
        const index = tickets.findIndex(t => t.id === ticketId);
        if (index !== -1) {
          tickets[index] = { ...tickets[index], ...ticketData };
          saveDataToLocalStorage();
          toast('工單已更新');
        }
      } else {
        tickets.unshift(ticketData);
        saveDataToLocalStorage();
        toast('工單已創建');

        // 投訴 Call：優先通知同區的客戶關係部；未設定同區人員時通知所有啟用中的客戶關係部人員。
        if (ticketData.type === "投訴") {
          notifyCustomerRelationsForComplaint(ticketData);
        }
      }

      // 關閉模態框並刷新工單列表
      const overlay = document.getElementById("woModalOverlay");
      if (overlay) overlay.remove();
      document.body.classList.remove("modal-open");
      workOrderState.modalMode = "";
      workOrderState.selectedWorkOrderId = null;
      render();
    }

    // 批量生成空白工單
    function batchCreateWorkOrders() {
      const count = prompt('請輸入要生成的空白工單數量（1-50）：', '5');
      if (!count || isNaN(count) || count < 1 || count > 50) {
        if (count !== null) toast('請輸入1-50之間的數字');
        return;
      }

      const num = parseInt(count);
      const now = new Date();
      const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
      const timeStr = now.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-');
      
      let created = 0;
      for (let i = 0; i < num; i++) {
        const ticketId = `WO-${dateStr}-${String(tickets.length + i + 1).padStart(3, '0')}`;
        const ticketData = {
          id: ticketId,
          customerId: '',
          customer: '（空白工單）',
          contact: '',
          phone: '',
          channel: '電話',
          area: '香港',
          address: '',
          type: '保養維修',
          desc: '',
          status: '待分派',
          owner: currentRole().name,
          tl: '',
          master: '',
          createdAt: timeStr,
          updatedAt: timeStr,
          records: [{ time: timeStr, actor: currentRole().name, text: '批量生成空白工單' }],
          attachments: [],
          tags: ['空白工單'],
          urgent: false,
          priority: '普通'
        };
        tickets.unshift(ticketData);
        created++;
      }
      
      saveDataToLocalStorage();
      toast(`已批量生成 ${created} 張空白工單`);
      render();
    }

    function getRecommendedDispatchMaster(ticket) {
      const mastersList = getMastersForDispatch();
      const available = mastersList.filter(m => m.status === "可接單");
      return available.filter(m => m.area === ticket?.area).sort((a, b) => a.load - b.load)[0]
        || available.sort((a, b) => a.load - b.load)[0]
        || mastersList[0];
    }

    function renderDispatch() {
      const currentTLName = state.role === "TL" ? currentRole().name : null;
      const pending = tickets.filter(t => t.status === "待分派" && (!currentTLName || t.tl === currentTLName)).sort((a, b) => {
        const timeA = a.createdAt || '';
        const timeB = b.createdAt || '';
        return timeB.localeCompare(timeA);
      });
      const assigned = tickets.filter(t =>
        ["待確認", "待處理", "處理中"].includes(t.status) &&
        t.master &&
        (!currentTLName || t.tl === currentTLName)
      ).sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
      const dispatchRows = [...pending, ...assigned];
      const filter = state.dispatchFilters;
      const uniqueValues = (key) => [...new Set(dispatchRows.map(t => t[key]).filter(Boolean))].sort();
      const filterOptions = {
        status: ["全部", ...uniqueValues("status")],
        area: ["全部", ...uniqueValues("area")],
        customer: ["全部", ...uniqueValues("customer")],
        type: ["全部", ...uniqueValues("type")]
      };
      const filteredRows = dispatchRows.filter(t =>
        (filter.status === "全部" || t.status === filter.status) &&
        (filter.area === "全部" || t.area === filter.area) &&
        (filter.customer === "全部" || t.customer === filter.customer) &&
        (filter.type === "全部" || t.type === filter.type) &&
        (function() {
          // 關鍵詞搜索：匹配 CALL編號、客戶、內容摘要、師傅
          const kw = (state.dispatchSearch || "").toLowerCase().trim();
          if (!kw) return true;
          return `${t.id || ''} ${t.customer || ''} ${t.desc || ''} ${t.master || ''}`.toLowerCase().includes(kw);
        })()
      );

      return `
        <section class="page active">
          <div class="dispatch-list-section">
            <div class="dispatch-summary">
              <button class="dispatch-summary-card" data-dispatch-metric="pending"><span>待分派</span><strong>${pending.length}</strong><p>需要安排師傅的 CALL</p></button>
              <button class="dispatch-summary-card" data-dispatch-metric="assigned"><span>已分派</span><strong>${assigned.length}</strong><p>等待接單或處理中的 CALL</p></button>
              <button class="dispatch-summary-card" data-dispatch-metric="masters"><span>可接單師傅</span><strong>${getMastersForDispatch().filter(m => m.status === "可接單").length}</strong><p>目前可安排的外勤人員</p></button>
            </div>
            <div class="pc-section">
              <div class="dispatch-toolbar">
                <h2>分派明細</h2>
                <div class="wo-filters dispatch-filters">
                  ${[
                    ["status", "狀態"],
                    ["area", "區域"],
                    ["customer", "客戶"],
                    ["type", "CALL類型"]
                  ].map(([key, label]) => `<div class="wo-filter-group"><label>${label}</label><select data-dispatch-filter="${key}">${filterOptions[key].map(option => `<option value="${escapeHtml(option)}" ${filter[key] === option ? "selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select></div>`).join("")}
                  <div class="wo-filter-group">
                    <label>關鍵詞搜索</label>
                    <div class="wo-search-wrap">
                      <input type="text" value="${escapeHtml(state.dispatchSearch || '')}" data-dispatch-search>
                      <button type="button" class="primary-btn wo-search-btn" data-dispatch-search-btn>搜索</button>
                    </div>
                  </div>
                  <div class="wo-actions-top"><button class="secondary-btn" data-dispatch-filter-reset>重置</button></div>
                </div>
              </div>
              <div class="pc-table-wrapper">
                <table class="pc-table dispatch-table">
                  <thead><tr><th>CALL編號</th><th>客戶</th><th>區域</th><th>CALL類型</th><th>內容摘要</th><th>目前師傅</th><th>狀態</th><th>分派時間</th><th>更新時間</th><th style="text-align:center;">操作</th></tr></thead>
                  <tbody>
                    ${filteredRows.length ? filteredRows.map(t => `
                      <tr>
                        <td><button class="link-btn" data-dispatch-view="${t.id}">${t.id}</button></td>
                        <td><strong class="dispatch-customer" title="${escapeHtml(t.customer)}">${escapeHtml(t.customer)}</strong></td>
                        <td>${escapeHtml(t.area)}</td>
                        <td>${escapeHtml(t.type)}</td>
                        <td><span class="dispatch-desc" title="${escapeHtml(t.desc)}">${escapeHtml(t.desc)}</span></td>
                        <td>${escapeHtml(t.master || '-')}</td>
                        <td>${statusBadge(t.status)}</td>
                        <td>${escapeHtml(t.assignedAt || '-')}</td>
                        <td>${escapeHtml(t.updatedAt || t.createdAt || '-')}</td>
                        <td><div class="dispatch-actions">${t.status === "待分派" ? `<button class="primary-btn" data-dispatch-open="${t.id}">分派</button>` : ''}<button class="ghost-btn" data-dispatch-view="${t.id}">查看</button><button class="wo-delete-btn" data-dispatch-delete="${t.id}">刪除</button></div></td>
                      </tr>`).join("") : '<tr><td colspan="10" class="muted" style="text-align:center;padding:40px;">沒有符合篩選條件的 CALL</td></tr>'}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          ${renderDispatchAssignModal()}
          ${renderDispatchMetricModal(pending, assigned)}
        </section>`;
    }

    function renderDispatchAssignModal() {
      if (!state.dispatchModalOpen) return "";
      const ticket = ticketById(state.selectedDispatchId);
      if (!ticket || ticket.status !== "待分派") return "";
      // 師傅列表：先按區域匹配篩選同區師傅；若同區無可選師傅則 fallback 顯示全部師傅
      const mastersList = getMastersForDispatch();
      const sameAreaMasters = mastersList.filter(m => m.area === ticket.area);
      const candidateMasters = sameAreaMasters.length > 0 ? sameAreaMasters : mastersList;
      // 應用搜索關鍵詞過濾（按姓名 / 職衔 / 區域 / 技能）
      const keyword = (state.dispatchMasterKeyword || "").trim().toLowerCase();
      const statusFilter = state.dispatchMasterStatusFilter || "全部";
      const filteredMasters = candidateMasters.filter(m => {
        const matchKeyword = !keyword
          || (m.name || "").toLowerCase().includes(keyword)
          || (m.area || "").toLowerCase().includes(keyword)
          || (m.skills || "").toLowerCase().includes(keyword)
          || (m.tag || "").toLowerCase().includes(keyword);
        const matchStatus = statusFilter === "全部" || m.status === statusFilter;
        return matchKeyword && matchStatus;
      });
      // 排序：可接單優先 → 同區優先 → 負載較低優先
      const sortedMasters = [...filteredMasters].sort((a, b) => {
        const aAvailable = a.status === "可接單" ? 0 : 1;
        const bAvailable = b.status === "可接單" ? 0 : 1;
        const aMatch = a.area === ticket.area ? 0 : 1;
        const bMatch = b.area === ticket.area ? 0 : 1;
        return aAvailable - bAvailable || aMatch - bMatch || a.load - b.load;
      });
      const sameAreaHint = sameAreaMasters.length > 0
        ? `已按區域「${ticket.area}」篩選 ${sameAreaMasters.length} 位師傅`
        : `區域「${ticket.area}」暫無對應師傅，已顯示全部可選師傅`;
      if (!sortedMasters.some(m => m.name === state.selectedMaster && m.status === "可接單")) state.selectedMaster = getRecommendedDispatchMaster(ticket)?.name || "";
      const statusFilters = ["全部", "可接單", "忙碌"];
      return `
        <div class="dispatch-modal-overlay" data-dispatch-modal-close>
          <section class="dispatch-modal" role="dialog" aria-modal="true" aria-label="分派 CALL">
            <header class="dispatch-modal-head">
              <div><h2>分派 CALL · ${ticket.id}</h2><p>${sameAreaHint}，當前符合條件 ${sortedMasters.length} 位。</p></div>
              <button class="ghost-btn" data-dispatch-modal-close>關閉</button>
            </header>
            <div class="dispatch-modal-body">
              <div class="dispatch-picker-toolbar">
                <input class="dispatch-picker-search" type="text" placeholder="搜索師傅姓名 / 區域 / 技能" value="${escapeHtml(state.dispatchMasterKeyword || '')}" data-dispatch-master-keyword>
                <div class="dispatch-picker-filters">
                  ${statusFilters.map(s => `<button class="chip ${state.dispatchMasterStatusFilter === s ? 'active' : ''}" data-dispatch-master-status="${s}">${s}</button>`).join('')}
                </div>
              </div>
              <div class="dispatch-master-options">
                ${sortedMasters.length ? sortedMasters.map(m => `<button class="dispatch-master-option ${state.selectedMaster === m.name ? 'active' : ''}" data-dispatch-master="${m.name}" ${m.status !== "可接單" ? 'disabled title="目前忙碌，暫不可分派"' : ''}>
                  <span class="dispatch-master-avatar">${m.name.slice(0, 1)}</span>
                  <span><strong class="dispatch-master-name">${m.name}</strong><span class="dispatch-master-meta">${m.area} · 今日負載 ${m.load} · ${m.skills}</span></span>
                  <span class="tag">${m.status !== "可接單" ? '忙碌' : m.area === ticket.area ? '區域匹配' : m.tag}</span>
                </button>`).join("") : '<p class="muted" style="grid-column:1 / -1;text-align:center;padding:30px;">沒有符合條件的師傅</p>'}
              </div>
              <div class="field" style="margin-top:18px;">
                <label>領取單據類型（互斥，僅可選一項）</label>
                <div style="display:flex;gap:12px;margin-top:8px;">
                  <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;padding:8px 14px;border:1px solid var(--line);border-radius:8px;${state.dispatchPaperType === "完工單" ? 'border-color:var(--primary);background:var(--primary-soft);' : ''}">
                    <input type="radio" name="dispatchPaperType" value="完工單" ${state.dispatchPaperType === "完工單" ? "checked" : ""} data-dispatch-paper="完工單" style="width:auto;"> 領取完工單
                  </label>
                  <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;padding:8px 14px;border:1px solid var(--line);border-radius:8px;${state.dispatchPaperType === "服務報告" ? 'border-color:var(--primary);background:var(--primary-soft);' : ''}">
                    <input type="radio" name="dispatchPaperType" value="服務報告" ${state.dispatchPaperType === "服務報告" ? "checked" : ""} data-dispatch-paper="服務報告" style="width:auto;"> 領取服務報告
                  </label>
                </div>
                <div class="sr-hint" style="margin-top:6px;font-size:12px;color:var(--muted);">師傅移動端「處理」頁面將根據此選擇顯示對應的提交頁面</div>
              </div>
              <div class="field" style="margin-top:18px;"><label>派工備註</label><textarea id="dispatchAssignNote" placeholder="填寫派工說明或現場注意事項"></textarea></div>
            </div>
            <footer class="dispatch-modal-footer"><button class="ghost-btn" data-dispatch-modal-close>取消</button><button class="primary-btn" data-dispatch-confirm>確認分派</button></footer>
          </section>
        </div>`;
    }

    function renderDispatchMetricModal(pending, assigned) {
      if (!state.dispatchMetricModal) return "";
      const views = {
        pending: { title: "待分派明細", rows: pending, type: "calls" },
        assigned: { title: "已分派明細", rows: assigned, type: "calls" },
        masters: { title: "可接單師傅", rows: getMastersForDispatch().filter(m => m.status === "可接單"), type: "masters" }
      };
      const view = views[state.dispatchMetricModal];
      if (!view) return "";
      const table = view.type === "calls"
        ? `<table class="pc-table"><thead><tr><th>CALL編號</th><th>客戶</th><th>區域</th><th>狀態</th><th>目前師傅</th><th>更新時間</th></tr></thead><tbody>${view.rows.length ? view.rows.map(t => `<tr><td><button class="link-btn" data-dispatch-view="${t.id}">${t.id}</button></td><td>${escapeHtml(t.customer)}</td><td>${escapeHtml(t.area)}</td><td>${statusBadge(t.status)}</td><td>${escapeHtml(t.master || "-")}</td><td>${escapeHtml(t.updatedAt || t.createdAt || "-")}</td></tr>`).join("") : '<tr><td colspan="6" class="muted" style="text-align:center;padding:32px;">暫無資料</td></tr>'}</tbody></table>`

    function renderReport() {
      const statusCounts = countBy("status");
      const typeCounts = countBy("type");
      const areaCounts = countBy("area");
      const masterCounts = tickets.reduce((acc, t) => {
        const name = t.master || "未分派";
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      const customerCounts = tickets.reduce((acc, t) => {
        const name = t.customer || "未知客戶";
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      
      // 中單報表統計
      const quotationStats = {
        total: quotations.length,
        won: quotations.filter(q => q.bidStatus === '已中標').length,
        lost: quotations.filter(q => q.bidStatus === '未中標').length,
        noOffer: quotations.filter(q => q.bidStatus === '不投標').length,
        pending: quotations.filter(q => q.bidStatus === '待確認').length
      };
      const winRate = quotationStats.total > 0 ? ((quotationStats.won / quotationStats.total) * 100).toFixed(1) : 0;
      
      // 按客戶統計中單情況
      const customerQuotationStats = {};
      quotations.forEach(q => {
        if (!customerQuotationStats[q.customerName]) {
          customerQuotationStats[q.customerName] = { total: 0, won: 0 };
        }
        customerQuotationStats[q.customerName].total++;
        if (q.bidStatus === '已中標') {
          customerQuotationStats[q.customerName].won++;
        }
      });
      
      // 按區域統計中單情況
      const areaQuotationStats = {};
      quotations.forEach(q => {
        const ticket = tickets.find(t => t.id === q.ticketId);
        const area = ticket ? ticket.area : '未知';
        if (!areaQuotationStats[area]) {
          areaQuotationStats[area] = { total: 0, won: 0 };
        }
        areaQuotationStats[area].total++;
        if (q.bidStatus === '已中標') {
          areaQuotationStats[area].won++;
        }
      });
      
      return `
        <section class="page active">
          <div class="grid cols-4">
            <div class="card stat-card"><div class="stat-label">工單總數</div><div class="stat-value">${tickets.length}</div><div class="stat-note">較上週 +12%</div></div>
            <div class="card stat-card"><div class="stat-label">已完成</div><div class="stat-value">${statusCounts["已完成"] || 0}</div><div class="stat-note">閉環工單</div></div>
            <div class="card stat-card"><div class="stat-label">待處理</div><div class="stat-value">${statusCounts["待處理"] || 0}</div><div class="stat-note">需 TL / 主管處理</div></div>
            <div class="card stat-card"><div class="stat-label">已取消</div><div class="stat-value">${statusCounts["已取消"] || 0}</div><div class="stat-note">進入基礎統計</div></div>
          </div>

          <!-- Outstanding 檢查提醒 -->
          ${(() => {
            const unfinished = tickets.filter(t => ["待分派", "待處理", "處理中"].includes(t.status));
            const srPendingSig = tickets.filter(t => t.serviceReportNo && !t.signatureOriginalPhoto && t.status !== "已取消");
            const pmPending = tickets.filter(t => t.type === "PM" && !t.maintenanceType && t.status !== "已完成" && t.status !== "已取消");
            const totalOutstanding = unfinished.length + srPendingSig.length + pmPending.length;
            if (totalOutstanding === 0) return "";
            return `
            <div class="card" style="margin-top:14px;border:2px solid var(--warning);background:var(--warning-soft,#fff8e1);">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                <span style="font-size:20px;">⚠</span>
                <h2 style="margin:0;color:var(--warning);">Outstanding 檢查提醒</h2>
                <span style="font-size:12px;color:var(--muted);margin-left:auto;">每月一號自動提醒</span>
              </div>
              <div class="grid cols-3">
                <div style="padding:10px;background:var(--panel);border-radius:8px;">
                  <div style="font-size:24px;font-weight:700;color:var(--warning);">${unfinished.length}</div>
                  <div style="font-size:13px;color:var(--muted);">未完成工單（待分派/處理中）</div>
                </div>
                <div style="padding:10px;background:var(--panel);border-radius:8px;">
                  <div style="font-size:24px;font-weight:700;color:var(--warning);">${srPendingSig.length}</div>
                  <div style="font-size:13px;color:var(--muted);">SR 待上傳簽名正本</div>
                </div>
                <div style="padding:10px;background:var(--panel);border-radius:8px;">
                  <div style="font-size:24px;font-weight:700;color:var(--warning);">${pmPending.length}</div>
                  <div style="font-size:13px;color:var(--muted);">保養工單未標記保養類型</div>
                </div>
              </div>
              ${unfinished.length > 0 ? `<div style="margin-top:10px;font-size:13px;"><strong>待跟進工單：</strong>${unfinished.slice(0,5).map(t => `<span style="margin-right:8px;"><button class="link-btn" data-open="${t.id}">${t.id}</button></span>`).join("")}${unfinished.length > 5 ? ` 等 ${unfinished.length} 項` : ""}</div>` : ""}
            </div>`;
          })()}
          <div class="grid cols-3" style="margin-top:14px;">
            <div class="card"><h2>按狀態統計</h2>${STATUSES.map(s => barRow(s, statusCounts[s] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按工單類型統計</h2>${TYPES.map(t => barRow(t, typeCounts[t] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按區域統計</h2>${REGIONS.map(r => barRow(r, areaCounts[r] || 0, tickets.length)).join("")}</div>
          </div>
          <div class="grid cols-2" style="margin-top:14px;">
            <div class="card"><h2>按師傅統計</h2>${Object.entries(masterCounts).map(([k,v]) => barRow(k, v, tickets.length)).join("")}</div>
            <div class="card"><h2>按客戶統計</h2>${Object.entries(customerCounts).sort((a,b) => b[1] - a[1]).map(([k,v]) => barRow(k, v, tickets.length)).join("")}</div>
          </div>
          
          <!-- 中單報表 -->
          <div class="grid cols-4" style="margin-top:14px;">
            <div class="card stat-card"><div class="stat-label">報價單總數</div><div class="stat-value">${quotationStats.total}</div><div class="stat-note">所有報價</div></div>
            <div class="card stat-card"><div class="stat-label">已中單</div><div class="stat-value">${quotationStats.won}</div><div class="stat-note">成功中標</div></div>
            <div class="card stat-card"><div class="stat-label">未中單</div><div class="stat-value">${quotationStats.lost}</div><div class="stat-note">失去機會</div></div>
            <div class="card stat-card"><div class="stat-label">中單率</div><div class="stat-value">${winRate}%</div><div class="stat-note">成功率</div></div>
          </div>
          
          <div class="grid cols-2" style="margin-top:14px;">
            <div class="card">
              <h2>按客戶統計中單情況</h2>
              <div class="data-table-wrap">
                <table>
                  <thead>
                    <tr><th>客戶名稱</th><th>報價總數</th><th>中單數</th><th>中單率</th></tr>
                  </thead>
                  <tbody>
                    ${Object.entries(customerQuotationStats).map(([name, stats]) => {
                      const rate = stats.total > 0 ? ((stats.won / stats.total) * 100).toFixed(1) : 0;
                      return `<tr>
                        <td>${name}</td>
                        <td>${stats.total}</td>
                        <td>${stats.won}</td>
                        <td><span class="tag ${rate >= 50 ? 'success' : rate >= 30 ? 'warning' : 'danger'}">${rate}%</span></td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>
            <div class="card">
              <h2>按區域統計中單情況</h2>
              <div class="data-table-wrap">
                <table>
                  <thead>
                    <tr><th>區域</th><th>報價總數</th><th>中單數</th><th>中單率</th></tr>
                  </thead>
                  <tbody>
                    ${Object.entries(areaQuotationStats).map(([area, stats]) => {
                      const rate = stats.total > 0 ? ((stats.won / stats.total) * 100).toFixed(1) : 0;
                      return `<tr>
                        <td>${area}</td>
                        <td>${stats.total}</td>
                        <td>${stats.won}</td>
                        <td><span class="tag ${rate >= 50 ? 'success' : rate >= 30 ? 'warning' : 'danger'}">${rate}%</span></td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          
          <div class="grid cols-1" style="margin-top:14px;">
            <div class="card">
              <div class="card-head"><h2>最近 7 天趨勢</h2><span class="chip">基礎趨勢</span></div>
              <div class="trend">${[3,5,4,7,6,8,9].map((v,i) => `<div class="trend-col"><div class="trend-bar" style="height:${v * 13}px"></div><span>06-${9+i}</span></div>`).join("")}</div>
              <p>第一版只做狀態、類型、區域、師傅、客戶等基礎統計，不做成本、績效、SLA、財務、採購或複雜 BI。</p>
            </div>
          </div>
        </section>`;
    }

    function renderSettings() {
      // 根據 settingsTab 渲染不同的頁面
      if (state.settingsTab === "dictionary") {
        return renderDictionary();
      } else if (state.settingsTab === "customer") {
        return renderCustomerPage();
      } else if (state.settingsTab === "user") {
        return renderUsersPage();
      } else if (state.settingsTab === "addressBook") {
        // 報價組通訊錄已合併到用戶管理中的報價組，自動重定向
        state.settingsTab = "user";
        userState.roleFilter = "QUO";
        return renderUsersPage();
      } else if (state.settingsTab === "server") {
        return renderServerConfig();
      } else if (state.settingsTab === "excelImport") {
        return renderExcelImport();
      } else if (state.settingsTab === "components") {
        return renderComponentLibrary();
      }
      return renderDictionary(); // 默認顯示字典管理
    }

        if (hasRequired) {
