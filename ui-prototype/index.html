                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">EC負責人 ${requiredStar}</label>
                    <input name="owner" value="${escapeHtml(t.owner || '')}" required placeholder="請輸入EC負責人" style="${inputStyle}">
                  </div>
                </div>
              </div>

              <div class="wo-detail-section">
                <div class="wo-detail-card">
                  <h4>標書資訊</h4>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">標書金額 (HKD) ${requiredStar}</label>
                    <input name="tenderValue" type="number" min="0" step="100" value="${t.tenderValue || ''}" required placeholder="0" style="${inputStyle}">
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">標書狀態 ${requiredStar}</label>
                    <select name="status" required style="${inputStyle}">
                      ${tenderStatusOptions.length > 0 ? tenderStatusOptions.map(s => `<option value="${escapeHtml(s.name)}" ${t.status === s.name ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join("") : `<option value="待投標" ${t.status === "待投標" || !t.status ? 'selected' : ''}>待投標</option><option value="不投標" ${t.status === "不投標" ? 'selected' : ''}>不投標</option>`}
                    </select>
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">接受標書日期</label>
                    <input name="tenderDate" type="datetime-local" value="${escapeHtml(t.tenderDate || '')}" style="${inputStyle}">
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">截止時間</label>
                    <input name="deadline" type="datetime-local" value="${escapeHtml(t.deadline || '')}" style="${inputStyle}">
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">投票日期</label>
                    <input name="submittedDate" type="datetime-local" value="${escapeHtml(t.submittedDate || '')}" style="${inputStyle}">
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">揭曉日期</label>
                    <input name="resultDate" type="datetime-local" value="${escapeHtml(t.resultDate || '')}" style="${inputStyle}">
                  </div>
                </div>
              </div>

              <div class="wo-detail-section">
                <div class="wo-detail-card">
                  <h4>關聯資訊</h4>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">標書來源</label>
                    <select name="tenderSource" style="${inputStyle}">
                      <option value="">請選擇標書來源</option>
                      ${sourceOptions.map(s => `<option value="${escapeHtml(s.name)}" ${t.tenderSource === s.name ? "selected" : ""}>${escapeHtml(s.name)}</option>`).join("")}
                    </select>
                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">回標方式</label>
                    <select name="replyMethod" style="${inputStyle}">
                      <option value="">請選擇回標方式</option>

                    <label style="${labelStyle}">區域</label>

                  </div>
                  <div style="${fieldStyle}">
                    <label style="${labelStyle}">已發出報價編號 ${requiredStar}</label>
                    <select name="relatedQuotationId" required style="${inputStyle}">

                      ${quotations.map(q => `<option value="${q.id}" ${t.relatedQuotationId === q.id ? 'selected' : ''}>${q.id} - ${escapeHtml(q.title || '')}</option>`).join("")}
                    </select>
                  </div>
                </div>
              </div>

              <div class="wo-detail-section">
                <div class="wo-detail-card">
                  <h4>備註</h4>
                  <div style="${fieldStyle}">
                    <textarea name="remark" placeholder="請輸入備註（選填）" style="${textareaStyle}">${escapeHtml(t.remark || '')}</textarea>
                  </div>
                  ${t.attachments && t.attachments.length > 0 ? `
                  <div style="margin-top:8px;">
                    <label style="${labelStyle}">現有附件</label>
                    ${t.attachments.map(a => `<div style="padding:6px 10px;background:var(--panel-soft);border-radius:6px;margin-bottom:4px;font-size:12px;">📄 ${escapeHtml(a)}</div>`).join("")}
                  </div>` : ""}
                </div>
              </div>
            </form>
          </div>

          <div class="wo-drawer-footer tender-drawer-footer">
            <button class="ghost-btn" data-tender-cancel-edit>取消</button>
            <button class="primary-btn" type="submit" form="tenderEditForm">保存修改</button>
          </div>
        </aside>
      `;
    }

    // 生成新的標書編號：T-YYYY-NNN
    function generateTenderNo() {
      const year = new Date().getFullYear();
      const yearCount = tenders.filter(t => (t.id || "").startsWith(`T-${year}-`)).length + 1;
      return `T-${year}-${String(yearCount).padStart(3, '0')}`;
    }

    // 打開新建/編輯標書彈窗
    function openTenderModal(tenderId = null) {
      const isEdit = !!tenderId;
      const t = isEdit ? (tenders.find(x => x.id === tenderId) || {}) : {};
      const defaultDeadline = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 16);
      // 從字典獲取選項
      const sourceOptions = (dictData["標書來源"] || []).filter(s => isEnabled(s.status));
      const replyOptions = (dictData["回標方式"] || []).filter(r => isEnabled(r.status));
      const regionOptions = (dictData["區域"] || []).filter(r => isEnabled(r.status));
      const tenderStatusOptions = (dictData["標書狀態"] || []).filter(s => isEnabled(s.status));
      const tenderNo = t.id || generateTenderNo();

      // 企業級 SaaS 卡片式佈局（與新增報價風格一致，使用 qf- class 結構）
      const requiredStar = '<span class="req">*</span>';

      // Card Radio 樣式（標書類別）
      const cardRadioItems = [
        { value: 'M', label: 'M', sub: '保養' },
        { value: 'P', label: 'P', sub: '工程' },
        { value: 'M+P', label: 'M+P', sub: '保養+工程' }
      ];
      const cardRadioHtml = cardRadioItems.map(item => {
        const checked = (t.tenderCategory || '') === item.value;
        return `
          <label style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 12px;border:2px solid ${checked ? 'var(--primary)' : 'var(--line)'};border-radius:10px;cursor:pointer;transition:all .15s;background:${checked ? 'var(--primary)' : 'var(--panel)'};color:${checked ? '#fff' : 'var(--text)'};min-height:72px;">
            <input type="radio" name="tenderCategory" value="${item.value}" ${checked ? 'checked' : ''} style="position:absolute;opacity:0;pointer-events:none;">
            <span style="font-size:16px;font-weight:700;">${item.label}</span>
            <span style="font-size:12px;margin-top:4px;opacity:.85;">${item.sub}</span>
          </label>`;
      }).join('');

      const modal = document.createElement("div");
      modal.className = "qf-overlay";
      modal.innerHTML = `
        <div class="qf-modal">
          <div class="qf-header">
            <div>
              <h3>${isEdit ? '編輯標書' : '新建標書'}</h3>
              <div class="qf-sub">填寫標書基本資訊、金額、關聯報價與附件</div>
            </div>
            <button type="button" class="qf-close" data-close-modal aria-label="關閉">×</button>
          </div>
          <form id="tenderForm">
            <div class="qf-body">
            <!-- ① 基本資訊 -->
            <div class="qf-card">
              <div class="qf-card-title">基本資訊<span class="qf-card-sub">標書主要資料</span></div>
              <div class="qf-grid">
                <!-- 標書類別（Card Radio，全寬） -->
                <div class="qf-field wide">
                  <label class="qf-label">標書類別 ${requiredStar}</label>
                  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px;">
                    ${cardRadioHtml}
                  </div>
                </div>
                <!-- 標書編號（唯讀） -->
                <div class="qf-field">
                  <label class="qf-label">標書編號 ${requiredStar}</label>
                  <input class="qf-input${isEdit ? ' qf-readonly' : ''}" name="id" value="${escapeHtml(tenderNo)}" ${isEdit ? 'readonly' : 'required'} placeholder="系統自動生成">
                </div>
                <!-- 項目名稱 -->
                <div class="qf-field">
                  <label class="qf-label">項目名稱 ${requiredStar}</label>
                  <input class="qf-input" name="projectName" value="${escapeHtml(t.projectName || '')}" required placeholder="請輸入項目名稱">
                </div>
                <!-- 客戶 -->
                <div class="qf-field">
                  <label class="qf-label">客戶 ${requiredStar}</label>
                  <input class="qf-input" name="client" value="${escapeHtml(t.client || '')}" required placeholder="請輸入招標客戶">
                </div>
                <!-- EC負責人 -->
                <div class="qf-field">
                  <label class="qf-label">EC負責人 ${requiredStar}</label>
                  <input class="qf-input" name="owner" value="${escapeHtml(t.owner || '')}" required placeholder="請輸入EC負責人">
                </div>
              </div>
            </div>

            <!-- ② 標書資訊 -->
            <div class="qf-card">
              <div class="qf-card-title">標書資訊<span class="qf-card-sub">金額與日期</span></div>
              <div class="qf-grid">
                <!-- 標書金額 -->
                <div class="qf-field">
                  <label class="qf-label">標書金額 (HKD) ${requiredStar}</label>
                  <input class="qf-input" name="tenderValue" type="number" min="0" step="100" value="${t.tenderValue || ''}" required placeholder="0">
                </div>
                <!-- 標書狀態 -->
                <div class="qf-field">
                  <label class="qf-label">標書狀態 ${requiredStar}</label>
                  <select class="qf-select" name="status" required>
                    ${tenderStatusOptions.length > 0 ? tenderStatusOptions.map(s => `<option value="${escapeHtml(s.name)}" ${t.status === s.name ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join("") : `<option value="待投標" ${t.status === "待投標" || !t.status ? 'selected' : ''}>待投標</option><option value="不投標" ${t.status === "不投標" ? 'selected' : ''}>不投標</option>`}
                  </select>
                </div>
                <!-- 接受標書日期 -->
                <div class="qf-field">
                  <label class="qf-label">接受標書日期</label>
                  <input class="qf-input" name="tenderDate" type="datetime-local" value="${escapeHtml(t.tenderDate || new Date().toISOString().slice(0, 16))}">

                  <label class="qf-label">截止時間</label>

                <div class="qf-field">
                  <label class="qf-label">投票日期</label>
                  <input class="qf-input" name="submittedDate" type="datetime-local" value="${escapeHtml(t.submittedDate || '')}">

                  <label class="qf-label">區域</label>
                  <select class="qf-select" name="tenderRegion">
                    <option value="">請選擇區域</option>
                    ${regionOptions.map(r => `<option value="${escapeHtml(r.name)}" ${t.tenderRegion === r.name ? "selected" : ""}>${escapeHtml(r.name)}</option>`).join("")}

                </div>
                <!-- 已發出報價編號 -->
                <div class="qf-field">
                  <label class="qf-label">已發出報價編號 ${requiredStar}</label>
                  <select class="qf-select" name="relatedQuotationId" required>
                    <option value="">請選擇已發出報價</option>
                    ${quotations.map(q => `<option value="${q.id}" ${t.relatedQuotationId === q.id ? 'selected' : ''}>${q.id} - ${escapeHtml(q.title || '')}</option>`).join("")}
                  </select>
                </div>
              </div>
            </div>

            <!-- ④ 備註與附件 -->
            <div class="qf-card">
              <div class="qf-card-title">備註與附件<span class="qf-card-sub">補充說明與文件</span></div>
              <div class="qf-grid">
                <!-- 備註（全寬 Textarea） -->
                <div class="qf-field wide">
                  <label class="qf-label">備註</label>
                  <textarea class="qf-textarea" name="remark" placeholder="請輸入備註（選填）">${escapeHtml(t.remark || '')}</textarea>

                  <label class="qf-label">標書附件</label>

                    <div style="font-size:13px;color:var(--muted);">點擊上傳或將文件拖入此區域</div>

            </div>
            <div class="qf-footer">

            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      modal.querySelectorAll("[data-close-modal]").forEach(btn => btn.addEventListener("click", () => modal.remove()));
      modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });

      // Card Radio 點擊切換樣式
      modal.querySelectorAll('input[name="tenderCategory"]').forEach(radio => {
        radio.addEventListener("change", function() {
          modal.querySelectorAll('input[name="tenderCategory"]').forEach(r => {
            const label = r.closest('label');
            if (r.checked) {
              label.style.borderColor = 'var(--primary)';
              label.style.background = 'var(--primary)';
              label.style.color = '#fff';
            } else {
              label.style.borderColor = 'var(--line)';
              label.style.background = 'var(--panel)';
              label.style.color = 'var(--text)';
            }
          });
        });
      });

      // 文件上傳：點擊觸發 + 拖放支持
      modal.querySelectorAll('[data-tender-upload]').forEach(zone => {
        const input = zone.querySelector('input[type="file"]');
        const listContainer = modal.querySelector(`[data-tender-file-list="${zone.dataset.tenderUpload}"]`);
        // 點擊觸發文件選擇
        zone.addEventListener("click", () => input.click());
        // 拖放支持
        zone.addEventListener("dragover", (e) => { e.preventDefault(); zone.style.borderColor = 'var(--primary)'; zone.style.background = 'var(--primary-soft)'; });
        zone.addEventListener("dragleave", () => { zone.style.borderColor = 'var(--line)'; zone.style.background = 'var(--panel-soft)'; });
        zone.addEventListener("drop", (e) => {
          e.preventDefault();
          zone.style.borderColor = 'var(--line)';
          zone.style.background = 'var(--panel-soft)';
          renderTenderFileList(e.dataTransfer.files, listContainer);
        });
        input.addEventListener("change", () => renderTenderFileList(input.files, listContainer));
      });

      // 表單提交
      modal.querySelector("#tenderForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        saveTender(formData, isEdit, tenderId);
        modal.remove();
      });
    }

    // 渲染標書文件列表（上傳後顯示文件名）
    function renderTenderFileList(files, container) {
      if (!container) return;
      const arr = Array.from(files || []);
      if (arr.length === 0) return;
      container.innerHTML = arr.map((f, i) => `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel-soft);border:1px solid var(--line);border-radius:8px;margin-top:6px;font-size:13px;">
          <span>📄</span>
          <span style="flex:1;color:var(--text);">${escapeHtml(f.name)}</span>
          <span style="color:var(--muted);font-size:12px;">${(f.size / 1024).toFixed(1)} KB</span>
          <button type="button" data-remove-file="${i}" style="border:0;background:transparent;color:var(--danger);cursor:pointer;font-size:16px;padding:0 4px;">×</button>
        </div>
      `).join("");
      container.querySelectorAll('[data-remove-file]').forEach(btn => btn.addEventListener('click', () => {
        btn.closest('div').remove();
      }));
    }

    // 保存標書（新建或編輯）
    function saveTender(formData, isEdit, tenderId) {
      const data = {
        id: (formData.get("id") || "").trim(),
        projectName: (formData.get("projectName") || "").trim(),
        client: (formData.get("client") || "").trim(),
        owner: (formData.get("owner") || "").trim(),
        tenderValue: parseFloat(formData.get("tenderValue") || 0),
        status: formData.get("status") || "待投標",
        tenderDate: formData.get("tenderDate") || "",
        deadline: formData.get("deadline") || "",
        submittedDate: formData.get("submittedDate") || "",
        resultDate: formData.get("resultDate") || "",
        relatedQuotationId: formData.get("relatedQuotationId") || "",
        // 新增字段
        tenderCategory: formData.get("tenderCategory") || "",
        tenderSource: formData.get("tenderSource") || "",
        replyMethod: formData.get("replyMethod") || "",
        tenderRegion: formData.get("tenderRegion") || "",
        // 備註與附件（UI 紅利新增，不影響原有業務邏輯）
        remark: (formData.get("remark") || "").trim(),
        attachments: Array.from(formData.getAll("attachments").filter(f => f && f.name)).map(f => f.name),
        otherDocs: Array.from(formData.getAll("otherDocs").filter(f => f && f.name)).map(f => f.name)
      };

      if (isEdit) {
        const idx = tenders.findIndex(x => x.id === tenderId);
        if (idx >= 0) {
          tenders[idx] = { ...tenders[idx], ...data, id: tenderId };
          toast("標書已更新");
        }
      } else {
        if (tenders.find(x => x.id === data.id)) {
          toast("標書編號已存在，請使用其他編號", "error");
          return;
        }
        tenders.push(data);
        state.selectedTenderId = data.id;
        toast("標書已創建");
      }
      saveDataToLocalStorage();
      render();
    }

    // 保存側邊欄內編輯的標書（局部刷新，不開彈窗、不全量 render）
    function saveTenderEdit(formData, tenderId) {
      const t = tenders.find(x => x.id === tenderId);
      if (!t) return;
      // 更新各字段
      t.projectName = (formData.get("projectName") || "").trim();
      t.client = (formData.get("client") || "").trim();
      t.owner = (formData.get("owner") || "").trim();
      t.tenderValue = parseFloat(formData.get("tenderValue") || 0);
      t.status = formData.get("status") || "待投標";
      t.tenderDate = formData.get("tenderDate") || "";
      t.deadline = formData.get("deadline") || "";
      t.submittedDate = formData.get("submittedDate") || "";
      t.resultDate = formData.get("resultDate") || "";
      t.relatedQuotationId = formData.get("relatedQuotationId") || "";
      t.tenderCategory = formData.get("tenderCategory") || "";
      t.tenderSource = formData.get("tenderSource") || "";
      t.replyMethod = formData.get("replyMethod") || "";
      t.tenderRegion = formData.get("tenderRegion") || "";
      t.remark = (formData.get("remark") || "").trim();
      saveDataToLocalStorage();
      toast("標書已更新");
      // 切換回詳情模式並局部刷新側邊欄（不閃動）
      state.tenderEditMode = false;
      refreshTenderDrawer();
    }

    // 局部刷新標書側邊欄（保留滾動位置，避免全量 render 導致閃動）
    function refreshTenderDrawer() {
      const t = tenders.find(x => x.id === state.selectedTenderId);
      if (!t) {
        state.selectedTenderId = null;
        state.tenderEditMode = false;
        render();
        return;
      }
      const oldDrawer = document.querySelector(".wo-drawer");
      if (!oldDrawer) {
        render();
        return;
      }
      // 保存滾動位置
      const oldBody = oldDrawer.querySelector(".wo-drawer-body");
      const scrollTop = oldBody ? oldBody.scrollTop : 0;
      // 生成新側邊欄 DOM 並替換
      const wrapper = document.createElement("div");
      wrapper.innerHTML = renderTenderDetail(t);
      const newDrawer = wrapper.firstElementChild;
      oldDrawer.replaceWith(newDrawer);
      // 恢復滾動位置
      const newBody = newDrawer.querySelector(".wo-drawer-body");
      if (newBody) newBody.scrollTop = scrollTop;
      // 重新綁定側邊欄事件（DOM 替換後舊監聽器已銷毀）
      bindTenderDrawerEvents();
    }

    // 綁定標書側邊欄內的事件（DOM 替換後需重新綁定）
    function bindTenderDrawerEvents() {
      // 限定綁定範圍為抽屜內，避免重新綁定列表按鈕造成重複觸發
      const drawer = document.querySelector(".wo-drawer");
      if (!drawer) return;
      const scope = drawer;
      // 關閉側邊欄
      scope.querySelectorAll("[data-tender-close]").forEach(btn => btn.addEventListener("click", () => {
        state.selectedTenderId = null;
        state.tenderEditMode = false;
        render();
      }));
      // 編輯：切換為側邊欄內編輯模式
      scope.querySelectorAll("[data-tender-edit]").forEach(btn => btn.addEventListener("click", () => {
        state.tenderEditMode = true;
        refreshTenderDrawer();
      }));
      // 取消編輯：切換回詳情模式
      scope.querySelectorAll("[data-tender-cancel-edit]").forEach(btn => btn.addEventListener("click", () => {
        state.tenderEditMode = false;
        refreshTenderDrawer();
      }));
      // 刪除
      scope.querySelectorAll("[data-tender-delete]").forEach(btn => btn.addEventListener("click", () => deleteTender(btn.dataset.tenderDelete)));
      // 標記中標/未中標/不投標
      scope.querySelectorAll("[data-tender-mark-won]").forEach(btn => btn.addEventListener("click", () => updateTenderStatus(btn.dataset.tenderMarkWon, "已中標")));
      scope.querySelectorAll("[data-tender-mark-lost]").forEach(btn => btn.addEventListener("click", () => updateTenderStatus(btn.dataset.tenderMarkLost, "未中標")));
      scope.querySelectorAll("[data-tender-mark-no-bid]").forEach(btn => btn.addEventListener("click", () => updateTenderStatus(btn.dataset.tenderMarkNoBid, "不投標")));
      // 確認已投遞
      scope.querySelectorAll("[data-tender-submit]").forEach(btn => btn.addEventListener("click", () => submitTender(btn.dataset.tenderSubmit)));
      // 編輯表單提交
      const editForm = scope.querySelector("#tenderEditForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          saveTenderEdit(formData, editForm.dataset.tenderId);
        });
      }
      // 標書類別 Card Radio 點擊切換樣式
      scope.querySelectorAll('input[name="tenderCategory"]').forEach(radio => {
        radio.addEventListener("change", function() {
          scope.querySelectorAll('input[name="tenderCategory"]').forEach(r => {
            const label = r.closest('label');
            if (!label) return;
            if (r.checked) {
              label.style.borderColor = 'var(--primary)';
              label.style.background = 'var(--primary)';
              label.style.color = '#fff';
            } else {
              label.style.borderColor = 'var(--line)';
              label.style.background = 'var(--panel)';
              label.style.color = 'var(--text)';
            }
          });
        });
      });
    }

    // 更新標書狀態
    function updateTenderStatus(tenderId, newStatus) {
      const t = tenders.find(x => x.id === tenderId);
      if (!t) return;
      const oldStatus = t.status;
      t.status = newStatus;
      // 自動填充狀態對應的日期
      const today = new Date().toISOString().slice(0, 10);
      if (newStatus === "已中標" || newStatus === "未中標") {
        if (!t.resultDate) t.resultDate = today;
        if (!t.submittedDate) t.submittedDate = today;
      } else if (newStatus === "投標中" && !t.submittedDate) {
        // 投標中暫不填投遞日期
      }
      saveDataToLocalStorage();
      toast(`標書狀態已更新為「${newStatus}」`);
      // 側邊欄打開時局部刷新，避免閃動
      if (state.selectedTenderId === tenderId && !state.tenderEditMode) {
        refreshTenderDrawer();
      } else {
        render();
      }
    }

    // 確認投遞標書（保留投標中狀態，僅記錄投遞日期）
    function submitTender(tenderId) {
      const t = tenders.find(x => x.id === tenderId);
      if (!t) return;
      t.submittedDate = new Date().toISOString().slice(0, 10);
      saveDataToLocalStorage();
      toast("已記錄投遞日期");
      // 側邊欄打開時局部刷新，避免閃動
      if (state.selectedTenderId === tenderId && !state.tenderEditMode) {
        refreshTenderDrawer();
      } else {
        render();
      }
    }

    // 刪除標書（使用自定義確認彈窗）
    async function deleteTender(tenderId) {
      const t = tenders.find(x => x.id === tenderId);
      if (!t) return;
      const confirmed = await showConfirmDialog({
        title: "刪除標書",
        message: `確定要刪除標書「${t.id} - ${t.projectName}」嗎？此操作不可撤銷。`,
        confirmText: "確認刪除"
      });
      if (!confirmed) return;
      tenders = tenders.filter(x => x.id !== tenderId);
      if (state.selectedTenderId === tenderId) state.selectedTenderId = null;
      saveDataToLocalStorage();
      toast("標書已刪除");
      render();
    }

    // ============ SR 文件夾模塊 ============
    // 渲染 服務報告 文件夾（支持按編號或名稱搜索）
    function renderSrFolder() {
      // 收集所有有 serviceReportNo 的工單
      const srTickets = tickets.filter(t => t.serviceReportNo).slice().sort((a, b) => {
        // 按 SR 編號倒序排列
        return (b.serviceReportNo || "").localeCompare(a.serviceReportNo || "");
      });

      // 統計
      const totalSR = srTickets.length;
      const byStatus = {};
      srTickets.forEach(t => { byStatus[t.status] = (byStatus[t.status] || 0) + 1; });
      const completed = byStatus["已完成"] || 0;
      const inProgress = byStatus["處理中"] || 0;
      const pending = byStatus["待處理"] || 0;

      // 過濾
      const search = (state.srFolderSearch || "").toLowerCase().trim();
      const areaFilter = state.srFolderArea || "全部";
      const statusFilter = state.srFolderStatus || "全部";

      let filtered = srTickets;
      if (areaFilter !== "全部") {
        // 區域篩選兼容 srArea 和 area 字段
        filtered = filtered.filter(t => (t.srArea || t.area || "") === areaFilter);
      }
      if (statusFilter !== "全部") {
        filtered = filtered.filter(t => t.status === statusFilter);
      }
      if (search) {
        filtered = filtered.filter(t =>
          (t.serviceReportNo || "").toLowerCase().includes(search) ||
          (t.id || "").toLowerCase().includes(search) ||
          (t.customer || "").toLowerCase().includes(search) ||
          (t.desc || "").toLowerCase().includes(search) ||
          (t.srSystems || []).some(s => s.toLowerCase().includes(search)) ||
          (t.srObjectives || []).some(s => s.toLowerCase().includes(search))
        );
      }

      // 收集所有出現過的區域（用於篩選下拉）
      const allAreas = ["全部", ...new Set(srTickets.map(t => t.srArea || t.area || "").filter(Boolean))];

      return `
        <div class="pc-container">
          <div class="pc-grid sr-folder-metrics">
            <button class="pc-card" data-sr-folder-metric="total">
              <h3>服務報告總數</h3>
              <div class="pc-metric">${totalSR}</div>
              <div class="pc-label">已建立的服務報告</div>
            </button>
            <button class="pc-card" data-sr-folder-metric="pending">
              <h3>待處理</h3>
              <div class="pc-metric">${pending}</div>
              <div class="pc-label">等待師傅處理</div>
            </button>
            <button class="pc-card" data-sr-folder-metric="processing">
              <h3>處理中</h3>
              <div class="pc-metric">${inProgress}</div>
              <div class="pc-label">師傅處理中的工單</div>
            </button>
            <button class="pc-card" data-sr-folder-metric="completed">
              <h3>已完成</h3>
              <div class="pc-metric">${completed}</div>
              <div class="pc-label">已完工的服務報告</div>
            </button>
          </div>

          <div class="pc-section">
            <div class="wo-filters">
              <div class="wo-filter-group">
                <label>區域</label>
                <select data-sr-folder-area>
                  ${allAreas.map(a => `<option value="${escapeHtml(a)}" ${areaFilter === a ? 'selected' : ''}>${a === '全部' ? '全部區域' : escapeHtml(a)}</option>`).join("")}
                </select>
              </div>
              <div class="wo-filter-group">
                <label>狀態</label>
                <select data-sr-folder-status>
                  ${["全部", "待確認", "待處理", "處理中", "已完成", "已取消"].map(s => `<option value="${s}" ${statusFilter === s ? 'selected' : ''}>${s === '全部' ? '全部狀態' : s}</option>`).join("")}
                </select>
              </div>
              <div class="wo-filter-group">
                <label>關鍵詞搜索</label>
                <div class="wo-search-wrap">
                  <input type="text" value="${escapeHtml(state.srFolderSearch || '')}" data-sr-folder-search>
                  <button type="button" class="primary-btn wo-search-btn" data-sr-folder-search-btn>搜索</button>
                </div>
              </div>
              <div class="wo-actions-top">
                <button class="secondary-btn" data-sr-folder-reset>重置</button>
              </div>
            </div>

            ${renderSrFolderList(filtered)}
          </div>
          ${renderSrFolderMetricModal(srTickets)}
          ${renderSrFolderReportModal()}
        </div>
      `;
    }

    function renderSrFolderMetricModal(srTickets) {
      if (!state.srFolderMetricModal) return "";
      const views = {
        total: { title: "全部服務報告", rows: srTickets },
        pending: { title: "待處理服務報告", rows: srTickets.filter(t => t.status === "待處理") },
        processing: { title: "處理中服務報告", rows: srTickets.filter(t => t.status === "處理中") },
        completed: { title: "已完成服務報告", rows: srTickets.filter(t => t.status === "已完成") }
      };
      const view = views[state.srFolderMetricModal];
      if (!view) return "";
      return `
        <div class="dispatch-modal-overlay" data-sr-folder-metric-close>
          <section class="dispatch-modal" role="dialog" aria-modal="true" aria-label="${view.title}">
            <header class="dispatch-modal-head"><h2>${view.title}</h2><button class="ghost-btn" data-sr-folder-metric-close>關閉</button></header>
            <div class="dispatch-modal-body">
              <div class="pc-table-wrapper">
                <table class="pc-table">
                  <thead><tr><th>SR 編號</th><th>CALL編號</th><th>客戶</th><th>區域</th><th>狀態</th><th>建立時間</th></tr></thead>
                  <tbody>${view.rows.length ? view.rows.map(t => `<tr><td>SR-${escapeHtml(t.serviceReportNo)}</td><td><button class="link-btn" data-sr-folder-open-ticket="${t.id}">${escapeHtml(t.id)}</button></td><td>${escapeHtml(t.customer)}</td><td>${escapeHtml(t.srArea || t.area || "-")}</td><td>${statusBadge(t.status)}</td><td>${escapeHtml(t.createdAt || "-")}</td></tr>`).join("") : '<tr><td colspan="6" class="muted" style="text-align:center;padding:32px;">暫無資料</td></tr>'}</tbody>
                </table>
              </div>
            </div>
            <footer class="dispatch-modal-footer"><button class="secondary-btn" data-sr-folder-metric-close>關閉</button></footer>
          </section>
        </div>`;
    }

    function renderSrFolderReportModal() {
      const t = ticketById(state.srFolderReportTicketId);
      if (!t || !t.serviceReportNo) return "";
      const detail = (label, value) => `<div><span>${label}</span><strong>${escapeHtml(value || "-")}</strong></div>`;
      const tagList = (items, empty) => items?.length
        ? `<div class="sr-report-tags">${items.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join("")}</div>`
        : `<span class="muted">${empty}</span>`;
      const photoSection = (title, photos) => {
        if (!photos?.length) return "";
        return `<section class="sr-report-section"><h3>${title}</h3><div class="sr-report-photo-list">${photos.map(photo => {
          const value = String(photo || "");
          return `<div class="sr-report-photo">${value.startsWith("data:image") ? `<img src="${value}" alt="${title}">` : escapeHtml(value)}</div>`;
        }).join("")}</div></section>`;
      };
      const reportPhotos = t.serviceReportSourceImage ? [t.serviceReportSourceImage] : [];
      const signaturePhotos = t.signature ? [t.signature] : [];
      const records = Array.isArray(t.records) ? t.records.slice().reverse() : [];
      return `
        <div class="dispatch-modal-overlay" data-sr-folder-report-close>
          <section class="dispatch-modal sr-report-modal" role="dialog" aria-modal="true" aria-label="服務報告詳情">
            <header class="dispatch-modal-head">
              <div><h2>服務報告詳情</h2><p>SR-${escapeHtml(t.serviceReportNo)} · ${escapeHtml(t.id)}</p></div>
              <button class="ghost-btn" data-sr-folder-report-close>關閉</button>
            </header>
            <div class="dispatch-modal-body">
              <div class="sr-report-summary">
                <div><span>客戶</span><strong>${escapeHtml(t.customer)}</strong></div>
                <div><span>CALL 狀態</span>${statusBadge(t.status)}</div>
                <div><span>師傅</span><strong>${escapeHtml(t.master || t.owner || "-")}</strong></div>
              </div>
              <section class="sr-report-section">
                <h3>基本資料</h3>
                <div class="sr-report-detail">
                  ${detail("聯繫人", t.contact)}${detail("聯繫電話", t.phone)}${detail("服務區域", t.srArea || t.area)}${detail("保養類型", t.maintenanceType || "非保養")}${detail("地址", t.address)}${detail("建立時間", t.createdAt)}
                </div>
              </section>
              <section class="sr-report-section">
                <h3>服務內容</h3>
                <div class="sr-report-detail">
                  <div><span>系統</span>${tagList(t.srSystems, "未填寫")}</div>
                  <div><span>目的</span>${tagList(t.srObjectives, "未填寫")}</div>
                </div>
              </section>
              <section class="sr-report-section">
                <h3>服務紀錄</h3>
                <div class="sr-report-detail">
                  ${detail("簽到時間", t.serviceCheckInAt || t.arrivalTime)}${detail("完成時間", t.completionTime || (t.status === "已完成" ? t.updatedAt : ""))}${detail("客戶滿意度", t.satisfaction)}${detail("需要報價", t.needQuotation ? "是" : "否")}
                </div>
                <div style="display:grid;gap:10px;margin-top:10px;">
                  <div><span class="muted" style="font-size:12px;">完成工作</span><p class="sr-report-text">${escapeHtml(t.completedWork || t.processNote || "暫無服務紀錄")}</p></div>
                  <div><span class="muted" style="font-size:12px;">跟進結果</span><p class="sr-report-text">${escapeHtml(t.faultResult || "暫無需跟進事項")}</p></div>
                </div>
              </section>
              ${photoSection("Before Service 照片", t.beforeServicePhotos)}
              ${photoSection("服務中照片", t.processPhotos)}
              ${photoSection("After Service 照片", t.afterServicePhotos)}
              ${photoSection("已提交服務報告", reportPhotos)}
              ${photoSection("客戶電子簽名", signaturePhotos)}

    // 打開 SR 發送對話框（Email/WhatsApp 發送 服務報告 給客戶）
    function openSrSendModal(ticketId, defaultMethod) {
      const t = ticketById(ticketId);
      if (!t) { toast("找不到工單記錄", "error"); return; }
      if (!t.serviceReportNo) { toast("此工單尚未填寫 SR 編號，無法發送", "error"); return; }

      const method = defaultMethod || 'email';
      const customerInfo = customers.find(c => c.id === t.customerId);
      const defaultEmail = customerInfo?.contacts[0]?.email || '';
      const defaultPhone = customerInfo?.contacts[0]?.whatsapp || customerInfo?.contacts[0]?.phone || t.phone || '';

      const modal = document.createElement("div");
      modal.className = "um-modal-overlay";
      modal.innerHTML = `
        <div class="um-modal" style="max-width:560px;">
          <div class="um-modal-head">
            <h2>📧 發送 服務報告</h2>
            <button class="um-modal-close" data-close-modal>×</button>
          </div>
          <form id="srSendForm" style="padding:16px 20px;">

                </label>
                <label style="display:flex;align-items:center;gap:4px;font-weight:normal;cursor:pointer;">

                </label>
              </div>
            </div>

            <div id="emailFields" style="${method === 'email' ? '' : 'display:none;'}">
              <div class="field" style="margin-bottom:12px;">
                <label class="required">收件人郵箱</label>
                <input name="email" type="email" value="${defaultEmail}" placeholder="customer@example.com" required>
              </div>
              <div class="field" style="margin-bottom:12px;">
                <label class="required">郵件主題</label>
                <input name="subject" value="服務報告 ${escapeHtml(t.serviceReportNo)} - ${escapeHtml(t.customer)}" required>
              </div>
              <div class="field" style="margin-bottom:12px;">
                <label>郵件內容</label>
                <textarea name="body" rows="4" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;">尊敬的 ${escapeHtml(t.customer)}：

附件為本次服務的 服務報告（編號：${escapeHtml(t.serviceReportNo)}），對應工單 ${escapeHtml(t.id)}。
請查閱，如有疑問請隨時聯繫我們。

此致
EC Info 工程團隊</textarea>
              </div>
              <div class="field" style="margin-bottom:12px;">
                <label>附件</label>
                <div style="background:#f9fafb;border:1px solid var(--line);border-radius:6px;padding:8px 12px;font-size:13px;">
                  📎 SR_${escapeHtml(t.serviceReportNo)}.pdf（自動生成）<span style="color:var(--muted);"> · ${escapeHtml(t.id)}.pdf</span>
                </div>
              </div>
            </div>

            <div id="whatsappFields" style="${method === 'whatsapp' ? '' : 'display:none;'}">
              <div class="field" style="margin-bottom:12px;">
                <label class="required">WhatsApp 號碼</label>
                <input name="phone" value="${defaultPhone}" placeholder="+852 9123 4567" required>
              </div>

                <label class="required">消息內容</label>
                <textarea name="message" rows="4" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;">您好 ${escapeHtml(t.customer)}，

我們已完成工單 ${escapeHtml(t.id)} 的服務，服務報告 編號：${escapeHtml(t.serviceReportNo)}。
請點擊以下連結查看完整報告：
https://ecinfo.com/sr/${escapeHtml(t.serviceReportNo)}

如有疑問請聯繫我們。謝謝！</textarea>
              </div>
            </div>

            <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:8px 12px;margin-bottom:16px;font-size:12px;color:#9a3412;">
              ℹ 模擬說明：此為原型演示。實際部署時，Email 將通過 SMTP 發送並附帶 PDF 附件，WhatsApp 將通過 WhatsApp Business API 發送。
              <br>⚠ 需求註：接收電子版需分階段進行，CR 部門必須先與客戶確認接受電子版後方可實行。
            </div>

              <button type="button" class="ghost-btn" data-close-modal>取消</button>
              <button type="submit" class="primary-btn">確認發送</button>

        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      // 切換發送方式時顯示/隱藏對應字段
      const methodRadios = modal.querySelectorAll('input[name="method"]');
      methodRadios.forEach(radio => {
        radio.addEventListener("change", (e) => {
          modal.querySelector("#emailFields").style.display = e.target.value === 'email' ? '' : 'none';
          modal.querySelector("#whatsappFields").style.display = e.target.value === 'whatsapp' ? '' : 'none';
          // 切換時更新必填屬性
          const emailInput = modal.querySelector('input[name="email"]');
          const phoneInput = modal.querySelector('input[name="phone"]');
          if (emailInput) emailInput.required = e.target.value === 'email';
          if (phoneInput) phoneInput.required = e.target.value === 'whatsapp';
        });
      });

      // 提交表單
      const form = modal.querySelector("#srSendForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const selectedMethod = fd.get("method");
        const recipient = selectedMethod === 'email' ? fd.get("email") : fd.get("phone");

        // 記錄發送歷史
        const sendLogs = JSON.parse(localStorage.getItem('ecinfo_sr_send_logs') || '[]');
        sendLogs.unshift({
          srNo: t.serviceReportNo,
          ticketId: t.id,
          customer: t.customer,
          method: selectedMethod,
          recipient: recipient,
          sendTime: new Date().toLocaleString('zh-TW', { hour12: false }),
          operator: state.role === 'MASTER' ? '老闆' : (state.role || 'CS-001'),
          status: '已發送'
        });
        if (sendLogs.length > 100) sendLogs.length = 100;
        localStorage.setItem('ecinfo_sr_send_logs', JSON.stringify(sendLogs));

        toast(`✓ SR ${t.serviceReportNo} 已通過 ${selectedMethod === 'email' ? 'Email' : 'WhatsApp'} 發送至 ${recipient}`, "success");
        modal.remove();
      });
    }

      const modal = document.createElement("div");
      modal.className = "um-modal-overlay";
      modal.innerHTML = `

    function masterTickets(includeHistory = false) {
      const roleName = currentRole().name;
      const list = tickets.filter(t => t.master === roleName || t.owner === roleName);
      return includeHistory ? list.filter(t => ["已完成", "已取消"].includes(t.status)) : list.filter(t => ["待確認", "待處理", "處理中"].includes(t.status));
    }

    function masterTaskTickets() {
      const taskStatuses = ["待確認", "待處理", "處理中", "已完成"];
      const roleName = currentRole().name;
      return tickets.filter(t => (t.master === roleName || t.owner === roleName) && taskStatuses.includes(t.status));
    }

      return new Date().toLocaleString("zh-HK", {
        year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false
      }).replace(/\//g, "-");
    }

      const photoGrid = (photos) => photos.length

      const serviceContent = `

          <h3>3. 處理記錄</h3>

    function saveMobileProcessPhotos(type, files) {
      const t = ticketById(state.mobileProcessTicketId);
      if (!t) return;
      const key = type === "after" ? "afterServicePhotos" : "beforeServicePhotos";
      const selectedFiles = Array.from(files || []);
      if (!selectedFiles.length) return;
      const photos = [...(t[key] || [])];
      let remaining = selectedFiles.length;
      selectedFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = (loadEvent) => {
          photos.push(loadEvent.target.result);
          remaining -= 1;
          if (remaining === 0) {
            updateTicket(t.id, { [key]: photos });
            render();
            toast("照片已即時保存", "success");
          }
        };
        reader.readAsDataURL(file);
      });
    }

    function addMobileProcessDemoPhoto(type) {
      const t = ticketById(state.mobileProcessTicketId);
      if (!t) return;
      const key = type === "after" ? "afterServicePhotos" : "beforeServicePhotos";
      const label = type === "after" ? "After Service" : "Before Service";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240"><rect width="100%" height="100%" fill="#dbeafe"/><text x="50%" y="46%" text-anchor="middle" font-family="Arial" font-size="20" fill="#1d4ed8">${label}</text><text x="50%" y="60%" text-anchor="middle" font-family="Arial" font-size="14" fill="#475569">${mobileProcessTime()}</text></svg>`;
      const photo = `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))}`;
      updateTicket(t.id, { [key]: [...(t[key] || []), photo] });
      render();
      toast("示例照片已即時保存", "success");
    }

    // Sync current DOM input values back to ticket/state before re-render
    function srSyncInputs() {
      const t = ticketById(state.selectedTicketId);
      if (!t) return;
      const get = (id) => { const el = document.getElementById(id); return el ? el.value : ""; };
      t.serviceReportNo = get("serviceReportNo");
      t.maintenanceType = get("maintenanceType");
      t.arrivalTime = get("arrivalTime");
      t.completionTime = get("completionTime");
      t.completedWork = get("completedWork");
      t.faultResult = get("faultResult");
      t.quotationNote = get("quotationNote");
      t.paperHolder = get("paperHolder");
      // 同步 System/Others、Objective/Others 及 HK$ 金額字段
      const srSystemOtherEl = document.querySelector('[data-sr-input="srSystemOther"]');
      if (srSystemOtherEl) t.srSystemOther = srSystemOtherEl.value;
      const srObjectiveOtherEl = document.querySelector('[data-sr-input="srObjectiveOther"]');
      if (srObjectiveOtherEl) t.srObjectiveOther = srObjectiveOtherEl.value;
      const srObjectiveAmountEl = document.querySelector('[data-sr-input="srObjectiveAmount"]');
      if (srObjectiveAmountEl) t.srObjectiveAmount = srObjectiveAmountEl.value;
      // Sync parts from DOM inputs
      document.querySelectorAll("[data-sr-part-name]").forEach(el => {
        const idx = parseInt(el.dataset.srPartName);
        if (state.srParts[idx]) state.srParts[idx].name = el.value;
      });
      document.querySelectorAll("[data-sr-part-qty]").forEach(el => {
        const idx = parseInt(el.dataset.srPartQty);
        if (state.srParts[idx]) state.srParts[idx].qty = el.value;
      });
    }

    function srToggleChip(key) {
      srSyncInputs();
      const idx = state.srServiceTypes.indexOf(key);
      if (idx >= 0) state.srServiceTypes.splice(idx, 1);
      else state.srServiceTypes.push(key);
      render();
    }

    // 切換 System 系統多選標籤（紙質報告字段還原）
    function srToggleSystem(key) {
      srSyncInputs();
      const t = ticketById(state.selectedTicketId);

      else t.srSystems.push(key);

    function initialiseSrSignaturePad(canvas) {
      const t = ticketById(state.selectedTicketId);
      if (!t) return;
      const context = canvas.getContext("2d");
      context.lineWidth = 4;
      context.lineCap = "round";
      context.strokeStyle = "#0f172a";
      let drawing = false;
      let hasStroke = false;

      const point = (event) => {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left) * (canvas.width / rect.width),
          y: (event.clientY - rect.top) * (canvas.height / rect.height)
        };
      };
      const saveSignature = () => {
        if (!hasStroke) return;
        const signature = canvas.toDataURL("image/png");
        state.srSignature = signature;
        updateTicket(t.id, { signature });
      };
      canvas.addEventListener("pointerdown", (event) => {
        drawing = true;
        hasStroke = true;
        const p = point(event);
        context.beginPath();
        context.moveTo(p.x, p.y);
        canvas.setPointerCapture(event.pointerId);
      });
      canvas.addEventListener("pointermove", (event) => {
        if (!drawing) return;
        const p = point(event);
        context.lineTo(p.x, p.y);
        context.stroke();
      });
      const stopDrawing = (event) => {
        if (!drawing) return;
        drawing = false;
        if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
        saveSignature();
      };
      canvas.addEventListener("pointerup", stopDrawing);
      canvas.addEventListener("pointercancel", stopDrawing);
    }

    // ===== Voice Input (supports target textarea) =====
    function startVoiceInput(targetId) {
      targetId = targetId || "mobileResult";
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('您的瀏覽器不支持語音輸入，請手動輸入文字。');
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.continuous = true;
      recognition.interimResults = true;

      const textarea = document.getElementById(targetId);
      if (!textarea) return;

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        textarea.value += transcript;
      };
      recognition.onerror = (event) => {
        console.error('語音識別錯誤:', event.error);
        alert('語音輸入失敗，請手動輸入文字。');
      };
      recognition.start();
      toast('開始語音輸入，請說話...');
      setTimeout(() => {
        recognition.stop();
        toast('語音輸入已停止');
      }, 30000);
    }
    
    // 檢查完工紙到期提醒
    function checkCompletionPaperExpiration() {
      const today = new Date();
      const twoWeeksLater = new Date(today.getTime() + 14 * 24 * 60 * 60 * 1000);
      
      quotations.forEach(q => {
        if (q.completionPaperStatus === '待制作' || q.completionPaperStatus === '已領取') {
          const dueDate = q.completionPaperDueDate ? new Date(q.completionPaperDueDate) : null;
          
          if (dueDate && dueDate <= twoWeeksLater) {
            const daysLeft = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
            
            // 檢查是否已經發送過提醒
            const reminderKey = `completion_paper_reminder_${q.id}`;
            const lastReminder = localStorage.getItem(reminderKey);
            const todayStr = today.toISOString().slice(0, 10);
            
            if (lastReminder !== todayStr) {
              // 發送提醒
              const reminderMsg = daysLeft <= 0 
                ? `完工紙已超期！報價單 ${q.ourRef} 的完工紙需要立即歸還。`
                : `完工紙將在 ${daysLeft} 天后到期！報價單 ${q.ourRef} 的完工紙請儘快歸還。`;
              
              // 創建通知
              createNotification({
                module: 'quotation',
                level: 'warning',
                title: '完工紙到期提醒',
                content: reminderMsg,
                targetPage: 'quotations',
                targetId: q.id,
                receiverRole: 'TL,MASTER'
              });
              
              // 記錄今天已發送提醒
              localStorage.setItem(reminderKey, todayStr);
            }
          }
        }
      });
    }

    // 根據工單區域、關鍵詞和狀態篩選師傅列表（只返回同區域師傅）
    function getFilteredMastersForDispatch(ticket) {
      const keyword = (state.mdMasterKeyword || "").trim().toLowerCase();
      return getMastersForDispatch()
        .filter(m => m.area === ticket.area)
        .map((master, idx) => ({
          ...master,
          rating: (4.9 - idx * 0.1).toFixed(1),
          matchRate: 98 - idx * 4,
          distance: 2 + idx
        }))
        .filter(master =>
          (state.mdMasterStatus === "全部" || master.status === state.mdMasterStatus) &&
          (!keyword || [master.name, master.skills, master.area, master.tag].join(" ").toLowerCase().includes(keyword))
        );
    }

      const listEl = document.getElementById("mdMasterList");
      if (listEl) listEl.innerHTML = renderMdMasterList(t);
      const confirmEl = document.getElementById("mdConfirmArea");
      if (confirmEl) confirmEl.innerHTML = renderMdConfirmArea(t);

      // 重新綁定師傅卡片點擊事件
      document.querySelectorAll("[data-md-master]").forEach(btn => btn.addEventListener("click", () => {
        state.mdSelectedMaster = btn.dataset.mdMaster;
        refreshMdMasterArea();
      }));
      // 重新綁定確認分派按鈕

      if (submitBtn) submitBtn.addEventListener("click", () => {
        const ticket = ticketById(state.mdSelectedTicketId);

    // 更新網絡狀態指示器（在線/離線）
    function updateNetworkIndicator() {
      const toggle = document.getElementById("networkToggle");
      if (!toggle) return;
      if (state.online === undefined) state.online = true; // 默認在線
      if (state.online) {
        toggle.textContent = "在線";
        toggle.className = "status-badge tone-info";
        toggle.style.background = "";
      } else {
        toggle.textContent = "離線";
        toggle.className = "status-badge tone-warning";
        toggle.style.background = "#fef3c7";
        toggle.style.color = "#92400e";
      }
    }

    // 切換在線/離線狀態
    function toggleNetworkStatus() {
      if (state.online === undefined) state.online = true;
      state.online = !state.online;
      const outbox = JSON.parse(localStorage.getItem('ecinfo_offline_outbox') || '[]');
      if (state.online) {
        toast("🌐 已恢復網絡連接", "success");
        // 如果有待上傳數據，提示用戶
        if (outbox.length > 0) {
          setTimeout(() => {
            toast(`檢測到 ${outbox.length} 條待上傳數據，正在自動同步...`, "info");
            setTimeout(() => syncOfflineData(), 1500);
          }, 500);
        }
      } else {
        toast("📱 已切換到離線模式，數據將保存在本地", "info");
      }
      updateNetworkIndicator();
      render();
    }

    // 將數據保存到離線 outbox（待上傳隊列）
    function saveToOfflineOutbox(dataType, data) {
      const outbox = JSON.parse(localStorage.getItem('ecinfo_offline_outbox') || '[]');
      const item = {
        id: 'offline-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
        dataType: dataType,
        data: data,
        savedTime: new Date().toLocaleString('zh-TW', { hour12: false }),
        status: 'pending'
      };
      outbox.push(item);
      localStorage.setItem('ecinfo_offline_outbox', JSON.stringify(outbox));
      return item;
    }

    // 同步離線數據（將 outbox 中的數據上傳到系統）
    function syncOfflineData() {
      let outbox = JSON.parse(localStorage.getItem('ecinfo_offline_outbox') || '[]');
      if (outbox.length === 0) {
        toast("沒有待上傳的離線數據");
        return;
      }

      let successCount = 0;
      let failCount = 0;
      const failedItems = [];

      outbox.forEach(item => {
        try {
          if (item.dataType === 'workrecord') {
            // 同步處理記錄到工單
            const ticket = tickets.find(t => t.id === item.data.ticketId);
            if (ticket) {
              if (item.data.serviceReportNo) ticket.serviceReportNo = item.data.serviceReportNo;
              if (item.data.srSystems) ticket.srSystems = item.data.srSystems;
              if (item.data.srObjectives) ticket.srObjectives = item.data.srObjectives;
              if (item.data.srArea) ticket.srArea = item.data.srArea;
              if (item.data.maintenanceType) ticket.maintenanceType = item.data.maintenanceType;
              if (item.data.status) ticket.status = item.data.status;
              if (item.data.workDescription) ticket.workDescription = item.data.workDescription;
              if (item.data.processPhotos) ticket.processPhotos = (ticket.processPhotos || []).concat(item.data.processPhotos);
              successCount++;
            } else {
              failCount++;
              failedItems.push(item);
            }
          } else if (item.dataType === 'newticket') {
            // 同步新建工單
            tickets.push(item.data);
            successCount++;
          } else if (item.dataType === 'signature') {
            // 同步簽名
            const ticket = tickets.find(t => t.id === item.data.ticketId);
            if (ticket) {
              ticket.signature = item.data.signature;
              ticket.signatureTime = item.data.signatureTime;
              successCount++;
            } else {
              failCount++;
              failedItems.push(item);
            }
          } else {
            // 未知類型，保留
            failCount++;
            failedItems.push(item);
          }
        } catch (e) {
          failCount++;
          failedItems.push(item);
        }
      });

      saveDataToLocalStorage();
      // 只保留失敗的項目
      localStorage.setItem('ecinfo_offline_outbox', JSON.stringify(failedItems));
      toast(`✓ 離線數據同步完成：成功 ${successCount} 條${failCount > 0 ? `，失敗 ${failCount} 條` : ''}`, "success");
      render();
    }

        if (remarkEl) t.cpRemark = remarkEl.value;

      // 提交完工
      document.querySelectorAll("[data-cp-submit]").forEach(btn => btn.addEventListener("click", () => {

          }
        }, 1000);
      }));

    // 字典管理事件委託 - 只註冊一次，處理動態渲染的按鈕
    document.addEventListener("click", function(e) {
      const target = e.target;

      // 標籤頁切換
      const tabBtn = target.closest("[data-dict-tab]");
      if (tabBtn) { state.dictTab = tabBtn.dataset.dictTab; render(); return; }

      // 關閉抽屜/確認框（僅點擊遮罩本身或關閉按鈕時觸發）
      // 關鍵：使用 matches() 而非 closest()，避免點擊內部按鈕時冒泡到遮罩層誤觸發關閉
      if (target.matches("[data-dm-drawer-close]")) {
        dictState.drawerOpen = false; dictState.editItem = null;
        render(); return;
      }
      if (target.matches("[data-dm-confirm-close]")) {
        dictState.deleteTarget = null;
        render(); return;
      }

      // 新增按鈕（主頁面）
      const addMainBtn = target.closest("[data-dict-add-main]");
      if (addMainBtn) {
        dictState.manageType = state.dictTab || "工單類型";
        dictState.editItem = {};
        dictState.drawerOpen = true;
        render();
        return;
      }

      // 編輯按鈕（主頁面）
      const editMainBtn = target.closest("[data-dict-edit-main]");
      if (editMainBtn) {
        const idx = parseInt(editMainBtn.dataset.dictEditMain);
        const type = state.dictTab || "工單類型";
        dictState.manageType = type;
        dictState.editItem = { ...dictData[type][idx] };
        dictState.drawerOpen = true;
        render();
        return;
      }

      // 刪除按鈕（主頁面）
      const deleteMainBtn = target.closest("[data-dict-delete-main]");
      if (deleteMainBtn) {
        const type = state.dictTab || "工單類型";
        dictState.manageType = type;
        dictState.deleteTarget = parseInt(deleteMainBtn.dataset.dictDeleteMain);
        render();
        return;
      }

      // 保存按鈕
      const saveBtn = target.closest("[data-dict-save]");
      if (saveBtn) {
        const form = document.getElementById("dictEditForm");
        if (!form) return;
        const type = dictState.manageType;
        const config = DICT_CONFIG[type];
        const formData = new FormData(form);
        const item = {};
        config.fields.forEach(field => {
          if (field.type === "switch") {
            const cb = form.querySelector(`[name="${field.key}"]`);
            item[field.key] = cb && cb.checked ? "啓用" : "停用";
          } else {
            item[field.key] = formData.get(field.key) || "";
          }
        });
        const missing = config.fields.filter(f => f.required && !item[f.key]);
        if (missing.length > 0) { toast("請填寫必填字段：" + missing.map(f => f.label).join("、")); return; }
        const items = dictData[type] || [];
        const isNew = !dictState.editItem.id;
        if (isNew) {
          item.id = "D" + type[0] + String(items.length + 1).padStart(3, "0");
          item.createdAt = new Date().toISOString().split("T")[0];
          if (type === "Call代碼") item.sortOrder = items.length + 1;
          items.push(item);
        } else {
          const idx = items.findIndex(i => i.id === dictState.editItem.id);
          if (idx >= 0) items[idx] = { ...items[idx], ...item };
        }
        dictData[type] = items;
        syncDictToLegacy();
        dictState.drawerOpen = false;
        dictState.editItem = null;
        toast(isNew ? "新增成功" : "保存成功");
        render();
        return;
      }

      // 確認刪除
      const confirmBtn = target.closest("[data-dict-confirm-delete]");
      if (confirmBtn) {
        const type = dictState.manageType;
        const idx = dictState.deleteTarget;
        if (type && idx !== null && dictData[type] && dictData[type][idx]) {
          dictData[type].splice(idx, 1);
          syncDictToLegacy();
          toast("刪除成功");
        }
        dictState.deleteTarget = null;
        render();
        return;
      }
    });

    // 報價組通訊錄事件委託（#37）：處理新增/編輯/刪除/保存
    document.addEventListener("click", function(e) {
      const target = e.target;

      // 關閉抽屜（僅點擊遮罩本身或關閉按鈕時觸發）
      if (target.matches("[data-ab-drawer-close]")) {
        addressBookState.drawerOpen = false;
        addressBookState.editIndex = null;
        render();
        return;
      }
      // 關閉刪除確認框
      if (target.matches("[data-ab-confirm-close]")) {
        addressBookState.deleteTarget = null;
        render();
        return;
      }

      // 新增聯繫人
      if (target.closest("[data-ab-add]")) {
        addressBookState.drawerOpen = true;
        addressBookState.editIndex = null;
        render();
        return;
      }

      // 編輯聯繫人
      const editBtn = target.closest("[data-ab-edit]");
      if (editBtn) {
        addressBookState.drawerOpen = true;
        addressBookState.editIndex = parseInt(editBtn.dataset.abEdit);
        render();
        return;
      }

      // 刪除聯繫人（打開確認框）
      const deleteBtn = target.closest("[data-ab-delete]");
      if (deleteBtn) {
        addressBookState.deleteTarget = parseInt(deleteBtn.dataset.abDelete);
        render();
        return;
      }

      // 保存聯繫人（新增或編輯）
      const saveBtn = target.closest("[data-ab-save]");
      if (saveBtn) {
        const form = document.getElementById("addressBookForm");
        if (!form) return;
        const formData = new FormData(form);
        const name = (formData.get("name") || "").trim();
        if (!name) { toast("請填寫姓名"); return; }
        const contacts = getAddressBookContacts();
        const isEdit = addressBookState.editIndex !== null && addressBookState.editIndex !== undefined;
        const entry = {
          name: name,
          email: formData.get("email") || "",
          fax: formData.get("fax") || "",
          phone: formData.get("phone") || "",
          company: formData.get("company") || "",
          remark: formData.get("remark") || "",
          status: formData.get("status") || "啓用"
        };
        if (isEdit) {
          const idx = addressBookState.editIndex;
          entry.id = contacts[idx].id;
          entry.createdAt = contacts[idx].createdAt;
          contacts[idx] = entry;
        } else {
          // 自動生成編號：QC + 3位序號
          const maxSeq = contacts.reduce((max, c) => {
            const m = String(c.id || "").match(/^QC(\d+)$/);
            return m ? Math.max(max, parseInt(m[1])) : max;
          }, 0);
          entry.id = "QC" + String(maxSeq + 1).padStart(3, "0");
          entry.createdAt = new Date().toISOString().split("T")[0];
          contacts.push(entry);
        }
        saveAddressBookContacts(contacts);
        addressBookState.drawerOpen = false;
        addressBookState.editIndex = null;
        toast(isEdit ? "保存成功" : "新增成功");
        render();
        return;
      }

      // 確認刪除
      const confirmBtn = target.closest("[data-ab-confirm-delete]");
      if (confirmBtn) {
        const contacts = getAddressBookContacts();
        const idx = addressBookState.deleteTarget;
        if (idx !== null && idx !== undefined && contacts[idx]) {
          contacts.splice(idx, 1);
          saveAddressBookContacts(contacts);
          toast("刪除成功");
        }
        addressBookState.deleteTarget = null;
        render();
        return;
      }
    });

    // 關閉所有已展開的自定義下拉框面板，並從 body 移除殘留面板
    function closeAllSelectPanels() {
      document.querySelectorAll('.qf-select-panel.open').forEach(function (p) {
        p.classList.remove('open');
        if (p.parentNode) p.parentNode.removeChild(p);
      });
      document.querySelectorAll('.qf-select-trigger.open').forEach(function (t) { t.classList.remove('open'); });
    }
    // 增強單個 select 為自定義下拉框：隱藏原生 select（保留業務邏輯），用自定義 UI 顯示，面板最多顯示 6 個選項可滾動
    // 面板使用 position:fixed 並掛載到 body，避免被 modal/overlay 的 overflow 裁剪
    function enhanceSelect(select) {
      if (!select || select.tagName !== 'SELECT') return;
      if (select.dataset.enhanced === '1') return;
      select.dataset.enhanced = '1';
      // 用包裝層包裹原生 select，並建立觸發器（選項面板延遲建立並掛載到 body）
      const wrap = document.createElement('div');
      wrap.className = 'qf-select-wrap';
      if (select.classList.contains('qf-readonly') || select.disabled) wrap.classList.add('qf-readonly');
      select.parentNode.insertBefore(wrap, select);
      wrap.appendChild(select);
      const trigger = document.createElement('div');
      trigger.className = 'qf-select-trigger';
      trigger.tabIndex = 0;
      wrap.appendChild(trigger);
      let panel = null;
      // 取得（或建立）選項面板元素
      function getPanel() {
        if (!panel) {
          panel = document.createElement('div');
          panel.className = 'qf-select-panel';
        }
        return panel;
      }
      // 同步觸發器顯示文字
      function refresh() {
        const sel = select.options[select.selectedIndex];
        if (sel && select.value) {
          trigger.textContent = sel.textContent;
          trigger.classList.remove('placeholder');
        } else {
          trigger.textContent = (select.dataset.placeholder || '請選擇');
          trigger.classList.add('placeholder');
        }
      }
      // 重建選項面板內容
      function buildOptions() {
        const p = getPanel();
        p.innerHTML = '';
        Array.prototype.forEach.call(select.options, function (opt, i) {
          const optEl = document.createElement('div');
          optEl.className = 'qf-select-opt';
          if (i === select.selectedIndex) optEl.classList.add('selected');
          if (opt.disabled) optEl.classList.add('disabled');
          optEl.textContent = opt.textContent;
          optEl.addEventListener('click', function (e) {
            e.stopPropagation();
            if (opt.disabled) return;
            select.selectedIndex = i;
            select.dispatchEvent(new Event('change', { bubbles: true }));
            closePanel();
          });
          p.appendChild(optEl);
        });
      }
      // 展開選項面板：先關閉其他面板，再計算位置並掛載到 body
      function openPanel() {
        if (wrap.classList.contains('qf-readonly')) return;
        if (!document.body.contains(wrap)) return;
        closeAllSelectPanels();
        buildOptions();
        const p = getPanel();
        document.body.appendChild(p);
        // 根據觸發器位置計算面板座標（fixed 定位）
        const rect = trigger.getBoundingClientRect();
        p.style.top = (rect.bottom + 4) + 'px';
        p.style.left = rect.left + 'px';
        p.style.width = rect.width + 'px';
        p.classList.add('open');
        trigger.classList.add('open');
        // 若下方空間不足且上方足夠，改為向上展開
        const ph = p.getBoundingClientRect().height;
        if (rect.bottom + 4 + ph > window.innerHeight && rect.top - 4 - ph > 0) {
          p.style.top = (rect.top - 4 - ph) + 'px';
        }
      }
      // 收起選項面板並從 body 移除
      function closePanel() {
        const p = getPanel();
        p.classList.remove('open');
        trigger.classList.remove('open');
        if (p.parentNode) p.parentNode.removeChild(p);
      }
      trigger.addEventListener('click', function (e) {
        e.stopPropagation();
        if (trigger.classList.contains('open')) closePanel(); else openPanel();
      });
      trigger.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPanel(); }
        if (e.key === 'Escape') closePanel();
      });
      select.addEventListener('change', function () { refresh(); });
      // 重寫 value setter：外部直接賦值 select.value 時同步更新自定義 UI
      try {
        const desc = Object.getOwnPropertyDescriptor(HTMLSelectElement.prototype, 'value');
        Object.defineProperty(select, 'value', {
          get: function () { return desc.get.call(this); },
          set: function (v) { desc.set.call(this, v); refresh(); },
          configurable: true
        });
      } catch (err) {}
      // 監聽 options 子元素變化：更新觸發器顯示，若面板展開中則重建選項
      new MutationObserver(function () {
        refresh();
        if (panel && panel.classList.contains('open')) buildOptions();
      }).observe(select, { childList: true, subtree: true });
      refresh();
    }
    // 所有表單共用同一組可搜尋下拉，避免不同彈窗各自使用不一致的元件。
    function enhanceAllSelects(scope) {
      enhanceSearchableSelects(scope || document);
    }
    // 全局事件：點擊下拉框/面板外部關閉、滾動/縮放時關閉（僅註冊一次）
    if (!window.__qfSelectGlobalBound) {
      window.__qfSelectGlobalBound = true;
      document.addEventListener('click', function (e) {
        if (e.target.closest('.qf-select-wrap') || e.target.closest('.qf-select-panel')) return;
        closeAllSelectPanels();
      });
      // 捕獲階段監聯滾動：面板為 fixed 定位，滾動時位置不再正確，直接關閉
      window.addEventListener('scroll', closeAllSelectPanels, true);
      window.addEventListener('resize', closeAllSelectPanels);
    }
    // 動態彈窗插入後，使用同一組可搜尋下拉規則。
    if (!window.__qfSelectObserverBound) {
      window.__qfSelectObserverBound = true;
      let scheduled = false;
      new MutationObserver(function () {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(function () { scheduled = false; enhanceAllSelects(document); });
      }).observe(document.body, { childList: true, subtree: true });
    }
    function render() {
      renderShell();
      if (state.view === "pc") renderPc();
      if (state.view === "mobile") renderMobile();
      bindEvents();
      // 增強當前渲染範圍內所有下拉框
      enhanceAllSelects(document);
      enhanceSearchableSelects();
      // 抽屜打開時禁止外部頁面滾動，僅抽屜內部可滾動
      const isDrawerOpen =
        (workOrderState.selectedWorkOrderId !== null) ||
        (state.page === "quotations" && quotationState.selectedQuotationId !== null);
      document.body.classList.toggle("drawer-open", isDrawerOpen);
    }

    // Hamburger toggle: collapse / expand sidebar
    $("#hamburgerBtn").addEventListener("click", () => {
      state.isSidebarCollapsed = !state.isSidebarCollapsed;
      state.isSettingsPopoverOpen = false;
      render();
    });

    // Tooltip for collapsed sidebar nav items
    let tooltipEl = null;
    document.addEventListener("mouseover", (e) => {
      if (!state.isSidebarCollapsed) return;
      const navItem = e.target.closest(".nav-item[data-collapsed-label]");
      if (!navItem) return;
      const label = navItem.dataset.collapsedLabel;
      if (!tooltipEl) {
        tooltipEl = document.createElement("div");
        tooltipEl.className = "nav-tooltip";
        document.body.appendChild(tooltipEl);
      }
      const rect = navItem.getBoundingClientRect();
      tooltipEl.textContent = label;
      tooltipEl.style.top = (rect.top + rect.height / 2) + "px";
      tooltipEl.style.left = (rect.right + 10) + "px";
      tooltipEl.style.transform = "translateY(-50%)";
      tooltipEl.classList.add("show");
    });
    document.addEventListener("mouseout", (e) => {
      const navItem = e.target.closest(".nav-item[data-collapsed-label]");
      if (navItem && tooltipEl) {
        tooltipEl.classList.remove("show");
      }
    });

    // Settings popover: close on outside click
    document.addEventListener("click", (e) => {
      if (!state.isSettingsPopoverOpen) return;
      const popover = document.getElementById("settingsPopover");
      const settingsBtn = document.querySelector(".nav-item-settings");
      if (popover && !popover.contains(e.target) && !(settingsBtn && settingsBtn.contains(e.target))) {
        state.isSettingsPopoverOpen = false;
        render();
      }
    });

    $("#themeBtn").addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem("ec-ui-theme", next);
      $("#themeBtn").textContent = next === "dark" ? "亮色模式" : "暗色模式";
    });
    $("#userMenuBtn").addEventListener("click", () => $("#userDropdown").classList.toggle("open"));
    document.addEventListener("click", (event) => {
      if (!event.target.closest(".user-menu")) $("#userDropdown").classList.remove("open");
    });

    const savedTheme = localStorage.getItem("ec-ui-theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
    $("#themeBtn").textContent = savedTheme === "dark" ? "亮色模式" : "暗色模式";
    render();
    
    // 檢查完工紙到期提醒
    checkCompletionPaperExpiration();
  </script>
</body>
</html>
