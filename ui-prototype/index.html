    // 打開 SR 發送對話框（Email/WhatsApp 發送 Service Report 給客戶）
    function openSrSendModal(ticketId, defaultMethod) {
      const t = ticketById(ticketId);
      if (!t) { toast("找不到工單記錄", "error"); return; }
      if (!t.serviceReportNo) { toast("此工單尚未填寫 SR 編號，無法發送", "error"); return; }

      const method = defaultMethod || 'email';
      const customerInfo = customers.find(c => c.id === t.customerId);
      const defaultEmail = customerInfo?.contacts[0]?.email || '';
      const defaultPhone = customerInfo?.contacts[0]?.whatsapp || customerInfo?.contacts[0]?.phone || t.phone || '';

      const modal = document.createElement("div");
      modal.className = "um-modal-overlay";
      modal.innerHTML = `
        <div class="um-modal" style="max-width:560px;">
          <div class="um-modal-head">
            <h2>📧 發送 Service Report</h2>
            <button class="um-modal-close" data-close-modal>×</button>
          </div>
          <form id="srSendForm" style="padding:16px 20px;">
            <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:13px;">
              <strong>SR 編號：</strong>${escapeHtml(t.serviceReportNo)}　
              <strong>工單：</strong>${escapeHtml(t.id)}　
              <strong>客戶：</strong>${escapeHtml(t.customer)}
            </div>

            <div class="field" style="margin-bottom:12px;">
              <label class="required">發送方式</label>
              <div style="display:flex;gap:8px;padding-top:4px;">
                <label style="display:flex;align-items:center;gap:4px;font-weight:normal;cursor:pointer;">
                  <input type="radio" name="method" value="email" ${method === 'email' ? 'checked' : ''}> 📧 Email
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-weight:normal;cursor:pointer;">
                  <input type="radio" name="method" value="whatsapp" ${method === 'whatsapp' ? 'checked' : ''}> 💬 WhatsApp
                </label>
              </div>
            </div>

            <div id="emailFields" style="${method === 'email' ? '' : 'display:none;'}">
              <div class="field" style="margin-bottom:12px;">
                <label class="required">收件人郵箱</label>
                <input name="email" type="email" value="${defaultEmail}" placeholder="customer@example.com" required>
              </div>
              <div class="field" style="margin-bottom:12px;">
                <label class="required">郵件主題</label>
                <input name="subject" value="Service Report ${escapeHtml(t.serviceReportNo)} - ${escapeHtml(t.customer)}" required>
              </div>
              <div class="field" style="margin-bottom:12px;">
                <label>郵件內容</label>
                <textarea name="body" rows="4" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;">尊敬的 ${escapeHtml(t.customer)}：

附件為本次服務的 Service Report（編號：${escapeHtml(t.serviceReportNo)}），對應工單 ${escapeHtml(t.id)}。
請查閱，如有疑問請隨時聯繫我們。

此致
EC Info 工程團隊</textarea>
              </div>
              <div class="field" style="margin-bottom:12px;">
                <label>附件</label>
                <div style="background:#f9fafb;border:1px solid var(--line);border-radius:6px;padding:8px 12px;font-size:13px;">
                  📎 SR_${escapeHtml(t.serviceReportNo)}.pdf（自動生成）<span style="color:var(--muted);"> · ${escapeHtml(t.id)}.pdf</span>
                </div>
              </div>
            </div>

            <div id="whatsappFields" style="${method === 'whatsapp' ? '' : 'display:none;'}">
              <div class="field" style="margin-bottom:12px;">
                <label class="required">WhatsApp 號碼</label>
                <input name="phone" value="${defaultPhone}" placeholder="+852 9123 4567" required>
              </div>
              <div class="field" style="margin-bottom:12px;">
                <label class="required">消息內容</label>
                <textarea name="message" rows="4" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;">您好 ${escapeHtml(t.customer)}，

我們已完成工單 ${escapeHtml(t.id)} 的服務，Service Report 編號：${escapeHtml(t.serviceReportNo)}。
請點擊以下連結查看完整報告：
https://ecinfo.com/sr/${escapeHtml(t.serviceReportNo)}

如有疑問請聯繫我們。謝謝！</textarea>
              </div>
            </div>

            <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:8px 12px;margin-bottom:16px;font-size:12px;color:#9a3412;">
              ℹ 模擬說明：此為原型演示。實際部署時，Email 將通過 SMTP 發送並附帶 PDF 附件，WhatsApp 將通過 WhatsApp Business API 發送。
              <br>⚠ 需求註：接收電子版需分階段進行，CR 部門必須先與客戶確認接受電子版後方可實行。
            </div>

            <div class="um-modal-actions">
              <button type="button" class="ghost-btn" data-close-modal>取消</button>
              <button type="submit" class="primary-btn">確認發送</button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);

      // 綁定關閉事件
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      // 切換發送方式時顯示/隱藏對應字段
      const methodRadios = modal.querySelectorAll('input[name="method"]');
      methodRadios.forEach(radio => {
        radio.addEventListener("change", (e) => {
          modal.querySelector("#emailFields").style.display = e.target.value === 'email' ? '' : 'none';
          modal.querySelector("#whatsappFields").style.display = e.target.value === 'whatsapp' ? '' : 'none';
          // 切換時更新必填屬性
          const emailInput = modal.querySelector('input[name="email"]');
          const phoneInput = modal.querySelector('input[name="phone"]');
          if (emailInput) emailInput.required = e.target.value === 'email';
          if (phoneInput) phoneInput.required = e.target.value === 'whatsapp';
        });
      });

      // 提交表單
      const form = modal.querySelector("#srSendForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const selectedMethod = fd.get("method");
        const recipient = selectedMethod === 'email' ? fd.get("email") : fd.get("phone");

        // 記錄發送歷史
        const sendLogs = JSON.parse(localStorage.getItem('ecinfo_sr_send_logs') || '[]');
        sendLogs.unshift({
          srNo: t.serviceReportNo,
          ticketId: t.id,
          customer: t.customer,
          method: selectedMethod,
          recipient: recipient,
          sendTime: new Date().toLocaleString('zh-TW', { hour12: false }),
          operator: state.role === 'MASTER' ? '老闆' : (state.role || 'CS-001'),
          status: '已發送'
        });
        if (sendLogs.length > 100) sendLogs.length = 100;
        localStorage.setItem('ecinfo_sr_send_logs', JSON.stringify(sendLogs));

    // Sync current DOM input values back to ticket/state before re-render
    function srSyncInputs() {
      const t = ticketById(state.selectedTicketId);
      if (!t) return;
      const get = (id) => { const el = document.getElementById(id); return el ? el.value : ""; };
      t.serviceReportNo = get("serviceReportNo");
      t.maintenanceType = get("maintenanceType");
      t.arrivalTime = get("arrivalTime");
      t.completionTime = get("completionTime");
      t.completedWork = get("completedWork");
      t.faultResult = get("faultResult");
      t.quotationNote = get("quotationNote");
      t.paperHolder = get("paperHolder");
      // 同步 System/Others、Objective/Others 及 HK$ 金額字段
      const srSystemOtherEl = document.querySelector('[data-sr-input="srSystemOther"]');
      if (srSystemOtherEl) t.srSystemOther = srSystemOtherEl.value;
      const srObjectiveOtherEl = document.querySelector('[data-sr-input="srObjectiveOther"]');
      if (srObjectiveOtherEl) t.srObjectiveOther = srObjectiveOtherEl.value;
      const srObjectiveAmountEl = document.querySelector('[data-sr-input="srObjectiveAmount"]');
      if (srObjectiveAmountEl) t.srObjectiveAmount = srObjectiveAmountEl.value;
      // Sync parts from DOM inputs
      document.querySelectorAll("[data-sr-part-name]").forEach(el => {
        const idx = parseInt(el.dataset.srPartName);
        if (state.srParts[idx]) state.srParts[idx].name = el.value;
      });
      document.querySelectorAll("[data-sr-part-qty]").forEach(el => {
        const idx = parseInt(el.dataset.srPartQty);
        if (state.srParts[idx]) state.srParts[idx].qty = el.value;
      });
    }

    // ===== Voice Input (supports target textarea) =====
    function startVoiceInput(targetId) {
      targetId = targetId || "mobileResult";
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('您的瀏覽器不支持語音輸入，請手動輸入文字。');
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.continuous = true;
      recognition.interimResults = true;

      const textarea = document.getElementById(targetId);
      if (!textarea) return;

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        textarea.value += transcript;
      };
      recognition.onerror = (event) => {
        console.error('語音識別錯誤:', event.error);
        alert('語音輸入失敗，請手動輸入文字。');
      };
      recognition.start();
      toast('開始語音輸入，請說話...');
      setTimeout(() => {
        recognition.stop();
        toast('語音輸入已停止');
      }, 30000);
    }
    
    // 檢查完工紙到期提醒
    function checkCompletionPaperExpiration() {
      const today = new Date();
      const twoWeeksLater = new Date(today.getTime() + 14 * 24 * 60 * 60 * 1000);
      
      quotations.forEach(q => {
        if (q.completionPaperStatus === '待制作' || q.completionPaperStatus === '已領取') {
          const dueDate = q.completionPaperDueDate ? new Date(q.completionPaperDueDate) : null;
          
          if (dueDate && dueDate <= twoWeeksLater) {
            const daysLeft = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
            
            // 檢查是否已經發送過提醒
            const reminderKey = `completion_paper_reminder_${q.id}`;
            const lastReminder = localStorage.getItem(reminderKey);
            const todayStr = today.toISOString().slice(0, 10);
            
            if (lastReminder !== todayStr) {
              // 發送提醒
              const reminderMsg = daysLeft <= 0 
                ? `完工紙已超期！報價單 ${q.ourRef} 的完工紙需要立即歸還。`
                : `完工紙將在 ${daysLeft} 天后到期！報價單 ${q.ourRef} 的完工紙請儘快歸還。`;
              
              // 創建通知
              createNotification({
                module: 'quotation',
                level: 'warning',
                title: '完工紙到期提醒',
                content: reminderMsg,
                targetPage: 'quotations',
                targetId: q.id,
                receiverRole: 'TL,MASTER'
              });
              
              // 記錄今天已發送提醒
              localStorage.setItem(reminderKey, todayStr);
            }
          }
        }
      });
    }

    // ===== 移動端分派中心（TL 角色）=====
    function renderMobileDispatch() {
      // 區塊①：取得待分派工單列表（根據當前 TL 人物過濾）
      const currentTLName = currentRole().name;
      const pendingTickets = tickets.filter(t => t.status === "待分派" && t.tl === currentTLName);

      // 若未選中工單，預設選中第一張待分派工單
      if (pendingTickets.length > 0 && !pendingTickets.find(t => t.id === state.mdSelectedTicketId)) {
        state.mdSelectedTicketId = pendingTickets[0].id;
      }
      const selectedTicket = pendingTickets.find(t => t.id === state.mdSelectedTicketId) || pendingTickets[0];

      // 區塊②：推薦師傅：基於 masters 數組加上模擬的評分、匹配率、距離
      const recommendedMasters = masters.map((m, idx) => {
        const rating = (4.9 - idx * 0.1).toFixed(1);                 // 本月評分（模擬）
        const matchRate = 98 - idx * 4;                                // 技能匹配率（模擬）
        const sameArea = selectedTicket && m.area === selectedTicket.area;
        const distance = sameArea ? (2 + idx) : (8 + idx * 3);         // 距離 km（模擬）
        return { ...m, rating, matchRate, distance };
      });

      // 預設選中第一位推薦師傅
      if (recommendedMasters.length > 0 && !recommendedMasters.find(m => m.name === state.mdSelectedMaster)) {
        state.mdSelectedMaster = recommendedMasters[0].name;
      }
      const selectedMaster = recommendedMasters.find(m => m.name === state.mdSelectedMaster) || recommendedMasters[0];

      // 待分派工單列表

        ? `<div class="md-empty">暫無待分派工單</div>`

      // 推薦師傅列表
      const mastersHtml = recommendedMasters.length === 0
        ? `<div class="md-empty">暫無可用師傅</div>`
        : recommendedMasters.map(m => `

              </div>
            </div>
            <div class="md-radio ${state.mdSelectedMaster === m.name ? "checked" : ""}"></div>

        `).join("");

      // 區塊③：分派確認（選擇師傅後顯示）
      const confirmHtml = (selectedTicket && selectedMaster) ? `

    // 渲染移動端 CR（客戶報告）頁面 — 支持按 SR 編號或客戶名稱搜索
    function renderMobileCr() {

      let srTickets = tickets.filter(t => t.serviceReportNo).slice().sort((a, b) => {

        srTickets = srTickets.filter(t =>
          (t.serviceReportNo || "").toLowerCase().includes(search) ||
          (t.id || "").toLowerCase().includes(search) ||
          (t.customer || "").toLowerCase().includes(search)

    // 更新網絡狀態指示器（在線/離線）
    function updateNetworkIndicator() {
      const toggle = document.getElementById("networkToggle");
      if (!toggle) return;
      if (state.online === undefined) state.online = true; // 默認在線
      if (state.online) {
        toggle.textContent = "在線";
        toggle.className = "status-pill status-處理中";
        toggle.style.background = "";
      } else {
        toggle.textContent = "離線";
        toggle.className = "status-pill status-待處理";
        toggle.style.background = "#fef3c7";
        toggle.style.color = "#92400e";
      }
    }

    // 切換在線/離線狀態
    function toggleNetworkStatus() {
      if (state.online === undefined) state.online = true;
      state.online = !state.online;
      const outbox = JSON.parse(localStorage.getItem('ecinfo_offline_outbox') || '[]');
      if (state.online) {
        toast("🌐 已恢復網絡連接", "success");
        // 如果有待上傳數據，提示用戶
        if (outbox.length > 0) {
          setTimeout(() => {
            toast(`檢測到 ${outbox.length} 條待上傳數據，正在自動同步...`, "info");
            setTimeout(() => syncOfflineData(), 1500);
          }, 500);
        }
      } else {
        toast("📱 已切換到離線模式，數據將保存在本地", "info");
      }
      updateNetworkIndicator();
      render();
    }

    // 將數據保存到離線 outbox（待上傳隊列）
    function saveToOfflineOutbox(dataType, data) {
      const outbox = JSON.parse(localStorage.getItem('ecinfo_offline_outbox') || '[]');
      const item = {
        id: 'offline-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
        dataType: dataType,
        data: data,
        savedTime: new Date().toLocaleString('zh-TW', { hour12: false }),
        status: 'pending'
      };
      outbox.push(item);
      localStorage.setItem('ecinfo_offline_outbox', JSON.stringify(outbox));
      return item;
    }

    // 同步離線數據（將 outbox 中的數據上傳到系統）
    function syncOfflineData() {
      let outbox = JSON.parse(localStorage.getItem('ecinfo_offline_outbox') || '[]');
      if (outbox.length === 0) {
        toast("沒有待上傳的離線數據");
        return;
      }

      let successCount = 0;
      let failCount = 0;
      const failedItems = [];

      outbox.forEach(item => {
        try {
          if (item.dataType === 'workrecord') {
            // 同步處理記錄到工單
            const ticket = tickets.find(t => t.id === item.data.ticketId);
            if (ticket) {
              if (item.data.serviceReportNo) ticket.serviceReportNo = item.data.serviceReportNo;
              if (item.data.srSystems) ticket.srSystems = item.data.srSystems;
              if (item.data.srObjectives) ticket.srObjectives = item.data.srObjectives;
              if (item.data.srArea) ticket.srArea = item.data.srArea;
              if (item.data.maintenanceType) ticket.maintenanceType = item.data.maintenanceType;
              if (item.data.status) ticket.status = item.data.status;
              if (item.data.workDescription) ticket.workDescription = item.data.workDescription;
              if (item.data.processPhotos) ticket.processPhotos = (ticket.processPhotos || []).concat(item.data.processPhotos);
              successCount++;
            } else {
              failCount++;
              failedItems.push(item);
            }
          } else if (item.dataType === 'newticket') {
            // 同步新建工單
            tickets.push(item.data);
            successCount++;
          } else if (item.dataType === 'signature') {
            // 同步簽名
            const ticket = tickets.find(t => t.id === item.data.ticketId);
            if (ticket) {
              ticket.signature = item.data.signature;
              ticket.signatureTime = item.data.signatureTime;
              successCount++;
            } else {
              failCount++;
              failedItems.push(item);
            }
          } else {
            // 未知類型，保留
            failCount++;
            failedItems.push(item);
          }
        } catch (e) {
          failCount++;
          failedItems.push(item);
        }
      });

      saveDataToLocalStorage();
      // 只保留失敗的項目
      localStorage.setItem('ecinfo_offline_outbox', JSON.stringify(failedItems));
      toast(`✓ 離線數據同步完成：成功 ${successCount} 條${failCount > 0 ? `，失敗 ${failCount} 條` : ''}`, "success");
      render();
    }

          const newInput = document.querySelector("[data-sr-folder-search]");
          if (newInput) {
            newInput.focus();
            newInput.setSelectionRange(newInput.value.length, newInput.value.length);
          }
        });
      });
      // SR 文件夾：查看工單（PC 詳情抽屜）
      document.querySelectorAll("[data-sr-folder-open-ticket]").forEach(btn => btn.addEventListener("click", () => {
        performAction("view", btn.dataset.srFolderOpenTicket);
      }));
      // SR 文件夾：查看 SR（切換到移動端處理頁面）
      document.querySelectorAll("[data-sr-folder-open-sr]").forEach(btn => btn.addEventListener("click", () => {
        const id = btn.dataset.srFolderOpenSr;
        state.selectedTicketId = id;
        state.view = "mobile";
        state.mobilePage = "workRecord";
        render();
      }));
      document.querySelectorAll("[data-po-create]").forEach(btn => btn.addEventListener("click", createPurchaseOrder));
      document.querySelectorAll("[data-po-action]").forEach(btn => btn.addEventListener("click", () => poAction(btn.dataset.poId, btn.dataset.poAction)));
      document.querySelectorAll("[data-sup-create]").forEach(btn => btn.addEventListener("click", createSupplier));
      document.querySelectorAll("[data-sup-edit]").forEach(btn => btn.addEventListener("click", () => editSupplier(btn.dataset.supEdit)));
      document.querySelectorAll("[data-sup-toggle]").forEach(btn => btn.addEventListener("click", () => toggleSupplier(btn.dataset.supToggle)));
      
      document.querySelectorAll("[data-quotation-page]").forEach(btn => btn.addEventListener("click", () => {
        const page = btn.dataset.quotationPage;
        const totalPages = Math.ceil(filterQuotations().length / quotationState.pageSize);
        if (page === "prev" && quotationState.currentPage > 1) quotationState.currentPage--;
        else if (page === "next" && quotationState.currentPage < totalPages) quotationState.currentPage++;
        else if (page !== "prev" && page !== "next") quotationState.currentPage = parseInt(page);
        render();
      }));

      // Notification events
      const notiBell = $("#notiBell");
      if (notiBell && !notiBell.dataset.bound) {
        notiBell.dataset.bound = "1";
        notiBell.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleNotificationPanel();
        });
      }
      document.querySelectorAll("[data-open-notification]").forEach(card => card.addEventListener("click", () => {
        openNotification(card.dataset.openNotification);
      }));
      document.querySelectorAll("[data-mark-all-read]").forEach(btn => btn.addEventListener("click", (e) => {
        e.stopPropagation();
        markAllAsRead();
      }));
      // 點擊頁面其他地方時關閉通知面板（只綁定一次，防止 render 累加）
      if (!window._notiCloseBound) {
        window._notiCloseBound = true;
        document.addEventListener("click", (e) => {
          const notiWrapper = $("#notiWrapper");
          if (notiWrapper && !notiWrapper.contains(e.target) && notificationState.panelOpen) {
            closeNotificationPanel();
          }
        });
      }

      // Work Order Management events
      document.querySelectorAll("[data-wo-view]").forEach(btn => btn.addEventListener("click", () => {
        openWorkOrderDrawer(btn.dataset.woView);
      }));
      document.querySelectorAll("[data-wo-close]").forEach(btn => btn.addEventListener("click", () => {
        closeWorkOrderDrawer();
      }));
      document.querySelectorAll("[data-wo-create]").forEach(btn => btn.addEventListener("click", () => {
        openCreateWorkOrderModal();
      }));
      document.querySelectorAll("[data-wo-modal-close]").forEach(btn => btn.addEventListener("click", () => {
        closeWorkOrderModal();
      }));
      document.querySelectorAll("[data-wo-save]").forEach(btn => btn.addEventListener("click", () => {
        const form = $("#workOrderForm");
        if (form && form.checkValidity()) {
          const formData = new FormData(form);
          saveWorkOrder(formData);
        } else if (form) {
          form.reportValidity();
        }
      }));
      document.querySelectorAll("[data-wo-filter]").forEach(el => el.addEventListener("change", () => {
        const filterKey = el.dataset.woFilter;
        workOrderState.filters[filterKey] = el.value;
        render();
      }));
      document.querySelectorAll("[data-wo-filter=\"keyword\"]").forEach(el => el.addEventListener("input", () => {
        workOrderState.filters.keyword = el.value;
        render();
      }));
      document.querySelectorAll("[data-wo-reset]").forEach(btn => btn.addEventListener("click", () => {
        workOrderState.filters = {
          status: "全部",
          type: "全部",
          area: "全部",
          owner: "全部",
          customer: "全部",
          keyword: ""
        };
        render();
      }));
      // Drawer action buttons
      document.querySelectorAll("[data-action=\"edit\"]").forEach(btn => btn.addEventListener("click", () => {
        openEditWorkOrderModal(btn.dataset.id);
      }));

      // ===== Service Report events =====
      document.querySelectorAll("[data-voice-target]").forEach(btn => btn.addEventListener("click", () => startVoiceInput(btn.dataset.voiceTarget)));
      document.querySelectorAll("[data-sr-chip]").forEach(chip => chip.addEventListener("click", () => srToggleChip(chip.dataset.srChip)));
      document.querySelectorAll("[data-sr-system-chip]").forEach(chip => chip.addEventListener("click", () => srToggleSystem(chip.dataset.srSystemChip)));
      document.querySelectorAll("[data-sr-objective-chip]").forEach(chip => chip.addEventListener("click", () => srToggleObjective(chip.dataset.srObjectiveChip)));
      document.querySelectorAll("[data-sr-ocr-upload]").forEach(btn => btn.addEventListener("click", srOcrUpload));
      document.querySelectorAll("[data-sr-radio]").forEach(radio => radio.addEventListener("click", () => srSetWorkNature(radio.dataset.srRadio)));
      document.querySelectorAll("[data-sr-satisfaction]").forEach(btn => btn.addEventListener("click", () => srSetSatisfaction(btn.dataset.srSatisfaction)));
      document.querySelectorAll("[data-sr-toggle-quotation]").forEach(sw => sw.addEventListener("click", srToggleQuotation));
      document.querySelectorAll("[data-sr-add-part]").forEach(btn => btn.addEventListener("click", srAddPart));
      document.querySelectorAll("[data-sr-remove-part]").forEach(btn => btn.addEventListener("click", () => srRemovePart(parseInt(btn.dataset.srRemovePart))));
      document.querySelectorAll("[data-sr-upload-photo]").forEach(btn => btn.addEventListener("click", srUploadPhoto));
      document.querySelectorAll("[data-sr-remove-photo]").forEach(btn => btn.addEventListener("click", () => srRemovePhoto(parseInt(btn.dataset.srRemovePhoto))));
      document.querySelectorAll("[data-sr-upload-report-photo]").forEach(btn => btn.addEventListener("click", srUploadReportPhoto));
      document.querySelectorAll("[data-sr-remove-report-photo]").forEach(btn => btn.addEventListener("click", () => srRemoveReportPhoto(parseInt(btn.dataset.srRemoveReportPhoto))));
      document.querySelectorAll("[data-sr-upload-paper]").forEach(btn => btn.addEventListener("click", srUploadCompletionPaper));
      document.querySelectorAll("[data-sr-remove-paper]").forEach(btn => btn.addEventListener("click", srRemoveCompletionPaper));
      document.querySelectorAll("[data-sr-upload-signature-original]").forEach(btn => btn.addEventListener("click", srUploadSignatureOriginal));
      document.querySelectorAll("[data-sr-remove-signature-original]").forEach(btn => btn.addEventListener("click", srRemoveSignatureOriginal));
      document.querySelectorAll("[data-sr-send-email]").forEach(btn => btn.addEventListener("click", () => srSendSoftcopy("Email")));
      document.querySelectorAll("[data-sr-send-whatsapp]").forEach(btn => btn.addEventListener("click", () => srSendSoftcopy("WhatsApp")));
    }

    // 字典管理事件委託 - 只註冊一次，處理動態渲染的按鈕
    document.addEventListener("click", function(e) {
      const target = e.target;

      // 標籤頁切換
      const tabBtn = target.closest("[data-dict-tab]");
      if (tabBtn) { state.dictTab = tabBtn.dataset.dictTab; render(); return; }

      // 關閉抽屜/確認框（僅點擊遮罩本身或關閉按鈕時觸發）
      // 關鍵：使用 matches() 而非 closest()，避免點擊內部按鈕時冒泡到遮罩層誤觸發關閉
      if (target.matches("[data-dm-drawer-close]")) {
        dictState.drawerOpen = false; dictState.editItem = null;
        render(); return;
      }
      if (target.matches("[data-dm-confirm-close]")) {
        dictState.deleteTarget = null;
        render(); return;
      }

      // 新增按鈕（主頁面）
      const addMainBtn = target.closest("[data-dict-add-main]");
      if (addMainBtn) {
        dictState.manageType = state.dictTab || "工單類型";
        dictState.editItem = {};
        dictState.drawerOpen = true;
        render();
        return;
      }

      // 編輯按鈕（主頁面）
      const editMainBtn = target.closest("[data-dict-edit-main]");
      if (editMainBtn) {
        const idx = parseInt(editMainBtn.dataset.dictEditMain);
        const type = state.dictTab || "工單類型";
        dictState.manageType = type;
        dictState.editItem = { ...dictData[type][idx] };
        dictState.drawerOpen = true;
        render();
        return;
      }

      // 刪除按鈕（主頁面）
      const deleteMainBtn = target.closest("[data-dict-delete-main]");
      if (deleteMainBtn) {
        const type = state.dictTab || "工單類型";
        dictState.manageType = type;
        dictState.deleteTarget = parseInt(deleteMainBtn.dataset.dictDeleteMain);
        render();
        return;
      }

      // 保存按鈕
      const saveBtn = target.closest("[data-dict-save]");
      if (saveBtn) {
        const form = document.getElementById("dictEditForm");
        if (!form) return;
        const type = dictState.manageType;
        const config = DICT_CONFIG[type];
        const formData = new FormData(form);
        const item = {};
        config.fields.forEach(field => {
          if (field.type === "switch") {
            const cb = form.querySelector(`[name="${field.key}"]`);
            item[field.key] = cb && cb.checked ? "啓用" : "停用";
          } else {
            item[field.key] = formData.get(field.key) || "";
          }
        });
        const missing = config.fields.filter(f => f.required && !item[f.key]);
        if (missing.length > 0) { toast("請填寫必填字段：" + missing.map(f => f.label).join("、")); return; }
        const items = dictData[type] || [];
        const isNew = !dictState.editItem.id;
        if (isNew) {
          item.id = "D" + type[0] + String(items.length + 1).padStart(3, "0");
          item.createdAt = new Date().toISOString().split("T")[0];
          if (type === "Call代碼") item.sortOrder = items.length + 1;
          items.push(item);
        } else {
          const idx = items.findIndex(i => i.id === dictState.editItem.id);
          if (idx >= 0) items[idx] = { ...items[idx], ...item };
        }
        dictData[type] = items;
        syncDictToLegacy();
        dictState.drawerOpen = false;
        dictState.editItem = null;
        toast(isNew ? "新增成功" : "保存成功");
        render();
        return;
      }

      // 確認刪除
      const confirmBtn = target.closest("[data-dict-confirm-delete]");
      if (confirmBtn) {
        const type = dictState.manageType;
        const idx = dictState.deleteTarget;
        if (type && idx !== null && dictData[type] && dictData[type][idx]) {
          dictData[type].splice(idx, 1);
          syncDictToLegacy();
          toast("刪除成功");
        }
        dictState.deleteTarget = null;
        render();
        return;
      }
    });

    // 報價組通訊錄事件委託（#37）：處理新增/編輯/刪除/保存
    document.addEventListener("click", function(e) {
      const target = e.target;

      // 關閉抽屜（僅點擊遮罩本身或關閉按鈕時觸發）
      if (target.matches("[data-ab-drawer-close]")) {
        addressBookState.drawerOpen = false;
        addressBookState.editIndex = null;
        render();
        return;
      }
      // 關閉刪除確認框
      if (target.matches("[data-ab-confirm-close]")) {
        addressBookState.deleteTarget = null;
        render();
        return;
      }

      // 新增聯繫人
      if (target.closest("[data-ab-add]")) {
        addressBookState.drawerOpen = true;
        addressBookState.editIndex = null;
        render();
        return;
      }

      // 編輯聯繫人
      const editBtn = target.closest("[data-ab-edit]");
      if (editBtn) {
        addressBookState.drawerOpen = true;
        addressBookState.editIndex = parseInt(editBtn.dataset.abEdit);
        render();
        return;
      }

      // 刪除聯繫人（打開確認框）
      const deleteBtn = target.closest("[data-ab-delete]");
      if (deleteBtn) {
        addressBookState.deleteTarget = parseInt(deleteBtn.dataset.abDelete);
        render();
        return;
      }

      // 保存聯繫人（新增或編輯）
      const saveBtn = target.closest("[data-ab-save]");
      if (saveBtn) {
        const form = document.getElementById("addressBookForm");
        if (!form) return;
        const formData = new FormData(form);
        const name = (formData.get("name") || "").trim();
        if (!name) { toast("請填寫姓名"); return; }
        const contacts = getAddressBookContacts();
        const isEdit = addressBookState.editIndex !== null && addressBookState.editIndex !== undefined;
        const entry = {
          name: name,
          email: formData.get("email") || "",
          fax: formData.get("fax") || "",
          phone: formData.get("phone") || "",
          company: formData.get("company") || "",
          remark: formData.get("remark") || "",
          status: formData.get("status") || "啓用"
        };
        if (isEdit) {
          const idx = addressBookState.editIndex;
          entry.id = contacts[idx].id;
          entry.createdAt = contacts[idx].createdAt;
          contacts[idx] = entry;
        } else {
          // 自動生成編號：QC + 3位序號
          const maxSeq = contacts.reduce((max, c) => {
            const m = String(c.id || "").match(/^QC(\d+)$/);
            return m ? Math.max(max, parseInt(m[1])) : max;
          }, 0);
          entry.id = "QC" + String(maxSeq + 1).padStart(3, "0");
          entry.createdAt = new Date().toISOString().split("T")[0];
          contacts.push(entry);
        }
        saveAddressBookContacts(contacts);
        addressBookState.drawerOpen = false;
        addressBookState.editIndex = null;
        toast(isEdit ? "保存成功" : "新增成功");
        render();
        return;
      }

      // 確認刪除
      const confirmBtn = target.closest("[data-ab-confirm-delete]");
      if (confirmBtn) {
        const contacts = getAddressBookContacts();
        const idx = addressBookState.deleteTarget;
        if (idx !== null && idx !== undefined && contacts[idx]) {
          contacts.splice(idx, 1);
          saveAddressBookContacts(contacts);
          toast("刪除成功");
        }
        addressBookState.deleteTarget = null;
        render();
        return;
      }
    });

    function render() {
      renderShell();
      if (state.view === "pc") renderPc();
      if (state.view === "mobile") renderMobile();
      bindEvents();
    }

    // Hamburger toggle: collapse / expand sidebar
    $("#hamburgerBtn").addEventListener("click", () => {
      state.isSidebarCollapsed = !state.isSidebarCollapsed;
      state.isSettingsPopoverOpen = false;
      render();
    });

    // Tooltip for collapsed sidebar nav items
    let tooltipEl = null;
    document.addEventListener("mouseover", (e) => {
      if (!state.isSidebarCollapsed) return;
      const navItem = e.target.closest(".nav-item[data-collapsed-label]");
      if (!navItem) return;
      const label = navItem.dataset.collapsedLabel;
      if (!tooltipEl) {
        tooltipEl = document.createElement("div");
        tooltipEl.className = "nav-tooltip";
        document.body.appendChild(tooltipEl);
      }
      const rect = navItem.getBoundingClientRect();
      tooltipEl.textContent = label;
      tooltipEl.style.top = (rect.top + rect.height / 2) + "px";
      tooltipEl.style.left = (rect.right + 10) + "px";
      tooltipEl.style.transform = "translateY(-50%)";
      tooltipEl.classList.add("show");
    });
    document.addEventListener("mouseout", (e) => {
      const navItem = e.target.closest(".nav-item[data-collapsed-label]");
      if (navItem && tooltipEl) {
        tooltipEl.classList.remove("show");
      }
    });

    // Settings popover: close on outside click
    document.addEventListener("click", (e) => {
      if (!state.isSettingsPopoverOpen) return;
      const popover = document.getElementById("settingsPopover");
      const settingsBtn = document.querySelector(".nav-item-settings");
      if (popover && !popover.contains(e.target) && !(settingsBtn && settingsBtn.contains(e.target))) {
        state.isSettingsPopoverOpen = false;
        render();
      }
    });

    $("#themeBtn").addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem("ec-ui-theme", next);
      $("#themeBtn").textContent = next === "dark" ? "亮色模式" : "暗色模式";
    });
    $("#userMenuBtn").addEventListener("click", () => $("#userDropdown").classList.toggle("open"));
    document.addEventListener("click", (event) => {
      if (!event.target.closest(".user-menu")) $("#userDropdown").classList.remove("open");
    });

    const savedTheme = localStorage.getItem("ec-ui-theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
    $("#themeBtn").textContent = savedTheme === "dark" ? "亮色模式" : "暗色模式";
    render();
    
    // 檢查完工紙到期提醒
    checkCompletionPaperExpiration();
  </script>
</body>
</html>
