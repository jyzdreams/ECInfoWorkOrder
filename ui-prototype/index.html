    function renderReport() {
      const statusCounts = countBy("status");
      const typeCounts = countBy("type");
      const areaCounts = countBy("area");
      const masterCounts = tickets.reduce((acc, t) => {
        const name = t.master || "未分派";
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      const customerCounts = tickets.reduce((acc, t) => {
        const name = t.customer || "未知客戶";
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      
      // 中單報表統計
      const quotationStats = {
        total: quotations.length,
        won: quotations.filter(q => q.bidStatus === '已中標').length,
        lost: quotations.filter(q => q.bidStatus === '未中標').length,
        noOffer: quotations.filter(q => q.bidStatus === '不投標').length,
        pending: quotations.filter(q => q.bidStatus === '待確認').length
      };
      const winRate = quotationStats.total > 0 ? ((quotationStats.won / quotationStats.total) * 100).toFixed(1) : 0;
      
      // 按客戶統計中單情況
      const customerQuotationStats = {};
      quotations.forEach(q => {
        if (!customerQuotationStats[q.customerName]) {
          customerQuotationStats[q.customerName] = { total: 0, won: 0 };
        }
        customerQuotationStats[q.customerName].total++;
        if (q.bidStatus === '已中標') {
          customerQuotationStats[q.customerName].won++;
        }
      });
      
      // 按區域統計中單情況
      const areaQuotationStats = {};
      quotations.forEach(q => {
        const ticket = tickets.find(t => t.id === q.ticketId);
        const area = ticket ? ticket.area : '未知';
        if (!areaQuotationStats[area]) {
          areaQuotationStats[area] = { total: 0, won: 0 };
        }
        areaQuotationStats[area].total++;
        if (q.bidStatus === '已中標') {
          areaQuotationStats[area].won++;
        }
      });
      
      return `
        <section class="page active">
          <div class="grid cols-4">
            <div class="card stat-card"><div class="stat-label">工單總數</div><div class="stat-value">${tickets.length}</div><div class="stat-note">較上週 +12%</div></div>
            <div class="card stat-card"><div class="stat-label">已完成</div><div class="stat-value">${statusCounts["已完成"] || 0}</div><div class="stat-note">閉環工單</div></div>
            <div class="card stat-card"><div class="stat-label">待處理</div><div class="stat-value">${statusCounts["待處理"] || 0}</div><div class="stat-note">需 TL / 主管處理</div></div>
            <div class="card stat-card"><div class="stat-label">已取消</div><div class="stat-value">${statusCounts["已取消"] || 0}</div><div class="stat-note">進入基礎統計</div></div>
          </div>

          <!-- Outstanding 檢查提醒 -->
          ${(() => {
            const unfinished = tickets.filter(t => ["待分派", "待處理", "處理中"].includes(t.status));
            const srPendingSig = tickets.filter(t => t.serviceReportNo && !t.signatureOriginalPhoto && t.status !== "已取消");
            const pmPending = tickets.filter(t => t.type === "PM" && !t.maintenanceType && t.status !== "已完成" && t.status !== "已取消");
            const totalOutstanding = unfinished.length + srPendingSig.length + pmPending.length;
            if (totalOutstanding === 0) return "";
            return `
            <div class="card" style="margin-top:14px;border:2px solid var(--warning);background:var(--warning-soft,#fff8e1);">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                <span style="font-size:20px;">⚠</span>
                <h2 style="margin:0;color:var(--warning);">Outstanding 檢查提醒</h2>
                <span style="font-size:12px;color:var(--muted);margin-left:auto;">每月一號自動提醒</span>
              </div>
              <div class="grid cols-3">
                <div style="padding:10px;background:var(--panel);border-radius:8px;">
                  <div style="font-size:24px;font-weight:700;color:var(--warning);">${unfinished.length}</div>
                  <div style="font-size:13px;color:var(--muted);">未完成工單（待分派/處理中）</div>
                </div>
                <div style="padding:10px;background:var(--panel);border-radius:8px;">
                  <div style="font-size:24px;font-weight:700;color:var(--warning);">${srPendingSig.length}</div>
                  <div style="font-size:13px;color:var(--muted);">SR 待上傳簽名正本</div>
                </div>
                <div style="padding:10px;background:var(--panel);border-radius:8px;">
                  <div style="font-size:24px;font-weight:700;color:var(--warning);">${pmPending.length}</div>
                  <div style="font-size:13px;color:var(--muted);">保養工單未標記保養類型</div>
                </div>
              </div>
              ${unfinished.length > 0 ? `<div style="margin-top:10px;font-size:13px;"><strong>待跟進工單：</strong>${unfinished.slice(0,5).map(t => `<span style="margin-right:8px;"><button class="link-btn" data-open="${t.id}">${t.id}</button></span>`).join("")}${unfinished.length > 5 ? ` 等 ${unfinished.length} 項` : ""}</div>` : ""}
            </div>`;
          })()}
          <div class="grid cols-3" style="margin-top:14px;">
            <div class="card"><h2>按狀態統計</h2>${STATUSES.map(s => barRow(s, statusCounts[s] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按工單類型統計</h2>${TYPES.map(t => barRow(t, typeCounts[t] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按區域統計</h2>${REGIONS.map(r => barRow(r, areaCounts[r] || 0, tickets.length)).join("")}</div>
          </div>
          <div class="grid cols-2" style="margin-top:14px;">
            <div class="card"><h2>按師傅統計</h2>${Object.entries(masterCounts).map(([k,v]) => barRow(k, v, tickets.length)).join("")}</div>
            <div class="card"><h2>按客戶統計</h2>${Object.entries(customerCounts).sort((a,b) => b[1] - a[1]).map(([k,v]) => barRow(k, v, tickets.length)).join("")}</div>
          </div>
          
          <!-- 中單報表 -->
          <div class="grid cols-4" style="margin-top:14px;">
            <div class="card stat-card"><div class="stat-label">報價單總數</div><div class="stat-value">${quotationStats.total}</div><div class="stat-note">所有報價</div></div>
            <div class="card stat-card"><div class="stat-label">已中單</div><div class="stat-value">${quotationStats.won}</div><div class="stat-note">成功中標</div></div>
            <div class="card stat-card"><div class="stat-label">未中單</div><div class="stat-value">${quotationStats.lost}</div><div class="stat-note">失去機會</div></div>
            <div class="card stat-card"><div class="stat-label">中單率</div><div class="stat-value">${winRate}%</div><div class="stat-note">成功率</div></div>
          </div>
          
          <div class="grid cols-2" style="margin-top:14px;">
            <div class="card">
              <h2>按客戶統計中單情況</h2>
              <div class="data-table-wrap">
                <table>
                  <thead>
                    <tr><th>客戶名稱</th><th>報價總數</th><th>中單數</th><th>中單率</th></tr>
                  </thead>
                  <tbody>
                    ${Object.entries(customerQuotationStats).map(([name, stats]) => {
                      const rate = stats.total > 0 ? ((stats.won / stats.total) * 100).toFixed(1) : 0;
                      return `<tr>
                        <td>${name}</td>
                        <td>${stats.total}</td>
                        <td>${stats.won}</td>
                        <td><span class="tag ${rate >= 50 ? 'success' : rate >= 30 ? 'warning' : 'danger'}">${rate}%</span></td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>
            <div class="card">
              <h2>按區域統計中單情況</h2>
              <div class="data-table-wrap">
                <table>
                  <thead>
                    <tr><th>區域</th><th>報價總數</th><th>中單數</th><th>中單率</th></tr>
                  </thead>
                  <tbody>
                    ${Object.entries(areaQuotationStats).map(([area, stats]) => {
                      const rate = stats.total > 0 ? ((stats.won / stats.total) * 100).toFixed(1) : 0;
                      return `<tr>
                        <td>${area}</td>
                        <td>${stats.total}</td>
                        <td>${stats.won}</td>
                        <td><span class="tag ${rate >= 50 ? 'success' : rate >= 30 ? 'warning' : 'danger'}">${rate}%</span></td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          
          <div class="grid cols-1" style="margin-top:14px;">
            <div class="card">
              <div class="card-head"><h2>最近 7 天趨勢</h2><span class="chip">基礎趨勢</span></div>
              <div class="trend">${[3,5,4,7,6,8,9].map((v,i) => `<div class="trend-col"><div class="trend-bar" style="height:${v * 13}px"></div><span>06-${9+i}</span></div>`).join("")}</div>
              <p>第一版只做狀態、類型、區域、師傅、客戶等基礎統計，不做成本、績效、SLA、財務、採購或複雜 BI。</p>
            </div>
          </div>
        </section>`;
    }

    function renderSettings() {
      // 根據 settingsTab 渲染不同的頁面
      if (state.settingsTab === "dictionary") {
        return renderDictionary();
      } else if (state.settingsTab === "customer") {
        return renderCustomerPage();
      } else if (state.settingsTab === "user") {
        return renderUsersPage();
      } else if (state.settingsTab === "addressBook") {
        return renderAddressBook();
      } else if (state.settingsTab === "server") {
        return renderServerConfig();
      } else if (state.settingsTab === "excelImport") {
        return renderExcelImport();
      }
      return renderDictionary(); // 默認顯示字典管理
    }

    // 渲染服務器空間配置頁面（#9：配置上傳 PDF/附件的服務器空間）
    function renderServerConfig() {
      // 從 localStorage 讀取服務器配置，默認值為模擬配置
      const config = JSON.parse(localStorage.getItem('ecinfo_server_config') || JSON.stringify({
        provider: "阿里雲 OSS",
        endpoint: "https://oss-cn-hongkong.ecinfo.com",
        bucket: "ecinfo-attachments",
        region: "香港",
        accessKey: "AKIA****ECINFO",
        maxFileSize: "50",
        allowedTypes: "pdf,jpg,jpeg,png,docx,xlsx",
        storageUsed: 2.3,
        storageTotal: 100,
        autoDeleteDays: 365,
        backupEnabled: true,
        lastSync: "2026-07-13 09:30"
      }));

      const usagePercent = Math.round((config.storageUsed / config.storageTotal) * 100);

      return `
        <div class="pc-container">
          <div class="pc-header">
            <h1>服務器空間配置</h1>
            <div class="pc-header-actions">
              <button class="ghost-btn" data-server-test>🔌 測試連接</button>
              <button class="primary-btn" data-server-save>💾 保存配置</button>
            </div>
          </div>

          <div class="pc-grid">
            <div class="pc-card">
              <h3>已用空間</h3>
              <div class="pc-metric">${config.storageUsed} GB</div>

    // 處理 Excel 文件上傳（模擬：生成預覽數據並顯示）
    function handleExcelUpload(fileName, type) {
      const typeLabels = { customer: '客戶資料', workorder: '工單記錄', quotation: '報價記錄', invoice: '發票記錄', payment: '收款記錄' };
      const mockData = generateMockExcelData(type);
      const previewArea = document.getElementById('excelPreviewArea');
      if (!previewArea) return;

      // 數據驗證（模擬）
      let validCount = 0;
      let invalidCount = 0;
      const invalidRows = [];
      mockData.forEach((row, idx) => {
        const hasRequired = type === 'customer' ? row['客戶編號'] && row['中文名稱'] : true;
        if (hasRequired) {
          validCount++;
        } else {
          invalidCount++;
          invalidRows.push(idx + 2); // +2 因為 Excel 第1行是表頭，第2行開始是數據
        }
      });

      const headers = Object.keys(mockData[0] || {});

      previewArea.innerHTML = `
        <div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">

              ${invalidCount > 0 ? `<span style="font-size:13px;color:var(--danger);">，無效 ${invalidCount} 行</span>` : ''}
            </div>
          </div>

          ${invalidCount > 0 ? `
            <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:#991b1b;">
              ⚠ 第 ${invalidRows.join('、')} 行數據缺少必填字段（客戶編號/中文名稱），將跳過這些行
            </div>
          ` : ''}

          <div class="pc-table-wrapper" style="max-height:300px;overflow:auto;">
            <table class="pc-table" style="font-size:12px;">
              <thead>
                <tr>
                  <th style="width:40px;">#</th>
                  ${headers.map(h => `<th>${h}</th>`).join('')}
                  <th>驗證</th>
                </tr>
              </thead>
              <tbody>
                ${mockData.map((row, idx) => {
                  const isValid = type === 'customer' ? row['客戶編號'] && row['中文名稱'] : true;
                  return `
                    <tr>
                      <td>${idx + 1}</td>
                      ${headers.map(h => `<td>${row[h] || '<span style="color:var(--muted);">-</span>'}</td>`).join('')}

                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">

          </div>
        </div>
      `;

      // 綁定確認導入按鈕

        confirmBtn.addEventListener('click', () => confirmExcelImport(fileName, type, mockData, validCount, invalidCount));

      let failCount = 0;

      // 根據類型執行實際導入
      if (type === 'customer') {
        data.forEach(row => {
          if (!row['客戶編號'] || !row['中文名稱']) { failCount++; return; }
          // 檢查是否已存在
          if (customers.find(c => c.id === row['客戶編號'])) { failCount++; return; }
          customers.push({
            id: row['客戶編號'],
            nameZh: row['中文名稱'],
            nameEn: row['英文名稱'] || '',
            type: row['類型(政府/私人)'] || '私人',
            level: row['等級(普通/VIP/重要)'] || '普通',
            status: '啓用',
            peachtreeId: row['Peachtree ID'] || '',
            contacts: [{ name: row['聯繫人'] || '', title: '聯繫人', phone: row['電話'] || '', whatsapp: '', email: row['郵箱'] || '' }],
            addresses: [{ area: row['區域'] || '未設置', addressZh: row['地址'] || '', addressEn: '', tl: 'TL-001', noPhoto: false, noPhotoReason: '' }],
            createdAt: new Date().toISOString().slice(0, 10),
            createdBy: state.role === 'MASTER' ? '老闆' : (state.role || 'CS-001')
          });
          successCount++;
        });
      } else if (type === 'workorder') {
        data.forEach(row => {
          if (!row['工單編號']) { failCount++; return; }
          if (tickets.find(t => t.id === row['工單編號'])) { failCount++; return; }
          tickets.push({
            id: row['工單編號'],
            customerId: row['客戶編號'] || '',
            customerName: '',
            type: row['工單類型'] || '保養',
            area: row['區域'] || '',
            address: row['地址'] || '',
            assignee: row['負責人'] || '',
            createdAt: row['創建日期'] || new Date().toISOString().slice(0, 10),
            scheduledDate: row['預約日期'] || '',
            description: row['描述'] || '',
            status: row['狀態'] || '待處理',
            priority: '普通',
            source: 'Excel 導入'
          });
          successCount++;
        });
      } else if (type === 'quotation') {
        data.forEach(row => {
          if (!row['報價單號']) { failCount++; return; }
          if (quotations.find(q => q.id === row['報價單號'])) { failCount++; return; }
          quotations.push({
            id: row['報價單號'],
            customerId: row['客戶編號'] || '',
            customerName: row['客戶名稱'] || '',
            tenderAmount: row['報價金額'] || 0,
            category: row['類別(M/P/M+P)'] || 'M',
            createdAt: row['創建日期'] || new Date().toISOString().slice(0, 10),
            deadline: row['截止日期'] || '',
            source: row['來源'] || '',
            owner: row['負責人'] || '',
            bidStatus: row['狀態'] || '待報價'
          });
          successCount++;
        });
      } else if (type === 'invoice') {
        data.forEach(row => {
          if (!row['發票編號']) { failCount++; return; }
          if (invoices.find(i => i.invoiceNo === row['發票編號'])) { failCount++; return; }
          invoices.push({
            id: 'inv-' + Date.now() + Math.random().toString(36).slice(2, 6),
            invoiceNo: row['發票編號'],
            quotationId: row['報價單號'] || '',
            customerName: row['客戶名稱'] || '',
            amount: row['金額'] || 0,
            invoiceDate: row['開票日期'] || new Date().toISOString().slice(0, 10),
            dueDate: row['到期日'] || '',
            status: row['狀態'] || '已開具'
          });
          successCount++;
        });
      } else if (type === 'payment') {
        data.forEach(row => {
          if (!row['收據編號']) { failCount++; return; }
          payments.push({
            id: 'pay-' + Date.now() + Math.random().toString(36).slice(2, 6),
            receiptNo: row['收據編號'],
            invoiceId: row['發票編號'] || '',
            customerName: row['客戶名稱'] || '',
            amount: row['金額'] || 0,
            paymentDate: row['收款日期'] || new Date().toISOString().slice(0, 10),
            paymentMethod: row['收款方式'] || '現金',
            remark: row['備註'] || ''
          });
          successCount++;
        });
      }

      saveDataToLocalStorage();

      // 記錄導入歷史
      const importHistory = JSON.parse(localStorage.getItem('ecinfo_excel_imports') || '[]');
      importHistory.unshift({
        importTime: new Date().toLocaleString('zh-TW', { hour12: false }),
        type: type,
        typeLabel: typeLabels[type] || type,
        fileName: fileName,
        totalCount: data.length,
        successCount: successCount,
        failCount: failCount + invalidCount,
        status: (failCount + invalidCount) === 0 ? '成功' : '部分成功',
        operator: state.role === 'MASTER' ? '老闆' : (state.role || 'CS-001')
      });
      if (importHistory.length > 50) importHistory.length = 50;
      localStorage.setItem('ecinfo_excel_imports', JSON.stringify(importHistory));

      toast(`Excel 導入完成：成功 ${successCount} 條，失敗 ${failCount + invalidCount} 條`, "success");

      // 清空預覽區域並重新渲染
      const previewArea = document.getElementById('excelPreviewArea');
      if (previewArea) previewArea.innerHTML = '';
      render();
    }

    function filterUsers() {
      return users.filter(u => {
        const matchRole = userState.roleFilter === "全部" || u.role === userState.roleFilter;
        const matchFilterRole = userState.filterRole === "全部" || u.role === userState.filterRole;
        const matchFilterStatus = userState.filterStatus === "全部" || u.status === userState.filterStatus;
        const keyword = userState.searchKeyword.toLowerCase();
        const matchKeyword = !keyword ||
          u.name.toLowerCase().includes(keyword) ||
          u.employeeNo.toLowerCase().includes(keyword) ||
          u.phone.includes(keyword) ||
          u.email.toLowerCase().includes(keyword);
        return matchRole && matchFilterRole && matchFilterStatus && matchKeyword;
      });
    }

    function paginateUsers(filtered) {
      const start = (userState.currentPage - 1) * userState.pageSize;
      return filtered.slice(start, start + userState.pageSize);
    }

    function getUserStats(user) {
      const userTickets = tickets.filter(t => t.master === user.name || t.owner === user.name);
      const completed = userTickets.filter(t => t.status === "已完成").length;
      const processing = userTickets.filter(t => ["待確認", "待處理", "處理中"].includes(t.status)).length;
      const overdue = userTickets.filter(t => t.urgent && ["待確認", "待處理", "處理中"].includes(t.status)).length;
      const satisfaction = userTickets.length > 0 ? Math.min(98, 85 + Math.floor(Math.random() * 15)) : 0;
      return { completed, processing, overdue, satisfaction };
    }

    function openAddCallCodeModal() {
      const modal = document.createElement("div");
      modal.className = "um-modal-overlay";
      modal.innerHTML = `
        <div class="um-modal" style="max-width:480px;">
          <div class="um-modal-head">
            <h2>新增 Call代碼</h2>
            <button class="um-modal-close" data-close-modal>×</button>
          </div>
          <form id="addCallCodeForm">

              <div class="field"><label class="required">Call代碼</label><input name="code" required placeholder="例如：CALL-006"></div>
              <div class="field"><label>名稱/說明</label><input name="name" placeholder="可選，例如：門禁系統維修"></div>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border);">
              <button type="button" class="secondary-btn" data-close-modal>取消</button>
              <button type="submit" class="primary-btn">保存</button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      modal.querySelectorAll("[data-close-modal]").forEach(btn => btn.addEventListener("click", () => modal.remove()));
      modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });
      const form = modal.querySelector("#addCallCodeForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const code = formData.get("code").trim();
        const name = formData.get("name").trim() || code;
        if (!code) {
          toast("請輸入Call代碼", "error");
          return;
        }
        if (callCodes.some(cc => cc.code === code)) {
          toast("該Call代碼已存在", "error");
          return;
        }
        const newId = "CC" + String(callCodes.length + 1).padStart(3, "0");
        const newCallCode = {
          id: newId,
          code: code,
          name: name,
          status: "啓用",
          sortOrder: callCodes.length + 1
        };
        callCodes.push(newCallCode);
        saveDataToLocalStorage();
        toast("Call代碼新增成功");
        modal.remove();
        render();
        // 重新打開新建工單頁面並自動選中新Call代碼
        setTimeout(() => {
          const callCodeSelect = document.querySelector("#callCodeSelect");
          if (callCodeSelect) {
            callCodeSelect.value = code;
          }
        }, 100);
      });
    }

    function saveUser(formData, isEdit = false, userId = null) {
      if (isEdit) {
        const user = users.find(u => u.id === userId);
        if (user) {
          Object.assign(user, {
            name: formData.get("name") || user.name,
            phone: formData.get("phone") || user.phone,
            email: formData.get("email") || user.email,
            role: formData.get("role") || user.role,
            area: formData.get("area") || user.area,
            manager: formData.get("manager") || user.manager,
            status: formData.get("status") || user.status
          });
          toast("用戶信息已更新");
        }
      } else {
        const newUser = {
          id: `U${String(users.length + 1).padStart(3, "0")}`,
          name: formData.get("name"),
          employeeNo: formData.get("employeeNo"),
          role: formData.get("role"),
          area: formData.get("area") || "未分配",
          phone: formData.get("phone"),
          email: formData.get("email") || "",
          manager: formData.get("manager") || "",
          status: formData.get("status") || "啓用",
          lastLogin: "尚未登錄",
          createdAt: new Date().toISOString().slice(0, 10)
        };
        users.unshift(newUser);
        saveDataToLocalStorage();
        toast("新用戶已創建");
      }
      render();
    }

    function deleteUser(userId) {
      const user = users.find(u => u.id === userId);
      if (!user) return;
      if (!confirm(`確定要刪除用戶 "${user.name}" 嗎？此操作不可恢復。`)) return;
      users = users.filter(u => u.id !== userId);
      saveDataToLocalStorage();
      if (userState.selectedUserId === userId) userState.selectedUserId = null;
      toast("用戶已刪除");
      render();
    }

    function bindModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });
      const createForm = modal.querySelector("#createUserForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveUser(formData, false);
          modal.remove();
        });
      }
      const editForm = modal.querySelector("#editUserForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const userId = editForm.dataset.userId;
          saveUser(formData, true, userId);
          modal.remove();
        });
      }
    }

    function filterCustomers() {
      return customers.filter(c => {
        // Category filter (only 全部/政府/私人)
        if (customerState.categoryFilter !== "全部") {
          if (c.type !== customerState.categoryFilter) return false;
        }

        // Type filter
        if (customerState.filterType !== "全部" && c.type !== customerState.filterType) return false;

        // Level filter
        if (customerState.filterLevel !== "全部" && c.level !== customerState.filterLevel) return false;

        // Status filter
        if (customerState.filterStatus !== "全部" && c.status !== customerState.filterStatus) return false;

        // Search filter
        if (customerState.searchKeyword) {
          const keyword = customerState.searchKeyword.toLowerCase();
          const searchFields = [
            c.nameZh,
            c.nameEn,
            c.id,
            c.contacts[0]?.name,
            c.contacts[0]?.phone,
            c.addresses[0]?.addressZh,
            c.addresses[0]?.addressEn
          ].map(f => (f || "").toLowerCase());

          return searchFields.some(f => f.includes(keyword));
        }

        return true;
      });
    }

    function paginateCustomers(filtered) {
      const start = (customerState.currentPage - 1) * customerState.pageSize;
      return filtered.slice(start, start + customerState.pageSize);
    }

    function getCustomerStats(customer) {
      // Simulate stats based on customer ID
      const idNum = parseInt(customer.id.replace("CUST-", ""));
      return {
        total: 10 + idNum * 3,
        month: 2 + (idNum % 5),
        processing: 1 + (idNum % 3),
        completed: 8 + idNum * 2
      };
    }

    function saveCustomer(formData, isEdit = false, customerId = null) {
      if (isEdit) {
        const customer = customers.find(c => c.id === customerId);
        if (customer) {
          customer.nameZh = formData.get("nameZh") || customer.nameZh;
          customer.nameEn = formData.get("nameEn") || customer.nameEn;
          customer.type = formData.get("type") || customer.type;
          customer.level = formData.get("level") || customer.level;
          customer.status = formData.get("status") || customer.status;
          customer.peachtreeId = formData.get("peachtreeId") || customer.peachtreeId || "";

          if (customer.contacts.length > 0) {
            customer.contacts[0].name = formData.get("contactName") || customer.contacts[0].name;
            customer.contacts[0].phone = formData.get("contactPhone") || customer.contacts[0].phone;
            customer.contacts[0].whatsapp = formData.get("contactWhatsapp") || customer.contacts[0].whatsapp;
            customer.contacts[0].email = formData.get("contactEmail") || customer.contacts[0].email;
          }

          if (customer.addresses.length > 0) {
            customer.addresses[0].area = formData.get("area") || customer.addresses[0].area;
            customer.addresses[0].addressZh = formData.get("addressZh") || customer.addresses[0].addressZh;
            customer.addresses[0].addressEn = formData.get("addressEn") || customer.addresses[0].addressEn;
            customer.addresses[0].noPhoto = formData.get("noPhoto") === "true";
            customer.addresses[0].noPhotoReason = formData.get("noPhotoReason") || "";
          }

          toast("客戶資訊已更新");
        }
      } else {
        const newCustomer = {
          id: `CUST-${String(customers.length + 1).padStart(4, "0")}`,
          nameZh: formData.get("nameZh"),
          nameEn: formData.get("nameEn"),
          type: formData.get("type"),
          level: formData.get("level"),
          status: formData.get("status") || "啓用",
          peachtreeId: formData.get("peachtreeId") || "",
          contacts: [{
            name: formData.get("contactName"),
            title: "聯繫人",
            phone: formData.get("contactPhone"),
            whatsapp: formData.get("contactWhatsapp") || "",
            email: formData.get("contactEmail") || ""
          }],
          addresses: [{
            area: formData.get("area") || "未設置",
            addressZh: formData.get("addressZh") || "",
            addressEn: formData.get("addressEn") || "",
            tl: "TL-001",
            noPhoto: formData.get("noPhoto") === "true",
            noPhotoReason: formData.get("noPhotoReason") || ""
          }],
          createdAt: new Date().toISOString().slice(0, 10),
          createdBy: "CS-001"
        };
        customers.unshift(newCustomer);
        saveDataToLocalStorage();
        toast("新客戶已創建");
      }
      render();
    }

    function deleteCustomer(customerId) {
      const customer = customers.find(c => c.id === customerId);
      if (!customer) return;
      if (!confirm(`確定要刪除客戶 "${customer.nameZh}" 嗎？此操作不可恢復。`)) return;
      customers = customers.filter(c => c.id !== customerId);
      saveDataToLocalStorage();
      if (customerState.selectedCustomerId === customerId) {
        customerState.selectedCustomerId = null;
      }
      toast("客戶已刪除");
      render();
    }

    function bindCustomerModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      // 客戶類型切換時顯示/隱藏政府字段
      const typeSelects = modal.querySelectorAll("[data-customer-type-select]");
      typeSelects.forEach(select => {
        const updateGovFields = () => {
          const isGov = select.value === "政府";
          const govPrefixField = modal.querySelector("#govPrefixField");
          const govContractField = modal.querySelector("#govContractField");
          const govJNumberField = modal.querySelector("#govJNumberField");
          if (govPrefixField) govPrefixField.classList.toggle("hidden", !isGov);
          if (govContractField) govContractField.classList.toggle("hidden", !isGov);
          if (govJNumberField) govJNumberField.classList.toggle("hidden", !isGov);
        };
        select.addEventListener("change", updateGovFields);
        updateGovFields(); // 初始化
      });

      const createForm = modal.querySelector("#createCustomerForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveCustomer(formData, false);
          modal.remove();
        });
      }

      const editForm = modal.querySelector("#editCustomerForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const customerId = editForm.dataset.customerId;
          saveCustomer(formData, true, customerId);
          modal.remove();
        });
      }
    }

    // 通過 Email 發送報價單
    function sendQuotationEmail(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;

      const customer = customers.find(c => c.id === quotation.customerId);
      const defaultEmail = customer?.contacts?.[0]?.email || '';
      
      const recipient = prompt('請輸入收件人郵箱：', defaultEmail);
      if (!recipient) return;

      const remark = prompt('請輸入備註信息（可選）：', '') || '';

      if (!quotation.sendRecords) quotation.sendRecords = [];
      
      quotation.sendRecords.push({
        time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        actor: currentRole().name,
        method: 'Email',
        recipient: recipient,
        status: '已發送',
        remark: remark
      });

      saveDataToLocalStorage();
      toast(`報價單已通過 Email 發送至 ${recipient}`);
      render();
    }

    // 通過 Fax 發送報價單
    function sendQuotationFax(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;

      const customer = customers.find(c => c.id === quotation.customerId);
      const defaultFax = customer?.contacts?.[0]?.fax || '';
      
      const recipient = prompt('請輸入傳真號碼：', defaultFax);
      if (!recipient) return;

      const remark = prompt('請輸入備註信息（可選）：', '') || '';

      if (!quotation.sendRecords) quotation.sendRecords = [];
      
      quotation.sendRecords.push({
        time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-'),
        actor: currentRole().name,
        method: 'Fax',
        recipient: recipient,
        status: '已發送',
        remark: remark
      });

      saveDataToLocalStorage();
      toast(`報價單已通過 Fax 發送至 ${recipient}`);
      render();
    }

    // 報價單電子簽名
    function signQuotation(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;

      const signerName = prompt('請輸入簽名者姓名：', currentRole().name);
      if (!signerName) return;

      const signDate = new Date().toLocaleString('zh-CN', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit', 
        hour12: false 
      }).replace(/\//g, '-');

      if (!quotation.signatures) quotation.signatures = [];
      
      quotation.signatures.push({
        signer: signerName,
        time: signDate,
        role: currentRole().name,
        status: '已簽名'
      });

      quotation.signed = true;
      quotation.signedBy = signerName;
      quotation.signedAt = signDate;

      saveDataToLocalStorage();
      toast(`報價單已由 ${signerName} 簽名`);
      render();
    }

    // 修改工單聯繫人資訊
    function editContactInfo(ticketId) {
      const ticket = tickets.find(t => t.id === ticketId);
      if (!ticket) return;

      const newContact = prompt('請輸入新的聯繫人姓名：', ticket.contact);
      if (!newContact) return;

      const newPhone = prompt('請輸入新的聯繫電話：', ticket.phone);
      if (!newPhone) return;

      ticket.contact = newContact;
      ticket.phone = newPhone;
      ticket.updatedAt = new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-');

      if (!ticket.records) ticket.records = [];
      ticket.records.push({
        time: ticket.updatedAt,
        actor: currentRole().name,
        text: `修改聯繫人資訊：${newContact} / ${newPhone}`
      });

      saveDataToLocalStorage();
      toast('聯繫人資訊已更新');
      render();
    }

    function filterQuotations() {
      return quotations.filter(q => {
        // Status filter
        if (quotationState.statusFilter !== "全部" && q.status !== quotationState.statusFilter) return false;

        // Ticket status filter
        if (quotationState.filterTicketStatus !== "全部") {
          const ticket = tickets.find(t => t.id === q.ticketId);
          if (!ticket || ticket.status !== quotationState.filterTicketStatus) return false;
        }

        // Customer filter
        if (quotationState.filterCustomer !== "全部" && q.customerId !== quotationState.filterCustomer) return false;

        // Search filter
        if (quotationState.searchKeyword) {
          const keyword = quotationState.searchKeyword.toLowerCase();
          const searchFields = [
            q.id,
            q.ticketId,
            q.customerName,
            q.title
          ].map(f => (f || "").toLowerCase());

          return searchFields.some(f => f.includes(keyword));
        }

        return true;
      });
    }

    function paginateQuotations(filtered) {
      const start = (quotationState.currentPage - 1) * quotationState.pageSize;
      return filtered.slice(start, start + quotationState.pageSize);
    }

    function calculateTax(amount, taxRate) {
      return amount * (1 + taxRate);
    }

    function generateQuotationNo(form) {
      const area = form.querySelector('[name=area]')?.value || "";
      const category = form.querySelector('[name=category]')?.value || "";
      if (!area || !category) {
        form.querySelector('[name=id]').value = "選擇類別和區域後自動生成";

      // 從字典管理中讀取區域編號
      const areaDict = dictData["區域"] || [];
      const areaItem = areaDict.find(r => r.name === area);
      const areaCode = areaItem?.code || area;
      const catCode = category.replace("+", "");
      const yy = String(new Date().getFullYear()).slice(-2);
      const seq = String(quotations.length + 1).padStart(5, "0");
      form.querySelector('[name=id]').value = `${areaCode}${catCode}${yy}${seq}`;
    }

    function saveQuotation(formData, isEdit = false, quotationId = null) {
      const ticketId = formData.get("ticketId") || "";
      const ticket = tickets.find(t => t.id === ticketId);
      const customer = customers.find(c => c.id === ticket?.customerId);
      const amount = parseFloat(formData.get("amount")) || 0;
      const taxRate = parseFloat(formData.get("taxRate")) || 0;
      const totalAmount = calculateTax(amount, taxRate);
      const sourceTicketId = formData.get("sourceTicketId") || "";

      if (isEdit) {
        const quotation = quotations.find(q => q.id === quotationId);
        if (quotation) {
          quotation.title = formData.get("title") || quotation.title;
          quotation.category = formData.get("category") || quotation.category || "";
          quotation.srNo = formData.get("srNo") || quotation.srNo;
          quotation.owner = formData.get("owner") || quotation.owner;
          quotation.createdAt = formData.get("createdAt") || quotation.createdAt;
          quotation.validUntil = formData.get("validUntil") || quotation.validUntil;
          quotation.amount = amount;
          quotation.taxRate = taxRate;
          quotation.totalAmount = totalAmount;
          quotation.bargainAmount = parseFloat(formData.get("bargainAmount")) || null;
          quotation.status = formData.get("status") || quotation.status;
          quotation.remark = formData.get("remark") || quotation.remark;
          quotation.deadline = formData.get("deadline") || quotation.deadline;
          quotation.source = formData.get("source") || quotation.source;
          quotation.sourceTicketId = sourceTicketId;
          quotation.isInviteTender = formData.get("isInviteTender") === "on";
          quotation.projectJobNo = formData.get("projectJobNo") || quotation.projectJobNo || "";
          quotation.ticketId = ticketId;
          quotation.customerName = formData.get("customerName") || quotation.customerName || "";
          quotation.area = formData.get("area") || quotation.area || "";
          // 記錄修改歷史（#17 報價歷史記錄）
          if (!quotation.history) quotation.history = [];
          quotation.history.push({ action: "編輯", time: new Date().toLocaleString('zh-TW'), actor: currentRole().name, changes: `金額: ${amount}, 狀態: ${formData.get("status") || quotation.status}` });
          toast("報價信息已更新");
        }
      } else {
        const newQuotation = {
          id: formData.get("id"),
          title: formData.get("title"),
          ticketId: ticketId,
          customerId: ticket?.customerId || "",
          customerName: formData.get("customerName") || customer?.nameZh || "",
          area: formData.get("area") || ticket?.area || "",
          amount: amount,
          taxRate: taxRate,
          totalAmount: totalAmount,
          bargainAmount: parseFloat(formData.get("bargainAmount")) || null,
          status: formData.get("status") || "待報價",
          owner: formData.get("owner"),
          ownerPhone: users.find(u => u.name === formData.get("owner"))?.phone || "",
          ownerTeam: users.find(u => u.name === formData.get("owner"))?.area || "",
          srNo: formData.get("srNo") || "",
          category: formData.get("category") || "",
          createdAt: formData.get("createdAt"),
          validUntil: formData.get("validUntil"),
          deadline: formData.get("deadline"),
          source: formData.get("source") || "",
          sourceTicketId: sourceTicketId,
          isInviteTender: formData.get("isInviteTender") === "on",
          projectJobNo: formData.get("projectJobNo") || "",
          attachments: [],
          remark: formData.get("remark") || "",
          history: [{ action: "創建", time: new Date().toLocaleString('zh-TW'), actor: currentRole().name }]
        };
        quotations.unshift(newQuotation);
        saveDataToLocalStorage();
        toast("新報價已創建");
      }
      render();
    }

    function deleteQuotation(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      if (!confirm(`確定要刪除報價 "${quotation.id}" 嗎？此操作不可恢復。`)) return;
      quotations = quotations.filter(q => q.id !== quotationId);
      saveDataToLocalStorage();
      if (quotationState.selectedQuotationId === quotationId) {
        quotationState.selectedQuotationId = null;
      }
      toast("報價已刪除");
      render();
    }

    // 不投標
    function markNoOffer(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      if (!confirm(`確定要將報價 "${quotation.id}" 標記為「不投標」嗎？`)) return;
      quotation.bidStatus = "不投標";
      quotation.status = "已取消";
      saveDataToLocalStorage();
      toast("已標記為不投標");
      render();
    }

    // 創建修訂版
    function createQuotationRevision(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      const newAmount = prompt("請輸入修訂後的金額（HKD）：", quotation.amount);
      if (newAmount === null) return;
      
      const remark = prompt("請輸入修訂說明：");
      if (remark === null) return;
      
      // 保存當前版本到修訂歷史
      if (!quotation.revisions) quotation.revisions = [];
      quotation.revisions.push({
        rev: quotation.revision,
        amount: quotation.amount,
        date: quotation.createdAt,
        remark: quotation.remark || "初版"
      });
      
      // 更新爲新版本
      quotation.revision += 1;
      quotation.amount = parseFloat(newAmount) || quotation.amount;
      quotation.totalAmount = quotation.amount * (1 + (quotation.taxRate || 0));
      quotation.remark = remark;
      quotation.createdAt = new Date().toISOString().slice(0, 10);
      
      saveDataToLocalStorage();
      toast(`已創建修訂版 ${quotation.ourRef}R${quotation.revision}`);
      render();
    }

    // 啓動採購
    function startProcurement(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      quotation.procurementStatus = "採購中";
      quotation.completionPaperStatus = "待制作";
      quotation.completionPaperDueDate = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      
      saveDataToLocalStorage();
      toast("已通知採購部啓動採購流程，完工期限：2周");
      render();
    }

    // 標記到貨
    function markProcurementArrived(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      quotation.procurementStatus = "已到貨";
      
      saveDataToLocalStorage();
      toast("已標記到貨，通知TL和師傅");
      render();
    }

    // 完工紙管理
    function manageCompletionPaper(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      const action = prompt("請選擇操作：\n1. 記錄領取人\n2. 標記已完工\n\n請輸入數字 1 或 2：");
      
      if (action === "1") {
        const holder = prompt("請輸入完工紙領取人姓名：");
        if (holder === null) return;
        quotation.completionPaperHolder = holder;
        quotation.completionPaperStatus = "已領取";
        saveDataToLocalStorage();
        toast(`完工紙已領取，領取人：${holder}`);
      } else if (action === "2") {
        if (!quotation.completionPaperHolder) {
          alert("請先記錄領取人！");
          return;
        }
        quotation.completionPaperStatus = "已完工";
        saveDataToLocalStorage();
        toast("完工紙已歸還，工單可關閉");
      }
      
      render();
    }

    // 採購部關單
    function closeProcurement(quotationId) {
      const quotation = quotations.find(q => q.id === quotationId);
      if (!quotation) return;
      
      // 檢查完工紙是否已歸還
      if (quotation.completionPaperStatus !== "已完工") {
        alert("完工紙尚未歸還，無法關單！");
        return;
      }
      
      if (!confirm("確定要關單嗎？關單後將通知會計部開具發票。")) return;
      
      quotation.procurementStatus = "已關單";
      
      // 創建通知給會計部
      createNotification({
        type: 'invoice_required',
        title: '新發票待開具',
        content: `報價單 ${quotation.ourRef} 已完工，請開具發票`,
        targetId: quotation.id,
        targetUrl: `?page=quotations&id=${quotation.id}`,
        recipients: ['FIN']
      });
      
      saveDataToLocalStorage();
      toast("已關單，已通知會計部");
      render();
    }

    function bindQuotationModalEvents(modal) {
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();
      });

      // Auto-fill customer, area, SR No and quotation ID when ticket is selected
      const ticketSelect = modal.querySelector("[name='ticketId']");
      const customerInput = modal.querySelector("[name='customerName']");
      const areaSelect = modal.querySelector("[name='area']");
      const srNoInput = modal.querySelector("[name='srNo']");
      if (ticketSelect) {
        ticketSelect.addEventListener("change", () => {
          const ticket = tickets.find(t => t.id === ticketSelect.value);
          const customer = customers.find(c => c.id === ticket?.customerId);
          if (customerInput) {
            customerInput.value = customer?.nameZh || ticket?.customer || "";
          }
          // 設置區域下拉框的值
          if (areaSelect && ticket?.area) {
            areaSelect.value = ticket.area;
          }
          if (srNoInput) srNoInput.value = ticket?.serviceReportNo || "";
          // 區域和類別都選中後動態生成報價編號
          generateQuotationNo(modal.querySelector('form'));
        });
      }

      // Auto-calculate total amount
      const amountInput = modal.querySelector("[name='amount']");
      const taxRateInput = modal.querySelector("[name='taxRate']");
      const totalAmountInput = modal.querySelector("[name='totalAmount']");
      if (amountInput && taxRateInput && totalAmountInput) {
        const calculate = () => {
          const amount = parseFloat(amountInput.value) || 0;
          const taxRate = parseFloat(taxRateInput.value) || 0;
          totalAmountInput.value = calculateTax(amount, taxRate).toFixed(2);
        };
        amountInput.addEventListener("input", calculate);
        taxRateInput.addEventListener("input", calculate);
      }

      const createForm = modal.querySelector("#createQuotationForm");
      if (createForm) {
        createForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(createForm);
          saveQuotation(formData, false);
          modal.remove();
        });
      }

      const editForm = modal.querySelector("#editQuotationForm");
      if (editForm) {
        editForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(editForm);
          const quotationId = editForm.dataset.quotationId;
          saveQuotation(formData, true, quotationId);
          modal.remove();
        });
      }

      const statusForm = modal.querySelector("#updateQuotationStatusForm");
      if (statusForm) {
        statusForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const formData = new FormData(statusForm);
          const quotationId = statusForm.dataset.quotationId;
          updateQuotationStatus(formData, quotationId);
          modal.remove();
        });
      }
    }

    // 採購單狀態流轉
    function poAction(poId, action) {
      const po = purchaseOrders.find(p => p.id === poId);
      if (!po) return;
      const flow = {
        order: { next: "已下單", msg: "採購單已下單", field: "orderDate", value: new Date().toISOString().slice(0, 10) },
        ship: { next: "已發貨", msg: "已標記為發貨" },
        arrive: { next: "已到貨", msg: "已確認到貨", field: "arrivedDate", value: new Date().toISOString().slice(0, 10) },
        verify: { next: "已驗收", msg: "驗收通過" },
        cancel: { next: "已取消", msg: "採購單已取消" }
      };
      const step = flow[action];
      if (!step) return;
      if (action === "cancel" && !confirm("確定取消此採購單嗎？")) return;
      po.status = step.next;
      if (step.field) po[step.field] = step.value;
      saveDataToLocalStorage();
      toast(step.msg);

      // 採購驗收完成時，通知對應工單的 TL 採購完畢可派出工單
      if (action === "verify" && po.ticketId) {
        const ticket = tickets.find(t => t.id === po.ticketId);
        if (ticket) {
          const tlUser = users.find(u => u.name === ticket.tl && u.role === "TL" && isEnabled(u.status));
          if (tlUser) {
            createNotification({
              module: "ticket",
              level: "action",
              title: "採購完畢，可派出工單",
              content: `工單 ${ticket.id} - ${ticket.customer}`,
              subContent: `採購單 ${po.id} 已驗收完成，客戶 ${ticket.customer}（區域：${ticket.area}）的工單可派工處理。聯繫人：${ticket.contact || "無"}，電話：${ticket.phone || "無"}`,
              targetPage: "dispatch",
              targetId: ticket.id,
              receiverId: tlUser.id,
              receiverRole: "TEAM_LEADER"
            });
          }
        }
      }

      render();
    }

      const itemsBody = modal.querySelector("#poItemsBody");
      const totalEl = modal.querySelector("#poTotalAmount");
      const recalcTotal = () => {
        let total = 0;
        itemsBody.querySelectorAll("tr").forEach(tr => {
          const qty = parseFloat(tr.querySelector("[data-po-qty]")?.value) || 0;
          const price = parseFloat(tr.querySelector("[data-po-price]")?.value) || 0;
          const subtotal = qty * price;
          const subtotalEl = tr.querySelector("[data-po-subtotal]");
          if (subtotalEl) subtotalEl.textContent = subtotal.toFixed(2);
          total += subtotal;
        });
        totalEl.textContent = total.toFixed(2);
      };
      const addItemRow = (item = {}) => {
        const tr = document.createElement("tr");
        tr.style.borderBottom = "1px solid var(--line)";
        tr.style.transition = "background .15s";
        tr.innerHTML = `
          <td style="padding:8px 12px;"><input data-po-name style="width:100%;padding:6px 10px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--text);font-size:13px;" value="${item.name || ""}" placeholder="請輸入物料名稱"></td>
          <td style="padding:8px 8px;"><input data-po-qty type="number" min="1" value="${item.qty || 1}" style="width:70px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;text-align:center;background:var(--panel);color:var(--text);font-size:13px;"></td>
          <td style="padding:8px 8px;"><select data-po-unit style="padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--text);font-size:13px;"><option>個</option><option>套</option><option>件</option><option>批</option><option>箱</option></select></td>
          <td style="padding:8px 12px;"><input data-po-price type="number" step="0.01" min="0" value="${item.unitPrice || 0}" style="width:110px;padding:6px 10px;border:1px solid var(--line);border-radius:6px;text-align:right;background:var(--panel);color:var(--text);font-size:13px;"></td>
          <td data-po-subtotal style="text-align:right;padding:8px 12px;font-weight:600;color:var(--sidebar);">0.00</td>
          <td style="padding:8px;text-align:center;"><button type="button" data-po-remove style="border:none;background:none;color:#d33;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:4px;">×</button></td>
        `;
        itemsBody.appendChild(tr);
        tr.querySelector("[data-po-qty]").addEventListener("input", recalcTotal);
        tr.querySelector("[data-po-price]").addEventListener("input", recalcTotal);
        tr.querySelector("[data-po-remove]").addEventListener("click", () => { tr.remove(); recalcTotal(); });
        if (item.unit) tr.querySelector("[data-po-unit]").value = item.unit;
        recalcTotal();
      };
      modal.querySelector("#poAddItemBtn").addEventListener("click", () => addItemRow());
      addItemRow();

      // 選擇工單後自動帶出關聯報價
      const ticketSelect = modal.querySelector("[name='ticketId']");
      const quotationSelect = modal.querySelector("[name='quotationId']");
      ticketSelect.addEventListener("change", () => {
        const ticket = tickets.find(t => t.id === ticketSelect.value);
        if (ticket) {
          const relatedQuotation = quotations.find(q => q.ticketId === ticket.id);
          if (relatedQuotation) quotationSelect.value = relatedQuotation.id;
        }
      });

      const form = modal.querySelector("#createPOForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const supplierId = formData.get("supplierId");
        const supplier = suppliers.find(s => s.id === supplierId);
        if (!supplier) { toast("請選擇供應商", "error"); return; }
        const items = [];
        itemsBody.querySelectorAll("tr").forEach(tr => {
          const name = tr.querySelector("[data-po-name]").value.trim();
          if (!name) return;
          const qty = parseInt(tr.querySelector("[data-po-qty]").value) || 1;
          const unit = tr.querySelector("[data-po-unit]").value;
          const unitPrice = parseFloat(tr.querySelector("[data-po-price]").value) || 0;
          items.push({ name, qty, unit, unitPrice, amount: qty * unitPrice });
        });
        if (items.length === 0) { toast("請添加至少一項物料", "error"); return; }
        const totalAmount = items.reduce((sum, i) => sum + i.amount, 0);
        const po = {
          id: `PO-${Date.now().toString().slice(-8)}`,
          quotationId: formData.get("quotationId") || "",
          ticketId: formData.get("ticketId") || "",
          supplierId: supplier.id,
          supplierName: supplier.name,
          items,
          totalAmount,
          status: "待下單",
          orderDate: "",
          expectedDate: formData.get("expectedDate"),
          arrivedDate: "",
          remark: formData.get("remark") || "",
          createdBy: currentRole().name
        };
        purchaseOrders.push(po);
        saveDataToLocalStorage();
        toast("採購單已創建");
        modal.remove();
        render();
      });
    }

      s.status = s.status === "合作中" ? "暫停" : "合作中";

    // 打開 Peachtree 同步對話框（顯示同步步驟和進度模擬）
    function openPeachtreeSyncModal() {
      const config = JSON.parse(localStorage.getItem('ecinfo_peachtree_config') || '{"enabled":false,"server":"","company":"","syncDirection":"雙向","syncTypes":["客戶","發票","收款"],"autoSync":false}');
      const modal = document.createElement("div");
      modal.className = "um-modal-overlay";
      modal.innerHTML = `
        <div class="um-modal" style="max-width:640px;">
          <div class="um-modal-head">
            <h2>🔄 Peachtree 財務系統同步</h2>
            <button class="um-modal-close" data-close-modal>×</button>
          </div>
          <div style="padding:16px 20px;" id="peachtreeSyncContent">
            <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#9a3412;">
              ℹ 模擬說明：此為原型演示，模擬與 Peachtree 財務系統的數據同步流程。實際部署時需安裝 Peachtree SDK 並配置 ODBC 連接。
            </div>

            <div style="margin-bottom:16px;">
              <h4 style="margin:0 0 8px;">同步設置</h4>
              <div class="info-list">
                ${infoRow("同步方向", config.syncDirection || "雙向")}
                ${infoRow("同步範圍", (config.syncTypes || ['客戶', '發票', '收款']).join('、'))}
                ${infoRow("Peachtree 公司", config.company || "EC Company Ltd.")}
              </div>
            </div>

            <div style="margin-bottom:16px;">
              <h4 style="margin:0 0 8px;">待同步數據預覽</h4>
              <div id="peachtreePreview">
                <div style="padding:24px;text-align:center;color:var(--muted);">點擊下方按鈕開始分析待同步數據</div>
              </div>
            </div>

            <div id="peachtreeProgress" style="display:none;margin-bottom:16px;">
              <h4 style="margin:0 0 8px;">同步進度</h4>
              <div style="background:#f3f4f6;border-radius:8px;padding:12px;">
                <div id="peachtreeProgressSteps"></div>
                <div style="margin-top:8px;background:#e5e7eb;border-radius:4px;height:6px;overflow:hidden;">
                  <div id="peachtreeProgressBar" style="background:var(--primary);height:100%;width:0%;transition:width 0.3s;"></div>
                </div>
              </div>
            </div>

            <div id="peachtreeResult" style="display:none;margin-bottom:16px;"></div>
          </div>
          <div class="um-modal-actions">
            <button type="button" class="ghost-btn" data-close-modal>關閉</button>

      // 綁定關閉事件
      modal.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => modal.remove());
      });
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.remove();

      // 綁定開始同步按鈕
      const startBtn = modal.querySelector("#peachtreeStartBtn");
      startBtn.addEventListener("click", () => runPeachtreeSync(modal, config));

    // 分析待同步數據並顯示預覽
    function analyzePeachtreeSyncData() {
      const customersToSync = customers.filter(c => !c.peachtreeId || c.peachtreeSynced !== true);
      const invoicesToSync = invoices.filter(i => !i.peachtreeSynced);
      const paymentsToSync = payments.filter(p => !p.peachtreeSynced);
      return { customersToSync, invoicesToSync, paymentsToSync };
    }

    // 執行 Peachtree 同步流程（分步驟模擬）
    function runPeachtreeSync(modal, config) {
      const startBtn = modal.querySelector("#peachtreeStartBtn");
      const preview = modal.querySelector("#peachtreePreview");
      const progress = modal.querySelector("#peachtreeProgress");
      const progressSteps = modal.querySelector("#peachtreeProgressSteps");
      const progressBar = modal.querySelector("#peachtreeProgressBar");
      const result = modal.querySelector("#peachtreeResult");

      startBtn.disabled = true;
      startBtn.textContent = "同步中...";

      const data = analyzePeachtreeSyncData();

      // 顯示待同步數據
      preview.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div style="background:#eff6ff;padding:8px;border-radius:6px;text-align:center;">
            <div style="font-size:20px;font-weight:600;color:#1e40af;">${data.customersToSync.length}</div>
            <div style="font-size:12px;color:#64748b;">客戶資料</div>
          </div>
          <div style="background:#f0fdf4;padding:8px;border-radius:6px;text-align:center;">
            <div style="font-size:20px;font-weight:600;color:#166534;">${data.invoicesToSync.length}</div>
            <div style="font-size:12px;color:#64748b;">發票數據</div>
          </div>
          <div style="background:#fef3c7;padding:8px;border-radius:6px;text-align:center;">
            <div style="font-size:20px;font-weight:600;color:#92400e;">${data.paymentsToSync.length}</div>
            <div style="font-size:12px;color:#64748b;">收款記錄</div>
          </div>
        </div>
      `;

      progress.style.display = "block";
      result.style.display = "none";

      // 同步步驟定義
      const steps = [
        { name: "連接 Peachtree 服務器", duration: 600 },
        { name: `同步客戶資料 (${data.customersToSync.length} 條)`, duration: 900 },
        { name: `同步發票數據 (${data.invoicesToSync.length} 條)`, duration: 800 },
        { name: `同步收款記錄 (${data.paymentsToSync.length} 條)`, duration: 700 },
        { name: "驗證數據一致性", duration: 500 },
        { name: "完成同步", duration: 300 }
      ];

      let currentStep = 0;
      let successCount = 0;
      let failCount = 0;

      // 逐步執行同步
      function executeStep() {
        if (currentStep >= steps.length) {
          finishSync();
          return;
        }
        const step = steps[currentStep];
        const stepEl = document.createElement("div");
        stepEl.style.cssText = "padding:4px 0;font-size:13px;display:flex;align-items:center;gap:6px;";
        stepEl.innerHTML = `<span id="stepIcon-${currentStep}" style="display:inline-block;width:16px;height:16px;border:2px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></span><span>${step.name}...</span>`;
        progressSteps.appendChild(stepEl);

        setTimeout(() => {
          const icon = progressSteps.querySelector(`#stepIcon-${currentStep}`);
          if (icon) {
            icon.style.animation = "none";
            icon.style.borderColor = "var(--success)";
            icon.innerHTML = "✓";
            icon.style.fontSize = "12px";
            icon.style.textAlign = "center";
            icon.style.lineHeight = "14px";
            icon.style.color = "var(--success)";
          }
          // 累計成功條數
          if (currentStep === 1) successCount += data.customersToSync.length;
          else if (currentStep === 2) successCount += data.invoicesToSync.length;
          else if (currentStep === 3) successCount += data.paymentsToSync.length;
          currentStep++;
          progressBar.style.width = `${(currentStep / steps.length) * 100}%`;
          executeStep();
        }, step.duration);
      }

      // 完成同步：記錄日誌、更新數據、顯示結果
      function finishSync() {
        // 模擬少量失敗（10% 機率失敗 1 條）
        if (successCount > 5 && Math.random() < 0.3) {
          failCount = 1;
          successCount -= 1;
        }

        // 標記客戶、發票、收款為已同步
        customers.forEach(c => {
          if (!c.peachtreeId) c.peachtreeId = `PT-${c.id.replace('CUST-', '')}`;
          c.peachtreeSynced = true;
        });
        invoices.forEach(i => { i.peachtreeSynced = true; });
        payments.forEach(p => { p.peachtreeSynced = true; });
        saveDataToLocalStorage();

        // 寫入同步日誌
        const logs = JSON.parse(localStorage.getItem('ecinfo_peachtree_logs') || '[]');
        const newLog = {
          syncTime: new Date().toLocaleString('zh-TW', { hour12: false }),
          direction: config.syncDirection || "雙向",
          types: config.syncTypes || ['客戶', '發票', '收款'],
          successCount,
          failCount,
          status: failCount === 0 ? '成功' : '部分成功',
          detail: failCount > 0 ? `${failCount} 條記錄因 Peachtree ID 衝突失敗` : '全部數據同步成功'
        };
        logs.unshift(newLog);
        if (logs.length > 50) logs.length = 50;
        localStorage.setItem('ecinfo_peachtree_logs', JSON.stringify(logs));

        // 更新配置的最後同步時間
        config.lastSync = newLog.syncTime;
        config.enabled = true;
        localStorage.setItem('ecinfo_peachtree_config', JSON.stringify(config));

        // 顯示同步結果
        result.style.display = "block";
        result.innerHTML = `
          <div style="background:${failCount === 0 ? '#f0fdf4' : '#fef3c7'};border:1px solid ${failCount === 0 ? '#bbf7d0' : '#fde68a'};border-radius:8px;padding:12px;">
            <h4 style="margin:0 0 8px;color:${failCount === 0 ? '#166534' : '#92400e'};">✓ 同步完成</h4>
            <div style="font-size:13px;color:#475569;">
              <div>成功同步：<strong style="color:var(--success);">${successCount}</strong> 條</div>
              ${failCount > 0 ? `<div>失敗：<strong style="color:var(--danger);">${failCount}</strong> 條</div>` : ''}
              <div>同步時間：${newLog.syncTime}</div>
              <div style="margin-top:8px;color:var(--muted);">系統已自動為未對應的客戶生成 Peachtree Customer ID</div>
            </div>
          </div>
        `;

        startBtn.disabled = false;
        startBtn.textContent = "再次同步";
        toast(`Peachtree 同步完成：成功 ${successCount} 條${failCount > 0 ? `，失敗 ${failCount} 條` : ''}`, "success");
        render();
      }

      executeStep();
    }

        if (e.target === modal) modal.remove();

      const form = modal.querySelector("#peachtreeConfigForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const syncTypes = [];
        if (fd.get("syncTypeCustomer")) syncTypes.push("客戶");
        if (fd.get("syncTypeInvoice")) syncTypes.push("發票");
        if (fd.get("syncTypePayment")) syncTypes.push("收款");

    // 渲染標書管理主頁面（統計卡 + 搜索 + 狀態篩選 + 列表 + 詳情）
    function renderTender() {
      const tenderStatuses = ["投標中", "已中標", "未中標", "不投標"];

        all: tenders.length,
        "投標中": tenders.filter(t => t.status === "投標中").length,
        "已中標": tenders.filter(t => t.status === "已中標").length,
        "未中標": tenders.filter(t => t.status === "未中標").length,
        "不投標": tenders.filter(t => t.status === "不投標").length
      };
      const totalValue = tenders.filter(t => t.status === "投標中" || t.status === "已中標").reduce((sum, t) => sum + (t.tenderValue || 0), 0);
      const wonValue = tenders.filter(t => t.status === "已中標").reduce((sum, t) => sum + (t.tenderValue || 0), 0);
      const winRate = counts["已中標"] + counts["未中標"] > 0
        ? Math.round(counts["已中標"] / (counts["已中標"] + counts["未中標"]) * 100)
        : 0;

      const tab = state.tenderTab || "all";
      const search = (state.tenderSearch || "").toLowerCase().trim();

      // 按狀態篩選 + 搜索過濾
      let filtered = tenders;
      if (tab !== "all") filtered = filtered.filter(t => t.status === tab);
      if (search) {
        filtered = filtered.filter(t =>
          (t.id || "").toLowerCase().includes(search) ||
          (t.projectName || "").toLowerCase().includes(search) ||
          (t.client || "").toLowerCase().includes(search) ||
          (t.owner || "").toLowerCase().includes(search)
        );
      }

      // 按投標日期倒序排列
      filtered = [...filtered].sort((a, b) => (b.tenderDate || "").localeCompare(a.tenderDate || ""));

              <div class="pc-label">已揭曉項目 ${counts["已中標"] + counts["未中標"]}</div>

            <div class="pc-card">

                <div class="field">
                  <label class="required">標書金額 (HKD)</label>
                  <input name="tenderValue" type="number" min="0" step="100" value="${t.tenderValue || ''}" required placeholder="0">
                </div>
                <div class="field">
                  <label class="required">狀態</label>
                  <select name="status" required>
                    ${["投標中", "已中標", "未中標", "不投標"].map(s => `<option value="${s}" ${t.status === s ? 'selected' : ''}>${s}</option>`).join("")}
                  </select>
                </div>
                <div class="field">
                  <label>投標日期</label>
                  <input name="tenderDate" type="date" value="${escapeHtml(t.tenderDate || new Date().toISOString().slice(0, 10))}">

                <div class="field">
                  <label>截止日期</label>
                  <input name="deadline" type="date" value="${escapeHtml(t.deadline || defaultDeadline)}">
                </div>
                <div class="field">
                  <label>投遞日期</label>
                  <input name="submittedDate" type="date" value="${escapeHtml(t.submittedDate || '')}">
                </div>
                <div class="field">
                  <label>揭曉日期</label>
                  <input name="resultDate" type="date" value="${escapeHtml(t.resultDate || '')}">
                </div>
                <div class="field">
                  <label>競爭對手數量</label>
                  <input name="competitorCount" type="number" min="0" value="${t.competitorCount || 0}">
                </div>
                <div class="field">
                  <label>關聯報價</label>
                  <select name="relatedQuotationId">
                    <option value="">不關聯報價</option>
                    ${quotations.map(q => `<option value="${q.id}" ${t.relatedQuotationId === q.id ? 'selected' : ''}>${q.id} - ${escapeHtml(q.title || '')}</option>`).join("")}
                  </select>
                </div>
                <div class="field" style="grid-column:span 2;">
                  <label>項目描述</label>
                  <textarea name="description" rows="3" placeholder="請輸入項目描述（選填）">${escapeHtml(t.description || '')}</textarea>
                </div>
                <div class="field" style="grid-column:span 2;">
                  <label>備註</label>
                  <textarea name="remark" rows="2" placeholder="請輸入備註（選填）">${escapeHtml(t.remark || '')}</textarea>
                </div>
              </div>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;padding:14px 24px;border-top:1px solid var(--border);background:var(--bg);">
              <button type="button" class="ghost-btn" data-close-modal>取消</button>
              <button type="submit" class="primary-btn" style="padding:8px 24px;">${isEdit ? '保存修改' : '創建標書'}</button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      modal.querySelectorAll("[data-close-modal]").forEach(btn => btn.addEventListener("click", () => modal.remove()));
      modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });
      modal.querySelector("#tenderForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        saveTender(formData, isEdit, tenderId);
        modal.remove();
      });
    }

    // 保存標書（新建或編輯）
    function saveTender(formData, isEdit, tenderId) {
      const data = {
        id: (formData.get("id") || "").trim(),
        projectName: (formData.get("projectName") || "").trim(),
        client: (formData.get("client") || "").trim(),
        owner: (formData.get("owner") || "").trim(),
        tenderValue: parseFloat(formData.get("tenderValue") || 0),
        status: formData.get("status"),
        tenderDate: formData.get("tenderDate") || "",
        deadline: formData.get("deadline") || "",
        submittedDate: formData.get("submittedDate") || "",
        resultDate: formData.get("resultDate") || "",
        competitorCount: parseInt(formData.get("competitorCount") || 0, 10),
        relatedQuotationId: formData.get("relatedQuotationId") || "",
        description: (formData.get("description") || "").trim(),
        remark: (formData.get("remark") || "").trim()
      };

      if (isEdit) {
        const idx = tenders.findIndex(x => x.id === tenderId);
        if (idx >= 0) {
          tenders[idx] = { ...tenders[idx], ...data, id: tenderId };
          toast("標書已更新");
        }
      } else {
        if (tenders.find(x => x.id === data.id)) {
          toast("標書編號已存在，請使用其他編號", "error");
          return;
        }
        tenders.push(data);
        state.selectedTenderId = data.id;
        toast("標書已創建");
      }
      saveDataToLocalStorage();
      render();
    }

    // 更新標書狀態
    function updateTenderStatus(tenderId, newStatus) {
      const t = tenders.find(x => x.id === tenderId);
      if (!t) return;
      const oldStatus = t.status;
      t.status = newStatus;
      // 自動填充狀態對應的日期
      const today = new Date().toISOString().slice(0, 10);
      if (newStatus === "已中標" || newStatus === "未中標") {
        if (!t.resultDate) t.resultDate = today;
        if (!t.submittedDate) t.submittedDate = today;
      } else if (newStatus === "投標中" && !t.submittedDate) {
        // 投標中暫不填投遞日期
      }
      saveDataToLocalStorage();
      toast(`標書狀態已更新為「${newStatus}」`);
      render();
    }

    // 確認投遞標書（保留投標中狀態，僅記錄投遞日期）
    function submitTender(tenderId) {
      const t = tenders.find(x => x.id === tenderId);
      if (!t) return;
      t.submittedDate = new Date().toISOString().slice(0, 10);
      saveDataToLocalStorage();
      toast("已記錄投遞日期");
      render();
    }

    // 刪除標書
    function deleteTender(tenderId) {
      const t = tenders.find(x => x.id === tenderId);
      if (!t) return;
      if (!confirm(`確定刪除標書「${t.id} - ${t.projectName}」？此操作不可撤銷。`)) return;
      tenders = tenders.filter(x => x.id !== tenderId);
      if (state.selectedTenderId === tenderId) state.selectedTenderId = null;
      saveDataToLocalStorage();
      toast("標書已刪除");
      render();
    }

    // ============ SR 文件夾模塊 ============
    // 渲染 Service Report 文件夾（支持按編號或名稱搜索）
    function renderSrFolder() {
      // 收集所有有 serviceReportNo 的工單
      const srTickets = tickets.filter(t => t.serviceReportNo).slice().sort((a, b) => {
        // 按 SR 編號倒序排列
        return (b.serviceReportNo || "").localeCompare(a.serviceReportNo || "");
      });

      // 統計
      const totalSR = srTickets.length;
      const byStatus = {};
      srTickets.forEach(t => { byStatus[t.status] = (byStatus[t.status] || 0) + 1; });
      const completed = byStatus["已完成"] || 0;
      const inProgress = byStatus["處理中"] || 0;
      const pending = byStatus["待處理"] || 0;

      // 過濾
      const search = (state.srFolderSearch || "").toLowerCase().trim();
      const areaFilter = state.srFolderArea || "全部";
      const statusFilter = state.srFolderStatus || "全部";

      let filtered = srTickets;
      if (areaFilter !== "全部") {
        // 區域篩選兼容 srArea 和 area 字段
        filtered = filtered.filter(t => (t.srArea || t.area || "") === areaFilter);
      }
      if (statusFilter !== "全部") {
        filtered = filtered.filter(t => t.status === statusFilter);
      }
      if (search) {
        filtered = filtered.filter(t =>
          (t.serviceReportNo || "").toLowerCase().includes(search) ||
          (t.id || "").toLowerCase().includes(search) ||
          (t.customer || "").toLowerCase().includes(search) ||
          (t.desc || "").toLowerCase().includes(search) ||
          (t.srSystems || []).some(s => s.toLowerCase().includes(search)) ||
          (t.srObjectives || []).some(s => s.toLowerCase().includes(search))
        );
      }

      // 收集所有出現過的區域（用於篩選下拉）
      const allAreas = ["全部", ...new Set(srTickets.map(t => t.srArea || t.area || "").filter(Boolean))];

      return `
        <div class="pc-container">
          <div class="pc-header">
            <h1>SR 文件夾</h1>
            <div class="pc-header-actions">
              <span style="color:var(--muted);font-size:13px;">共 ${totalSR} 份 Service Report</span>
            </div>
          </div>

          <div class="pc-grid">
            <div class="pc-card">
              <h3>SR 總數</h3>
              <div class="pc-metric">${totalSR}</div>
              <div class="pc-label">已建立的服務報告</div>
            </div>
            <div class="pc-card">
              <h3>處理中</h3>
              <div class="pc-metric">${inProgress}</div>
              <div class="pc-label">師傅處理中的工單</div>
            </div>
            <div class="pc-card">
              <h3>已完成</h3>
              <div class="pc-metric">${completed}</div>
              <div class="pc-label">已完工的服務報告</div>
            </div>
            <div class="pc-card">
              <h3>待處理</h3>
              <div class="pc-metric">${pending}</div>
              <div class="pc-label">等待師傅處理</div>
            </div>
          </div>

          <div class="pc-section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
              <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                <select data-sr-folder-area style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);">
                  ${allAreas.map(a => `<option value="${escapeHtml(a)}" ${areaFilter === a ? 'selected' : ''}>${a === '全部' ? '全部區域' : escapeHtml(a)}</option>`).join("")}
                </select>
                <select data-sr-folder-status style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);">
                  ${["全部", "待確認", "待處理", "處理中", "已完成", "已取消"].map(s => `<option value="${s}" ${statusFilter === s ? 'selected' : ''}>${s === '全部' ? '全部狀態' : s}</option>`).join("")}
                </select>
              </div>
              <input type="text" placeholder="搜索 SR 編號 / 工單號 / 客戶 / 系統 / 目的..." value="${escapeHtml(state.srFolderSearch || '')}" data-sr-folder-search style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:340px;">
            </div>

            ${renderSrFolderList(filtered)}
          </div>

          <div class="pc-section" style="margin-top:16px;">
            <h3 style="margin:0 0 12px;">📤 SR 發送記錄</h3>
            ${renderSrSendLogs()}
          </div>
        </div>
      `;
    }

    // 渲染 SR 文件夾列表表格
    function renderSrFolderList(filtered) {

                  <td>${escapeHtml(t.customer)}</td>
                  <td>${escapeHtml(t.srArea || t.area || '-')}</td>
                  <td>${(t.srSystems && t.srSystems.length > 0) ? t.srSystems.map(s => `<span class="chip" style="margin:1px;">${escapeHtml(s)}</span>`).join('') : '<span style="color:var(--muted);">-</span>'}</td>
                  <td>${(t.srObjectives && t.srObjectives.length > 0) ? t.srObjectives.map(s => `<span class="chip" style="margin:1px;">${escapeHtml(s)}</span>`).join('') : '<span style="color:var(--muted);">-</span>'}</td>
                  <td>${escapeHtml(t.maintenanceType || '非保養')}</td>
                  <td><span class="tag ${statusColor(t.status)}">${escapeHtml(t.status)}</span></td>
                  <td>${escapeHtml(t.createdAt || '-')}</td>
                  <td>
                    <div style="display:flex;gap:4px;flex-wrap:wrap;">
                      <button class="ghost-btn" data-sr-folder-open-ticket="${t.id}">查看工單</button>
                      <button class="secondary-btn" data-sr-folder-open-sr="${t.id}">查看 SR</button>
                      <button class="ghost-btn" data-sr-send="${t.id}">📧 發送</button>

          </table>
