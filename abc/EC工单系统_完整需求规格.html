function ftbl(fields){
  var h='<table><tr><th>字段名称</th><th>字段标识</th><th>数据类型</th><th>必填</th><th>长度/取值</th><th>备注</th></tr>';

    var f=fields[i];
    if(f[0].indexOf('===')===0){h+='<tr class="sep"><td colspan="6">'+f[0].replace(/===/g,'')+'</td></tr>';continue;}
    var r=f[3]==='是'?'<span class="req">●</span>':(f[3]==='—'?'—':'<span class="opt">'+f[3]+'</span>');

  }
  return h+'</table>';
}

}

// ═══════════ Render engine ═══════════
async function render(id){
  cur=id;
  title.textContent=titles[id]||'EC工单管理系统';
  var links=nav.querySelectorAll('a');
  for(var i=0;i<links.length;i++)links[i].classList.toggle('active',links[i].dataset.s===id);

  // flowchart pages (f1-f6)
  if(id[0]==='f' && M[id]){
    content.innerHTML='<div id="fchart" style="background:#fff;overflow-x:auto"></div>';
    var wrap=document.getElementById('fchart');
    try{
      var result=await mermaid.render('mg',M[id]);
      wrap.innerHTML=result.svg;
      var svg=wrap.querySelector('svg');
      if(svg){svg.style.maxWidth='none';svg.style.display='block';svg.style.background='#fff';}
    }catch(e){
      wrap.innerHTML='<pre style="color:#dc2626">Mermaid render failed: '+e.message+'</pre>';
    }
    view.scrollTo(0,0);
    return;
  }

  // normal pages
  content.innerHTML=H[id]?H[id]():'<p>Coming soon.</p>';
  view.scrollTo(0,0);
}

nav.addEventListener('click',function(e){
  var a=e.target.closest('a[data-s]');
  if(!a||a.dataset.s===cur)return;
  location.hash='#'+a.dataset.s;
  render(a.dataset.s);
});
