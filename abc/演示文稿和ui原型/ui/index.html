<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECInfo × DingTalk 工单系统 MVP UI 原型</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafd;
      --text: #1f2937;
      --muted: #687386;
      --line: #dde5f0;
      --primary: #1e6bff;
      --primary-strong: #0b55df;
      --primary-soft: #eaf1ff;
      --sidebar: #10233a;
      --sidebar-2: #0b1b2e;
      --success: #12a56b;
      --success-soft: #e8f8f1;
      --warning: #e99a12;
      --warning-soft: #fff5df;
      --danger: #e5484d;
      --danger-soft: #ffeded;
      --cyan: #0ea5b7;
      --purple: #7c5cff;
      --shadow: 0 12px 32px rgba(16, 35, 58, .08);
      --radius: 8px;
    }

    [data-theme="dark"] {
      --bg: #0d1523;
      --panel: #141f31;
      --panel-soft: #101a2b;
      --text: #e8edf6;
      --muted: #9aa7bb;
      --line: #26354b;
      --primary: #5b8fff;
      --primary-strong: #82a9ff;
      --primary-soft: #16294b;
      --sidebar: #07111f;
      --sidebar-2: #050b14;
      --success-soft: #0e2f25;
      --warning-soft: #35270c;
      --danger-soft: #3a1518;
      --shadow: 0 18px 44px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 236px 1fr;
      transition: grid-template-columns .18s ease;
    }
    .app.sidebar-collapsed { grid-template-columns: 72px 1fr; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      color: #e9f1ff;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
      border-right: 1px solid rgba(255,255,255,.08);
      padding: 14px 10px;
      overflow: hidden;
    }
    .brand {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      margin-bottom: 10px;
    }
    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2b7cff, #0ba5ff);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(30,107,255,.26);
      flex: 0 0 auto;
    }
    .brand-title {
      white-space: nowrap;
      overflow: hidden;
    }
    .brand-title strong { display: block; font-size: 14px; line-height: 1.2; }
    .brand-title span { display: block; font-size: 11px; color: rgba(233,241,255,.7); margin-top: 3px; }
    .collapse-btn {
      width: 100%;
      height: 34px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 7px;
      background: rgba(255,255,255,.06);
      color: #d8e6ff;
      margin: 4px 0 14px;
    }
    .nav-list { display: grid; gap: 5px; }
    .nav-item {
      height: 42px;
      border: 0;
      width: 100%;
      color: #d7e5f8;
      background: transparent;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,.08); }
    .nav-item.active { background: #1768ff; color: #fff; box-shadow: 0 8px 18px rgba(23,104,255,.24); }
    .nav-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px;
      flex: 0 0 auto;
    }
    .app.sidebar-collapsed .brand-title,
    .app.sidebar-collapsed .nav-label,
    .app.sidebar-collapsed .collapse-text { display: none; }
    .app.sidebar-collapsed .brand { justify-content: center; padding: 0; }
    .app.sidebar-collapsed .nav-item { justify-content: center; padding: 0; }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 22px;
      background: rgba(244,247,251,.82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    [data-theme="dark"] .topbar { background: rgba(13,21,35,.82); }
    .topbar-left, .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .page-heading {
      min-width: 170px;
      display: grid;
      gap: 2px;
    }
    .page-heading h1 { margin: 0; font-size: 18px; line-height: 1.2; }
    .page-heading p { margin: 0; font-size: 12px; color: var(--muted); }
    .segmented {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 3px 14px rgba(15, 23, 42, .04);
    }
    .segmented button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      height: 30px;
      padding: 0 11px;
      white-space: nowrap;
    }
    .segmented button.active { background: var(--primary); color: #fff; }
    .toolbar-btn, .primary-btn, .secondary-btn, .danger-btn, .ghost-btn {
      height: 34px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .primary-btn {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 16px rgba(30,107,255,.18);
    }
    .primary-btn:hover { background: var(--primary-strong); }
    .secondary-btn { background: var(--primary-soft); color: var(--primary-strong); border-color: transparent; }
    .danger-btn { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
    .ghost-btn { background: transparent; }

    .user-menu { position: relative; }
    .user-card {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 10px;
      min-width: 190px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .user-meta { min-width: 0; text-align: left; }
    .user-meta strong { display: block; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta span { display: block; color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown {
      position: absolute;
      right: 0;
      top: 48px;
      width: 190px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 6px;
      display: none;
    }
    .dropdown.open { display: block; }
    .dropdown button {
      width: 100%;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      text-align: left;
      padding: 0 10px;
    }
    .dropdown button:hover { background: var(--panel-soft); }

    .content {
      padding: 20px 22px 28px;
      min-width: 0;
    }
    .page {
      display: none;
      animation: fade .12s ease-out;
    }
    .page.active { display: block; }
    @keyframes fade { from { opacity: .4; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .grid { display: grid; gap: 14px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cols-8 { grid-template-columns: repeat(8, minmax(118px, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      min-width: 0;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card h2, .card h3 { margin: 0; font-size: 15px; }
    .card p { color: var(--muted); margin: 5px 0 0; font-size: 12px; line-height: 1.5; }
    .muted { color: var(--muted); }

    .stat-card {
      min-height: 92px;
      display: grid;
      gap: 8px;
      align-content: space-between;
      border-left: 3px solid var(--primary);
    }
    .stat-card .stat-label { color: var(--muted); font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .stat-card .stat-value { font-size: 24px; font-weight: 800; }
    .stat-card .stat-note { font-size: 11px; color: var(--muted); }

    .chip, .status-pill, .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .chip { background: var(--panel-soft); color: var(--muted); border-color: var(--line); }
    .tag { background: var(--primary-soft); color: var(--primary-strong); }
    .urgent { background: var(--danger-soft); color: var(--danger); }
    .status-待受理 { background: #eaf1ff; color: #1e6bff; }
    .status-待分派 { background: #fff5df; color: #bf7600; }
    .status-待接单 { background: #e8fbff; color: #08798a; }
    .status-处理中 { background: #eef0ff; color: #6550d9; }
    .status-待确认 { background: #fff0f4; color: #c63b64; }
    .status-已关闭 { background: #e8f8f1; color: #08764a; }
    .status-已取消 { background: #f0f2f5; color: #667085; }
    [data-theme="dark"] .status-待受理 { background: #16335d; color: #93b8ff; }
    [data-theme="dark"] .status-待分派 { background: #3a2b11; color: #ffc96b; }
    [data-theme="dark"] .status-待接单 { background: #123641; color: #73d9e6; }
    [data-theme="dark"] .status-处理中 { background: #28244e; color: #b6adff; }
    [data-theme="dark"] .status-待确认 { background: #3b1725; color: #ff9fbb; }
    [data-theme="dark"] .status-已关闭 { background: #123726; color: #7be0b4; }
    [data-theme="dark"] .status-已取消 { background: #252b36; color: #b8c0cc; }

    .data-table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }
    th { color: var(--muted); font-weight: 700; background: var(--panel-soft); }
    td .link-btn {
      border: 0;
      background: transparent;
      color: var(--primary-strong);
      padding: 0;
      font-weight: 700;
      text-align: left;
    }
    .ellipsis { max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .filters {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 10px;
      outline: none;
    }
    .field textarea { min-height: 86px; resize: vertical; line-height: 1.5; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,107,255,.12); }
    .required::after { content: " *"; color: var(--danger); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .form-grid .wide { grid-column: 1 / -1; }
    .form-section { margin-bottom: 14px; }
    .form-section h3 { margin: 0 0 10px; font-size: 14px; }

    .split-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(360px, 1.3fr) minmax(250px, .9fr);
      gap: 14px;
      align-items: start;
    }
    .detail-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .detail-title { display: grid; gap: 5px; }
    .detail-title h2 { margin: 0; font-size: 20px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .info-list { display: grid; gap: 9px; }
    .info-row {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .info-row span:first-child { color: var(--muted); }
    .timeline { position: relative; display: grid; gap: 12px; }
    .timeline::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--line);
    }
    .timeline-item {
      position: relative;
      padding-left: 30px;
      display: grid;
      gap: 4px;
    }
    .timeline-dot {
      position: absolute;
      left: 3px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--panel);
    }
    .timeline-item strong { font-size: 13px; }
    .timeline-item p { margin: 0; font-size: 12px; color: var(--muted); }

    .photo-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .photo-thumb {
      aspect-ratio: 4 / 3;
      border-radius: 7px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(30,107,255,.16), rgba(18,165,107,.12)),
        repeating-linear-gradient(45deg, transparent 0 10px, rgba(104,115,134,.08) 10px 18px);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
    }

    .dispatch-grid {
      display: grid;
      grid-template-columns: 1.05fr 1.15fr .95fr;
      gap: 14px;
      align-items: start;
    }
    .ticket-mini, .master-card {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      padding: 11px;
      display: grid;
      gap: 7px;
      margin-bottom: 10px;
    }
    .ticket-mini.active, .master-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30,107,255,.1);
    }
    .master-card { grid-template-columns: 42px 1fr auto; align-items: center; }
    .master-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary-strong);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .bar-row { display: grid; grid-template-columns: 82px 1fr 38px; gap: 9px; align-items: center; margin: 9px 0; font-size: 12px; }
    .bar-track { height: 8px; background: var(--panel-soft); border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); border-radius: 999px; }
    .trend { height: 164px; display: flex; align-items: end; gap: 10px; padding-top: 10px; }
    .trend-col { flex: 1; display: grid; gap: 6px; align-items: end; justify-items: center; color: var(--muted); font-size: 11px; }
    .trend-bar { width: 100%; max-width: 24px; background: var(--primary); border-radius: 6px 6px 0 0; min-height: 18px; }

    .settings-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .settings-tabs button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      height: 32px;
      padding: 0 12px;
    }
    .settings-tabs button.active { border-color: var(--primary); background: var(--primary); color: #fff; }

    .mobile-stage {
      min-height: calc(100vh - 66px);
      display: grid;
      place-items: start center;
      padding: 28px 18px;
    }
    .phone {
      width: min(390px, 100%);
      height: 844px;
      max-height: calc(100vh - 92px);
      border: 10px solid #111827;
      border-radius: 34px;
      background: var(--panel);
      box-shadow: 0 18px 54px rgba(15,23,42,.24);
      overflow: hidden;
      display: grid;
      grid-template-rows: 54px 1fr 64px;
    }
    .phone-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .phone-title { display: grid; gap: 2px; }
    .phone-title strong { font-size: 14px; }
    .phone-title span { font-size: 11px; color: var(--muted); }
    .phone-body {
      overflow-y: auto;
      padding: 12px;
      background: var(--bg);
    }
    .phone-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    .phone-tabs button {
      border: 0;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      gap: 3px;
      font-size: 12px;
    }
    .phone-tabs button.active { color: var(--primary-strong); font-weight: 700; }
    .mobile-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      display: grid;
      gap: 9px;
    }
    .mobile-card-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .mobile-actions { display: flex; gap: 8px; }
    .mobile-actions button { flex: 1; }
    .fixed-mobile-actions {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding-top: 10px;
      background: linear-gradient(180deg, transparent, var(--bg) 18%);
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: var(--sidebar);
      color: #fff;
      border-radius: 8px;
      min-width: 220px;
      padding: 12px 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.2);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: .18s ease;
      z-index: 60;
      font-size: 13px;
    }
    .toast.show { opacity: 1; transform: none; }

    @media (max-width: 1180px) {
      .cols-8 { grid-template-columns: repeat(4, minmax(130px, 1fr)); }
      .filters { grid-template-columns: repeat(3, minmax(130px, 1fr)); }
      .split-layout, .dispatch-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; display: none; }
      .topbar { position: static; flex-direction: column; align-items: stretch; }
      .topbar-left, .topbar-right { flex-wrap: wrap; }
      .content { padding: 14px; }
      .cols-2, .cols-3, .cols-4, .cols-8 { grid-template-columns: 1fr; }
      .filters, .form-grid { grid-template-columns: 1fr; }
      .user-card { min-width: 160px; }
      .phone { height: calc(100vh - 120px); border-width: 6px; border-radius: 26px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-mark">EC</div>
        <div class="brand-title">
          <strong>ECInfo 工单系统</strong>
          <span>DingTalk MVP 原型</span>
        </div>
      </div>
      <button class="collapse-btn" id="collapseBtn" title="收起 / 展开侧边栏"><span class="collapse-text">收起菜单</span></button>
      <nav class="nav-list" id="navList"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="page-heading">
            <h1 id="pageTitle">首页 / 工单看板</h1>
            <p id="pageSub">客户流程确认版 UI 原型</p>
          </div>
          <div class="segmented" id="roleSwitch" aria-label="角色切换"></div>
          <div class="segmented" id="viewSwitch" aria-label="视图切换">
            <button data-view="pc" class="active">PC 端</button>
            <button data-view="mobile">移动端</button>
          </div>
        </div>
        <div class="topbar-right">
          <button class="toolbar-btn" id="themeBtn">暗色模式</button>
          <div class="user-menu">
            <button class="user-card" id="userMenuBtn">
              <span class="avatar" id="avatarText">管</span>
              <span class="user-meta">
                <strong id="userName">林主管</strong>

    const $ = (selector) => document.querySelector(selector);

    function toast(message) {
      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    function countBy(field) {
      return tickets.reduce((acc, t) => {
        acc[t[field]] = (acc[t[field]] || 0) + 1;
        return acc;
      }, {});
    }

    function setPage(page) {
      state.page = page;
      state.view = "pc";
      render();
    }

    function setMobilePage(page) {
      state.mobilePage = page;
      state.view = "mobile";
      render();
    }

    function setRole(role) {
      state.role = role;
      if (role === "MASTER") {
        state.view = "mobile";
        state.mobilePage = "tasks";
        const own = tickets.find(t => t.master === currentRole().name && ["待接单", "处理中", "待确认"].includes(t.status));
        if (own) state.selectedTicketId = own.id;
      } else {
        state.view = "pc";
        if (role === "CS") state.page = "create";
        if (role === "TL") state.page = "dispatch";
        if (role === "ADMIN") state.page = "dashboard";
      }
      render();
      toast(`已切换为 ${currentRole().label}`);
    }

    function updateTicket(id, patch, note) {
      const t = ticketById(id);
      Object.assign(t, patch);
      t.updatedAt = new Date().toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).replace(/\//g, "-");
      if (note) {
        t.records.push({ time: t.updatedAt.slice(-5), actor: currentRole().name, text: note });
      }
    }

    function performAction(action, id) {
      const t = ticketById(id);
      if (action === "view") {
        state.selectedTicketId = id;
        state.page = "detail";
        state.view = "pc";
        render();
        return;
      }
      if (action === "accept") {
        updateTicket(id, { status: "待分派", owner: t.tl || "李组长" }, "CS 已受理，确认需要派工。");
      }
      if (action === "cancel") {
        updateTicket(id, { status: "已取消", owner: currentRole().name, cancelReason: "原型模拟取消" }, "工单已取消。");
      }
      if (action === "closeDirect") {
        updateTicket(id, { status: "已关闭", owner: currentRole().name }, "现场或电话中已解决，直接关闭。");
      }
      if (action === "assign") {
        state.selectedDispatchId = id;
        state.page = "dispatch";
        state.view = "pc";
        render();
        toast("请在分派中心选择师傅并确认分派");
        return;
      }
      if (action === "take") {
        updateTicket(id, { status: "处理中", owner: currentRole().name, master: currentRole().name }, "师傅已接单，进入处理中。");
      }
      if (action === "reject") {
        updateTicket(id, { status: "待分派", owner: t.tl, master: "", rejectReason: "当前任务冲突，需重新安排。" }, "师傅拒单：当前任务冲突，退回待分派。");
      }
      if (action === "submitResult") {
        updateTicket(id, { status: "待确认", owner: t.tl }, "师傅提交处理结果和现场记录，等待确认。");
      }
      if (action === "confirmClose") {
        updateTicket(id, { status: "已关闭", owner: currentRole().name }, "确认处理结果通过，工单关闭。");
      }
      if (action === "returnWork") {
        updateTicket(id, { status: "处理中", owner: t.master || "周师傅" }, "确认不通过，退回师傅继续处理。");
      }
      if (action === "note") {
        updateTicket(id, {}, "补充信息：已在原型中记录备注。");
      }
      render();
      toast("状态已在页面内模拟更新");
    }

    function actionButtons(t, context = "detail") {
      const buttons = [];
      const add = (label, action, cls = "secondary-btn") => buttons.push(`<button class="${cls}" data-action="${action}" data-id="${t.id}">${label}</button>`);
      if (context === "list") add("查看详情", "view", "ghost-btn");
      if (["已关闭", "已取消"].includes(t.status)) return buttons.join("");
      if (state.role === "CS") {
        if (t.status === "待受理") {
          add("受理", "accept", "primary-btn");
          add("取消", "cancel", "danger-btn");
        }
        if (["待受理", "处理中"].includes(t.status)) add("补充信息", "note", "secondary-btn");
      }
      if (state.role === "TL") {
        if (t.status === "待分派") add("分派", "assign", "primary-btn");
        if (t.status === "待接单") add("重新分派", "assign", "secondary-btn");
        if (t.status === "待确认") {
          add("确认关闭", "confirmClose", "primary-btn");
          add("退回处理", "returnWork", "secondary-btn");
        }
        if (t.status === "处理中") add("补充备注", "note", "secondary-btn");
      }
      if (state.role === "MASTER") {
        if (t.status === "待接单") {
          add("接单", "take", "primary-btn");
          add("拒单", "reject", "danger-btn");
        }
        if (t.status === "处理中") add("提交处理结果", "submitResult", "primary-btn");
      }
      if (state.role === "ADMIN") {
        if (t.status === "待确认") {
          add("确认关闭", "confirmClose", "primary-btn");
          add("退回处理", "returnWork", "secondary-btn");
        }
        if (["待受理", "待分派", "处理中"].includes(t.status)) add("取消", "cancel", "danger-btn");
      }
      return buttons.join("");
    }

    function renderShell() {
      $("#roleSwitch").innerHTML = ROLES.map(r => `<button data-role="${r.key}" class="${state.role === r.key ? "active" : ""}">${r.label}</button>`).join("");
      $("#viewSwitch").querySelectorAll("button").forEach(btn => btn.classList.toggle("active", btn.dataset.view === state.view));
      const role = currentRole();
      $("#avatarText").textContent = role.avatar;
      $("#userName").textContent = role.name;
      $("#userRoleLine").textContent = `${role.label} · ${role.dept}`;
      $("#pcShell").classList.toggle("hidden", state.view !== "pc");
      $("#mobileShell").classList.toggle("hidden", state.view !== "mobile");
      const activePage = state.view === "pc" ? PAGES.find(p => p.key === state.page) : MOBILE_PAGES.find(p => p.key === state.mobilePage);
      $("#pageTitle").textContent = activePage?.label || activePage?.title || "工单系统";
      $("#pageSub").textContent = state.view === "pc" ? (activePage?.sub || "客户流程确认版 UI 原型") : "师傅移动端操作模拟";
      $("#navList").innerHTML = PAGES.map(p => `
        <button class="nav-item ${state.page === p.key && state.view === "pc" ? "active" : ""}" data-page="${p.key}" title="${p.label}">
          <span class="nav-icon">${p.icon}</span><span class="nav-label">${p.label}</span>
        </button>`).join("");
    }

    function renderDashboard() {
      const counts = Object.fromEntries(STATUSES.map(s => [s, tickets.filter(t => t.status === s).length]));
      const typeCounts = countBy("type");
      const areaCounts = countBy("area");
      const todo = tickets.filter(t => ["待受理", "待分派", "待接单", "待确认"].includes(t.status)).slice(0, 5);
      const focus = tickets.filter(t => t.urgent || t.rejectReason || t.tags.includes("无法完成示例")).slice(0, 4);
      return `
        <section class="page active">
          <div class="grid cols-8">
            <div class="card stat-card"><div class="stat-label">工单总数<span class="chip">全部</span></div><div class="stat-value">${tickets.length}</div><div class="stat-note">MVP 模拟数据</div></div>
            ${STATUSES.map(s => `<div class="card stat-card"><div class="stat-label">${s}<span class="${statusClass(s)}">${s}</span></div><div class="stat-value">${counts[s] || 0}</div><div class="stat-note">点击列表筛选查看</div></div>`).join("")}
          </div>
          <div class="grid cols-3" style="margin-top:14px;">
            <div class="card">
              <div class="card-head"><h2>今日待办</h2><button class="secondary-btn" data-page-target="list">查看列表</button></div>
              ${todo.map(t => `<div class="ticket-mini"><div><button class="link-btn" data-open="${t.id}">${t.id}</button> <span class="${statusClass(t.status)}">${t.status}</span></div><strong>${escapeHtml(t.customer)}</strong><p>${escapeHtml(t.desc)}</p></div>`).join("")}
            </div>
            <div class="card">
              <div class="card-head"><h2>异常 / 需关注工单</h2><span class="chip">${focus.length} 条</span></div>
              ${focus.map(t => `<div class="ticket-mini"><div><button class="link-btn" data-open="${t.id}">${t.id}</button> ${t.urgent ? '<span class="tag urgent">紧急</span>' : '<span class="tag">需关注</span>'}</div><strong>${escapeHtml(t.customer)}</strong><p>${escapeHtml(t.rejectReason || t.desc)}</p></div>`).join("")}
            </div>
            <div class="card">
              <div class="card-head"><h2>最近动态</h2><span class="chip">${now}</span></div>
              ${tickets.slice(0, 5).map(t => `<div class="timeline-item"><span class="timeline-dot"></span><strong>${t.updatedAt} · ${t.id}</strong><p>${escapeHtml(t.records[t.records.length - 1]?.text || t.desc)}</p></div>`).join("")}
            </div>
          </div>
          <div class="grid cols-3" style="margin-top:14px;">
            <div class="card"><h2>工单类型分布</h2>${TYPES.map(type => barRow(type, typeCounts[type] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>区域分布</h2>${REGIONS.map(area => barRow(area, areaCounts[area] || 0, tickets.length)).join("")}</div>
            <div class="card">
              <h2>快捷操作</h2>
              <p>用于演示从建单、查询到分派的主流程入口。</p>
              <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
                <button class="primary-btn" data-new-ticket>新建工单</button>
                <button class="secondary-btn" data-page-target="list">查看工单列表</button>
              </div>
            </div>
          </div>
        </section>`;
    }

    function barRow(label, value, total) {
      const pct = total ? Math.round(value / total * 100) : 0;
      return `<div class="bar-row"><span>${label}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, pct)}%"></div></div><strong>${value}</strong></div>`;
    }

    function filteredTickets() {
      const f = state.filters;
      return tickets.filter(t => {
        const keyword = f.keyword.trim().toLowerCase();
        return (f.status === "全部" || t.status === f.status)
          && (f.type === "全部" || t.type === f.type)
          && (f.area === "全部" || t.area === f.area)
          && (f.owner === "全部" || t.owner === f.owner || t.master === f.owner)
          && (f.tl === "全部" || t.tl === f.tl)
          && (!keyword || `${t.id} ${t.customer} ${t.contact} ${t.desc}`.toLowerCase().includes(keyword));
      });
    }

    function renderList() {
      const ownerOptions = [...new Set(tickets.flatMap(t => [t.owner, t.master]).filter(Boolean))];
      const rows = filteredTickets().map(t => `
        <tr>
          <td><button class="link-btn" data-open="${t.id}">${t.id}</button></td>
          <td>${t.type}</td>
          <td><button class="link-btn ellipsis" data-open="${t.id}">${escapeHtml(t.customer)}</button><div class="muted">${escapeHtml(t.contact)}</div></td>
          <td>${t.channel}</td>
          <td>${t.area}</td>
          <td><span class="${statusClass(t.status)}">${t.status}</span></td>
          <td>${escapeHtml(t.owner)}</td>
          <td>${t.updatedAt}</td>
          <td><div style="display:flex; gap:6px; flex-wrap:wrap;">${actionButtons(t, "list")}</div></td>
        </tr>`).join("");
      return `
        <section class="page active">
          <div class="card">
            <div class="card-head">
              <div><h2>工单列表</h2><p>按状态、类型、区域、负责人和关键词筛选工单。</p></div>
              <button class="primary-btn" data-new-ticket>新建工单</button>
            </div>
            <div class="filters">
              ${selectFilter("status", "状态", ["全部", ...STATUSES])}
              ${selectFilter("type", "工单类型", ["全部", ...TYPES])}
              ${selectFilter("area", "区域", ["全部", ...REGIONS])}
              ${selectFilter("owner", "负责人", ["全部", ...ownerOptions])}
              ${selectFilter("tl", "Team Leader", ["全部", ...teamLeaders])}
              <div class="field"><label>关键词</label><input data-filter="keyword" value="${escapeHtml(state.filters.keyword)}" placeholder="工单编号、客户、联系人"></div>
            </div>
            <div class="data-table-wrap">
              <table>
                <thead><tr><th>工单编号</th><th>工单类型</th><th>客户 / 联系人</th><th>来源渠道</th><th>区域</th><th>状态</th><th>当前负责人</th><th>更新时间</th><th>操作</th></tr></thead>
                <tbody>${rows || `<tr><td colspan="9" class="muted">暂无匹配工单</td></tr>`}</tbody>
              </table>
            </div>
          </div>
        </section>`;
    }

    function selectFilter(key, label, options) {
      return `<div class="field"><label>${label}</label><select data-filter="${key}">${options.map(o => `<option ${state.filters[key] === o ? "selected" : ""}>${o}</option>`).join("")}</select></div>`;
    }

    function renderCreate() {
      return `
        <section class="page active">
          <form class="card" id="createForm">
            <div class="card-head">
              <div><h2>新建工单 / 来电记录</h2><p>由 CS 记录电话、WhatsApp、现场沟通或邮件服务请求。</p></div>
              <span class="chip">新建后状态：待受理</span>
            </div>
            ${formSection("基本信息", `
              <div class="field"><label>工单编号</label><input value="自动生成" disabled></div>
              <div class="field"><label>创建人</label><input value="${currentRole().name}" disabled></div>
            `)}
            ${formSection("客户与联系人", `
              <div class="field"><label class="required">客户名称</label><input name="customer" required placeholder="请输入客户名称"></div>
              <div class="field"><label class="required">联系人</label><input name="contact" required placeholder="请输入联系人"></div>
              <div class="field"><label class="required">联系方式</label><input name="phone" required placeholder="+852 ..."></div>
              <div class="field"><label>来源渠道</label><select name="channel">${CHANNELS.map(c => `<option>${c}</option>`).join("")}</select></div>
            `)}
            ${formSection("工单类型", `
              <div class="field wide"><label class="required">工单类型</label><select name="type" required>${TYPES.map(t => `<option>${t}</option>`).join("")}</select></div>
            `)}
            ${formSection("区域与地址", `
              <div class="field"><label class="required">区域</label><select name="area" required>${REGIONS.map(r => `<option>${r}</option>`).join("")}</select></div>
              <div class="field"><label>地址</label><input name="address" placeholder="请输入服务地点"></div>
            `)}
            ${formSection("问题描述", `
              <div class="field wide"><label class="required">问题描述</label><textarea name="desc" required placeholder="请记录客户问题、现场情况或服务请求"></textarea></div>
            `)}
            ${formSection("附件 / 图片", `
              <div class="field wide"><label>附件说明</label><input name="attachments" placeholder="可填写照片、PDF 或客户资料名称；原型不做真实上传"></div>
            `)}
            ${formSection("是否需要派工", `
              <div class="field"><label>受理判断</label><select name="needDispatch"><option>需要派工</option><option>现场解决</option><option>取消</option></select></div>
              <div class="field"><label>备注 / 标签</label><input name="tags" placeholder="例如：紧急、图片附件、需补充资料"></div>
            `)}
            <div style="display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;">
              <button class="secondary-btn" type="button" id="draftBtn">保存草稿</button>
              <button class="primary-btn" type="submit">提交工单</button>
              <button class="ghost-btn" type="button" data-page-target="list">取消</button>
            </div>
          </form>
        </section>`;
    }

    function formSection(title, inner) {
      return `<div class="form-section"><h3>${title}</h3><div class="form-grid">${inner}</div></div>`;
    }

    function renderDetail() {
      const t = ticketById(state.selectedTicketId);
      return `
        <section class="page active">
          <div class="detail-hero card">
            <div class="detail-title">
              <h2>${t.id}</h2>
              <div style="display:flex; gap:8px; flex-wrap:wrap;"><span class="${statusClass(t.status)}">${t.status}</span><span class="tag">${t.type}</span><span class="chip">当前负责人：${escapeHtml(t.owner)}</span></div>
            </div>
            <div class="detail-actions">${actionButtons(t, "detail") || '<span class="chip">仅查看</span>'}</div>
          </div>
          <div class="split-layout">
            <div class="card">
              <h2>基础信息</h2>
              <div class="info-list" style="margin-top:12px;">
                ${infoRow("客户", t.customer)}
                ${infoRow("联系人", t.contact)}
                ${infoRow("联系电话", t.phone)}
                ${infoRow("来源渠道", t.channel)}
                ${infoRow("区域", t.area)}
                ${infoRow("地址", t.address)}
                ${infoRow("Team Leader", t.tl)}
                ${infoRow("师傅", t.master || "待分派")}
                ${infoRow("创建时间", t.createdAt)}
                ${infoRow("更新时间", t.updatedAt)}
              </div>
            </div>
            <div class="card">
              <h2>处理记录 / 时间线</h2>
              <p>${escapeHtml(t.desc)}</p>
              <div class="timeline" style="margin-top:14px;">
                ${t.records.map(r => `<div class="timeline-item"><span class="timeline-dot"></span><strong>${r.time} · ${escapeHtml(r.actor)}</strong><p>${escapeHtml(r.text)}</p></div>`).join("")}
              </div>
            </div>
            <div class="card">
              <h2>当前处理信息</h2>
              <div class="info-list" style="margin-top:12px;">
                ${infoRow("标签", t.tags.join("、") || "无")}
                ${infoRow("是否紧急", t.urgent ? "是" : "否")}
                ${infoRow("拒单原因", t.rejectReason || "无")}
                ${infoRow("取消原因", t.cancelReason || "无")}
              </div>
              <h3 style="margin-top:16px;">附件 / 图片</h3>
              <div class="photo-grid" style="margin-top:10px;">
                ${(t.attachments.length ? t.attachments : ["暂无附件"]).map((a, idx) => `<div class="photo-thumb">${escapeHtml(a)}${idx < t.attachments.length ? "" : ""}</div>`).join("")}
              </div>
            </div>
          </div>
        </section>`;
    }

    function infoRow(label, value) {
      return `<div class="info-row"><span>${label}</span><strong>${escapeHtml(value)}</strong></div>`;
    }

    function renderDispatch() {
      const pending = tickets.filter(t => t.status === "待分派");
      if (!pending.find(t => t.id === state.selectedDispatchId) && pending[0]) state.selectedDispatchId = pending[0].id;
      const selected = ticketById(state.selectedDispatchId);
      const master = masters.find(m => m.name === state.selectedMaster) || masters[0];
      return `
        <section class="page active">
          <div class="dispatch-grid">
            <div class="card">
              <div class="card-head"><h2>待分派工单</h2><span class="chip">${pending.length} 条</span></div>
              ${pending.map(t => `<button class="ticket-mini ${state.selectedDispatchId === t.id ? "active" : ""}" data-dispatch-ticket="${t.id}">
                <strong>${t.id}</strong><span class="${statusClass(t.status)}">${t.status}</span><p>${escapeHtml(t.customer)} · ${t.area} · ${t.type}</p><p>${escapeHtml(t.desc)}</p>
              </button>`).join("") || '<p>暂无待分派工单</p>'}
            </div>
            <div class="card">
              <div class="card-head"><h2>推荐师傅 / 可选师傅</h2><span class="chip">人工选择</span></div>
              ${masters.map(m => `<button class="master-card ${state.selectedMaster === m.name ? "active" : ""}" data-master="${m.name}">
                <span class="master-avatar">${m.name.slice(0,1)}</span>
                <span><strong>${m.name}</strong><p>${m.area} · ${m.skills} · 今日负载 ${m.load}</p></span>
                <span class="tag">${m.tag}</span>
              </button>`).join("")}
            </div>
            <div class="card">
              <h2>分派确认</h2>
              <div class="info-list" style="margin-top:12px;">
                ${infoRow("工单", selected?.id || "无")}
                ${infoRow("客户", selected?.customer || "无")}
                ${infoRow("区域", selected?.area || "无")}
                ${infoRow("选择师傅", master.name)}
                ${infoRow("师傅状态", master.status)}
              </div>
              <div class="field" style="margin-top:12px;"><label>分派备注</label><textarea id="assignNote" placeholder="填写派工说明或注意事项"></textarea></div>
              <button class="primary-btn" id="confirmAssign" style="width:100%;">确认分派</button>
            </div>
          </div>
        </section>`;
    }

    function renderReport() {
      const statusCounts = countBy("status");
      const typeCounts = countBy("type");
      const areaCounts = countBy("area");
      const masterCounts = tickets.reduce((acc, t) => {
        const name = t.master || "未分派";
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      return `
        <section class="page active">
          <div class="grid cols-4">
            <div class="card stat-card"><div class="stat-label">工单总数</div><div class="stat-value">${tickets.length}</div><div class="stat-note">较上周 +12%</div></div>
            <div class="card stat-card"><div class="stat-label">已关闭</div><div class="stat-value">${statusCounts["已关闭"] || 0}</div><div class="stat-note">闭环工单</div></div>
            <div class="card stat-card"><div class="stat-label">待确认</div><div class="stat-value">${statusCounts["待确认"] || 0}</div><div class="stat-note">需 TL / 主管处理</div></div>
            <div class="card stat-card"><div class="stat-label">已取消</div><div class="stat-value">${statusCounts["已取消"] || 0}</div><div class="stat-note">进入基础统计</div></div>
          </div>
          <div class="grid cols-3" style="margin-top:14px;">
            <div class="card"><h2>按状态统计</h2>${STATUSES.map(s => barRow(s, statusCounts[s] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按工单类型统计</h2>${TYPES.map(t => barRow(t, typeCounts[t] || 0, tickets.length)).join("")}</div>
            <div class="card"><h2>按区域统计</h2>${REGIONS.map(r => barRow(r, areaCounts[r] || 0, tickets.length)).join("")}</div>
          </div>
          <div class="grid cols-2" style="margin-top:14px;">
            <div class="card"><h2>按师傅统计</h2>${Object.entries(masterCounts).map(([k,v]) => barRow(k, v, tickets.length)).join("")}</div>
            <div class="card">
              <div class="card-head"><h2>最近 7 天趋势</h2><span class="chip">基础趋势</span></div>
              <div class="trend">${[3,5,4,7,6,8,9].map((v,i) => `<div class="trend-col"><div class="trend-bar" style="height:${v * 13}px"></div><span>06-${9+i}</span></div>`).join("")}</div>
              <p>第一版只做状态、类型、区域、师傅等基础统计，不做成本、绩效、SLA、财务、采购或复杂 BI。</p>
            </div>
          </div>
        </section>`;
    }

    function renderSettings() {
      const tabs = ["工单类型", "区域", "师傅 / 处理人", "Team Leader", "状态说明", "通知规则"];
      const contentMap = {
        "工单类型": TYPES.map((t, i) => ({ a: t, b: ["CALL", "PM", "CM"][i], c: "启用" })),
        "区域": REGIONS.map(r => ({ a: r, b: "用于分派和统计", c: "启用" })),
        "师傅 / 处理人": masters.map(m => ({ a: m.name, b: `${m.area} · ${m.skills}`, c: m.status })),
        "Team Leader": teamLeaders.map((t, i) => ({ a: t, b: i === 0 ? "九龙 / 香港" : "新界 / 特殊任务", c: "启用" })),
        "状态说明": STATUSES.map(s => ({ a: s, b: "MVP 固定状态，不新增主状态", c: "启用" })),
        "通知规则": [
          { a: "待分派通知", b: "进入待分派后提醒 Team Leader", c: "系统内提醒" },
          { a: "分派通知", b: "分派后提醒师傅", c: "系统内提醒" },
          { a: "待确认通知", b: "师傅提交后提醒 TL / 主管", c: "系统内提醒" }
        ]
      };
      const rows = contentMap[state.settingsTab].map(item => `<tr><td>${item.a}</td><td>${item.b}</td><td><span class="tag">${item.c}</span></td><td><button class="ghost-btn">查看</button></td></tr>`).join("");
      return `
        <section class="page active">
          <div class="card">
            <div class="card-head"><div><h2>基础设置，简化版</h2><p>只维护 MVP 原型所需基础口径，不做复杂后台。</p></div><span class="chip">主管 / 管理员</span></div>
            <div class="settings-tabs">${tabs.map(t => `<button class="${state.settingsTab === t ? "active" : ""}" data-setting-tab="${t}">${t}</button>`).join("")}</div>
            <div class="data-table-wrap"><table><thead><tr><th>名称</th><th>说明</th><th>状态 / 规则</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>
          </div>
        </section>`;
    }

    function renderPc() {
      const map = {
        dashboard: renderDashboard,
        list: renderList,
        create: renderCreate,
        detail: renderDetail,
        dispatch: renderDispatch,
        report: renderReport,
        settings: renderSettings
      };
      $("#pcPages").innerHTML = map[state.page]();
    }

    function masterTickets(includeHistory = false) {
      const roleName = currentRole().name;
      let list = tickets.filter(t => t.master === roleName || t.owner === roleName);
      if (!list.length) list = tickets.filter(t => ["周师傅", "吴师傅", "梁师傅", "黄师傅"].includes(t.master));
      return includeHistory ? list.filter(t => ["已关闭", "已取消"].includes(t.status)) : list.filter(t => ["待接单", "处理中", "待确认"].includes(t.status));
    }

    function renderMobileTasks() {
      const list = masterTickets(false);
      return `
        <div class="segmented" style="width:100%; margin-bottom:10px;"><button class="active">待接单</button><button>处理中</button><button>待确认</button><button>历史</button></div>
        ${list.map(t => `<div class="mobile-card">
          <div class="mobile-card-head"><button class="link-btn" data-mobile-open="${t.id}">${t.id}</button><span class="${statusClass(t.status)}">${t.status}</span></div>
          <strong>${t.type}</strong>
          <div class="muted">${escapeHtml(t.customer)} · ${t.area}</div>
          <div>${escapeHtml(t.address)}</div>
          <div style="display:flex; gap:6px; flex-wrap:wrap;">${t.urgent ? '<span class="tag urgent">紧急</span>' : ''}<span class="chip">${t.channel}</span></div>
          <div class="mobile-actions">
            ${t.status === "待接单" ? `<button class="primary-btn" data-action="take" data-id="${t.id}">接单</button><button class="danger-btn" data-action="reject" data-id="${t.id}">拒单</button>` : `<button class="secondary-btn" data-mobile-open="${t.id}">查看详情</button>`}
          </div>
        </div>`).join("") || '<div class="mobile-card">暂无待处理任务</div>'}`;
    }

    function renderMobileDetail() {
      const t = ticketById(state.selectedTicketId);
      return `
        <div class="mobile-card">
          <div class="mobile-card-head"><strong>${t.id}</strong><span class="${statusClass(t.status)}">${t.status}</span></div>
          ${infoRow("客户", t.customer)}
          ${infoRow("电话", t.phone)}
          ${infoRow("来源", t.channel)}
          ${infoRow("区域", t.area)}
          ${infoRow("地址", t.address)}
          <p>${escapeHtml(t.desc)}</p>
          <div class="photo-grid">${(t.attachments.length ? t.attachments : ["暂无附件"]).map(a => `<div class="photo-thumb">${escapeHtml(a)}</div>`).join("")}</div>
        </div>
        <div class="fixed-mobile-actions">
          ${t.status === "待接单" ? `<button class="primary-btn" data-action="take" data-id="${t.id}">接单</button><button class="danger-btn" data-action="reject" data-id="${t.id}">拒单</button>` : ""}
          ${t.status === "处理中" ? `<button class="primary-btn" data-mobile-page="workRecord">开始处理</button><button class="secondary-btn" data-mobile-page="tasks">返回</button>` : ""}
          ${!["待接单", "处理中"].includes(t.status) ? `<button class="secondary-btn" data-mobile-page="tasks">返回任务</button><button class="ghost-btn" data-mobile-page="history">查看历史</button>` : ""}
        </div>`;
    }

    function renderWorkRecord() {
      const t = ticketById(state.selectedTicketId);
      return `
        <div class="mobile-card">
          <div class="mobile-card-head"><strong>处理记录</strong><span class="${statusClass(t.status)}">${t.status}</span></div>
          <div class="timeline">${t.records.map(r => `<div class="timeline-item"><span class="timeline-dot"></span><strong>${r.time} · ${escapeHtml(r.actor)}</strong><p>${escapeHtml(r.text)}</p></div>`).join("")}</div>
        </div>
        <div class="mobile-card">
          <strong>上传图片</strong>
          <div class="photo-grid"><div class="photo-thumb">上传占位</div><div class="photo-thumb">现场照片</div><div class="photo-thumb">完成照片</div></div>
          <div class="field"><label>处理结果</label><textarea id="mobileResult" placeholder="填写处理说明、异常原因或完成情况"></textarea></div>
          <button class="secondary-btn" style="width:100%; margin-bottom:8px;">上传照片</button>
          <button class="primary-btn" style="width:100%;" data-action="submitResult" data-id="${t.id}">提交处理结果</button>
        </div>`;
    }

    function renderHistory() {
      const list = masterTickets(true);
      return `
        <div class="field" style="margin-bottom:10px;"><label>状态筛选</label><select><option>全部历史</option><option>已关闭</option><option>已取消</option></select></div>
        ${list.map(t => `<div class="mobile-card">
          <div class="mobile-card-head"><button class="link-btn" data-mobile-open="${t.id}">${t.id}</button><span class="${statusClass(t.status)}">${t.status}</span></div>
          <strong>${escapeHtml(t.customer)}</strong>
          <div class="muted">${t.type} · ${t.updatedAt}</div>
          <button class="ghost-btn" data-mobile-open="${t.id}">查看详情</button>
        </div>`).join("") || '<div class="mobile-card">暂无历史工单</div>'}`;
    }

    function renderMobile() {
      const map = { tasks: renderMobileTasks, mobileDetail: renderMobileDetail, workRecord: renderWorkRecord, history: renderHistory };
      const page = MOBILE_PAGES.find(p => p.key === state.mobilePage);
      $("#mobileTitle").textContent = page.title;
      $("#mobileSub").textContent = `师傅移动端 · ${currentRole().name}`;
      $("#mobileBody").innerHTML = map[state.mobilePage]();
      $("#mobileTabs").innerHTML = MOBILE_PAGES.map(p => `<button class="${state.mobilePage === p.key ? "active" : ""}" data-mobile-page="${p.key}"><span>${p.label}</span></button>`).join("");
    }

    function bindEvents() {
      document.querySelectorAll("[data-role]").forEach(btn => btn.addEventListener("click", () => setRole(btn.dataset.role)));
      document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => {
        state.view = btn.dataset.view;
        if (state.view === "mobile" && state.role !== "MASTER") {
          state.role = "MASTER";
          toast("移动端默认切换为师傅视角");
        }
        render();
      }));
      document.querySelectorAll("[data-page]").forEach(btn => btn.addEventListener("click", () => setPage(btn.dataset.page)));
      document.querySelectorAll("[data-page-target]").forEach(btn => btn.addEventListener("click", () => setPage(btn.dataset.pageTarget)));
      document.querySelectorAll("[data-new-ticket]").forEach(btn => btn.addEventListener("click", () => {
        if (state.role !== "CS") {
          toast("当前角色通常不负责建单，可切换 CS 角色操作");
          return;
        }
        setPage("create");
      }));
      document.querySelectorAll("[data-open]").forEach(btn => btn.addEventListener("click", () => performAction("view", btn.dataset.open)));
      document.querySelectorAll("[data-action]").forEach(btn => btn.addEventListener("click", () => performAction(btn.dataset.action, btn.dataset.id)));
      document.querySelectorAll("[data-filter]").forEach(el => el.addEventListener("input", () => {
        state.filters[el.dataset.filter] = el.value;
        render();
      }));
      document.querySelectorAll("[data-dispatch-ticket]").forEach(btn => btn.addEventListener("click", () => {
        state.selectedDispatchId = btn.dataset.dispatchTicket;
        render();
      }));
      document.querySelectorAll("[data-master]").forEach(btn => btn.addEventListener("click", () => {
        state.selectedMaster = btn.dataset.master;
        render();
      }));
      const confirmAssign = $("#confirmAssign");
      if (confirmAssign) {
        confirmAssign.addEventListener("click", () => {
          const t = ticketById(state.selectedDispatchId);
          updateTicket(t.id, { status: "待接单", owner: state.selectedMaster, master: state.selectedMaster }, `Team Leader 已分派给 ${state.selectedMaster}。`);
          state.selectedTicketId = t.id;
          render();
          toast("已模拟分派，状态变为待接单");
        });
      }
      document.querySelectorAll("[data-setting-tab]").forEach(btn => btn.addEventListener("click", () => {
        state.settingsTab = btn.dataset.settingTab;
        render();
      }));
      document.querySelectorAll("[data-mobile-page]").forEach(btn => btn.addEventListener("click", () => setMobilePage(btn.dataset.mobilePage)));
      document.querySelectorAll("[data-mobile-open]").forEach(btn => btn.addEventListener("click", () => {
        state.selectedTicketId = btn.dataset.mobileOpen;
        setMobilePage("mobileDetail");
      }));
      const form = $("#createForm");
      if (form) {
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(form);
          const id = `WO-20260615-${String(tickets.length + 1).padStart(3, "0")}`;
          const newTicket = {
            id,
            type: data.get("type"),
            customer: data.get("customer"),
            contact: data.get("contact"),
            phone: data.get("phone"),
            channel: data.get("channel"),
            area: data.get("area"),
            address: data.get("address") || "待补充",
            status: "待受理",
            owner: "CS 陈小姐",
            tl: "李组长",
            master: "",
            createdAt: "06-15 12:00",
            updatedAt: "06-15 12:00",
            desc: data.get("desc"),
            records: [{ time: "12:00", actor: "CS 陈小姐", text: "提交新工单，状态为待受理。" }],
            attachments: data.get("attachments") ? [data.get("attachments")] : [],
            tags: data.get("tags") ? [data.get("tags")] : [],
            urgent: false
          };
          tickets.unshift(newTicket);
          state.selectedTicketId = id;
          state.page = "detail";
          render();
          toast("已新增模拟工单，状态为待受理");
        });
      }
      const draftBtn = $("#draftBtn");
      if (draftBtn) draftBtn.addEventListener("click", () => toast("草稿仅展示，不作为 MVP 主状态"));
    }

    function render() {
      renderShell();
      if (state.view === "pc") renderPc();
      if (state.view === "mobile") renderMobile();
      bindEvents();
    }

    $("#collapseBtn").addEventListener("click", () => {
      $("#app").classList.toggle("sidebar-collapsed");
    });
    $("#themeBtn").addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem("ec-ui-theme", next);
      $("#themeBtn").textContent = next === "dark" ? "亮色模式" : "暗色模式";
    });
    $("#userMenuBtn").addEventListener("click", () => $("#userDropdown").classList.toggle("open"));
    document.addEventListener("click", (event) => {
      if (!event.target.closest(".user-menu")) $("#userDropdown").classList.remove("open");
    });

    const savedTheme = localStorage.getItem("ec-ui-theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
    $("#themeBtn").textContent = savedTheme === "dark" ? "亮色模式" : "暗色模式";
    render();
  </script>
</body>
</html>
