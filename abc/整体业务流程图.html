.stage{display:inline-block}

'subgraph 会计2["会计部"]\nA1["收到完工通知"]\nA2["核对完工单"]\nA3["开具发票 Invoice"]\nend\n'+
'T1-->T2\nT1-->T3\nT2-->T4\nT3-->T4\nT4-->|是|T5\nT4-->|否|T8\nT5-->T6\nT6-->T7\nT7-->T8\n'+
'T8-->T9\nT9-->|是|T10\nT9-->|否|T11\nT10-->T11\nT11-->T12\nT12-->T13\nT13-->T14\nT14-->T15\n'+
'T15-->N1\nT15-->N2\nT15-->N3\nT15-->N4\nT15-->N5\nN3-->A1\nA1-->A2\nA2-->A3\n'+
'classDef tech fill:#fff3e0,stroke:#e65100\nclassDef notify fill:#fce4ec,stroke:#c62828\n'+

src.s6='stateDiagram-v2\n'+
'[*]-->待处理:CS创建工单\n'+
'待处理-->已接单:师傅接单\n待处理-->已取消:投诉取消/拒单无人接/超时\n'+
'已接单-->处理中:签到到达现场\n已接单-->已取消:未按时到达/客户取消\n已接单-->待处理:拒单 CS重派\n'+
'state 处理中{\n'+
'开始检查-->可顺利维修\n开始检查-->无法即时维修\n开始检查-->需要更换材料\n'+
'可顺利维修-->执行维修\n执行维修-->填写竣工表\n'+
'无法即时维修-->填写故障报告\n无法即时维修-->取消工单重建\n'+
'需要更换材料-->提交领料\n提交领料-->采购部\n采购部-->材料到货\n材料到货-->执行维修\n}\n'+
'故障报告-->提交报价单\n提交报价单-->客户确认\n客户确认-->待处理:转为新工单\n'+
'填写竣工表-->客户签名\n客户签名-->已完成\n已完成-->系统通知\n系统通知-->会计部开票\n'+
'处理中-->需跟进:缺料/等人\n处理中-->未完成:无法修复\n'+
'未完成-->待处理:重新建单\n需跟进-->处理中:条件满足\n';

var titles={
  s0:'总体完整流程（从客户来电到会计开票）',
  s1:'一、来电→派单（上半段细节）',
  s1b:'二、现场执行→完工（下半段）',
  s2:'三、PM/CM 分类处理（185456）',
  s3:'四、现场执行三条路径（185151/185324）',
  s4:'五、超时与异常处理（185151）',
  s5:'六、完工闭环（185151/185324）',
  s6:'七、工单完整状态流转',
  s7:'八、角色与职责对照'
};

var stage=document.getElementById('stage');
var title=document.getElementById('title');
var zlbl=document.getElementById('zlbl');
var view=document.getElementById('view');
var nav=document.getElementById('nav');

var zoom=1;
var cur='s1';
var idx=0;
var natW=0; // natural SVG width, captured after render

function applyZoom(){
  zlbl.textContent=Math.round(zoom*100)+'%';
  var svg=stage.querySelector('svg');
  if(!svg||cur==='s7')return;
  svg.style.width=(natW*zoom)+'px';
  svg.style.height='auto';
}

function zin(){zoom=Math.min(3,zoom+0.25);applyZoom();}
function zout(){zoom=Math.max(0.25,zoom-0.25);applyZoom();}
function zreset(){zoom=1;applyZoom();}

function fitWidth(){
  var svg=stage.querySelector('svg');
  if(!svg||cur==='s7')return;
  var vw=view.clientWidth-48;
  zoom=Math.round((vw/natW)*100)/100;
  if(zoom<0.2)zoom=0.2;if(zoom>5)zoom=5;
  applyZoom();
}

function goFS(){
  if(document.fullscreenElement){document.exitFullscreen();}
  else{document.documentElement.requestFullscreen();}
}

async function render(secId){
  if(!src[secId] && secId!=='s7')return;
  cur=secId;zoom=1;natW=0;
  title.textContent=titles[secId]||'';
  var links=nav.querySelectorAll('a');
  for(var i=0;i<links.length;i++)links[i].classList.toggle('active',links[i].dataset.sec===secId);

  if(secId==='s7'){
    stage.innerHTML='<table>'+
    '<tr><th>角色</th><th>负责环节</th><th>输入</th><th>输出</th></tr>'+
    '<tr><td><b>登录系统</b></td><td>选择角色→选择员工→进入系统</td><td>角色+员工身份</td><td>登录态写入localStorage</td></tr>'+
    '<tr><td><b>客户</b></td><td>来电报修、确认报价、完工签名</td><td>维修需求</td><td>签名确认</td></tr>'+
    '<tr><td><b>CS 客服</b></td><td>接听、判断类型、录入工单、派单</td><td>客户来电</td><td>工单+派单</td></tr>'+
    '<tr><td><b>报价员</b></td><td>出报价单、客户确认、转工单</td><td>报价需求</td><td>已确认报价/工单</td></tr>'+
    '<tr><td><b>Super</b></td><td>派单、超时处理、异常重新分配</td><td>待派工单</td><td>已分配工单</td></tr>'+
    '<tr><td><b>师傅</b></td><td>接单/拒单、签到、检查、维修、拍照、完工</td><td>已派工单</td><td>完工单+照片</td></tr>'+
    '<tr><td><b>采购部</b></td><td>收到领料→创建PO→到货→ML绑出库</td><td>领料请求</td><td>物料到货</td></tr>'+
    '<tr><td><b>会计部</b></td><td>完工通知→核对→开票</td><td>完工通知</td><td>发票</td></tr>'+
    '<tr><td><b>CR 同事</b></td><td>处理投诉单</td><td>投诉工单</td><td>投诉处理结果</td></tr>'+
    '</table>';
    zlbl.textContent='-';
    return;
  }

  stage.innerHTML='<div style="padding:40px;color:#999;font-size:14px;">渲染中...</div>';
  try{
    idx++;
    var r=await mermaid.render('g'+idx,src[secId]);
    stage.innerHTML=r.svg;
    var svg=stage.querySelector('svg');
    if(svg){
      svg.removeAttribute('style');
      svg.style.display='block';
      natW=svg.getBoundingClientRect().width||svg.viewBox?.baseVal?.width||1200;
    }
    applyZoom();
    view.scrollTo(0,0);
  }catch(e){
    stage.innerHTML='<pre style="color:#c62828;font-size:13px;white-space:pre-wrap;">'+e.message+'\n\n'+(e.stack||'')+'</pre>';
  }
}

nav.addEventListener('click',function(e){
  var a=e.target.closest('a[data-sec]');
  if(!a||a.dataset.sec===cur)return;
  location.hash='#'+a.dataset.sec;
  render(a.dataset.sec);
});
document.getElementById('zin').addEventListener('click',zin);
document.getElementById('zout').addEventListener('click',zout);
document.getElementById('zreset').addEventListener('click',zreset);
document.getElementById('fit').addEventListener('click',fitWidth);
document.getElementById('fs').addEventListener('click',goFS);
document.addEventListener('keydown',function(e){
  if(!e.ctrlKey&&!e.metaKey)return;
  if(e.key==='='||e.key==='+'){e.preventDefault();zin();}
  if(e.key==='-'){e.preventDefault();zout();}
  if(e.key==='0'){e.preventDefault();zreset();}
});
var h=location.hash.slice(1);
if(!src[h] && h!=='s7')h='s0';
render(h);
location.hash='#'+h;
window.addEventListener('hashchange',function(){
  var h2=location.hash.slice(1);
  if(!src[h2] && h2!=='s7')return;
  render(h2);
});
})();
</script>
</body>
</html>
