<style>
:root{--nav-w:230px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#1a1a2e;color:#ccc;display:flex;height:100vh}
a{color:#64b5f6}

nav{width:var(--nav-w);background:#16213e;height:100vh;overflow-y:auto;flex-shrink:0;border-right:1px solid #0f3460}
nav h3{padding:20px 16px 12px;font-size:15px;color:#e0e0e0;border-bottom:1px solid #0f3460}
nav .mod{display:block;padding:12px 16px 6px;font-size:12px;color:#64b5f6;text-transform:uppercase;letter-spacing:1px;font-weight:600}
nav a{display:block;padding:6px 16px 6px 24px;font-size:13px;text-decoration:none;color:#90a4ae;border-left:3px solid transparent;transition:.15s;cursor:pointer}
nav a:hover,nav a.active{color:#fff;border-left-color:#42a5f5;background:rgba(66,165,245,.08)}

main{flex:1;height:100vh;display:flex;flex-direction:column;min-width:0}
header{background:#16213e;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0f3460;flex-shrink:0}
header h2{font-size:17px;color:#e0e0e0}

#view{flex:1;overflow:auto;padding:20px}
.card{background:#fff;border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,.3);padding:28px;color:#333;max-width:1100px}
.card h3{font-size:18px;margin-bottom:4px;color:#1a1a2e}
.card .src{font-size:12px;color:#999;margin-bottom:20px}
.card table{width:100%;border-collapse:collapse;margin-bottom:24px;font-size:14px}
.card th{background:#f5f5f5;padding:10px 12px;text-align:left;font-weight:600;border:1px solid #e0e0e0;font-size:13px}
.card td{padding:10px 12px;border:1px solid #e0e0e0;font-size:13px;vertical-align:top}
.card td b{color:#1a1a2e}
.required{color:#c62828;font-weight:700}
.optional{color:#999}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;margin-right:4px}
.tag-img{background:#e8f5e9;color:#2e7d32}
.tag-note{background:#e3f2fd;color:#1565c0}
.tag-deduced{background:#fff3e0;color:#e65100}
.tag-yida{background:#f3e5f5;color:#7b1fa2}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
</style>

// ═══════════════════════════════════════
// 渲染
// ═══════════════════════════════════════

var title=document.getElementById('title');
var content=document.getElementById('content');
var nav=document.getElementById('nav');
var cur='m1-p1';

function render(secId){
  var d=data[secId];
  if(!d)return;
  cur=secId;
  title.textContent=d.title;
  var links=nav.querySelectorAll('a');
  for(var i=0;i<links.length;i++)links[i].classList.toggle('active',links[i].dataset.sec===secId);

  var html='<h3>'+d.title+'</h3>';
  if(d.desc)html+='<div class="src" style="margin-bottom:16px">来源：'+d.desc+'</div>';
  if(d.note)html+='<div style="background:#f5f5f5;padding:12px;border-radius:4px;margin-bottom:20px;font-size:13px;color:#666;line-height:1.6">'+d.note+'</div>';

  html+='<table><tr><th>#</th><th>字段名称</th><th>字段标识</th><th>数据类型</th><th>必填</th><th>长度/取值</th><th>备注/来源</th></tr>';
  for(var i=0;i<d.fields.length;i++){
    var f=d.fields[i];
    if(f[0].indexOf('=====')===0){
      html+='<tr style="background:#f3f5f9"><td colspan="7" style="font-weight:700;font-size:13px;color:#555">'+f[0].replace(/===== /,'').replace(/ =====/,'')+'</td></tr>';
    }else{
      var req=f[3]==='是'?'<span class="required">● 必填</span>':(f[3]==='—'?'<span style="color:#999">—</span>':'<span class="optional">'+f[3]+'</span>');
      html+='<tr>'+
        '<td>'+(i+1)+'</td>'+
        '<td><b>'+f[0]+'</b></td>'+
        '<td><code>'+f[1]+'</code></td>'+
        '<td>'+f[2]+'</td>'+
        '<td>'+req+'</td>'+
        '<td>'+f[4]+'</td>'+
        '<td>'+f[5]+'</td>'+
        '</tr>';
    }
  }
  html+='</table>';
  content.innerHTML=html;
}

nav.addEventListener('click',function(e){
  var a=e.target.closest('a[data-sec]');
  if(!a||a.dataset.sec===cur)return;
  location.hash='#'+a.dataset.sec;
  render(a.dataset.sec);
});

var h=location.hash.slice(1);
if(!data[h])h='m1-p1';
render(h);
location.hash='#'+h;
window.addEventListener('hashchange',function(){
  var h2=location.hash.slice(1);
  if(!data[h2])return;
  render(h2);
});
})();
</script>
